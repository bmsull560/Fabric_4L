openapi: "3.1.0"
info:
  title: "Layer 2.5: Signal Refinery"
  description: |
    Turns L2 extraction output into trusted, evidence-backed ValueSignal objects.

    All endpoints require tenant context from the authenticated request (X-Tenant-ID header
    or JWT). tenant_id is never accepted from the request body.
  version: "0.1.0"
  contact:
    name: "Value Fabric Engineering"

servers:
  - url: "http://localhost:8007"
    description: "Local development"

tags:
  - name: signals
    description: ValueSignal CRUD, review, promote, and refinement

paths:
  /api/v1/signals:
    post:
      tags: [signals]
      summary: Create a ValueSignal
      operationId: createSignal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValueSignalCreate"
      responses:
        "201":
          description: Signal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignal"
        "422":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [signals]
      summary: List signals for an account
      operationId: listSignals
      parameters:
        - name: account_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: types
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ValueSignalType"
        - name: lifecycle_state
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ValueSignalLifecycleState"
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: min_trust_score
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: impact_area
          in: query
          schema:
            $ref: "#/components/schemas/SignalImpactArea"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated signal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignalListResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/signals/refine:
    post:
      tags: [signals]
      summary: Trigger L2.5 refinement on a batch of source refs
      operationId: refineSignals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalRefineRequest"
      responses:
        "202":
          description: Refinement accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  refined:
                    type: integer
                  signal_ids:
                    type: array
                    items:
                      type: string
                      format: uuid

  /api/v1/signals/account/{account_id}:
    get:
      tags: [signals]
      summary: All signals for an account
      operationId: getAccountSignals
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lifecycle_state
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ValueSignalLifecycleState"
        - name: types
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ValueSignalType"
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Account signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignalListResponse"

  /api/v1/signals/{signal_id}:
    get:
      tags: [signals]
      summary: Get a single signal
      operationId: getSignal
      parameters:
        - $ref: "#/components/parameters/SignalId"
      responses:
        "200":
          description: Signal found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignal"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [signals]
      summary: Partial update of a signal
      operationId: updateSignal
      parameters:
        - $ref: "#/components/parameters/SignalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValueSignalUpdate"
      responses:
        "200":
          description: Updated signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [signals]
      summary: Soft-delete a signal
      operationId: deleteSignal
      parameters:
        - $ref: "#/components/parameters/SignalId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/signals/{signal_id}/review:
    post:
      tags: [signals]
      summary: Submit human review (approve or reject)
      operationId: reviewSignal
      parameters:
        - $ref: "#/components/parameters/SignalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalReviewRequest"
      responses:
        "200":
          description: Reviewed signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/signals/{signal_id}/promote:
    post:
      tags: [signals]
      summary: Promote a signal to a value hypothesis
      operationId: promoteSignal
      parameters:
        - $ref: "#/components/parameters/SignalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalPromoteRequest"
      responses:
        "200":
          description: Promoted signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueSignal"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service healthy

components:
  parameters:
    SignalId:
      name: signal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Missing or invalid tenant context
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Signal not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ValueSignalType:
      type: string
      enum:
        - pain
        - opportunity
        - risk
        - expansion
        - renewal
        - cost_saving
        - revenue_uplift
        - efficiency
        - compliance
        - strategic_priority

    ValueSignalLifecycleState:
      type: string
      enum:
        - draft
        - extracted
        - validated
        - rejected
        - promoted
        - expired
        - superseded

    SignalImpactArea:
      type: string
      enum:
        - revenue
        - cost
        - risk
        - strategic

    ValueSignalEvidence:
      type: object
      required: [id, source_ref, confidence]
      properties:
        id:
          type: string
          format: uuid
        source_ref:
          type: string
        excerpt:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        document_id:
          type: string
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        relevance_score:
          type: number
          minimum: 0
          maximum: 1
          nullable: true

    ValueSignalProvenance:
      type: object
      required: [extractor, method, extracted_at]
      properties:
        extractor:
          type: string
          enum: [human, ai, system]
        method:
          type: string
        model:
          type: string
          nullable: true
        run_id:
          type: string
          nullable: true
        source_system:
          type: string
          nullable: true
        extracted_at:
          type: string
          format: date-time

    ValueSignal:
      type: object
      required:
        - id
        - tenant_id
        - account_id
        - type
        - content
        - confidence
        - trust_score
        - lifecycle_state
        - evidence
        - provenance
        - source_refs
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ValueSignalType"
        content:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        trust_score:
          type: number
          minimum: 0
          maximum: 1
        lifecycle_state:
          $ref: "#/components/schemas/ValueSignalLifecycleState"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ValueSignalEvidence"
        provenance:
          $ref: "#/components/schemas/ValueSignalProvenance"
        source_refs:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        opportunity_id:
          type: string
          format: uuid
          nullable: true
        value_driver_id:
          type: string
          format: uuid
          nullable: true
        stakeholder_id:
          type: string
          format: uuid
          nullable: true
        persona:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        impact_area:
          $ref: "#/components/schemas/SignalImpactArea"
          nullable: true
        estimated_value:
          type: number
          nullable: true
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          nullable: true
        time_horizon:
          type: string
          nullable: true
        validation_notes:
          type: string
          nullable: true
        reviewer_id:
          type: string
          format: uuid
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        supersedes_signal_id:
          type: string
          format: uuid
          nullable: true
        related_signal_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true

    ValueSignalCreate:
      type: object
      required: [account_id, type, content, confidence, provenance]
      properties:
        account_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ValueSignalType"
        content:
          type: string
          minLength: 1
          maxLength: 4000
        confidence:
          type: number
          minimum: 0
          maximum: 1
        trust_score:
          type: number
          minimum: 0
          maximum: 1
          default: 0
        lifecycle_state:
          $ref: "#/components/schemas/ValueSignalLifecycleState"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ValueSignalEvidence"
        provenance:
          $ref: "#/components/schemas/ValueSignalProvenance"
        source_refs:
          type: array
          items:
            type: string
        opportunity_id:
          type: string
          format: uuid
          nullable: true
        value_driver_id:
          type: string
          format: uuid
          nullable: true
        impact_area:
          $ref: "#/components/schemas/SignalImpactArea"
          nullable: true
        estimated_value:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true

    ValueSignalUpdate:
      type: object
      properties:
        lifecycle_state:
          $ref: "#/components/schemas/ValueSignalLifecycleState"
        validation_notes:
          type: string
          nullable: true
        reviewer_id:
          type: string
          format: uuid
          nullable: true
        impact_area:
          $ref: "#/components/schemas/SignalImpactArea"
          nullable: true
        estimated_value:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        time_horizon:
          type: string
          nullable: true
        value_driver_id:
          type: string
          format: uuid
          nullable: true

    SignalReviewRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [validated, rejected]
        notes:
          type: string
          nullable: true

    SignalPromoteRequest:
      type: object
      required: [value_path_category]
      properties:
        value_path_category:
          type: string
          enum: [revenue_uplift, cost_savings, risk_reduction, blended]
        value_driver_id:
          type: string
          format: uuid
          nullable: true

    SignalRefineRequest:
      type: object
      required: [account_id, source_refs]
      properties:
        account_id:
          type: string
          format: uuid
        source_refs:
          type: array
          items:
            type: string
          minItems: 1
        extraction_run_id:
          type: string
          nullable: true

    ValueSignalListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ValueSignal"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

  securitySchemes:
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
  - TenantHeader: []
