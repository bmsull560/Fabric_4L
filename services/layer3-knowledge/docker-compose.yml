version: "3.8"

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: value-fabric-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-valuefabric}
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Layer 3 API
  layer3-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: value-fabric-layer3
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8003
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-valuefabric}
      - NEO4J_DATABASE=valuefabric
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - LOG_LEVEL=INFO
    depends_on:
      - neo4j
    command: >
      sh -c "sleep 10 &&
             python -m uvicorn value_fabric.layer3.api.main:app
             --host 0.0.0.0
             --port 8003"

volumes:
  neo4j_data:
  neo4j_logs:
