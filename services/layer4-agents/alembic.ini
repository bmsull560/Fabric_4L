# Alembic configuration for Layer 4 Agents

[alembic]
# Path to migration scripts
script_location = migrations

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length for migration file slug
truncate_slug_length = 40

# SQLAlchemy URL — overridden at runtime by env_url in env.py
# Uses synchronous psycopg2 driver for Alembic (service uses asyncpg for runtime)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/layer4_agents

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
