# OpenTelemetry Tracing Configuration for Value Fabric
# Shared configuration for distributed tracing across all 6 layers

# Exporter Settings
exporter:
  otlp:
    # OTLP gRPC endpoint (OpenTelemetry Collector or Jaeger)
    endpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
    insecure: true
    headers:
      x-environment: production
    timeout: 10s
    
  jaeger:
    # Alternative: Direct Jaeger endpoint
    endpoint: "http://jaeger-collector.monitoring.svc.cluster.local:14250"
    insecure: true

# Tracer Provider Settings
provider:
  # Sampling strategy
  sampler:
    type: parentbased_traceidratio
    ratio: 0.1  # Sample 10% of traces (adjust in production)
    
  # Resource attributes - identify the service
  resource:
    attributes:
      - name: service.namespace
        value: value-fabric
      - name: deployment.environment
        value: production
      - name: host.name
        from_env: HOSTNAME
      - name: container.id
        from_env: CONTAINER_ID

# Propagators for trace context
propagators:
  - tracecontext  # W3C Trace Context
  - baggage       # W3C Baggage
  - jaeger        # Jaeger propagation (for backwards compatibility)

# Span Processors
processors:
  - type: batch
    schedule_delay_millis: 5000
    max_queue_size: 2048
    max_export_batch_size: 512
    export_timeout_millis: 30000

# Instrumentation Settings
instrumentation:
  # HTTP client/server instrumentation
  http:
    capture_headers:
      request: ["x-tenant-id", "x-request-id", "authorization"]
      response: ["x-request-id", "x-trace-id"]
    capture_body: false
    
  # Database instrumentation
  db:
    statement_sanitizer: true
    capture_parameters: false
    
  # Messaging instrumentation (Redis, RabbitMQ, etc.)
  messaging:
    capture_payload: false
    capture_headers: ["x-tenant-id", "x-workflow-id"]

# Cross-Layer Trace Headers
headers:
  # Headers to propagate across all requests
  trace_id: x-trace-id
  span_id: x-span-id
  parent_span_id: x-parent-span-id
  sampled: x-sampled
  baggage_prefix: x-fabric-

# Layer-Specific Settings
layers:
  layer1-ingestion:
    service_name: layer1-ingestion
    service_version: "1.0.0"
    attributes:
      layer: ingestion
      component: crawler
      
  layer2-extraction:
    service_name: layer2-extraction
    service_version: "1.0.0"
    attributes:
      layer: extraction
      component: llm-extraction
      
  layer3-knowledge:
    service_name: layer3-knowledge
    service_version: "1.0.0"
    attributes:
      layer: knowledge
      component: graph-engine
      
  layer4-agents:
    service_name: layer4-agents
    service_version: "1.0.0"
    attributes:
      layer: agents
      component: workflow-engine
      
  layer5-ground-truth:
    service_name: layer5-ground-truth
    service_version: "1.0.0"
    attributes:
      layer: ground-truth
      component: evaluation
      
  layer6-benchmarks:
    service_name: layer6-benchmarks
    service_version: "1.0.0"
    attributes:
      layer: benchmarks
      component: performance
