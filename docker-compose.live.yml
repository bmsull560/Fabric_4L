# Credentials must come from secure env injection; see .env.production-compose.template
# =============================================================================
# Fabric_4L Live Workflow Validation Stack
# =============================================================================
# Canonical local/Bunnyshell live validation stack.
# Combines the frontend with the full backend-integrated L1-L6 services so
# Playwright can validate real user workflows against live services.
#
# Usage:
#   docker-compose -f docker-compose.live.yml config
#   docker-compose -f docker-compose.live.yml up -d
#   docker-compose -f docker-compose.live.yml ps
#   docker-compose -f docker-compose.live.yml --profile seed run --rm live-seed
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: vf-live-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingestion
      POSTGRES_MULTIPLE_DATABASES: ingestion,layer2_extraction,ground_truth,layer4_agents
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - live-postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - live-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vf-live-redis
    command: redis-server
    volumes:
      - live-redis-data:/data
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: vf-live-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - live-neo4j-data:/data
    networks:
      - live-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: vf-live-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - live-minio-data:/data
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: vf-live-minio-init
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio';
        sleep 2;
      done;
      /usr/bin/mc mb myminio/layer1-raw-html || true;
      /usr/bin/mc anonymous set none myminio/layer1-raw-html || true;
      exit 0;
      "
    networks:
      - live-network

  # ---------------------------------------------------------------------------
  # Layer 1: Ingestion Service (internal container port 8000)
  # ---------------------------------------------------------------------------
  layer1:
    build:
      context: ./services/layer1-ingestion
      dockerfile: ./Dockerfile
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "false"
    container_name: vf-live-layer1
    environment:
      LAYER1_ENVIRONMENT: development
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      LAYER1_REDIS_URL: redis://redis:6379/0
      LAYER1_S3_ENDPOINT: http://minio:9000
      LAYER1_S3_ACCESS_KEY: minioadmin
      LAYER1_S3_SECRET_KEY: minioadmin
      LAYER1_S3_BUCKET: layer1-raw-html
      LAYER1_DEBUG: "true"
      LAYER1_API_PORT: 8000
      # Keep Docker readiness non-blocking during live-stack startup; full API checks run after the stack is ready.
      LAYER1_RELEASE_SMOKE_LIGHT_HEALTH: "true"
      JWT_SECRET: ${JWT_SECRET:-live-local-secret-do-not-use-in-production-minimum-32-chars}
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  layer1-worker:
    build:
      context: ./services/layer1-ingestion
      dockerfile: ./Dockerfile
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "false"
    container_name: vf-live-layer1-worker
    command: celery -A src.shared.tasks worker --loglevel=info --concurrency=2
    environment:
      LAYER1_ENVIRONMENT: development
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      LAYER1_REDIS_URL: redis://redis:6379/0
      LAYER1_S3_ENDPOINT: http://minio:9000
      LAYER1_S3_ACCESS_KEY: minioadmin
      LAYER1_S3_SECRET_KEY: minioadmin
      PYTHONPATH: /app
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network

  # ---------------------------------------------------------------------------
  # Layer 2: Extraction Service (internal container port 8000)
  # ---------------------------------------------------------------------------
  layer2:
    build:
      context: ./services/layer2-extraction
      dockerfile: ./Dockerfile
    container_name: vf-live-layer2
    environment:
      ENVIRONMENT: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: layer2_extraction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      LAYER2_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/layer2_extraction
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      LAYER3_API_URL: http://layer3:8001
      # Keep Docker readiness non-blocking during live-stack startup; full L2→L3 checks run after stack readiness.
      LAYER2_HEALTH_SKIP_LAYER3: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: gpt-4o
      LOG_LEVEL: info
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Layer 3: Knowledge Graph Service (internal container port 8001)
  # ---------------------------------------------------------------------------
  layer3:
    build:
      context: ./services/layer3-knowledge
      dockerfile: ./Dockerfile
    container_name: vf-live-layer3
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Layer 4: Agents Service (public host port 8004)
  # ---------------------------------------------------------------------------
  layer4:
    build:
      context: ./services/layer4-agents
      dockerfile: ./Dockerfile
    container_name: vf-live-layer4
    ports:
      - "8004:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-live-local-secret-do-not-use-in-production-minimum-32-chars}
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-live-local-service-auth-secret-do-not-use-in-production-32c}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/layer4_agents
      CHECKPOINT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ground_truth
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      LAYER1_URL: http://layer1:8000
      LAYER1_API_URL: http://layer1:8000
      LAYER2_URL: http://layer2:8000
      LAYER2_API_URL: http://layer2:8000
      LAYER3_URL: http://layer3:8001
      LAYER3_API_URL: http://layer3:8001
      LAYER5_GROUND_TRUTH_URL: http://layer5:8005
      LAYER6_BENCHMARKS_URL: http://layer6:8006
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: gpt-4o
      LOG_LEVEL: debug
      PYTHONPATH: /app
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Layer 5: Ground Truth Service (internal container port 8005)
  # ---------------------------------------------------------------------------
  layer5:
    build:
      context: ./services/layer5-ground-truth
      dockerfile: ./Dockerfile
    container_name: vf-live-layer5
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ground_truth
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/ground_truth
      LAYER3_BASE_URL: http://layer3:8001
      LAYER3_SYNC_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-live-local-secret-do-not-use-in-production-minimum-32-chars}
      JWT_ALGORITHM: HS256
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-live-local-service-auth-secret-do-not-use-in-production-32c}
      LOG_LEVEL: info
      API_PORT: 8005
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  layer5-migrate:
    build:
      context: ./services/layer5-ground-truth
      dockerfile: ./Dockerfile
    container_name: vf-live-layer5-migrate
    command:
      - sh
      - -lc
      - |
        attempts=0
        until alembic upgrade head; do
          attempts=$$((attempts + 1))
          if [ "$$attempts" -ge 24 ]; then
            echo "layer5 migration failed after $${attempts} attempts"
            exit 1
          fi
          echo "waiting for layer5 database ($${attempts}/24)"
          sleep 5
        done
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/ground_truth
      MIGRATION_CONNECT_ATTEMPTS: 12
      MIGRATION_CONNECT_DELAY_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network

  # ---------------------------------------------------------------------------
  # Layer 6: Benchmarks Service (internal container port 8006)
  # ---------------------------------------------------------------------------
  layer6:
    build:
      context: ./services/layer6-benchmarks
      dockerfile: ./Dockerfile
    container_name: vf-live-layer6
    environment:
      ENVIRONMENT: development
      PORT: 8006
      LOG_LEVEL: info
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Frontend — Live Workflow Validation UI (public host port 3001)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: vf-live-frontend
    ports:
      - "3001:3001"
    environment:
      VITE_API_BASE: /api/v1
      VITE_USE_MOCKS: "false"
      VITE_ENABLE_MOCK_FALLBACK: "false"
      VITE_ENABLE_SSE: "true"
      PLAYWRIGHT_LIVE_MODE: "true"
      VITE_PROXY_L1_URL: http://layer1:8000
      VITE_PROXY_L2_URL: http://layer2:8000
      VITE_PROXY_L3_URL: http://layer3:8001
      VITE_PROXY_L4_URL: http://layer4:8000
      VITE_PROXY_L5_URL: http://layer5:8005
      VITE_PROXY_L6_URL: http://layer6:8006
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - live-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  live-seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: vf-live-seed
    command: ["sh", "-lc", "PLAYWRIGHT_LIVE_MODE=true PLAYWRIGHT_BACKEND_URL=http://layer4:8000 pnpm run seed:live"]
    environment:
      PLAYWRIGHT_LIVE_MODE: "true"
      PLAYWRIGHT_BACKEND_URL: http://layer4:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - live-network

volumes:
  live-postgres-data:
  live-redis-data:
  live-neo4j-data:
  live-minio-data:

networks:
  live-network:
    driver: bridge