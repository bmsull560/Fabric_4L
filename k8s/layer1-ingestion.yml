apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer1-ingestion
  namespace: value-fabric
  labels:
    app: layer1-ingestion
    component: layer1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: layer1-ingestion
  template:
    metadata:
      labels:
        app: layer1-ingestion
        component: layer1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      containers:
        - name: api
          image: services/layer1-ingestion:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer1-db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
            - name: BROWSERBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: browserbase-secret
                  key: api-key
                  optional: true
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: firecrawl-secret
                  key: api-key
                  optional: true
            - name: LOG_LEVEL
              value: "info"
            - name: CRAWL_RATE_LIMIT_PER_DOMAIN
              value: "1"
            - name: TMPDIR
              value: "/tmp"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: raw-content
              mountPath: /app/raw-content
            - name: tmp
              mountPath: /tmp
        # Celery worker sidecar
        - name: celery-worker
          image: services/layer1-ingestion:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["celery", "-A", "layer1_ingestion.src.shared.tasks", "worker", "-l", "info"]
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer1-db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
            - name: LOG_LEVEL
              value: "info"
            - name: TMPDIR
              value: "/tmp"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - layer1_ingestion.src.shared.tasks
                - inspect
                - --timeout
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - celery
                - -A
                - layer1_ingestion.src.shared.tasks
                - inspect
                - --timeout
                - "5"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - celery
                - -A
                - layer1_ingestion.src.shared.tasks
                - inspect
                - --timeout
                - "5"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: raw-content
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: layer1-ingestion
  namespace: value-fabric
  labels:
    app: layer1-ingestion
    component: layer1
spec:
  selector:
    app: layer1-ingestion
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
