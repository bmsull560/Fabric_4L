apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Istio routing stack.
# This kustomization MUST NOT import ../../base.
# Hostnames use sentinel values __HOST__ / __API_HOST__ replaced by the
# deployment overlay via Kustomize `replacements:` keyed off a routing-host ConfigMap.

resources:
  - gateway.yaml
  - virtualservice.yaml
  - destinationrule.yaml
  - peerauthentication.yaml
  - authorizationpolicy.yaml
