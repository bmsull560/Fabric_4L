# NGINX Ingress resources.
# Hosts use sentinel values __HOST__ (frontend) and __API_HOST__ (layer APIs).
# These are replaced by the deployment overlay via Kustomize `replacements:`
# keyed off a `routing-host` ConfigMap. CI fails if any sentinel survives a render.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: value-fabric
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    # oauth2-proxy authentication
    nginx.ingress.kubernetes.io/auth-url: "https://oauth2-proxy.value-fabric.svc.cluster.local:4443/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-tls-secret: "value-fabric/oauth2-proxy-service-tls"
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "false"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header Authorization "";
      proxy_set_header X-Auth-Request-User "";
      proxy_set_header X-Auth-Request-Email "";
    nginx.ingress.kubernetes.io/auth-signin: "https://__HOST__/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,Authorization"
    # Rate limiting: 10 req/sec, 100 req/min, burst multiplier 5
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "100"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __HOST__
      secretName: frontend-tls
  rules:
    - host: __HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: layer-apis
  namespace: value-fabric
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # oauth2-proxy authentication
    nginx.ingress.kubernetes.io/auth-url: "https://oauth2-proxy.value-fabric.svc.cluster.local:4443/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-tls-secret: "value-fabric/oauth2-proxy-service-tls"
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "false"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header Authorization "";
      proxy_set_header X-Auth-Request-User "";
      proxy_set_header X-Auth-Request-Email "";
    nginx.ingress.kubernetes.io/auth-signin: "https://__API_HOST__/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,Authorization"
    # Rate limiting: 20 req/sec, 200 req/min for API (higher than frontend)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "200"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __API_HOST__
      secretName: layer-apis-tls
  rules:
    - host: __API_HOST__
      http:
        paths:
          - path: /layer1
            pathType: Prefix
            backend:
              service:
                name: layer1-ingestion
                port:
                  number: 8000
          - path: /layer2
            pathType: Prefix
            backend:
              service:
                name: layer2-extraction
                port:
                  number: 8000
          - path: /layer3
            pathType: Prefix
            backend:
              service:
                name: layer3-knowledge
                port:
                  number: 8001
          - path: /layer4
            pathType: Prefix
            backend:
              service:
                name: layer4-agents
                port:
                  number: 8000
          - path: /layer5
            pathType: Prefix
            backend:
              service:
                name: layer5-ground-truth
                port:
                  number: 8005
          - path: /layer6
            pathType: Prefix
            backend:
              service:
                name: layer6-benchmarks
                port:
                  number: 8006
