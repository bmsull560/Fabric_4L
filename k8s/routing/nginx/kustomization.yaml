apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NGINX routing stack.
# This kustomization MUST NOT import ../../base. It defines only routing/TLS resources
# that bind to Services produced by the env overlay it is composed with under
# k8s/deployments/<env>-nginx/.
#
# Hostnames in ingress.yaml use the sentinel value __HOST__ / __API_HOST__.
# The deployment overlay is responsible for replacing those via Kustomize
# `replacements:` keyed off a routing-host ConfigMap.

resources:
  - clusterissuer.yaml
  - ingress.yaml
