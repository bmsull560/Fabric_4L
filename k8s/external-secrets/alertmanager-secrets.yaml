# Alertmanager - External Secrets Configuration
# Syncs secrets from Vault for Slack and PagerDuty notifications
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-secrets
  namespace: value-fabric
  labels:
    component: monitoring
    service: alertmanager
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: alertmanager-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Slack webhook URL for notifications (required)
        slack_webhook_url: "{{ .slack_webhook_url }}"

        # PagerDuty integration key for critical alerts (required for PagerDuty alerts)
        pagerduty_integration_key: "{{ .pagerduty_integration_key }}"

        # Webhook fallback URLs (optional - only used if webhook receiver is configured)
        default_webhook_url: '{{ .default_webhook_url | default "" }}'
        critical_webhook_url: '{{ .critical_webhook_url | default "" }}'
        
  data:
    # Slack webhook for notifications
    - secretKey: slack_webhook_url
      remoteRef:
        key: value-fabric/monitoring
        property: slack-webhook-url
    
    # PagerDuty service integration key
    - secretKey: pagerduty_integration_key
      remoteRef:
        key: value-fabric/monitoring
        property: pagerduty-integration-key
    
    # Webhook fallback URLs (optional)
    - secretKey: default_webhook_url
      remoteRef:
        key: value-fabric/monitoring
        property: default-webhook-url
    
    - secretKey: critical_webhook_url
      remoteRef:
        key: value-fabric/monitoring
        property: critical-webhook-url
