# ExternalSecret templates for oauth2-proxy OIDC credentials
# These reference Vault/Infisical/Azure Key Vault for actual secret values
# Placeholder values must be replaced by the secret store before deployment
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-oidc
  namespace: value-fabric
  labels:
    app: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend  # Or your configured secret store
  target:
    name: oauth2-proxy-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        # OIDC provider configuration
        # These values must be populated from your secret store
        issuer-url: "{{ .issuer_url | default \"__OIDC_ISSUER_URL__\" }}"
        client-id: "{{ .client_id | default \"__OIDC_CLIENT_ID__\" }}"
        client-secret: "{{ .client_secret | default \"__OIDC_CLIENT_SECRET__\" }}"
        cookie-secret: "{{ .cookie_secret | default \"__COOKIE_SECRET__\" }}"
        # redirect-url is constructed from the hostname in the overlay
        redirect-url: "{{ .redirect_url | default \"__OIDC_REDIRECT_URL__\" }}"
  data:
    - secretKey: issuer_url
      remoteRef:
        key: oauth2-proxy/oidc
        property: issuer-url
    - secretKey: client_id
      remoteRef:
        key: oauth2-proxy/oidc
        property: client-id
    - secretKey: client_secret
      remoteRef:
        key: oauth2-proxy/oidc
        property: client-secret
    - secretKey: cookie_secret
      remoteRef:
        key: oauth2-proxy/oidc
        property: cookie-secret
    - secretKey: redirect_url
      remoteRef:
        key: oauth2-proxy/oidc
        property: redirect-url
