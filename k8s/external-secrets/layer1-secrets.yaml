# Layer 1 - Ingestion: External Secrets Configuration
# Syncs secrets from Vault for document crawling and processing
---
# Core application secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer1-core-secrets
  namespace: value-fabric
  labels:
    layer: layer1
    component: ingestion
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer1-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # LLM API Keys
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        ANTHROPIC_API_KEY: "{{ .anthropic_api_key | default \"\" }}"
        
        # External Service Keys
        BROWSERBASE_API_KEY: "{{ .browserbase_api_key | default \"\" }}"
        FIRECRAWL_API_KEY: "{{ .firecrawl_api_key | default \"\" }}"
        
        # Redis (if not using native K8s secret)
        REDIS_URL: "{{ .redis_url | default \"redis://redis:6379\" }}"
        
        # Internal auth
        LAYER3_API_KEY: "{{ .layer3_api_key }}"
        
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: value-fabric/llm
        property: openai-api-key
    
    - secretKey: anthropic_api_key
      remoteRef:
        key: value-fabric/llm
        property: anthropic-api-key
    
    - secretKey: browserbase_api_key
      remoteRef:
        key: value-fabric/external-services
        property: browserbase-api-key
    
    - secretKey: firecrawl_api_key
      remoteRef:
        key: value-fabric/external-services
        property: firecrawl-api-key
    
    - secretKey: redis_url
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-url
    
    - secretKey: layer3_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer3-api-key

---
# Database credentials (dynamic from Vault DB secrets engine)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer1-database-credentials
  namespace: value-fabric
  labels:
    layer: layer1
    component: database
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer1-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/ingestion?sslmode=require"
        DB_HOST: "postgres.value-fabric.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "ingestion"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/layer1-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/layer1-app
        property: password

---
# JWT and Auth secrets (shared across layers)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer1-auth-secrets
  namespace: value-fabric
  labels:
    layer: layer1
    component: auth
spec:
  refreshInterval: "24h"  # JWT keys rotate daily
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer1-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY_HMAC_SECRET: "{{ .api_key_hmac_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: value-fabric/auth
        property: jwt-secret
    - secretKey: api_key_hmac_secret
      remoteRef:
        key: value-fabric/auth
        property: api-key-hmac-secret
