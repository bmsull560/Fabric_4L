# Layer 4 - Agents: External Secrets Configuration
# Syncs secrets for workflow orchestration and agent execution
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer4-core-secrets
  namespace: value-fabric
  labels:
    layer: layer4
    component: agents
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer4-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # LLM API Keys (agents use LLM heavily)
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        ANTHROPIC_API_KEY: "{{ .anthropic_api_key | default \"\" }}"
        
        # Thesys C1 Generative UI
        THESYS_API_KEY: "{{ .thesys_api_key | default \"\" }}"
        THESYS_ENDPOINT: "{{ .thesys_endpoint | default \"\" }}"
        
        # CRM Integration (optional based on CRM_TYPE)
        CRM_TYPE: "{{ .crm_type | default \"none\" }}"
        CRM_API_KEY: "{{ .crm_api_key | default \"\" }}"
        CRM_API_SECRET: "{{ .crm_api_secret | default \"\" }}"
        CRM_INSTANCE_URL: "{{ .crm_instance_url | default \"\" }}"
        
        # Database connections
        NEO4J_URI: "{{ .neo4j_uri | default \"neo4j+s://neo4j:7687\" }}"
        NEO4J_USER: "{{ .neo4j_user | default \"neo4j\" }}"
        NEO4J_PASSWORD: "{{ .neo4j_password }}"
        
        REDIS_URL: "{{ .redis_url | default \"rediss://redis:6379\" }}"
        
        # Email/Notifications
        SMTP_HOST: "{{ .smtp_host | default \"\" }}"
        SMTP_PORT: "{{ .smtp_port | default \"587\" }}"
        SMTP_USER: "{{ .smtp_user | default \"\" }}"
        SMTP_PASSWORD: "{{ .smtp_password | default \"\" }}"
        
        # Inter-layer auth
        LAYER3_API_KEY: "{{ .layer3_api_key }}"
        LAYER5_API_KEY: "{{ .layer5_api_key }}"
        
        # LLM Cost Tracking (FinOps)
        LLM_COST_ALERT_THRESHOLD: "{{ .llm_cost_threshold | default \"100.0\" }}"
        
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: value-fabric/llm
        property: openai-api-key
    
    - secretKey: anthropic_api_key
      remoteRef:
        key: value-fabric/llm
        property: anthropic-api-key
    
    - secretKey: thesys_api_key
      remoteRef:
        key: value-fabric/external-services
        property: thesys-api-key
    
    - secretKey: thesys_endpoint
      remoteRef:
        key: value-fabric/external-services
        property: thesys-endpoint
    
    - secretKey: crm_type
      remoteRef:
        key: value-fabric/crm
        property: crm-type
    
    - secretKey: crm_api_key
      remoteRef:
        key: value-fabric/crm
        property: crm-api-key
    
    - secretKey: crm_api_secret
      remoteRef:
        key: value-fabric/crm
        property: crm-api-secret
    
    - secretKey: crm_instance_url
      remoteRef:
        key: value-fabric/crm
        property: crm-instance-url
    
    - secretKey: neo4j_password
      remoteRef:
        key: value-fabric/database
        property: neo4j-password
    
    - secretKey: neo4j_uri
      remoteRef:
        key: value-fabric/database
        property: neo4j-uri
    
    - secretKey: neo4j_user
      remoteRef:
        key: value-fabric/database
        property: neo4j-user
    
    - secretKey: redis_url
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-url
    
    - secretKey: smtp_host
      remoteRef:
        key: value-fabric/notifications
        property: smtp-host
    
    - secretKey: smtp_port
      remoteRef:
        key: value-fabric/notifications
        property: smtp-port
    
    - secretKey: smtp_user
      remoteRef:
        key: value-fabric/notifications
        property: smtp-user
    
    - secretKey: smtp_password
      remoteRef:
        key: value-fabric/notifications
        property: smtp-password
    
    - secretKey: layer3_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer3-api-key
    
    - secretKey: layer5_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer5-api-key
    
    - secretKey: llm_cost_threshold
      remoteRef:
        key: value-fabric/finops
        property: llm-cost-threshold

---
# Database credentials for checkpoint/persistence
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer4-database-credentials
  namespace: value-fabric
  labels:
    layer: layer4
    component: database
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer4-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/agents?sslmode=require"
        DB_HOST: "postgres.value-fabric.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "agents"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/layer4-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/layer4-app
        property: password

---
# Auth secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer4-auth-secrets
  namespace: value-fabric
  labels:
    layer: layer4
    component: auth
spec:
  refreshInterval: "24h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer4-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY_HMAC_SECRET: "{{ .api_key_hmac_secret }}"
        OIDC_CLIENT_SECRET: "{{ .oidc_client_secret | default \"\" }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: value-fabric/auth
        property: jwt-secret
    - secretKey: api_key_hmac_secret
      remoteRef:
        key: value-fabric/auth
        property: api-key-hmac-secret
    - secretKey: oidc_client_secret
      remoteRef:
        key: value-fabric/auth
        property: oidc-client-secret
