# HashiCorp Vault Integration for Value Fabric Secrets
# 
# This manifest provides an example of using Vault for production secret management.
# For local development, use k8s/secrets.yml with placeholder values.
# For production, integrate with your Vault instance.
#
# Prerequisites:
# - Vault cluster running and accessible from K8s cluster
# - Kubernetes auth method enabled in Vault
# - External Secrets Operator installed in cluster

---
# External Secret: OpenAI API Key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-api-key
  namespace: value-fabric
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: openai-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: value-fabric/llm
        property: openai-api-key

---
# External Secret: Neo4j Credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: neo4j-credentials
