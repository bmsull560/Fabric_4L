---
# ClusterSecretStore: Vault Backend Configuration
# This must be adapted to your specific Vault setup
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "$(VAULT_ADDR)"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "value-fabric-role"
          serviceAccountRef:
            name: "external-secrets-sa"
            namespace: "external-secrets"
