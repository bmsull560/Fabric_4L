---
# External Secret: JWT Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-signing-secret
  namespace: value-fabric
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: value-fabric/auth
        property: jwt-secret

---
# External Secret: PostgreSQL Password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-password
  namespace: value-fabric
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: postgres-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "postgres"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: value-fabric/database
        property: postgres-password

