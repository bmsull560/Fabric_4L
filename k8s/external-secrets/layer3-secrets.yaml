# Layer 3 - Knowledge: External Secrets Configuration
# Syncs secrets for knowledge graph and semantic search
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer3-core-secrets
  namespace: value-fabric
  labels:
    layer: layer3
    component: knowledge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer3-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Vector database (Pinecone or pgvector)
        PINECONE_API_KEY: "{{ .pinecone_api_key | default \"\" }}"
        PINECONE_ENVIRONMENT: "{{ .pinecone_environment | default \"\" }}"
        PINECONE_INDEX_NAME: "{{ .pinecone_index | default \"\" }}"
        
        # OpenAI for embeddings
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        
        # Neo4j (primary knowledge graph store)
        NEO4J_URI: "{{ .neo4j_uri | default \"bolt://neo4j:7687\" }}"
        NEO4J_USER: "{{ .neo4j_user | default \"neo4j\" }}"
        NEO4J_PASSWORD: "{{ .neo4j_password }}"
        
        # PostgreSQL (pgvector fallback)
        DATABASE_URL: "postgresql://{{ .pg_user }}:{{ .pg_password }}@postgres.value-fabric.svc.cluster.local:5432/knowledge?sslmode=require"
        
        # Redis for caching
        REDIS_URL: "{{ .redis_url | default \"redis://redis:6379\" }}"
        
        # Inter-layer auth
        LAYER4_API_KEY: "{{ .layer4_api_key }}"
        LAYER2_API_KEY: "{{ .layer2_api_key }}"
        
  data:
    - secretKey: pinecone_api_key
      remoteRef:
        key: value-fabric/vector-db
        property: pinecone-api-key
    
    - secretKey: pinecone_environment
      remoteRef:
        key: value-fabric/vector-db
        property: pinecone-environment
    
    - secretKey: pinecone_index
      remoteRef:
        key: value-fabric/vector-db
        property: pinecone-index
    
    - secretKey: openai_api_key
      remoteRef:
        key: value-fabric/llm
        property: openai-api-key
    
    - secretKey: neo4j_password
      remoteRef:
        key: value-fabric/database
        property: neo4j-password
    
    - secretKey: neo4j_uri
      remoteRef:
        key: value-fabric/database
        property: neo4j-uri
    
    - secretKey: neo4j_user
      remoteRef:
        key: value-fabric/database
        property: neo4j-user
    
    - secretKey: pg_user
      remoteRef:
        key: database/creds/layer3-app
        property: username
    
    - secretKey: pg_password
      remoteRef:
        key: database/creds/layer3-app
        property: password
    
    - secretKey: redis_url
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-url
    
    - secretKey: layer4_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer4-api-key
    
    - secretKey: layer2_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer2-api-key

---
# Database credentials (separate for granular access)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer3-database-credentials
  namespace: value-fabric
  labels:
    layer: layer3
    component: database
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer3-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/knowledge?sslmode=require"
        DB_HOST: "postgres.value-fabric.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "knowledge"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/layer3-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/layer3-app
        property: password

---
# Auth secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer3-auth-secrets
  namespace: value-fabric
  labels:
    layer: layer3
    component: auth
spec:
  refreshInterval: "24h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer3-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY_HMAC_SECRET: "{{ .api_key_hmac_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: value-fabric/auth
        property: jwt-secret
    - secretKey: api_key_hmac_secret
      remoteRef:
        key: value-fabric/auth
        property: api-key-hmac-secret
