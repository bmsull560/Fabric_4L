# Layer 5 - Ground Truth: External Secrets Configuration
# Syncs secrets for ground truth evaluation and validation workflows
---
# Database credentials for ground truth storage
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer5-database-credentials
  namespace: value-fabric
  labels:
    layer: layer5
    component: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer5-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql+asyncpg://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/ground_truth?sslmode=require"
        DATABASE_URL_SYNC: "postgresql+psycopg2://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/ground_truth?sslmode=require"
        DB_HOST: "postgres.value-fabric.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "ground_truth"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/layer5-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/layer5-app
        property: password

---
# Inter-layer API keys for Ground Truth service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer5-interlayer-secrets
  namespace: value-fabric
  labels:
    layer: layer5
    component: interlayer
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer5-interlayer
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # API key that other layers use to authenticate with Layer 5
        LAYER5_API_KEY: "{{ .layer5_api_key }}"
        # API key for Layer 5 to authenticate with other layers
        LAYER3_API_KEY: "{{ .layer3_api_key }}"
  data:
    - secretKey: layer5_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer5-api-key
    - secretKey: layer3_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer3-api-key
