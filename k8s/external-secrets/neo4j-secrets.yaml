# Neo4j: External Secrets Configuration
# Syncs Neo4j authentication and SSL certificates
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: neo4j-credentials
  namespace: value-fabric
  labels:
    component: neo4j
    tier: infrastructure
spec:
  refreshInterval: "24h"  # Neo4j password rotates daily
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: neo4j-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Neo4j authentication
        NEO4J_AUTH: "neo4j/{{ .neo4j_password }}"
        NEO4J_PASSWORD: "{{ .neo4j_password }}"
        
        # Connection strings for different protocols
        NEO4J_URI: "{{ .neo4j_uri | default \"bolt://neo4j:7687\" }}"
        NEO4J_BOLT_URL: "bolt://neo4j:{{ .neo4j_password }}@neo4j:7687"
        NEO4J_HTTP_URL: "http://neo4j:{{ .neo4j_password }}@neo4j:7474"
        
        # Neo4j user for app connections (non-admin)
        NEO4J_APP_USER: "{{ .neo4j_app_user | default \"app\" }}"
        NEO4J_APP_PASSWORD: "{{ .neo4j_app_password | default .neo4j_password }}"
        
  data:
    - secretKey: neo4j_password
      remoteRef:
        key: value-fabric/database
        property: neo4j-password
    
    - secretKey: neo4j_uri
      remoteRef:
        key: value-fabric/database
        property: neo4j-uri
    
    - secretKey: neo4j_app_user
      remoteRef:
        key: value-fabric/database
        property: neo4j-app-user
    
    - secretKey: neo4j_app_password
      remoteRef:
        key: value-fabric/database
        property: neo4j-app-password

---
# Neo4j SSL/TLS certificates (if using custom certs)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: neo4j-tls-certs
  namespace: value-fabric
  labels:
    component: neo4j
    tier: infrastructure
spec:
  refreshInterval: "168h"  # Weekly rotation for certs
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: neo4j-tls-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tls_cert }}"
        tls.key: "{{ .tls_key }}"
        ca.crt: "{{ .ca_cert | default \"\" }}"
  data:
    - secretKey: tls_cert
      remoteRef:
        key: value-fabric/certs/neo4j
        property: tls.crt
    
    - secretKey: tls_key
      remoteRef:
        key: value-fabric/certs/neo4j
        property: tls.key
    
    - secretKey: ca_cert
      remoteRef:
        key: value-fabric/certs/neo4j
        property: ca.crt
