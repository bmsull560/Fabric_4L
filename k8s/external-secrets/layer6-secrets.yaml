# Layer 6 - Benchmarks: External Secrets Configuration
# Syncs secrets for benchmark execution and result storage
---
# Database credentials for benchmark results storage
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer6-database-credentials
  namespace: value-fabric
  labels:
    layer: layer6
    component: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer6-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql+asyncpg://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/benchmarks?sslmode=require"
        DATABASE_URL_SYNC: "postgresql+psycopg2://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/benchmarks?sslmode=require"
        DB_HOST: "postgres.value-fabric.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "benchmarks"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/layer6-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/layer6-app
        property: password

---
# Inter-layer API keys for Benchmarks service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer6-interlayer-secrets
  namespace: value-fabric
  labels:
    layer: layer6
    component: interlayer
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer6-interlayer
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # API key for Layer 6 to authenticate with other layers
        LAYER3_API_KEY: "{{ .layer3_api_key }}"
        LAYER5_API_KEY: "{{ .layer5_api_key }}"
  data:
    - secretKey: layer3_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer3-api-key
    - secretKey: layer5_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer5-api-key
