# Redis: External Secrets Configuration
# Syncs Redis password and connection strings
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: value-fabric
  labels:
    component: redis
    tier: infrastructure
spec:
  refreshInterval: "24h"  # Redis password rotates daily
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: redis-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Redis CLI format password (for Redis pod itself)
        REDIS_PASSWORD: "{{ .redis_password }}"
        
        # Connection URLs for different use cases
        REDIS_URL: "redis://:{{ .redis_password }}@redis:6379/0"
        REDIS_CACHE_URL: "redis://:{{ .redis_password }}@redis:6379/1"
        REDIS_QUEUE_URL: "redis://:{{ .redis_password }}@redis:6379/2"
        
        # Connection with sentinel (if using Redis HA)
        REDIS_SENTINEL_PASSWORD: "{{ .redis_sentinel_password | default .redis_password }}"
        REDIS_SENTINEL_HOSTS: "{{ .redis_sentinel_hosts | default \"redis-sentinel:26379\" }}"
        
  data:
    - secretKey: redis_password
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-password
    
    - secretKey: redis_sentinel_password
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-sentinel-password
    
    - secretKey: redis_sentinel_hosts
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-sentinel-hosts

---
# Redis ACL users (if using Redis 6+ ACLs)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-acl-credentials
  namespace: value-fabric
  labels:
    component: redis
    tier: infrastructure
spec:
  refreshInterval: "24h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: redis-acl-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # App-specific Redis users (least privilege)
        REDIS_APP_USER: "{{ .redis_app_user | default \"app\" }}"
        REDIS_APP_PASSWORD: "{{ .redis_app_password }}"
        REDIS_QUEUE_USER: "{{ .redis_queue_user | default \"queue\" }}"
        REDIS_QUEUE_PASSWORD: "{{ .redis_queue_password }}"
        REDIS_CACHE_USER: "{{ .redis_cache_user | default \"cache\" }}"
        REDIS_CACHE_PASSWORD: "{{ .redis_cache_password }}"
        
  data:
    - secretKey: redis_app_password
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-app-password
    
    - secretKey: redis_app_user
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-app-user
    
    - secretKey: redis_queue_password
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-queue-password
    
    - secretKey: redis_queue_user
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-queue-user
    
    - secretKey: redis_cache_password
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-cache-password
    
    - secretKey: redis_cache_user
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-cache-user
