# ClusterSecretStore for HashiCorp Vault integration
# Provides cluster-wide access to Vault secrets via Kubernetes auth
#
# Prerequisites:
# - Vault deployed and Kubernetes auth enabled
# - External Secrets Operator installed
# - value-fabric namespace labeled with secrets=enabled
#
# For production with TLS:
# - Mount CA cert as ConfigMap or use cert-manager
# - Change server URL to https://vault.vault.svc.cluster.local:8200
# - Uncomment caProvider section below
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # Dev: http://, Prod: https:// with caProvider
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      # Uncomment for production TLS (with mounted CA cert):
      # caProvider:
      #   type: ConfigMap
      #   name: vault-ca-cert
      #   key: ca.crt
      #   namespace: vault
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
  conditions:
    - namespaceSelector:
        matchLabels:
          secrets: enabled
  retrySettings:
    maxRetries: 5
    retryInterval: "10s"
---
# Alternative: Namespace-scoped SecretStore for prod isolation
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: value-fabric
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "value-fabric-prod"
          serviceAccountRef:
            name: value-fabric-sa
---
# ServiceAccount for Vault authentication
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    # This will be populated by Vault Kubernetes auth
    vault.hashicorp.com/role: "external-secrets"
---
# RBAC for External Secrets Operator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets-vault-reader
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-vault-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-secrets-vault-reader
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
