# Layer 2 - Extraction: External Secrets Configuration
# Syncs secrets for LLM-powered entity and value extraction
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer2-core-secrets
  namespace: value-fabric
  labels:
    layer: layer2
    component: extraction
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer2-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # LLM API Keys (critical for extraction)
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        OPENAI_ORG_ID: "{{ .openai_org_id | default \"\" }}"
        ANTHROPIC_API_KEY: "{{ .anthropic_api_key | default \"\" }}"
        
        # Azure OpenAI (if using)
        AZURE_OPENAI_API_KEY: "{{ .azure_openai_key | default \"\" }}"
        AZURE_OPENAI_ENDPOINT: "{{ .azure_openai_endpoint | default \"\" }}"
        
        # Neo4j for extracted entity storage
        NEO4J_URI: "{{ .neo4j_uri | default \"bolt://neo4j:7687\" }}"
        NEO4J_USER: "{{ .neo4j_user | default \"neo4j\" }}"
        NEO4J_PASSWORD: "{{ .neo4j_password }}"
        
        # Redis for caching extraction results
        REDIS_URL: "{{ .redis_url | default \"redis://redis:6379\" }}"
        
        # Internal service auth
        LAYER3_API_KEY: "{{ .layer3_api_key }}"
        LAYER1_API_KEY: "{{ .layer1_api_key }}"
        
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: value-fabric/llm
        property: openai-api-key
    
    - secretKey: openai_org_id
      remoteRef:
        key: value-fabric/llm
        property: openai-org-id
    
    - secretKey: anthropic_api_key
      remoteRef:
        key: value-fabric/llm
        property: anthropic-api-key
    
    - secretKey: azure_openai_key
      remoteRef:
        key: value-fabric/llm
        property: azure-openai-key
    
    - secretKey: azure_openai_endpoint
      remoteRef:
        key: value-fabric/llm
        property: azure-openai-endpoint
    
    - secretKey: neo4j_password
      remoteRef:
        key: value-fabric/database
        property: neo4j-password
    
    - secretKey: neo4j_uri
      remoteRef:
        key: value-fabric/database
        property: neo4j-uri
    
    - secretKey: neo4j_user
      remoteRef:
        key: value-fabric/database
        property: neo4j-user
    
    - secretKey: redis_url
      remoteRef:
        key: value-fabric/infrastructure
        property: redis-url
    
    - secretKey: layer3_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer3-api-key
    
    - secretKey: layer1_api_key
      remoteRef:
        key: value-fabric/inter-layer
        property: layer1-api-key

---
# Database credentials for extraction metadata
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer2-database-credentials
  namespace: value-fabric
  labels:
    layer: layer2
    component: database
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer2-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@postgres.value-fabric.svc.cluster.local:5432/extraction?sslmode=require"
        DB_HOST: "postgres.value-fabric.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "extraction"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/layer2-app
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/layer2-app
        property: password

---
# Auth secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer2-auth-secrets
  namespace: value-fabric
  labels:
    layer: layer2
    component: auth
spec:
  refreshInterval: "24h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer2-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY_HMAC_SECRET: "{{ .api_key_hmac_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: value-fabric/auth
        property: jwt-secret
    - secretKey: api_key_hmac_secret
      remoteRef:
        key: value-fabric/auth
        property: api-key-hmac-secret
