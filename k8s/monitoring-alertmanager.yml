apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: value-fabric
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url_file: '/etc/alertmanager/secrets/slack-api-url'

    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      receiver: slack-default
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Critical alerts go to PagerDuty + Slack
        - match:
            severity: critical
          receiver: pagerduty-critical
          continue: true
          repeat_interval: 1h
        - match:
            severity: critical
          receiver: slack-critical
          repeat_interval: 1h
        # Warning alerts go to Slack only
        - match:
            severity: warning
          receiver: slack-default
        # Formula approval alerts to dedicated channel
        - match:
            alertname: FormulaApprovalRequired
          receiver: slack-formula-approval
          repeat_interval: 30m

    receivers:
      # Default Slack notifications
      - name: slack-default
        slack_configs:
          - channel: '#vf-alerts'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            actions:
              - type: button
                text: 'View Runbook'
                url: '{{ if .CommonAnnotations.runbook_url }}{{ .CommonAnnotations.runbook_url }}{{ else }}https://docs.value-fabric.io/runbooks{{ end }}'
      # Critical Slack channel
      - name: slack-critical
        slack_configs:
          - channel: '#vf-alerts-critical'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            actions:
              - type: button
                text: 'View Runbook'
                url: '{{ if .CommonAnnotations.runbook_url }}{{ .CommonAnnotations.runbook_url }}{{ else }}https://docs.value-fabric.io/runbooks{{ end }}'
      # Formula approval notifications
      - name: slack-formula-approval
        slack_configs:
          - channel: '#vf-formula-approvals'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
      # PagerDuty for critical alerts
      - name: pagerduty-critical
        pagerduty_configs:
          - service_key_file: '/etc/alertmanager/secrets/pagerduty-integration-key'
            severity: critical
            description: '{{ if .CommonAnnotations.summary }}{{ .CommonAnnotations.summary }}{{ else }}{{ .GroupLabels.alertname }} - Critical Alert{{ end }}'
            details:
              runbook_url: '{{ if .CommonAnnotations.runbook_url }}{{ .CommonAnnotations.runbook_url }}{{ else }}https://docs.value-fabric.io/runbooks{{ end }}'
              firing_alerts: '{{ .Alerts.Firing | len }}'
      # Webhook fallback (for compatibility)
      - name: default
        webhook_configs:
          - url_file: '/etc/alertmanager/secrets/default_webhook_url'
            send_resolved: true
      - name: critical
        webhook_configs:
          - url_file: '/etc/alertmanager/secrets/critical_webhook_url'
            send_resolved: true

    inhibit_rules:
      # Inhibit warnings when critical is firing for same alert
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname']

  # Slack notification templates
  slack.tmpl: |
    {{ define "slack.title" -}}
    [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}
    {{- end }}

    {{ define "slack.text" -}}
    {{ range .Alerts }}
    *Severity:* {{ .Labels.severity | title }}
    *Alert:* {{ .Annotations.summary }}
    *Description:* {{ .Annotations.description }}
    {{ if .Annotations.runbook_url }}*Runbook:* <{{ .Annotations.runbook_url }}|View Runbook>{{ end }}
    {{ if .GeneratorURL }}*Source:* <{{ .GeneratorURL }}|Prometheus>{{ end }}
    ---
    {{ end }}
    {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data
  namespace: value-fabric
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: value-fabric
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        component: monitoring
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.1
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: config
              mountPath: /etc/alertmanager/templates/slack.tmpl
              subPath: slack.tmpl
            - name: alerting-secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: alerting-secrets
          secret:
            secretName: alertmanager-secrets
            items:
              - key: default_webhook_url
                path: default_webhook_url
              - key: critical_webhook_url
                path: critical_webhook_url
              - key: slack-api-url
                path: slack-api-url
              - key: pagerduty-integration-key
                path: pagerduty-integration-key
        - name: data
          persistentVolumeClaim:
            claimName: alertmanager-data
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: value-fabric
  labels:
    app: alertmanager
    component: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
  type: ClusterIP
