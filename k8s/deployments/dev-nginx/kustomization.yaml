apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# dev-nginx: dev environment + NGINX Ingress routing.
# This is a SUPPORTED Phase 1 deployment target.

namespace: value-fabric

resources:
  - ../../envs/dev
  - ../../routing/nginx
  - hostname-config.yaml

# Propagate the single source of truth (routing-host ConfigMap) into every
# host/TLS field of the routing resources. CI fails if any __HOST__ /
# __API_HOST__ sentinel survives this render.
replacements:
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.host
    targets:
      - select:
          kind: Ingress
          name: frontend
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.apiHost
    targets:
      - select:
          kind: Ingress
          name: layer-apis
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
