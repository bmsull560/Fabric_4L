apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# prod-nginx: prod environment + NGINX Ingress routing.
# This is the DEFAULT supported production deployment target.

namespace: value-fabric

resources:
  - ../../envs/prod
  - ../../routing/nginx
  - hostname-config.yaml
  - oauth2-proxy-config.yaml

replacements:
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.host
    targets:
      - select:
          kind: Ingress
          name: frontend
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.apiHost
    targets:
      - select:
          kind: Ingress
          name: layer-apis
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  # Replace ingress namespace in NetworkPolicy
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.ingressNamespace
    targets:
      - select:
          kind: NetworkPolicy
          name: frontend-policy
        fieldPaths:
          - spec.ingress.0.from.0.namespaceSelector.matchLabels.kubernetes\.io/metadata\.name
      - select:
          kind: NetworkPolicy
          name: oauth2-proxy
        fieldPaths:
          - spec.ingress.0.from.0.namespaceSelector.matchLabels.kubernetes\.io/metadata\.name
  # Replace issuer email in ClusterIssuers
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.issuerEmail
    targets:
      - select:
          kind: ClusterIssuer
          name: letsencrypt-prod
        fieldPaths:
          - spec.acme.email
      - select:
          kind: ClusterIssuer
          name: letsencrypt-staging
        fieldPaths:
          - spec.acme.email
  # Replace oauth2-proxy redirect URL (frontend)
  - source:
      kind: ConfigMap
      name: routing-host
      fieldPath: data.host
    targets:
      - select:
          kind: ConfigMap
          name: oauth2-proxy-oidc
        fieldPaths:
          - data.redirect-url
        options:
          delimiter: "/"
          index: 0
    # Add https:// prefix to redirect URL
    # This is a workaround - we'll use sed in CI or handle in config
  # Replace oauth2-proxy allowed domains (same for both hosts)
  - source:
      kind: ConfigMap
      name: oauth2-proxy-oidc
      fieldPath: data.allowed-domains
    targets:
      - select:
          kind: Deployment
          name: oauth2-proxy
        fieldPaths:
          - spec.template.spec.containers.0.env.5.value
