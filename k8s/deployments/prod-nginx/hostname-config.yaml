apiVersion: v1
kind: ConfigMap
metadata:
  name: routing-host
  namespace: value-fabric
data:
  host: app.value-fabric.example.com
  apiHost: api.value-fabric.example.com
  # Ingress controller namespace for NetworkPolicy
  ingressNamespace: ingress-nginx
  # cert-manager ClusterIssuer email (must be replaced with valid email)
  issuerEmail: security@value-fabric.example.com
