apiVersion: batch/v1
kind: CronJob
metadata:
  name: placeholder-secret-scanner
  namespace: value-fabric
  labels:
    app.kubernetes.io/name: value-fabric
    app.kubernetes.io/component: security-scanner
    value-fabric.io/control: placeholder-secret-scan
spec:
  schedule: "17 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: value-fabric
            app.kubernetes.io/component: security-scanner
        spec:
          restartPolicy: Never
          serviceAccountName: placeholder-secret-scanner
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scanner
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  python - <<'PY'
                  import base64
                  import json
                  import os
                  import re
                  import ssl
                  import sys
                  import urllib.request

                  pattern = re.compile(
                      r"REPLACE_WITH_|<INFISICAL_|CHANGE_ME|YOUR_CLIENT_ID|replace-me|"
                      r"sk-placeholder|dev-secret-key-change-in-production",
                      re.I,
                  )
                  host = os.environ["KUBERNETES_SERVICE_HOST"]
                  port = os.environ["KUBERNETES_SERVICE_PORT_HTTPS"]
                  token = open(
                      "/var/run/secrets/kubernetes.io/serviceaccount/token",
                      encoding="utf-8",
                  ).read().strip()
                  ctx = ssl.create_default_context(
                      cafile="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  )

                  def get(path):
                      req = urllib.request.Request(
                          f"https://{host}:{port}{path}",
                          headers={"Authorization": f"Bearer {token}"},
                      )
                      with urllib.request.urlopen(req, context=ctx, timeout=30) as resp:
                          return json.load(resp)

                  findings = []
                  for resource in ("secrets", "configmaps"):
                      payload = get(f"/api/v1/{resource}")
                      for item in payload.get("items", []):
                          metadata = item.get("metadata", {})
                          ns = metadata.get("namespace", "")
                          name = metadata.get("name", "")
                          for key, value in (item.get("data") or {}).items():
                              rendered = value
                              if resource == "secrets":
                                  try:
                                      rendered = base64.b64decode(value).decode("utf-8", "replace")
                                  except Exception:
                                      rendered = value
                              if pattern.search(rendered):
                                  findings.append(f"{ns}/{resource[:-1]}/{name}:{key}")

                  if findings:
                      print("Placeholder values found:")
                      for finding in findings:
                          print(f"  - {finding}")
                      sys.exit(1)
                  print("No placeholder values found.")
                  PY
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: placeholder-secret-scanner
  namespace: value-fabric
  labels:
    app.kubernetes.io/name: value-fabric
    app.kubernetes.io/component: security-scanner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: placeholder-secret-scanner
  labels:
    app.kubernetes.io/name: value-fabric
    app.kubernetes.io/component: security-scanner
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: placeholder-secret-scanner
  labels:
    app.kubernetes.io/name: value-fabric
    app.kubernetes.io/component: security-scanner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: placeholder-secret-scanner
subjects:
  - kind: ServiceAccount
    name: placeholder-secret-scanner
    namespace: value-fabric
