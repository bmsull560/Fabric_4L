apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: monitoring
  labels:
    app: jaeger
    tier: observability
spec:
  type: ClusterIP
  ports:
    - port: 16686
      targetPort: 16686
      protocol: TCP
      name: ui
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: monitoring
  labels:
    app: jaeger
    tier: observability
spec:
  type: ClusterIP
  ports:
    - port: 14268
      targetPort: 14268
      protocol: TCP
      name: jaeger-collector
    - port: 14250
      targetPort: 14250
      protocol: TCP
      name: grpc
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      protocol: TCP
      name: otlp-http
    - port: 9411
      targetPort: 9411
      protocol: TCP
      name: zipkin
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-agent
  namespace: monitoring
  labels:
    app: jaeger
    tier: observability
spec:
  type: ClusterIP
  ports:
    - port: 6831
      protocol: UDP
      name: jaeger-thrift
    - port: 6832
      protocol: UDP
      name: jaeger-binary
    - port: 5778
      protocol: TCP
      name: config-rest
  selector:
    app: jaeger
---
# Ingress for Jaeger UI (optional - for external access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jaeger.value-fabric.local
      secretName: jaeger-tls
  rules:
    - host: jaeger.value-fabric.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger-query
                port:
                  number: 16686
