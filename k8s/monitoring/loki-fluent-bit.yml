apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: value-fabric
  labels:
    app: loki
    component: logging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        component: logging
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.2.1
          args:
            - -config.file=/etc/loki/local-config.yaml
          ports:
            - name: http
              containerPort: 3100
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: value-fabric
  labels:
    app: loki
    component: logging
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: value-fabric
  labels:
    app: fluent-bit
    component: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 5
        Log_Level info
    [INPUT]
        Name tail
        Path /var/log/containers/*_value-fabric_*.log
        Parser docker
        Tag kube.*
    [OUTPUT]
        Name loki
        Match kube.*
        Host loki.value-fabric.svc.cluster.local
        Port 3100
        Labels namespace=value-fabric
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: value-fabric
  labels:
    app: fluent-bit
    component: logging
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
        component: logging
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2.4
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config
              mountPath: /fluent-bit/etc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
