# Alertmanager Secrets Template
# COPY THIS FILE and fill in actual values - DO NOT COMMIT WITH REAL VALUES
# Use: kubectl apply -f alertmanager-secrets.yaml
# After: kubectl create secret generic alertmanager-secrets \
#          --from-file=slack_webhook_url=./slack_webhook.txt \
#          --from-file=pagerduty_key=./pagerduty_key.txt \
#          -n monitoring

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
type: Opaque
stringData:
  # Slack webhook URL for alerts
  # Get from: https://api.slack.com/messaging/webhooks
  slack_webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  
  # PagerDuty Integration Key (Events API v2)
  # Get from: PagerDuty > Services > Integration Settings
  pagerduty_key: "YOUR_PAGERDUTY_INTEGRATION_KEY"
  
  # Optional: PagerDuty key for FinOps team
  pagerduty_finops_key: "YOUR_FINOPS_PAGERDUTY_KEY"
  
  # Optional: SMTP credentials for email alerts
  smtp_username: "alerts@yourdomain.com"
  smtp_password: "your-smtp-password"
