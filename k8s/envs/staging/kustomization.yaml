apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: value-fabric

resources:
  - ../../base
  - ../../external-secrets/vault-integration.yml
  - ../../external-secrets/vault-database-dynamic.yml
  - ../../monitoring/placeholder-secret-scanner-cronjob.yaml

labels:
  - pairs:
      environment: staging

patches:
  - path: staging-replicas-patch.yml

# Staging images use SHA digest pinning (immutable), mirroring production.
# CI updates digests via: kustomize edit set image "name@sha256:digest"
# Example: kustomize edit set image "ghcr.io/bmsull560/fabric_4l/layer4-agents@sha256:abc123..."
images:
  # Base images (resolved to digests in CI/CD)
  - name: services/layer1-ingestion
    newName: ghcr.io/bmsull560/fabric_4l/layer1-ingestion
    digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
  - name: services/layer2-extraction
    newName: ghcr.io/bmsull560/fabric_4l/layer2-extraction
    digest: sha256:2222222222222222222222222222222222222222222222222222222222222222
  - name: services/layer3-knowledge
    newName: ghcr.io/bmsull560/fabric_4l/layer3-knowledge
    digest: sha256:3333333333333333333333333333333333333333333333333333333333333333
  - name: services/layer4-agents
    newName: ghcr.io/bmsull560/fabric_4l/layer4-agents
    digest: sha256:4444444444444444444444444444444444444444444444444444444444444444
  - name: services/layer5-ground-truth
    newName: ghcr.io/bmsull560/fabric_4l/layer5-ground-truth
    digest: sha256:5555555555555555555555555555555555555555555555555555555555555555
  - name: services/layer6-benchmarks
    newName: ghcr.io/bmsull560/fabric_4l/layer6-benchmarks
    digest: sha256:6666666666666666666666666666666666666666666666666666666666666666
  - name: value-fabric/frontend
    newName: ghcr.io/bmsull560/fabric_4l/frontend
    digest: sha256:7777777777777777777777777777777777777777777777777777777777777777
  # Infrastructure images (use specific versions, not :latest)
  - name: postgres
    newTag: "15.10-alpine"
  - name: redis
    newTag: "7.4-alpine"
  - name: neo4j
    newTag: "5.25-community"
