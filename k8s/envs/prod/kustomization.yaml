apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: value-fabric

resources:
  - ../../base
  - ../../external-secrets/vault-integration.yml
  - ../../external-secrets/vault-database-dynamic.yml

labels:
  - pairs:
      environment: prod

patches:
  - path: prod-replicas-patch.yml

# Production application images are pinned to immutable SHA digests by
# scripts/ci/prepare_kustomize_deploy.sh during the deploy workflow. The
# committed overlay intentionally contains no synthetic or zero digests.
images:
  # Infrastructure images use explicit versions; application images are resolved
  # from signed registry tags to immutable digests immediately before rendering.
  - name: postgres
    newTag: "15.10-alpine"
  - name: redis
    newTag: "7.4-alpine"
  - name: neo4j
    newTag: "5.25-community"
