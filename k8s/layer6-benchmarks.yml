apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer6-benchmarks
  namespace: value-fabric
  labels:
    app: layer6-benchmarks
    component: layer6
spec:
  replicas: 2
  selector:
    matchLabels:
      app: layer6-benchmarks
  template:
    metadata:
      labels:
        app: layer6-benchmarks
        component: layer6
    spec:
      containers:
        - name: api
          image: value-fabric/layer6-benchmarks:latest
          ports:
            - containerPort: 8006
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
            - secretRef:
                name: layer6-db-credentials
                optional: false
            - secretRef:
                name: layer6-interlayer
                optional: false
          env:
            - name: PORT
              value: "8006"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer6-db-credentials
                  key: DATABASE_URL
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: layer6-db-credentials
                  key: DATABASE_URL_SYNC
            - name: LAYER3_API_KEY
              valueFrom:
                secretKeyRef:
                  name: layer6-interlayer
                  key: LAYER3_API_KEY
            - name: LAYER5_API_KEY
              valueFrom:
                secretKeyRef:
                  name: layer6-interlayer
                  key: LAYER5_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: layer6-benchmarks
  namespace: value-fabric
  labels:
    app: layer6-benchmarks
    component: layer6
spec:
  selector:
    app: layer6-benchmarks
  ports:
    - port: 8006
      targetPort: 8006
      name: http
  type: ClusterIP
