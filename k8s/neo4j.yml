apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: value-fabric
  labels:
    app: neo4j
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        component: database
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: auth
            # APOC disabled temporarily - re-enable after base deployment succeeds
            # - name: NEO4J_PLUGINS
            #   value: '["apoc"]'
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "2G"
            - name: NEO4J_dbms_memory_pagecache_size
              value: "1G"
            - name: NEO4J_server_config_strict_validation_enabled
              value: "false"
            - name: NEO4J_server_bolt_enabled
              value: "true"
            - name: NEO4J_server_bolt_listen__address
              value: "0.0.0.0:7687"
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Unset ALL Kubernetes-injected service env vars that conflict with Neo4j config
              unset PORT
              unset NEO4J_PORT DB_PORT
              unset NEO4J_PORT_7474_TCP NEO4J_PORT_7474_TCP_ADDR NEO4J_PORT_7474_TCP_PORT NEO4J_PORT_7474_TCP_PROTO
              unset NEO4J_PORT_7687_TCP NEO4J_PORT_7687_TCP_ADDR NEO4J_PORT_7687_TCP_PORT NEO4J_PORT_7687_TCP_PROTO
              unset NEO4J_SERVICE_PORT NEO4J_SERVICE_PORT_HTTP NEO4J_SERVICE_PORT_BOLT
              unset DB_SERVICE_HOST DB_SERVICE_PORT DB_SERVICE_PORT_HTTP DB_SERVICE_PORT_BOLT
              unset NEO4J_SERVICE_HOST DB_SERVICE_HOST
              unset NEO4J_SERVICE_PORT_HTTP NEO4J_SERVICE_PORT_BOLT
              unset DB_PORT_7474_TCP DB_PORT_7474_TCP_ADDR DB_PORT_7474_TCP_PORT DB_PORT_7474_TCP_PROTO
              unset DB_PORT_7687_TCP DB_PORT_7687_TCP_ADDR DB_PORT_7687_TCP_PORT DB_PORT_7687_TCP_PROTO
              # Start Neo4j
              exec /startup/docker-entrypoint.sh neo4j
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-data-pvc
        - name: neo4j-logs
          persistentVolumeClaim:
            claimName: neo4j-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-db
  namespace: value-fabric
  labels:
    app: neo4j
    component: database
spec:
  selector:
    app: neo4j
  ports:
    - port: 7474
      targetPort: 7474
      name: http
    - port: 7687
      targetPort: 7687
      name: bolt
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data-pvc
  namespace: value-fabric
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-logs-pvc
  namespace: value-fabric
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
