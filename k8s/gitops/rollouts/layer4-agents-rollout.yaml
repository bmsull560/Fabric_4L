apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: layer4-agents
  namespace: value-fabric-prod
  labels:
    app: layer4-agents
    tier: agents
spec:
  replicas: 3
  strategy:
    canary:
      # Traffic splitting configuration
      canaryService: layer4-agents-canary
      stableService: layer4-agents-stable
      trafficRouting:
        nginx:
          stableIngress: layer4-agents
          annotationPrefix: nginx.ingress.kubernetes.io
          additionalIngressAnnotations:
            canary-by-header: X-Canary
            canary-by-header-value: "true"
      
      # Canary analysis steps
      steps:
        # Step 1: Set canary weight to 5%
        - setWeight: 5
        # Step 2: Pause for 10 minutes or until promoted
        - pause:
            duration: 10m
        # Step 3: Run analysis - auto-promote if successful
        - setWeight: 20
        - pause: {duration: 5m}
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 50
        - pause: {duration: 10m}
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: latency
        # Final step: 100% traffic
        - setWeight: 100
      
      # Auto-rollback settings
      autoRollbackEnabled: true
      maxUnavailable: 0
      maxSurge: "25%"
      
      # Scale down old version after successful deployment
      scaleDownDelaySeconds: 600
      scaleDownDelayRevisionLimit: 2
      
      # Analysis run settings
      analysis:
        # Success rate threshold
        successfulRunHistoryLimit: 3
        unsuccessfulRunHistoryLimit: 3
  
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: layer4-agents
  template:
    metadata:
      labels:
        app: layer4-agents
        tier: agents
    spec:
      serviceAccountName: layer4-agents
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: layer4-agents
          image: ghcr.io/bmsull560/fabric_4l/layer4-agents:{{ .Values.image.tag }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - layer4-agents
                topologyKey: kubernetes.io/hostname
---
# Analysis templates for canary evaluation
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: value-fabric-prod
spec:
  metrics:
    - name: success-rate
      interval: 1m
      count: 5
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
              service="layer4-agents",
              status!~"5.."
            }[1m]))
            /
            sum(rate(http_requests_total{
              service="layer4-agents"
            }[1m]))
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: latency
  namespace: value-fabric-prod
spec:
  metrics:
    - name: p95-latency
      interval: 1m
      count: 3
      successCondition: result[0] <= 500
      failureCondition: result[0] > 1000
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{
                service="layer4-agents"
              }[1m])) by (le)
            ) * 1000
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: error-rate
  namespace: value-fabric-prod
spec:
  metrics:
    - name: error-rate
      interval: 30s
      count: 10
      successCondition: result[0] < 0.01
      failureCondition: result[0] > 0.05
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
              service="layer4-agents",
              status=~"5.."
            }[1m]))
            /
            sum(rate(http_requests_total{
              service="layer4-agents"
            }[1m]))
