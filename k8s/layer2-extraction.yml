apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer2-extraction
  namespace: value-fabric
  labels:
    app: layer2-extraction
    component: layer2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: layer2-extraction
  template:
    metadata:
      labels:
        app: layer2-extraction
        component: layer2
    spec:
      initContainers:
        - name: wait-neo4j
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z neo4j-db 7687; do echo waiting for neo4j; sleep 2; done']
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: api
          image: value-fabric/layer2-extraction:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
            - name: LLM_MODEL
              value: "gpt-4o"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: NEO4J_URI
              value: "bolt://neo4j-db:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: auth
            - name: RDF_OUTPUT_DIR
              value: "/app/rdf-output"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: rdf-output
              mountPath: /app/rdf-output
      volumes:
        - name: rdf-output
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: layer2-extraction
  namespace: value-fabric
  labels:
    app: layer2-extraction
    component: layer2
spec:
  selector:
    app: layer2-extraction
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
