apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: value-fabric-secret-placeholder-guardrails
  labels:
    value-fabric.io/control: secret-placeholder-admission
  annotations:
    policies.kyverno.io/title: Block placeholder secrets
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-placeholder-secret-stringdata
      match:
        any:
          - resources:
              kinds:
                - Secret
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"value-fabric.io/secret-scope\" || '' }}"
            operator: NotEquals
            value: dev-placeholder
      validate:
        message: "Secret stringData must not contain placeholder values such as REPLACE_WITH_*."
        foreach:
          - list: "request.object.stringData.* || []"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('(?i).*(REPLACE_WITH_|<INFISICAL_|CHANGE_ME|YOUR_CLIENT_ID|replace-me|sk-placeholder|dev-secret-key-change-in-production).*', element) }}"
                    operator: Equals
                    value: true
    - name: block-placeholder-secret-data
      match:
        any:
          - resources:
              kinds:
                - Secret
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"value-fabric.io/secret-scope\" || '' }}"
            operator: NotEquals
            value: dev-placeholder
      validate:
        message: "Secret data must not decode to placeholder values such as REPLACE_WITH_*."
        foreach:
          - list: "request.object.data.* || []"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('(?i).*(REPLACE_WITH_|<INFISICAL_|CHANGE_ME|YOUR_CLIENT_ID|replace-me|sk-placeholder|dev-secret-key-change-in-production).*', base64_decode(element)) }}"
                    operator: Equals
                    value: true
    - name: confine-direct-dev-placeholder-secrets
      match:
        any:
          - resources:
              kinds:
                - Secret
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"value-fabric.io/secret-scope\" || '' }}"
            operator: Equals
            value: dev-placeholder
      validate:
        message: "Dev placeholder Secrets are allowed only in explicit non-production namespaces with non-prod labels."
        deny:
          conditions:
            any:
              - key: "{{ request.namespace }}"
                operator: In
                value:
                  - value-fabric-prod
                  - value-fabric-production
                  - value-fabric-staging
              - key: "{{ request.object.metadata.labels.\"value-fabric.io/non-prod-only\" || '' }}"
                operator: NotEquals
                value: "true"
              - key: "{{ request.object.metadata.labels.\"value-fabric.io/environment\" || '' }}"
                operator: NotIn
                value:
                  - dev
                  - development
                  - local
                  - test
              - key: "{{ request.object.metadata.annotations.\"value-fabric.io/allowed-namespaces\" || '' }}"
                operator: Equals
                value: ""
