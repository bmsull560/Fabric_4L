apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-latest-tag
  annotations:
    policies.kyverno.io/title: Block Latest Image Tag
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Blocks the use of :latest tag for container images across all namespaces.
      Mutable tags break reproducibility and prevent rollback.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      validate:
        message: "Using 'latest' tag for container images is not allowed. Use a specific version or digest."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ ends_with(element.image, ':latest') }}"
                    operator: Equals
                    value: true
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ request.object.spec.initContainers || `[]` | length(@) }}"
                  operator: GreaterThan
                  value: 0
            deny:
              conditions:
                all:
                  - key: "{{ ends_with(element.image, ':latest') }}"
                    operator: Equals
                    value: true
