apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-digests
  annotations:
    policies.kyverno.io/title: Require Immutable Image Digests
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Enforces digest-pinned images for all containers in production namespaces.
      This prevents mutable-tag drift and guarantees workload immutability.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-sha256-digest-in-prod
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - value-fabric-prod
                - value-fabric-production
      validate:
        message: "Containers in production namespaces must use image digests (@sha256:...)."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ request.object.spec.initContainers || `[]` | length(@) }}"
                  operator: GreaterThan
                  value: 0
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
