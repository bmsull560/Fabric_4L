apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fabric-4l-staging

resources:
  - ../../base/

# Image overrides: match exact base image names, redirect to GHCR with release tag.
# Base manifests use bare names (services/<name>:main, apps/web:main).
# newName rewrites the registry/repository; newTag pins the release.
images:
  - name: services/layer1-ingestion
    newName: ghcr.io/bmsull560/fabric_4l/layer1-ingestion
    newTag: v1.1.0
  - name: services/layer2-extraction
    newName: ghcr.io/bmsull560/fabric_4l/layer2-extraction
    newTag: v1.1.0
  - name: services/layer3-knowledge
    newName: ghcr.io/bmsull560/fabric_4l/layer3-knowledge
    newTag: v1.1.0
  - name: services/layer4-agents
    newName: ghcr.io/bmsull560/fabric_4l/layer4-agents
    newTag: v1.1.0
  - name: services/layer5-ground-truth
    newName: ghcr.io/bmsull560/fabric_4l/layer5-ground-truth
    newTag: v1.1.0
  - name: services/layer6-benchmarks
    newName: ghcr.io/bmsull560/fabric_4l/layer6-benchmarks
    newTag: v1.1.0
  - name: apps/web
    newName: ghcr.io/bmsull560/fabric_4l/frontend
    newTag: v1.1.0

replicas:
  - name: layer1-ingestion
    count: 2
  - name: layer2-extraction
    count: 2
  - name: layer3-knowledge
    count: 2
  - name: layer4-agents
    count: 2
  - name: layer5-ground-truth
    count: 1
  - name: layer6-benchmarks
    count: 1
  - name: frontend
    count: 1

patchesStrategicMerge:
  - staging-patch.yml
