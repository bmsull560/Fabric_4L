apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fabric-4l-staging

resources:
  - ../../base/

# Image overrides: match exact base image names, redirect to GHCR.
# Base manifests use value-fabric/<name>:main and apps/web:main.
# newName rewrites the registry/repository; newTag pins the candidate build.
#
# Staging tracks the sha-tagged image from the latest main build, not the
# release tag. Update STAGING_SHA below when promoting a candidate to staging.
# The environment-promotion.yml workflow updates this automatically on merge to main.
# To promote manually: replace sha-<commit> with the SHA from the build you want.
images:
  - name: value-fabric/layer1-ingestion
    newName: ghcr.io/bmsull560/fabric_4l/layer1-ingestion
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a
  - name: value-fabric/layer2-extraction
    newName: ghcr.io/bmsull560/fabric_4l/layer2-extraction
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a
  - name: value-fabric/layer3-knowledge
    newName: ghcr.io/bmsull560/fabric_4l/layer3-knowledge
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a
  - name: value-fabric/layer4-agents
    newName: ghcr.io/bmsull560/fabric_4l/layer4-agents
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a
  - name: value-fabric/layer5-ground-truth
    newName: ghcr.io/bmsull560/fabric_4l/layer5-ground-truth
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a
  - name: value-fabric/layer6-benchmarks
    newName: ghcr.io/bmsull560/fabric_4l/layer6-benchmarks
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a
  - name: apps/web
    newName: ghcr.io/bmsull560/fabric_4l/frontend
    newTag: sha-e2a0c3eac82766f79f3b3daac750114b571fdb6a

replicas:
  - name: layer1-ingestion
    count: 2
  - name: layer2-extraction
    count: 2
  - name: layer3-knowledge
    count: 2
  - name: layer4-agents
    count: 2
  - name: layer5-ground-truth
    count: 1
  - name: layer6-benchmarks
    count: 1
  - name: frontend
    count: 1

patchesStrategicMerge:
  - staging-patch.yml
