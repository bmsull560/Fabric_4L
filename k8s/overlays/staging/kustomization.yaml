apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fabric-4l-staging

resources:
  - ../../base/

images:
  - name: fabric-4l/layer1-ingestion
    newTag: v1.0.0-rc.1
  - name: fabric-4l/layer2-extraction
    newTag: v1.0.0-rc.1
  - name: fabric-4l/layer3-knowledge
    newTag: v1.0.0-rc.1
  - name: fabric-4l/layer4-agents
    newTag: v1.0.0-rc.1
  - name: fabric-4l/layer5-ground-truth
    newTag: v1.0.0-rc.1
  - name: fabric-4l/layer6-benchmarks
    newTag: v1.0.0-rc.1
  - name: fabric-4l/frontend
    newTag: v1.0.0-rc.1

replicas:
  - name: layer1-ingestion
    count: 2
  - name: layer2-extraction
    count: 2
  - name: layer3-knowledge
    count: 2
  - name: layer4-agents
    count: 2
  - name: layer5-ground-truth
    count: 1
  - name: layer6-benchmarks
    count: 1
  - name: frontend
    count: 1

patchesStrategicMerge:
  - staging-patch.yml
