apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: value-fabric
spec:
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: value-fabric-config
  namespace: value-fabric
data:
  ENVIRONMENT: "staging"
  LOG_LEVEL: "debug"
