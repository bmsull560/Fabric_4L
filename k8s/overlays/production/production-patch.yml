apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: value-fabric
spec:
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: value-fabric-config
  namespace: value-fabric
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
