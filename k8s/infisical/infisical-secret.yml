# Infisical Kubernetes Operator — InfisicalSecret CRDs for Value Fabric
#
# Prerequisites:
#   Install the Infisical K8s operator:
#     helm repo add infisical-helm-charts https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
#     helm install --generate-name infisical-helm-charts/secrets-operator
#
# 1. Create the machine identity credentials secret (once per cluster):
#   kubectl create secret generic infisical-universal-auth \
#     --from-literal=clientId=<CLIENT_ID> \
#     --from-literal=clientSecret=<CLIENT_SECRET> \
#     -n value-fabric
#
# 2. Set INFISICAL_PROJECT_ID in each InfisicalSecret below.
#
# The operator will sync secrets from Infisical into Kubernetes Secret objects,
# which are then mounted/injected into pods via envFrom.
# refreshInterval controls how often the operator polls for changes.

---
# Shared API keys and LLM credentials (all layers consume these)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: llm-api-keys
  namespace: value-fabric
spec:
  hostAPI: https://app.infisical.com/api  # change for self-hosted
  resyncInterval: 60  # seconds
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: ""  # set your Infisical project slug
        envSlug: prod     # dev | staging | prod
        secretsPath: /llm
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: value-fabric
  managedSecretReference:
    secretName: llm-api-keys
    secretNamespace: value-fabric
    creationPolicy: Owner

---
# Auth secrets (JWT, HMAC)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: auth-secrets
  namespace: value-fabric
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 300
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: ""
        envSlug: prod
        secretsPath: /auth
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: value-fabric
  managedSecretReference:
    secretName: auth-secrets
    secretNamespace: value-fabric
    creationPolicy: Owner

---
# Database credentials (Postgres, Neo4j)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: database-secrets
  namespace: value-fabric
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 3600
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: ""
        envSlug: prod
        secretsPath: /database
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: value-fabric
  managedSecretReference:
    secretName: database-secrets
    secretNamespace: value-fabric
    creationPolicy: Owner

---
# Optional external integrations (Pinecone, CRM, browser automation)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: integration-secrets
  namespace: value-fabric
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 3600
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: ""
        envSlug: prod
        secretsPath: /integrations
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: value-fabric
  managedSecretReference:
    secretName: integration-secrets
    secretNamespace: value-fabric
    creationPolicy: Owner
