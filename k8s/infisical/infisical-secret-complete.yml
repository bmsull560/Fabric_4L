# Infisical Secret Mappings - Complete Configuration
# All secret paths for Value Fabric integration with Infisical

# Prerequisites:
# 1. Install Infisical operator: helm install infisical-operator infisical-helm-charts/secrets-operator
# 2. Create machine identity in Infisical UI
# 3. Create universal-auth secret: kubectl create secret generic infisical-universal-auth ...
# 4. Update all projectSlug values below with your actual Infisical project slug

---
# LLM API Keys (OpenAI, Anthropic, Azure)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: llm-api-keys
  namespace: value-fabric
  labels:
    tier: critical
    rotation: 180d
spec:
  hostAPI: https://app.infisical.com/api  # Use https://your-infisical.internal/api for self-hosted
  resyncInterval: 3600  # Sync every hour
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "fabric-4l-value-fabric"  # UPDATE THIS
        envSlug: prod
        secretsPath: /llm
        recursive: true
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: value-fabric
  managedSecretReference:
    secretName: llm-api-keys
    secretNamespace: value-fabric
    creationPolicy: Owner

