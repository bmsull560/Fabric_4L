# Task 63: Alertmanager Secret Configuration
#
# This manifest creates the secrets required by Alertmanager for PagerDuty,
# Slack, and webhook notifications. It uses environment-token placeholders
# so CI/CD (or External Secrets) can inject real values at deploy time.

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: value-fabric
  labels:
    app: alertmanager
    component: monitoring
    eso-migration-status: "pending"
    eso-migration-target: "vault://secret/alertmanager"
type: Opaque
stringData:
  # Generic/default webhook destination used for warning + info routing
  default_webhook_url: "${ALERTMANAGER_DEFAULT_WEBHOOK_URL}"

  # Critical webhook destination for pager/on-call incident flow
  critical_webhook_url: "${ALERTMANAGER_CRITICAL_WEBHOOK_URL}"

  # Existing integration keys (retained for Slack/PagerDuty receiver configurations)
  pagerduty_integration_key: "${PAGERDUTY_INTEGRATION_KEY}"
  slack_webhook_url: "${SLACK_WEBHOOK_URL}"
