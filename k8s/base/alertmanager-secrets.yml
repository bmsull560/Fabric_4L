# Task 63: Alertmanager Secret Configuration
# 
# This manifest creates the secrets required by Alertmanager for PagerDuty
# and Slack notifications. It uses SecretKeyRef pattern for environment-based
# secret injection.
#
# SECRET MANAGEMENT APPROACH:
# ==========================
# Current (This File): SecretKeyRef-based
# - Secrets are injected as environment variables via Kubernetes Secrets
# - Values are populated from CI/CD pipeline or manual kubectl commands
# - Simple, works with standard Kubernetes
#
# Future Upgrade Path: External Secrets Operator + Vault
# - Replace this Secret with an ExternalSecret resource
# - ESO fetches secrets from Vault and syncs to Kubernetes Secret
# - See docs/runbooks/alertmanager-secret-management.md for migration guide
#
# USAGE:
# =====
# 1. Create secret values (do NOT commit real values to git):
#    kubectl create secret generic alertmanager-secrets \
#      --from-literal=pagerduty-integration-key=pd-key-here \
#      --from-literal=slack-webhook-url=https://hooks.slack.com/services/... \
#      -n value-fabric
#
# 2. Reference in Alertmanager deployment via env vars or volume mounts
#
# 3. For file-based secret reading (alertmanager.yml uses _file suffixes):
#    Mount secret as volume at /etc/alertmanager/secrets/

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: value-fabric
  labels:
    app: alertmanager
    component: monitoring
    # Mark for ESO migration tracking
    eso-migration-status: "pending"
    eso-migration-target: "vault://secret/alertmanager"
type: Opaque
stringData:
  # PagerDuty integration key for critical alerts
  # Generate at: PagerDuty Service -> Integrations -> Add Integration -> Events API v2
  pagerduty_integration_key: "${PAGERDUTY_INTEGRATION_KEY}"
  
  # Slack webhook URL for warning/info alerts
  # Generate at: Slack App -> Incoming Webhooks -> Add New Webhook
  slack_webhook_url: "${SLACK_WEBHOOK_URL}"

