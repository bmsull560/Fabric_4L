# JWT RSA Keys Secret
# 
# IMPORTANT: This is a TEMPLATE. Do NOT commit real keys to git.
# 
# Production options:
#   1. External Secrets Operator: Sync from Vault/AWS Secrets Manager
#   2. Sealed Secrets: Encrypt with kubeseal before committing
#   3. CI/CD injection: Generate during deployment pipeline
#
# Generate keys with: openssl genrsa -out jwt-private.pem 2048 && 
#                     openssl rsa -in jwt-private.pem -pubout -out jwt-public.pem

apiVersion: v1
kind: Secret
metadata:
  name: jwt-keys
  namespace: value-fabric
type: Opaque
stringData:
  # Paste base64-encoded keys here or use kubectl create secret
  # kubectl create secret generic jwt-keys \
  #   --from-file=jwt-private.pem=./jwt-private.pem \
  #   --from-file=jwt-public.pem=./jwt-public.pem \
  jwt-private.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    # REPLACE WITH REAL PRIVATE KEY
    # Generate with: openssl genrsa -out jwt-private.pem 2048
    -----END RSA PRIVATE KEY-----
  jwt-public.pem: |
    -----BEGIN PUBLIC KEY-----
    # REPLACE WITH REAL PUBLIC KEY
    # Generate with: openssl rsa -in jwt-private.pem -pubout -out jwt-public.pem
    -----END PUBLIC KEY-----
