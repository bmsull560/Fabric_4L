apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer1-ingestion
  namespace: value-fabric
  labels:
    app: layer1-ingestion
    component: layer1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: layer1-ingestion
  template:
    metadata:
      labels:
        app: layer1-ingestion
        component: layer1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: init-tmp
              mountPath: /tmp
      volumes:
        - name: raw-content
          emptyDir: {}
        - name: init-tmp
          emptyDir: {}
      containers:
        # NOTE: Use kustomize images.newTag in production; :latest is dev-only
        - name: api
          image: value-fabric/layer1-ingestion:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
            - secretRef:
                name: layer1-db-credentials
                optional: false
            - secretRef:
                name: layer1-secrets
                optional: false
            - secretRef:
                name: layer1-auth
                optional: false
          env:
            # Required: Explicit DATABASE_URL from dynamic secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer1-db-credentials
                  key: DATABASE_URL
            # Optional overrides (if not in layer1-secrets)
            - name: REDIS_URL
              value: "redis://redis:6379/0"
              optional: true
            - name: LOG_LEVEL
              value: "info"
            - name: CRAWL_RATE_LIMIT_PER_DOMAIN
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: raw-content
              mountPath: /app/raw-content
        # Celery worker sidecar
        # NOTE: Use kustomize to sync image tag with main container
        - name: celery-worker
          image: value-fabric/layer1-ingestion:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "src.shared.tasks", "worker", "-l", "info"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres:5432/ingestion"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: layer1-ingestion
  namespace: value-fabric
  labels:
    app: layer1-ingestion
    component: layer1
spec:
  selector:
    app: layer1-ingestion
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
