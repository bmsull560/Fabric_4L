apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer2-extraction
  namespace: value-fabric
  labels:
    app: layer2-extraction
    component: layer2
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: layer2-extraction
  template:
    metadata:
      labels:
        app: layer2-extraction
        component: layer2
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-neo4j
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z neo4j 7687; do echo waiting for neo4j; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        # NOTE: CI/CD may override this branch tag with immutable digests for staging and production
        - name: api
          image: services/layer2-extraction:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
            - secretRef:
                name: layer2-db-credentials
                optional: false
            - secretRef:
                name: layer2-secrets
                optional: false
            - secretRef:
                name: layer2-auth
                optional: false
          env:
            # Dynamic database credentials (required)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer2-db-credentials
                  key: DATABASE_URL
            # Neo4j from shared secret
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_PASSWORD
            - name: RDF_OUTPUT_DIR
              value: "/app/rdf-output"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: rdf-output
              mountPath: /app/rdf-output
      volumes:
        - name: rdf-output
          emptyDir: {}
        - name: init-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: layer2-extraction
  namespace: value-fabric
  labels:
    app: layer2-extraction
    component: layer2
spec:
  selector:
    app: layer2-extraction
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
