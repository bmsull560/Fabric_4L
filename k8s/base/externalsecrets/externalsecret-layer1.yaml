apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: layer1-secrets
  namespace: fabric-layer1
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: layer1-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: fabric/prod/layer1
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: fabric/prod/layer1
        property: REDIS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: fabric/prod/layer1
        property: JWT_SECRET
    - secretKey: API_KEY_HMAC_SECRET
      remoteRef:
        key: fabric/prod/layer1
        property: API_KEY_HMAC_SECRET
    - secretKey: SERVICE_AUTH_SECRET
      remoteRef:
        key: fabric/prod/shared
        property: SERVICE_AUTH_SECRET
---
# Placeholder template - replace with actual remoteRef keys for your secret backend
# Supported backends: Vault, AWS Secrets Manager, GCP Secret Manager, Azure Key Vault, Infisical
