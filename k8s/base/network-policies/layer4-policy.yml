apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: layer4-policy
  namespace: value-fabric
spec:
  podSelector:
    matchLabels:
      app: layer4-agents
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from frontend
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow to exact service dependencies only.
    - to:
        - podSelector:
            matchLabels:
              app: layer1-ingestion
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
              app: layer2-extraction
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
              app: layer3-knowledge
      ports:
        - protocol: TCP
          port: 8001
    - to:
        - podSelector:
            matchLabels:
              app: layer5-ground-truth
      ports:
        - protocol: TCP
          port: 8005
    - to:
        - podSelector:
            matchLabels:
              app: layer6-benchmarks
      ports:
        - protocol: TCP
          port: 8006
    # Allow to infrastructure dependencies using exact identity labels.
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: neo4j
      ports:
        - protocol: TCP
          port: 7687
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
