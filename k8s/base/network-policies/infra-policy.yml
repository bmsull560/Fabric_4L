apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: infra-policy
  namespace: value-fabric
spec:
  podSelector:
    matchLabels:
      component: infrastructure
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow only declared service dependencies on required ports.
    - from:
        - podSelector:
            matchLabels:
              app: layer1-ingestion
        - podSelector:
            matchLabels:
              app: layer2-extraction
        - podSelector:
            matchLabels:
              app: layer3-knowledge
        - podSelector:
            matchLabels:
              app: layer4-agents
        - podSelector:
            matchLabels:
              app: layer5-ground-truth
      ports:
        - protocol: TCP
          port: 5432  # Postgres
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 7474  # Neo4j HTTP
        - protocol: TCP
          port: 7687  # Neo4j Bolt
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
