apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: value-fabric
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller namespace only
    # Configurable via Kustomize replacement for __INGRESS_NAMESPACE__
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: __INGRESS_NAMESPACE__
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow to L4 agents
    - to:
        - podSelector:
            matchLabels:
              app: layer4-agents
      ports:
        - protocol: TCP
          port: 8000
    # Allow to L5 ground truth
    - to:
        - podSelector:
            matchLabels:
              app: layer5-ground-truth
      ports:
        - protocol: TCP
          port: 8005
    # Allow to L6 benchmarks
    - to:
        - podSelector:
            matchLabels:
              app: layer6-benchmarks
      ports:
        - protocol: TCP
          port: 8006
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
