apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: layer1-policy
  namespace: value-fabric
spec:
  podSelector:
    matchLabels:
      app: layer1-ingestion
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from L4 agents
    - from:
        - podSelector:
            matchLabels:
              app: layer4-agents
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow to infrastructure
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
