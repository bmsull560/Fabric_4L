apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: layer6-policy
  namespace: value-fabric
spec:
  podSelector:
    matchLabels:
      app: layer6-benchmarks
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from frontend
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8006
  egress:
    # Allow DNS only - standalone layer
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
