apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer4-agents
  namespace: value-fabric
  labels:
    app: layer4-agents
    component: layer4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: layer4-agents
  template:
    metadata:
      labels:
        app: layer4-agents
        component: layer4
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379 && nc -z neo4j 7687 && nc -z postgres 5432 && nc -z layer2-extraction 8000 && nc -z layer3-knowledge 8001; do echo waiting for dependencies; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: api
          image: value-fabric/layer4-agents:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
            - secretRef:
                name: layer4-db-credentials
                optional: false
            - secretRef:
                name: layer4-secrets
                optional: false
            - secretRef:
                name: layer4-auth
                optional: false
          env:
            # Dynamic database credentials (required)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer4-db-credentials
                  key: DATABASE_URL
            - name: CHECKPOINT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer4-db-credentials
                  key: DATABASE_URL
            # Neo4j from ExternalSecret
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: layer4-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: layer4-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: layer4-secrets
                  key: NEO4J_PASSWORD
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: layer4-agents
  namespace: value-fabric
  labels:
    app: layer4-agents
    component: layer4
spec:
  selector:
    app: layer4-agents
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
