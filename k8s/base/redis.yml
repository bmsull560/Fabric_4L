# Spotahome RedisFailover — production-grade Redis with sentinel failover.
# Requires the Spotahome Redis Operator (redisfailovers.databases.spotahome.com CRD).
# See k8s/operators/operator-prerequisites.yaml for installation instructions.
apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: redis
  namespace: value-fabric
  labels:
    app: redis
    component: infrastructure
spec:
  sentinel:
    replicas: 1
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  redis:
    replicas: 1
    image: redis:7-alpine
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    storage:
      persistentVolumeClaim:
        metadata:
          name: redis-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

  # Dev/local overlay overrides replicas: 1 for both sentinel and redis.
  # Prod overlay sets redis.replicas: 3 and sentinel.replicas: 3.
---
# Service alias for backward compatibility with service DNS references.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: value-fabric
  labels:
    app: redis
    component: infrastructure
spec:
  selector:
    # The Spotahome operator sets 'app: redis' (constant) and the component label
    # on Redis pods. It does not set app.kubernetes.io/name.
    app: redis
    redisfailovers.databases.spotahome.com/component: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
