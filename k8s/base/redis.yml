apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: redis
  namespace: value-fabric
  labels:
    app: redis
    component: infrastructure
spec:
  sentinel:
    replicas: 3
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "250m"
  redis:
    replicas: 3
    storage:
      persistentVolumeClaim:
        metadata:
          name: redis-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: value-fabric
  labels:
    app: redis
    component: infrastructure
spec:
  type: ExternalName
  externalName: rfr-redis.value-fabric.svc.cluster.local
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: value-fabric
  labels:
    app: redis
    component: infrastructure
spec:
  type: ExternalName
  externalName: rfs-redis.value-fabric.svc.cluster.local
  ports:
    - port: 26379
      targetPort: 26379
      name: sentinel
