apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: value-fabric
  labels:
    app: pgbouncer
    component: infrastructure
data:
  pgbouncer.ini: |
    [databases]
    # Database aliases for connection pooling
    # Format: alias = host=hostname port=port dbname=database_name
    ingestion = host=postgres port=5432 dbname=ingestion
    ground_truth = host=postgres port=5432 dbname=ground_truth
    layer4_agents = host=postgres port=5432 dbname=layer4_agents
    
    [pgbouncer]
    # Connection pool settings (P1-1: Connection Pooling)
    pool_mode = transaction
    max_client_conn = 10000
    default_pool_size = 25
    min_pool_size = 5
    reserve_pool_size = 10
    reserve_pool_timeout = 3
    max_db_connections = 100
    max_user_connections = 100
    
    # Query timeout settings
    query_timeout = 300
    idle_timeout = 600
    client_idle_timeout = 0
    
    # Logging
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    log_stats = 1
    stats_period = 60
    
    # Performance tuning
    server_lifetime = 3600
    server_idle_timeout = 600
    server_connect_timeout = 15
    server_login_retry = 3
    
    # Security
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    
    # Listen address
    listen_addr = 0.0.0.0
    listen_port = 6432
    
    # Unix socket (optional, for local connections)
    unix_socket_dir = /var/run/postgresql
    
    # Admin interface
    admin_users = postgres
    
  userlist.txt: |
    "postgres" "md5a8f7c7e8d9e0f1a2b3c4d5e6f7a8b9c"
