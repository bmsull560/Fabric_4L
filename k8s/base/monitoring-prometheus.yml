apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: value-fabric
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: "value-fabric"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/alerting/rules.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "layer1-ingestion"
        static_configs:
          - targets: ["layer1-ingestion:8000"]
        metrics_path: "/api/v1/ingestion/metrics"

      - job_name: "layer2-extraction"
        static_configs:
          - targets: ["layer2-extraction:8000"]
        metrics_path: "/metrics"

      - job_name: "layer3-knowledge"
        static_configs:
          - targets: ["layer3-knowledge:8001"]
        metrics_path: "/metrics"

      - job_name: "layer4-agents"
        static_configs:
          - targets: ["layer4-agents:8000"]
        metrics_path: "/metrics"

      - job_name: "layer5-ground-truth"
        static_configs:
          - targets: ["layer5-ground-truth:8005"]
        metrics_path: "/metrics"

      - job_name: "layer6-benchmarks"
        static_configs:
          - targets: ["layer6-benchmarks:8006"]
        metrics_path: "/metrics"

      - job_name: "alertmanager"
        static_configs:
          - targets: ["alertmanager:9093"]
        metrics_path: "/metrics"

  rules.yml: |
    groups:
      - name: value-fabric-availability
        rules:
          - alert: ServiceDown
            expr: up{job=~"layer[1-6]-.*|alertmanager"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} is down"
              description: "Prometheus cannot scrape {{ $labels.job }} for 2 minutes"
              runbook_url: "https://github.com/bmsull560/Fabric_4L/tree/main/docs/runbooks/service-down.md"

          - alert: DependencyHealthDegraded
            expr: value_fabric_health_status{component=~"database|redis|postgres|neo4j|layer3"} == 0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Dependency health check failing"
              description: "{{ $labels.namespace }}/{{ $labels.component }} reported unhealthy for >3m"

      - name: value-fabric-slo
        rules:
          - alert: ErrorRateSpike
            expr: |
              sum(rate({__name__=~"value_fabric_http_requests_total|layer2_http_requests_total",status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate({__name__=~"value_fabric_http_requests_total|layer2_http_requests_total"}[5m])), 1)
              > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "HTTP 5xx rate spike"
              description: "5xx ratio is above 5% for 5 minutes"

          - alert: LatencySLOBreachP95
            expr: |
              histogram_quantile(
                0.95,
                sum by (le, job) (
                  rate({__name__=~"value_fabric_http_request_duration_seconds_bucket|layer2_http_request_duration_seconds_bucket"}[5m])
                )
              ) > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "P95 latency SLO breach"
              description: "{{ $labels.job }} p95 latency is above 1 second for 10 minutes"

      - name: value-fabric-saturation
        rules:
          - alert: ServiceCpuSaturation
            expr: rate(process_cpu_seconds_total{job=~"layer[1-6]-.*"}[5m]) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU saturation"
              description: "{{ $labels.job }} process CPU usage is above 80%"

          - alert: ServiceMemorySaturation
            expr: process_resident_memory_bytes{job=~"layer[1-6]-.*"} > 1.5e+09
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory saturation"
              description: "{{ $labels.job }} resident memory is above 1.5GiB"

          - alert: DiskQueueDepthHigh
            expr: rate(node_disk_io_time_weighted_seconds_total[5m]) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Disk queue depth saturation"
              description: "Node disk queue depth is elevated for 10 minutes"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: value-fabric
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: value-fabric
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-lifecycle
            - --storage.tsdb.retention.time=15d
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/alerting/rules.yml
              subPath: rules.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: value-fabric
  labels:
    app: prometheus
    component: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: ClusterIP
