apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: value-fabric
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: "value-fabric"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/alerting/rules.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "layer1-ingestion"
        static_configs:
          - targets: ["layer1-ingestion:8000"]
        metrics_path: "/api/v1/ingestion/metrics"

      - job_name: "layer2-extraction"
        static_configs:
          - targets: ["layer2-extraction:8000"]
        metrics_path: "/metrics"

      - job_name: "layer3-knowledge"
        static_configs:
          - targets: ["layer3-knowledge:8001"]
        metrics_path: "/metrics"

      - job_name: "layer4-agents"
        static_configs:
          - targets: ["layer4-agents:8000"]
        metrics_path: "/metrics"

      - job_name: "layer5-ground-truth"
        static_configs:
          - targets: ["layer5-ground-truth:8005"]
        metrics_path: "/metrics"

      - job_name: "layer6-benchmarks"
        static_configs:
          - targets: ["layer6-benchmarks:8006"]
        metrics_path: "/metrics"

  rules.yml: |
    groups:
      - name: value-fabric-alerts
        rules:
          - alert: Layer5Down
            expr: up{job="layer5-ground-truth"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Layer 5 Ground Truth is down"
              description: "Prometheus cannot scrape layer5-ground-truth for 2 minutes"

          - alert: Layer3Down
            expr: up{job="layer3-knowledge"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Layer 3 Knowledge is down"
              description: "Prometheus cannot scrape layer3-knowledge for 2 minutes"

          - alert: HighErrorRateLayer2
            expr: sum(rate(layer2_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(layer2_http_requests_total[5m])) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx rate in Layer 2"
              description: "Layer 2 5xx ratio is above 5% over 5m"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: value-fabric
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: value-fabric
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-lifecycle
            - --storage.tsdb.retention.time=15d
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/alerting/rules.yml
              subPath: rules.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: value-fabric
  labels:
    app: prometheus
    component: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: ClusterIP
