apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer3-knowledge
  namespace: value-fabric
  labels:
    app: layer3-knowledge
    component: layer3
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: layer3-knowledge
  template:
    metadata:
      labels:
        app: layer3-knowledge
        component: layer3
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-neo4j
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z neo4j 7687; do echo waiting for neo4j; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: init-tmp
              mountPath: /tmp
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: init-tmp
              mountPath: /tmp
      volumes:
        - name: init-tmp
          emptyDir: {}
      containers:
        # NOTE: CI/CD may override this branch tag with immutable digests for staging and production
        - name: api
          image: value-fabric/layer3-knowledge:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
            - secretRef:
                name: layer3-db-credentials
                optional: false
            - secretRef:
                name: layer3-secrets
                optional: false
            - secretRef:
                name: layer3-auth
                optional: false
            - secretRef:
                name: neo4j-secret
                optional: false
          env:
            # Dynamic database credentials (required)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer3-db-credentials
                  key: DATABASE_URL
            # Neo4j from ExternalSecret
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: layer3-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: layer3-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: layer3-secrets
                  key: NEO4J_PASSWORD
            - name: PINECONE_INDEX
              valueFrom:
                configMapKeyRef:
                  name: value-fabric-config
                  key: PINECONE_INDEX
                  optional: true
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: layer3-knowledge
  namespace: value-fabric
  labels:
    app: layer3-knowledge
    component: layer3
spec:
  selector:
    app: layer3-knowledge
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP
