# API Key Cache Secret
# 
# IMPORTANT: This is a TEMPLATE. Do NOT commit real secrets to git.
# 
# This secret is used for HMAC-SHA256 key fingerprinting in the API key cache.
# Generate with: openssl rand -hex 32
#
# Production options:
#   1. External Secrets Operator: Sync from Vault/AWS Secrets Manager
#   2. Sealed Secrets: Encrypt with kubeseal before committing
#   3. CI/CD injection: Generate during deployment pipeline

apiVersion: v1
kind: Secret
metadata:
  name: api-key-cache-secret
  namespace: value-fabric
type: Opaque
stringData:
  # This value MUST be provided at deploy time via External Secrets Operator,
  # Sealed Secrets, or CI/CD injection. Do NOT commit real secrets to git.
  # Generate with: openssl rand -hex 32
  API_KEY_CACHE_SECRET: ""
