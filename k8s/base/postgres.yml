apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: value-fabric
  labels:
    app: postgres
    component: infrastructure
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:15.10
  primaryUpdateStrategy: unsupervised
  superuserSecret:
    name: postgres-secret
  bootstrap:
    initdb:
      database: ingestion
      owner: postgres
      secret:
        name: postgres-secret
      postInitSQL:
        - CREATE DATABASE ground_truth;
        - CREATE DATABASE agents;
        - CREATE DATABASE extraction;
        - CREATE DATABASE knowledge;
        - CREATE DATABASE benchmarks;
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "256MB"
  storage:
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  monitoring:
    enablePodMonitor: true
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: value-fabric
  labels:
    app: postgres
    component: infrastructure
spec:
  type: ExternalName
  externalName: postgres-rw.value-fabric.svc.cluster.local
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
