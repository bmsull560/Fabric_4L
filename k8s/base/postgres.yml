# CloudNativePG Cluster — production-grade PostgreSQL with RLS support.
# Requires the CloudNativePG operator (clusters.postgresql.cnpg.io CRD).
# See k8s/operators/operator-prerequisites.yaml for installation instructions.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: value-fabric
  labels:
    app: postgres
    component: infrastructure
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15.6

  bootstrap:
    initdb:
      database: ingestion
      owner: app
      secret:
        name: postgres-secret
      postInitSQL:
        - CREATE DATABASE ground_truth OWNER app;
        - ALTER DATABASE ingestion SET row_security = on;
        - ALTER DATABASE ground_truth SET row_security = on;

  storage:
    size: 10Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  monitoring:
    enablePodMonitor: false

  # Dev/local overlay overrides instances: 1 and disables replication.
  # Prod overlay sets instances: 3 and enables backup.
---
# Service alias for backward compatibility with service DNS references.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: value-fabric
  labels:
    app: postgres
    component: infrastructure
spec:
  selector:
    cnpg.io/cluster: postgres
    role: primary
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
