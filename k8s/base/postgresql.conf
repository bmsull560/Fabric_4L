# PostgreSQL configuration with pgAudit enabled (P0-5: Database Audit Logging)

# Connection settings
max_connections = 200
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
work_mem = 2621kB
min_wal_size = 1GB
max_wal_size = 4GB

# Logging
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000  # Log slow queries (>1s)
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'UTC'

# pgAudit Configuration (P0-5: Database Audit Logging)
# NOTE: pgaudit extension not available in postgres:15-alpine — skipped for dev
# shared_preload_libraries = 'pgaudit'
# pgaudit.log = 'all'  # Log all statements
# pgaudit.log_client = off  # Don't send to client
# pgaudit.log_level = 'log'  # Log at LOG level
# pgaudit.log_parameter = 'none'  # Don't log parameters (may contain sensitive data)
# pgaudit.log_relation = on  # Log relation access
# pgaudit.log_statement_once = off  # Log each substatement
# pgaudit.role = ''  # No specific role for auditing

# Performance monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# RLS (Row-Level Security) is already enabled via migrations
# Note: force_row_security is set via ALTER DATABASE, not in postgresql.conf
row_security = on
