apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# PRODUCTION: Override image tags via kustomize build --load-restrictor LoadRestrictionsNone
# Example overlay kustomization.yaml:
#   images:
#     - name: services/layer1-ingestion
#       newTag: v1.2.3
#     - name: services/layer2-extraction
#       newTag: v1.2.3
#     - name: services/layer3-knowledge
#       newTag: v1.2.3
#     - name: services/layer4-agents
#       newTag: v1.2.3
#     - name: services/layer5-ground-truth
#       newTag: v1.2.3
#     - name: services/layer6-benchmarks
#       newTag: v1.2.3

resources:
  - namespace.yml
  - configmap-global.yml
  # SECURITY TEMPLATES (must populate with real values before production use):
  #   - jwt-keys-secret.yaml: RSA key pair for JWT RS256 signing
  #     Do NOT include the placeholder template in base; add only to overlays
  #     that supply real keys or External Secrets Operator references.
  #   - api-key-cache-secret.yaml: HMAC secret for API key fingerprinting
  #   - Dev: kubectl create secret generic ... manually
  #   - Prod: apply k8s/external-secrets/ separately (not included here due to kustomize security)
  - api-key-cache-secret.yaml
  - redis.yml
  - postgres.yml
  - pgbouncer-config.yml
  - pgbouncer.yml
  - neo4j.yml
  - layer1-ingestion.yml
  - layer2-extraction.yml
  - layer3-knowledge.yml
  - layer4-agents.yml
  - layer5-ground-truth.yml
  - layer6-benchmarks.yml
  - frontend.yml
  - monitoring-prometheus.yml
  - monitoring-alertmanager.yml
  - tenant-safety.yml
  # Network policies for zero-trust segmentation
  - network-policies/
  # Horizontal pod autoscaling
  - hpa/layer1-ingestion-hpa.yml
  - hpa/layer2-extraction-hpa.yml
  - hpa/layer3-knowledge-hpa.yml
  - hpa/layer4-agents-hpa.yml
  - hpa/layer5-ground-truth-hpa.yml
  - hpa/layer6-benchmarks-hpa.yml
  - hpa/frontend-hpa.yml
  # Pod disruption budgets for critical services
  - pdb/postgres-pdb.yml
  - pdb/redis-pdb.yml
  - pdb/neo4j-pdb.yml
  - pdb/pgbouncer-pdb.yml
  - pdb/layer1-ingestion-pdb.yml
  - pdb/layer2-extraction-pdb.yml
  - pdb/layer3-knowledge-pdb.yml
  - pdb/layer4-agents-pdb.yml
  - pdb/layer5-ground-truth-pdb.yml
  - pdb/layer6-benchmarks-pdb.yml
  - pdb/frontend-pdb.yml

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: Exists
                  matchLabelKeys:
                    - app
