apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - configmap-global.yml
  # Secrets are managed via External Secrets Operator + Vault
  # See ../external-secrets/ for production secret configuration
  # For local dev: kubectl create secret generic ... manually
  - ../external-secrets/vault-integration.yml
  - redis.yml
  - postgres.yml
  - neo4j.yml
  - layer1-ingestion.yml
  - layer2-extraction.yml
  - layer3-knowledge.yml
  - layer4-agents.yml
  - layer5-ground-truth.yml
  - layer6-benchmarks.yml
  - frontend.yml
  - monitoring-prometheus.yml
  - monitoring-alertmanager.yml
