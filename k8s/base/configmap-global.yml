apiVersion: v1
kind: ConfigMap
metadata:
  name: value-fabric-config
  namespace: value-fabric
data:
  # Layer URLs for inter-service communication
  LAYER1_API_URL: "http://layer1-ingestion:8000"
  LAYER2_API_URL: "http://layer2-extraction:8000"
  LAYER3_API_URL: "http://layer3-knowledge:8001"
  LAYER4_API_URL: "http://layer4-agents:8000"
  LAYER5_API_URL: "http://layer5-ground-truth:8005"
  LAYER6_API_URL: "http://layer6-benchmarks:8006"
  LAYER5_DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@postgres:5432/ground_truth"
  PINECONE_INDEX: ""
  
  # Neo4j configuration
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  
  # Redis configuration
  REDIS_URL: "redis://redis:6379/0"
  
  # Log level
  LOG_LEVEL: "info"
