apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer5-ground-truth
  namespace: value-fabric
  labels:
    app: layer5-ground-truth
    component: layer5
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: layer5-ground-truth
  template:
    metadata:
      labels:
        app: layer5-ground-truth
        component: layer5
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: services/layer5-ground-truth:main
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: layer5-db-credentials
                  key: DATABASE_URL_SYNC
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        # NOTE: CI/CD may override this branch tag with immutable digests for staging and production
        - name: api
          image: services/layer5-ground-truth:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8005
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer5-db-credentials
                  key: DATABASE_URL
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: layer5-db-credentials
                  key: DATABASE_URL_SYNC
            - name: LAYER3_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: value-fabric-config
                  key: LAYER3_API_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: API_PORT
              value: "8005"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: layer5-ground-truth
  namespace: value-fabric
  labels:
    app: layer5-ground-truth
    component: layer5
spec:
  selector:
    app: layer5-ground-truth
  ports:
    - port: 8005
      targetPort: 8005
      name: http
  type: ClusterIP
