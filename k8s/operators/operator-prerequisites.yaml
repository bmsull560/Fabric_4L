apiVersion: v1
kind: ConfigMap
metadata:
  name: value-fabric-operator-prerequisites
  namespace: value-fabric
  labels:
    app.kubernetes.io/name: value-fabric
    app.kubernetes.io/component: operator-evidence
data:
  cloudnativepg.version: "1.25.0"
  cloudnativepg.crd: "clusters.postgresql.cnpg.io"
  cloudnativepg.install_order: "Install CloudNativePG operator before applying k8s/envs/prod."
  redis-operator.name: "spotahome-redis-operator"
  redis-operator.version: "1.3.0"
  redis-operator.crd: "redisfailovers.databases.spotahome.com"
  redis-operator.install_order: "Install Spotahome Redis Operator before applying k8s/envs/prod."
