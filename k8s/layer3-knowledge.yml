apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer3-knowledge
  namespace: value-fabric
  labels:
    app: layer3-knowledge
    component: layer3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: layer3-knowledge
  template:
    metadata:
      labels:
        app: layer3-knowledge
        component: layer3
    spec:
      initContainers:
        - name: wait-neo4j
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z neo4j-db 7687; do echo waiting for neo4j; sleep 2; done']
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: api
          image: value-fabric/layer3-knowledge:fixed
          imagePullPolicy: Never
          command: ["/bin/sh"]
          args: ["-c", "until nc -z neo4j-db 7687; do sleep 2; done; uvicorn src.api.main:app --host 0.0.0.0 --port 8001"]
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: NEO4J_URI
              value: "bolt://neo4j-db:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: auth
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pinecone-secret
                  key: api-key
                  optional: true
            - name: PINECONE_INDEX
              valueFrom:
                configMapKeyRef:
                  name: value-fabric-config
                  key: PINECONE_INDEX
                  optional: true
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: layer3-knowledge
  namespace: value-fabric
  labels:
    app: layer3-knowledge
    component: layer3
spec:
  selector:
    app: layer3-knowledge
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP
