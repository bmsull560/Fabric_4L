apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer4-agents
  namespace: value-fabric
  labels:
    app: layer4-agents
    component: layer4
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: layer4-agents
  template:
    metadata:
      labels:
        app: layer4-agents
        component: layer4
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379 && nc -z neo4j-db 7687 && nc -z postgres 5432; do echo waiting for dependencies; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      containers:
        - name: api
          image: value-fabric/layer4-agents:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: value-fabric-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api-key
                  optional: true
            - name: LLM_MODEL
              value: "gpt-4o"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: NEO4J_URI
              value: "bolt://neo4j-db:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: auth
            - name: LAYER1_API_URL
              value: "https://layer1-ingestion.value-fabric.svc.cluster.local:8000"
            - name: LAYER2_API_URL
              value: "https://layer2-extraction.value-fabric.svc.cluster.local:8000"
            - name: LAYER3_API_URL
              value: "https://layer3-knowledge.value-fabric.svc.cluster.local:8001"
            - name: LAYER5_API_URL
              value: "https://layer5-ground-truth.value-fabric.svc.cluster.local:8005"
            - name: SERVICE_MESH_MTLS_ENABLED
              value: "true"
            - name: LAYER6_BENCHMARKS_URL
              value: "http://layer6-benchmarks:8006"
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pinecone-secret
                  key: api-key
                  optional: true
            - name: CHECKPOINT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layer4-db-credentials
                  key: DATABASE_URL
            - name: LOG_LEVEL
              value: "info"
            - name: TMPDIR
              value: "/tmp"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: layer4-agents
  namespace: value-fabric
  labels:
    app: layer4-agents
    component: layer4
spec:
  selector:
    app: layer4-agents
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
