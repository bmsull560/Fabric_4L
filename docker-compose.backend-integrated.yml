# =============================================================================
# Fabric_4L Backend-Integrated Validation Stack
# =============================================================================
# Full L1-L6 services with backing stores for the 61-test backend-integrated
# validation milestone. Services map to localhost:8001-8006.
#
# Usage:
#   docker compose -f docker-compose.backend-integrated.yml up --build -d
#   make test-backend-integrated-validation
# =============================================================================

x-build-args: &build-args
  BASE_IMAGE: ${BASE_IMAGE:-}

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: vf-bi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingestion
      POSTGRES_MULTIPLE_DATABASES: ingestion,layer2_extraction,ground_truth,layer4_agents
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - bi-postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vf-bi-redis
    command: redis-server
    ports:
      - "6379:6379"
    volumes:
      - bi-redis-data:/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: vf-bi-neo4j
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - bi-neo4j-data:/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: vf-bi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - bi-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: vf-bi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://host.docker.internal:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/layer1-raw-html || true;
      /usr/bin/mc anonymous set none myminio/layer1-raw-html;
      exit 0;
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Layer 1: Ingestion Service (host:8001)
  # ---------------------------------------------------------------------------
  layer1:
    build:
      context: ./services/layer1-ingestion
      dockerfile: ./Dockerfile
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "false"
        BASE_IMAGE: ${BASE_IMAGE:-}
    container_name: vf-bi-layer1
    ports:
      - "8001:8000"
    environment:
      LAYER1_ENVIRONMENT: development
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/ingestion
      LAYER1_REDIS_URL: redis://host.docker.internal:6379/0
      LAYER1_S3_ENDPOINT: http://host.docker.internal:9000
      LAYER1_S3_ACCESS_KEY: minioadmin
      LAYER1_S3_SECRET_KEY: minioadmin
      LAYER1_S3_BUCKET: layer1-raw-html
      LAYER1_DEBUG: "true"
      LAYER1_API_PORT: 8000
      # Keep Docker readiness non-blocking during release-smoke startup; full API checks run after the stack is ready.
      LAYER1_RELEASE_SMOKE_LIGHT_HEALTH: "true"
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./services/layer1-ingestion/src:/app/src:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  layer1-worker:
    build:
      context: ./services/layer1-ingestion
      dockerfile: ./Dockerfile
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "false"
        BASE_IMAGE: ${BASE_IMAGE:-}
    container_name: vf-bi-layer1-worker
    command: celery -A src.shared.tasks worker --loglevel=info --concurrency=2
    environment:
      LAYER1_ENVIRONMENT: development
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/ingestion
      LAYER1_REDIS_URL: redis://host.docker.internal:6379/0
      LAYER1_S3_ENDPOINT: http://host.docker.internal:9000
      LAYER1_S3_ACCESS_KEY: minioadmin
      LAYER1_S3_SECRET_KEY: minioadmin
      PYTHONPATH: /app
    volumes:
      - ./services/layer1-ingestion/src:/app/src:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network

  # ---------------------------------------------------------------------------
  # Layer 2: Extraction Service (host:8002)
  # ---------------------------------------------------------------------------
  layer2:
    build:
      context: ./services/layer2-extraction
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-bi-layer2
    ports:
      - "8002:8000"
    environment:
      ENVIRONMENT: development
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: layer2_extraction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      LAYER2_DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/layer2_extraction
      REDIS_URL: redis://host.docker.internal:6379/0
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      # Layer 3 listens on 8001 inside its container; keep this URL for post-readiness live contract tests.
      LAYER3_API_URL: http://host.docker.internal:8003
      # Keep Docker readiness non-blocking during release-smoke startup; full L2→L3 checks run after stack readiness.
      LAYER2_HEALTH_SKIP_LAYER3: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: gpt-4o
      LOG_LEVEL: info
    volumes:
      - ./services/layer2-extraction/src:/app/src:ro
      - ./value_fabric/layer2:/app/value_fabric/layer2:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Layer 3: Knowledge Graph Service (host:8003)
  # ---------------------------------------------------------------------------
  layer3:
    build:
      context: ./services/layer3-knowledge
      dockerfile: ./Dockerfile
      args:
        <<: *build-args
        BUILDER_BASE_IMAGE: ${BUILDER_BASE_IMAGE:-}
    container_name: vf-bi-layer3
    ports:
      - "8003:8001"
    environment:
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      REDIS_URL: redis://host.docker.internal:6379/0
      LOG_LEVEL: info
    volumes:
      - ./services/layer3-knowledge/src:/app/src:ro
      - ./value_fabric/layer3:/app/value_fabric/layer3:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Layer 4: Agents Service (host:8004)
  # ---------------------------------------------------------------------------
  layer4:
    build:
      context: ./services/layer4-agents
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-bi-layer4
    ports:
      - "8004:8000"
    environment:
      DEV_AUTH_BYPASS: "true"
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      # Must equal Layer 5's SERVICE_AUTH_SECRET so the Layer5GroundTruthClient's
      # X-Service-Auth HMAC handshake is accepted by Layer 5 GovernanceMiddleware.
      SERVICE_AUTH_SECRET: dev-local-service-auth-secret-do-not-use-in-production-32c
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/layer4_agents
      CHECKPOINT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/ground_truth
      REDIS_URL: redis://host.docker.internal:6379/0
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      LAYER1_URL: http://host.docker.internal:8001
      LAYER1_API_URL: http://host.docker.internal:8001
      LAYER2_URL: http://host.docker.internal:8002
      LAYER2_API_URL: http://host.docker.internal:8002
      LAYER3_URL: http://host.docker.internal:8003
      LAYER3_API_URL: http://host.docker.internal:8003
      LAYER5_GROUND_TRUTH_URL: http://host.docker.internal:8005
      LAYER6_BENCHMARKS_URL: http://host.docker.internal:8006
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: gpt-4o
      LOG_LEVEL: debug
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      layer1:
        condition: service_healthy
      layer2:
        condition: service_healthy
      layer3:
        condition: service_healthy
      layer5:
        condition: service_healthy
      layer6:
        condition: service_healthy
    volumes:
      - ./services/layer4-agents/src:/app/src:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Layer 5: Ground Truth Service (host:8005)
  # ---------------------------------------------------------------------------
  layer5:
    build:
      context: ./services/layer5-ground-truth
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-bi-layer5
    ports:
      - "8005:8005"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/ground_truth
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/ground_truth
      LAYER3_BASE_URL: http://host.docker.internal:8003
      LAYER3_SYNC_ENABLED: "true"
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      JWT_ALGORITHM: HS256
      # Service-to-service HMAC secret for X-Service-Auth handoffs. Must match
      # the value provided to callers (Layer 4 Layer5GroundTruthClient). Dev-only
      # value; production-like runtimes enforce length/placeholder checks in
      # Settings.validate_production_fail_closed.
      SERVICE_AUTH_SECRET: dev-local-service-auth-secret-do-not-use-in-production-32c
      LOG_LEVEL: info
      API_PORT: 8005
      REDIS_URL: redis://host.docker.internal:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      layer5-migrate:
        condition: service_completed_successfully
      layer3:
        condition: service_healthy
    volumes:
      - ./services/layer5-ground-truth/src:/app/src:ro
      - ./value_fabric/layer5:/app/value_fabric/layer5:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  layer5-migrate:
    build:
      context: ./services/layer5-ground-truth
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-bi-layer5-migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/ground_truth
      MIGRATION_CONNECT_ATTEMPTS: 12
      MIGRATION_CONNECT_DELAY_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/layer5-ground-truth/src:/app/src:ro
      - ./value_fabric/layer5:/app/value_fabric/layer5:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Layer 6: Benchmarks Service (host:8006)
  # ---------------------------------------------------------------------------
  layer6:
    build:
      context: ./services/layer6-benchmarks
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-bi-layer6
    ports:
      - "8006:8006"
    environment:
      ENVIRONMENT: development
      PORT: 8006
      LOG_LEVEL: info
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      REDIS_URL: redis://host.docker.internal:6379/0
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/layer6-benchmarks/src:/app/src:ro
      - ./value_fabric/layer6:/app/value_fabric/layer6:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  bi-postgres-data:
  bi-redis-data:
  bi-neo4j-data:
  bi-minio-data:

networks:
  dev-network:
    driver: bridge
