# =============================================================================
# docker-compose.playwright-live.yml — Playwright Live Test Runner (Docker Frontend)
# =============================================================================
#
# Purpose:
#   Run Playwright E2E tests inside Docker against the *already-running* live
#   frontend service from docker-compose.live.yml. This does NOT start its own
#   frontend; it expects the vf-live-frontend container to be healthy on the
#   live-network.
#
# Prerequisites:
#   1. The live stack must be running:
#      docker compose -f docker-compose.live.yml up -d --wait
#   2. The live-network must exist (created automatically by the live stack).
#
# Quick start:
#   docker compose -f docker-compose.playwright-live.yml run --rm playwright pnpm run test:e2e:live
#
# With PowerShell helper:
#   .\scripts\run-playwright-docker.ps1 -Live
#   .\scripts\run-playwright-docker.ps1 -Live -P0
#   .\scripts\run-playwright-docker.ps1 -Live -UiMode
#
# Test results:
#   - playwright-report/index.html   (interactive HTML report)
#   - e2e-results/junit.xml          (CI-friendly JUnit output)
#   - e2e-results/                   (traces, screenshots, videos)
# =============================================================================

services:
  playwright:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.playwright
    container_name: vf-playwright-live
    working_dir: /app
    volumes:
      # Live source mount — changes on host are visible immediately
      - ./apps/web:/app
      # Named volume isolates Linux node_modules from Windows host binaries
      - playwright_node_modules:/app/node_modules
      # Test outputs surfaced back to host
      - ./e2e-results:/app/e2e-results
      - ./playwright-report:/app/playwright-report
    environment:
      # Playwright configuration — target the live frontend on the Docker network
      - PLAYWRIGHT_BASE_URL=http://frontend:3001
      - PLAYWRIGHT_LIVE_FRONTEND_URL=http://frontend:3001
      - PLAYWRIGHT_BACKEND_URL=http://layer4:8000
      - PLAYWRIGHT_LIVE_MODE=true
      # Explicitly skip the built-in webServer since we test a separately-hosted frontend
      - PLAYWRIGHT_SKIP_WEBSERVER=true
      - CI=${CI:-false}
      # Output directories (must match playwright.config.ts defaults)
      - PLAYWRIGHT_HTML_REPORT=/app/playwright-report
      - PLAYWRIGHT_JUNIT_FILE=/app/e2e-results/junit.xml
      - PLAYWRIGHT_OUTPUT_DIR=/app/e2e-results/
      # Live validation requires mocks to be disabled
      - VITE_USE_MOCKS=false
      - VITE_ENABLE_MOCK_FALLBACK=false
    ports:
      # Playwright UI mode
      - "9323:9323"
    # Keep container alive when running interactive UI mode
    stdin_open: true
    tty: true
    networks:
      # Attach to the live stack's network so we can reach frontend:3001 and layer4:8000
      - live-network

volumes:
  playwright_node_modules:

networks:
  live-network:
    external: true
