tasks:
  installPythonDeps:
    name: Install Python dependencies
    description: |
      Installs pytest via pipx then installs all service dev dependencies
      (shared packages + L1-L6 editable installs) into the pipx-managed pytest venv.
    command: |
      pipx install pytest --force
      make setup
    triggeredBy:
      - postDevcontainerStart

  installFrontendDeps:
    name: Install frontend dependencies
    description: Install pnpm workspace dependencies for apps/web and root packages.
    command: |
      corepack enable
      corepack prepare pnpm@10.18.1 --activate
      pnpm install --frozen-lockfile
    triggeredBy:
      - postDevcontainerStart

services:
  devStack:
    name: Dev Stack
    description: |
      Full local development stack via docker-compose.dev.yml.
      Starts PostgreSQL, Redis, Neo4j, Keycloak, Layer 4 Agents,
      Layer 2-5 Signal Refinery, and the Vite frontend (port 3001).
      Auth bypass is enabled — no JWT required for local exploration.
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: |
        cp -n .env.example .env 2>/dev/null || true
        docker compose -f docker-compose.dev.yml up --build -d
      ready: |
        curl -sf http://localhost:3001
      stop: |
        docker compose -f docker-compose.dev.yml down
