scan_paths:
  - "docker-compose*.yml"
  - "k8s/**/*.yml"
  - "k8s/**/*.yaml"
  - "services/**/src/**/*config.py"
  - "services/**/src/**/*settings.py"
  - "packages/config/src/env/*.ts"

required_scope_markers:
  - "environment: development"
  - "ENVIRONMENT=development"
  - "ENVIRONMENT == 'development'"
  - "env.environment === 'development'"

rules:
  - flag: "ALLOW_INSECURE_DEV_AUTH_BYPASS"
    dev_only_allowlist:
      - "docker-compose.dev.yml"
      - "docker-compose.e2e.yml"
      - "docker-compose.release-smoke.yml"
  - flag: "JWT_FALLBACK_TO_QUERY_PARAM"
    dev_only_allowlist:
      - "docker-compose.dev.yml"
      - "docker-compose.e2e.yml"
      - "docker-compose.release-smoke.yml"

scoped_allowances:
  - flag: "ALLOW_INSECURE_DEV_AUTH_BYPASS"
    paths:
      - "services/**/src/**/*config.py"
      - "services/**/src/**/*settings.py"
      - "packages/config/src/env/*.ts"
  - flag: "JWT_FALLBACK_TO_QUERY_PARAM"
    paths:
      - "services/**/src/**/*config.py"
      - "services/**/src/**/*settings.py"
      - "packages/config/src/env/*.ts"
