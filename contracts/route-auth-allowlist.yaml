# Explicitly public routes that are intentionally unauthenticated.
allowlist:
  - method: "*"
    path: "/health*"
    reason: "Liveness/readiness endpoints"
  - method: "*"
    path: "/metrics*"
    reason: "Prometheus scrape endpoints"
  - method: "*"
    path: "/ready"
    reason: "Platform readiness probe endpoint"
  - method: "*"
    path: "/docs*"
    reason: "OpenAPI docs"
  - method: "*"
    path: "/openapi.json"
    reason: "OpenAPI schema"
  - method: "*"
    path: "/redoc*"
    reason: "ReDoc docs"
  - method: "POST"
    path: "/v1/tenants/register*"
    reason: "Tenant bootstrap registration"
  - method: "POST"
    path: "/v1/auth/*"
    reason: "Authentication handshakes"
  - method: "POST"
    path: "/formulas/evaluate"
    reason: "Formula preview/evaluation endpoint"
  - method: "GET"
    path: "/formulas/variables"
    reason: "Public formula metadata"
  - method: "GET"
    path: "/formulas"
    reason: "Public formula catalog"
  - method: "GET"
    path: "/formulas/*"
    reason: "Public formula details"
  - method: "POST"
    path: "/formulas/scenario"
    reason: "Scenario simulation endpoint"
  - method: "GET"
    path: "/"
    reason: "Service root endpoint"
  - method: "GET"
    path: "/logs"
    reason: "Operational log summary endpoint"
  - method: "GET"
    path: "/workflows/types"
    reason: "Workflow type discovery endpoint"
  - method: "POST"
    path: "/c1/stream"
    reason: "Public streaming ingress"
  - method: "GET"
    path: "/plans/*/limits"
    reason: "Plan limit discovery"
