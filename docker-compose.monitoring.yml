# Launch monitoring entrypoint for Prometheus, Alertmanager, Grafana, and Jaeger.
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml config
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Start this before T-0 traffic movement so launch dashboards and alert routing
# have a baseline.

name: fabric4l-monitoring

x-from-full: &from-full
  file: docker-compose.full.yml

services:
  prometheus:
    extends:
      <<: *from-full
      service: prometheus

  alertmanager:
    extends:
      <<: *from-full
      service: alertmanager

  grafana:
    extends:
      <<: *from-full
      service: grafana

  jaeger:
    extends:
      <<: *from-full
      service: jaeger

volumes:
  grafana-data:
  alertmanager-data:

networks:
  value-fabric-network:
    driver: bridge
