groups:
  - name: value-fabric-alerts
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(layer1_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(layer1_http_requests_total[5m])) > 0.05
            or
            sum(rate(layer2_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(layer2_http_requests_total[5m])) > 0.05
            or
            sum(rate(value_fabric_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(value_fabric_http_requests_total[5m])) > 0.05
            or
            sum(rate(layer4_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(layer4_http_requests_total[5m])) > 0.05
            or
            sum(rate(layer5_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(layer5_http_requests_total[5m])) > 0.05
            or
            sum(rate(layer6_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(layer6_http_requests_total[5m])) > 0.05
          )
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected in Value Fabric"
          description: "Error rate is above 5% for more than 5 minutes"
          escalation_policy: "pagerduty-immediate"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/high-error-rate.md"

      # Disk space alerts (using node-exporter host-level metrics)
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!="tmpfs",fstype!="proc",fstype!="sysfs",fstype!="cgroup"} / node_filesystem_size_bytes) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage on {{ $labels.mountpoint }} is above 90% ({{ $value | humanizePercentage }} remaining)"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/disk-space-low.md"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!="tmpfs",fstype!="proc",fstype!="sysfs",fstype!="cgroup"} / node_filesystem_size_bytes) < 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk usage on {{ $labels.mountpoint }} is above 95% ({{ $value | humanizePercentage }} remaining). Immediate action required!"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/disk-space-critical.md"

      - alert: DiskInodeExhaustion
        expr: (node_filesystem_files_free{fstype!="tmpfs",fstype!="proc",fstype!="sysfs",fstype!="cgroup"} / node_filesystem_files) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low inodes on {{ $labels.instance }}"
          description: "Inode usage on {{ $labels.mountpoint }} is above 90% ({{ $value | humanizePercentage }} remaining). New file creation may fail."
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/disk-inode-exhaustion.md"

      # Slow queries alert (p95 latency > 2s)
      - alert: SlowQueries
        expr: |
          (
            histogram_quantile(0.95, sum(rate(layer1_http_request_duration_seconds_bucket[10m])) by (le)) > 2
            or
            histogram_quantile(0.95, sum(rate(layer2_http_request_duration_seconds_bucket[10m])) by (le)) > 2
            or
            histogram_quantile(0.95, sum(rate(value_fabric_http_request_duration_seconds_bucket[10m])) by (le)) > 2
            or
            histogram_quantile(0.95, sum(rate(layer4_http_request_duration_seconds_bucket[10m])) by (le)) > 2
            or
            histogram_quantile(0.95, sum(rate(layer5_http_request_duration_seconds_bucket[10m])) by (le)) > 2
            or
            histogram_quantile(0.95, sum(rate(layer6_http_request_duration_seconds_bucket[10m])) by (le)) > 2
          )
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow queries detected"
          description: "p95 latency is above 2 seconds for more than 10 minutes"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/slow-queries.md"

      # Dependency down alerts
      - alert: Neo4jDown
        expr: value_fabric_health_status{component="neo4j"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Neo4j is down"
          description: "Neo4j database is unreachable"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/neo4j-unreachable.md"

      - alert: PostgresDown
        expr: layer4_health_status{component="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is unreachable"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/postgres-unreachable.md"

      - alert: RedisDown
        expr: |
          (
            layer1_health_status{component="redis"} == 0
            or
            layer4_health_status{component="redis"} == 0
          )
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis is down"
          description: "Redis cache is unreachable"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/redis-unreachable.md"

      # Workflow stalled alert
      - alert: WorkflowStalled
        expr: |
          increase(layer4_workflow_executions_total{status="running"}[30m]) == 0
          and
          layer4_workflow_executions_total{status="running"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Workflow may be stalled"
          description: "Running workflows show no progress for 30+ minutes"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/agent-workflow-stall.md"

      # Memory usage alert
      - alert: HighMemoryUsage
        expr: |
          (
            layer1_memory_usage_bytes / (1024 * 1024 * 1024) > 4
            or
            layer2_memory_usage_bytes / (1024 * 1024 * 1024) > 4
            or
            value_fabric_memory_usage_bytes / (1024 * 1024 * 1024) > 4
            or
            layer4_memory_usage_bytes / (1024 * 1024 * 1024) > 4
            or
            layer5_memory_usage_bytes / (1024 * 1024 * 1024) > 4
            or
            layer6_memory_usage_bytes / (1024 * 1024 * 1024) > 4
          )
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage exceeds 4 GB in one or more layers"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/high-memory-usage.md"

      # CPU usage alert
      - alert: HighCPUUsage
        expr: |
          (
            layer1_cpu_usage_percent > 80
            or
            layer2_cpu_usage_percent > 80
            or
            value_fabric_cpu_usage_percent > 80
            or
            layer4_cpu_usage_percent > 80
            or
            layer5_cpu_usage_percent > 80
            or
            layer6_cpu_usage_percent > 80
          )
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage exceeds 80% for more than 10 minutes"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/high-cpu-usage.md"

      # High LLM cost rate alert (aggregated)
      - alert: HighLLMCostRate
        expr: sum(rate(vf_llm_cost_usd_total[1h])) > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High LLM cost rate detected"
          description: "Aggregated LLM spend is above $50/hr for more than 15 minutes"
          escalation_policy: "slack-warning-finops"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/high-llm-cost.md"

      - alert: HighLLMCostCritical
        expr: sum(rate(vf_llm_cost_usd_total[1h])) > 100
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical LLM cost rate detected"
          description: "Aggregated LLM spend is above $100/hr for more than 10 minutes"
          escalation_policy: "pagerduty-immediate-finops"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/high-llm-cost.md"

      # Per-tenant LLM cost budget alert (Task 85)
      - alert: HighLLMCostPerTenant
        expr: |
          increase(vf_llm_cost_usd_total[24h]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM cost for tenant {{ $labels.tenant_id }}"
          description: "LLM cost exceeded $100 in 24h window for tenant {{ $labels.tenant_id }} (current: {{ $value }} USD)"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/high-llm-cost.md"

      # Formula approval alert
      - alert: FormulaApprovalRequired
        expr: layer4_formula_approval_pending > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Formula approval required"
          description: "One or more formulas are pending human approval"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/formula-approval.md"

      # Audit write failure alert
      - alert: AuditWriteFailure
        expr: increase(value_fabric_audit_write_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Audit log write failures detected"
          description: "Audit writes are failing, compliance trail may be incomplete"
          escalation_policy: "pagerduty-immediate"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/audit-write-failure.md"

      # Ground truth staleness (L5)
      - alert: StaleGroundTruthObjects
        expr: layer5_stale_objects_detected > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Stale ground truth objects detected"
          description: "More than 10 ground truth objects are stale and need refreshing"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/stale-ground-truth.md"

      # Service down (API health endpoint reporting unhealthy)
      - alert: ServiceDown
        expr: |
          (
            layer1_health_status{component="api"} == 0
            or
            layer2_health_status{component="api"} == 0
            or
            value_fabric_health_status{component="api"} == 0
            or
            layer4_health_status{component="api"} == 0
            or
            layer5_health_status{component="api"} == 0
            or
            layer6_health_status{component="api"} == 0
          )
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service is down: {{ $labels.job }}"
          description: "The API health check for {{ $labels.job }} has been reporting unhealthy for more than 2 minutes"
          escalation_policy: "pagerduty-immediate"
          runbook_url: "https://github.com/bmsull560/Fabric_4L/blob/main/docs/runbooks/service-down.md"
