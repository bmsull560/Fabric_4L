# Production Alert Rules for Fabric_4L
# Grouped by severity and service
#
# TUNING RATIONALE (Task 105):
# Thresholds calibrated to balance:
# - Signal: Catch real incidents that impact users or platform health
# - Noise reduction: Avoid false positives during normal operation patterns
# - Severity alignment: warning = early signal requiring attention, critical = immediate action required
# - SLO alignment: Error budget burn rates calculated for 99.9% availability target
#
# Tuning considerations:
# - Baseline metric behavior from staging observation
# - Normal variance during peak vs off-peak hours
# - p99/p95 latency differences (p99 catches outliers, p95 catches sustained degradation)
# - Request volume thresholds to avoid low-volume noise
# - Cost thresholds aligned with daily budget targets ($500/day = ~$20/hour critical, ~$10/hour warning)

groups:
  # ==========================================
  # Critical Alerts (Immediate Response Required)
  # ==========================================
  - name: critical-alerts
    interval: 30s
    rules:
      # High Error Rate - Critical threshold
      # RATIONALE: 5% error rate sustained for 5min indicates user-impacting degradation.
      # Added minimum request threshold (0.1 rps) to avoid noise during low-traffic periods.
      # Critical = immediate on-call response required.
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total[5m])) by (layer) > 0.1
            and
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (layer)
            / sum(rate(http_requests_total[5m])) by (layer)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate in {{ $labels.layer }}"
          description: "Error rate is {{ $value | humanizePercentage }} over 5m"
          runbook_url: "https://wiki.internal/runbooks/high-error-rate"

      # Service Down - No requests detected
      # RATIONALE: Extended to 3m duration to avoid false positives during normal low-traffic periods.
      # Also requires < 0.01 rps threshold (effectively zero but handles sporadic health checks).
      # This catches hard failures (pod crash, network partition) without noise during off-hours.
      - alert: ServiceDown
        expr: |
          sum(rate(http_requests_total[3m])) by (layer) < 0.01
        for: 3m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.layer }} appears to be down"
          description: "No HTTP requests in the last 2 minutes"

      # Pod CrashLoopBackOff
      # RATIONALE: Changed from >0 to >= 3 restarts in 15m to avoid noise from single restarts.
      # Single restarts occur during normal operations (config reloads, node rebalancing).
      # 3+ restarts indicates actual crashloop condition requiring investigation.
      - alert: PodCrashLooping
        expr: |
          increase(kube_pod_container_status_restarts_total[15m]) >= 3
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod has restarted {{ $value }} times in 15m"

      # Critical LLM Cost Spike
      # RATIONALE: $100/hour = $2400/day if sustained, which is 4.8x daily budget target ($500/day).
      # 5m duration catches sudden spikes (API abuse, runaway extraction) without triggering on
      # legitimate high-volume workloads that complete within the hour.
      # Critical = immediate FinOps intervention required.
      - alert: CriticalLLMCost
        expr: |
          sum(increase(llm_cost_total[1h])) > 100
        for: 5m
        labels:
          severity: critical
          team: finops
        annotations:
          summary: "CRITICAL: Excessive LLM cost"
          description: "LLM cost is ${{ $value }} in the last hour"

      # Database Connection Pool Exhausted
      # RATIONALE: 95% threshold with 2m duration catches imminent exhaustion before queries fail.
      # 2m duration filters out brief spikes during transaction bursts.
      # Critical because pool exhaustion causes cascading failures across all layers.
      - alert: DatabasePoolExhausted
        expr: |
          (database_pool_active / database_pool_max) > 0.95
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database connection pool exhausted"
          description: "{{ $value | humanizePercentage }} of connections in use"

  # ==========================================
  # Warning Alerts (Attention Required)
  # ==========================================
  - name: warning-alerts
    interval: 1m
    rules:
      # High Latency - p95 degradation warning
      # RATIONALE: Changed from p99 to p95 because p99 is too noisy (catches outliers from 
      # occasional slow queries). p95 > 1.5s for 10m indicates sustained degradation affecting
      # real user experience. Warning severity = investigate before it becomes critical.
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, layer)
          ) > 1.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High latency in {{ $labels.layer }}"
          description: "p99 latency is {{ $value }}s"

      # Elevated Error Rate - Early warning threshold
      # RATIONALE: 1% error rate for 10m is early signal of potential issues.
      # Added minimum request threshold (0.05 rps) to avoid noise during low traffic.
      # Warning severity = investigate, not immediate action. Often precedes critical alert.
      - alert: ElevatedErrorRate
        expr: |
          (
            sum(rate(http_requests_total[10m])) by (layer) > 0.05
            and
            sum(rate(http_requests_total{status=~"5.."}[10m])) by (layer)
            / sum(rate(http_requests_total[10m])) by (layer)
          ) > 0.01
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated error rate in {{ $labels.layer }}"
          description: "Error rate is {{ $value | humanizePercentage }} over 10m"

      # LLM Cost Warning
      # RATIONALE: $50/hour = $1200/day if sustained, which is 2.4x daily budget target ($500/day).
      # 15m duration provides early warning before critical threshold ($100/hour) is reached.
      # Warning severity = FinOps review needed, may indicate inefficient extraction patterns.
      - alert: HighLLMCost
        expr: |
          sum(increase(llm_cost_total[1h])) > 50
        for: 15m
        labels:
          severity: warning
          team: finops
        annotations:
          summary: "High LLM cost rate"
          description: "LLM cost is ${{ $value }} in the last hour"

      # Celery Queue Backlog
      # RATIONALE: 100 tasks queued for 10m indicates worker capacity issue.
      # Threshold based on typical worker throughput (10 tasks/min/worker * 10 workers).
      # Warning severity = may need to scale workers or investigate slow tasks.
      - alert: CeleryQueueBacklog
        expr: |
          celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Celery queue backlog"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks"

      # Worker Concurrency High
      # RATIONALE: 80% prefetch capacity indicates workers are near saturation.
      # 5m duration filters out brief bursts. Prefetch count > 80% of concurrency
      # means workers have few available slots for new tasks.
      # Warning severity = monitor for scaling needs.
      - alert: CeleryWorkerOverload
        expr: |
          celery_worker_prefetched_tasks / celery_worker_concurrency > 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Celery worker {{ $labels.worker_name }} overloaded"
          description: "Worker has {{ $value | humanizePercentage }} of capacity in use"

      # Memory Usage High
      # RATIONALE: 85% memory for 10m indicates sustained memory pressure.
      # Below OOM threshold (typically 95-100%) but above comfortable operating range.
      # Warning severity = investigate memory leaks or consider increasing limits.
      # 10m duration avoids triggering on temporary memory spikes during batch operations.
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_working_set_bytes{container!=""}
            / container_spec_memory_limit_bytes{container!=""}
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage in {{ $labels.pod }}"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      # CPU Usage High
      # RATIONALE: 80% CPU sustained for 10m indicates CPU saturation.
      # Single-core containers: 1.0 = 100% of one core. Multi-core: scales accordingly.
      # Warning severity = consider scaling or optimizing hot paths.
      # 10m duration filters out brief CPU spikes during request bursts.
      - alert: HighCPUUsage
        expr: |
          (
            rate(container_cpu_usage_seconds_total{container!=""}[5m])
          ) > 0.8
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage in {{ $labels.pod }}"
          description: "CPU usage is {{ $value | humanizePercentage }}"

  # ==========================================
  # Resource Alerts
  # ==========================================
  - name: resource-alerts
    interval: 5m
    rules:
      # Disk Space Low (< 10% remaining)
      # RATIONALE: Lowered threshold from 15% to 10% to provide more actionable runway.
      # 10% on typical 100GB volume = 10GB remaining, sufficient for emergency response.
      # Critical severity = immediate action required to prevent write failures.
      # 5m duration confirms sustained low disk, not temporary measurement artifact.
      - alert: DiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            / node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.10
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "{{ $value | humanizePercentage }} disk space remaining"

      # Disk Space Warning (< 20% remaining)
      # RATIONALE: Lowered from 25% to 20% to reduce noise on large volumes.
      # 20% provides 2-3 days runway for planned cleanup/expansion.
      # Warning severity = schedule cleanup or volume expansion.
      # 10m duration confirms trend, not brief fluctuation.
      - alert: DiskSpaceWarning
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            / node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.20
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Disk space warning on {{ $labels.instance }}"
          description: "{{ $value | humanizePercentage }} disk space remaining"

      # Inode Exhaustion
      # RATIONALE: 5% inodes remaining is late-stage warning. Unlike disk space,
      # inode exhaustion is harder to recover from (requires file deletion).
      # Warning severity = investigate log rotation, temp file cleanup.
      # Often precedes DiskSpaceLow when many small files are being created.
      - alert: InodesExhausted
        expr: |
          (
            node_filesystem_files_free{mountpoint="/"}
            / node_filesystem_files{mountpoint="/"}
          ) < 0.05
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Inode exhaustion on {{ $labels.instance }}"
          description: "{{ $value | humanizePercentage }} inodes remaining"

      # Network Saturation
      # RATIONALE: 800 Mbps (100 MB/s) threshold suitable for modern cloud instances
      # with 1-10 Gbps interfaces. Adjust based on your instance network capacity.
      # Sustained high throughput may indicate DDoS, backup operations, or data exfil.
      # Warning severity = investigate traffic source, consider rate limiting.
      - alert: NetworkSaturation
        expr: |
          rate(node_network_receive_bytes_total[5m]) > 100000000  # 100 MB/s = 800 Mbps
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High network traffic on {{ $labels.instance }}"
          description: "Receiving {{ $value | humanize }}B/s"

  # ==========================================
  # SLO-based Alerts
  # ==========================================
  - name: slo-alerts
    interval: 1m
    rules:
      # Availability SLO: 99.9% (43.2m downtime budget per 30 days)
      # Burn rate alerts based on error budget calculation:
      # - 5x burn: 14.4% error rate exhausts budget in 6 hours
      # - 2x burn: 5.76% error rate exhausts budget in 3 days
      # These are multi-window alerts (see long/short labels) for reduced noise.
      - alert: ErrorBudgetBurn5x
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[1h]))
          / sum(rate(http_requests_total[1h]))
          > 0.0144  # 14.4% error rate = 5x burn, exhausts budget in 6h
        for: 2m
        labels:
          severity: critical
          team: platform
          long: 1h
          short: 5m
        annotations:
          summary: "Fast error budget burn (5x)"
          description: "Error rate {{ $value | humanizePercentage }} - will exhaust 30-day budget in 6 hours"

      - alert: ErrorBudgetBurn2x
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[6h]))
          / sum(rate(http_requests_total[6h]))
          > 0.00576  # 5.76% error rate = 2x burn, exhausts budget in 3d
        for: 15m
        labels:
          severity: warning
          team: platform
          long: 6h
          short: 30m
        annotations:
          summary: "Moderate error budget burn (2x)"
          description: "Error rate {{ $value | humanizePercentage }} - will exhaust 30-day budget in 3 days"

  # ==========================================
  # Business Alerts
  # ==========================================
  - name: business-alerts
    interval: 5m
    rules:
      # Ingestion Volume Drop
      # RATIONALE: 50% drop compared to same time yesterday indicates pipeline issue.
      # 30m duration avoids triggering on scheduled maintenance windows or brief pauses.
      # Compares to yesterday (not average) to account for day-of-week patterns.
      # Warning severity = data team should investigate source connectivity.
      - alert: IngestionVolumeDrop
        expr: |
          rate(ingested_documents_total[1h]) < 0.5 * rate(ingested_documents_total[1h] offset 1d)
        for: 30m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Ingestion volume dropped"
          description: "Ingestion is {{ $value | humanizePercentage }} of yesterday's rate"

      # Ground Truth Evaluation Failures
      # RATIONALE: 10% failure rate over 1h indicates systemic evaluation pipeline issue.
      # Could be: dependency outage (LLM API), schema mismatch, or ground truth DB issues.
      # 15m duration confirms sustained issue, not transient failures.
      # Warning severity = ML team investigate, may impact model quality metrics.
      - alert: GroundTruthEvaluationsFailing
        expr: |
          rate(evaluation_failures_total[1h]) / 
          (rate(evaluation_failures_total[1h]) + rate(evaluation_successes_total[1h])) > 0.10
        for: 15m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "Ground truth evaluations failing"
          description: "{{ $value | humanizePercentage }} of evaluations failing"
