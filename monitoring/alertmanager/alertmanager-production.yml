# Production Alertmanager Configuration for Fabric_4L
# Routes alerts to appropriate channels based on severity and team

global:
  # Time to wait before marking alert as resolved
  resolve_timeout: 5m
  
  # Slack webhook URL (read from Kubernetes secret)
  slack_api_url_file: '/etc/alertmanager/secrets/slack_webhook_url'
  
  # PagerDuty URL
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  
  # SMTP settings for email (optional)
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@fabric.local'
  smtp_auth_username_file: '/etc/alertmanager/secrets/smtp_username'
  smtp_auth_password_file: '/etc/alertmanager/secrets/smtp_password'

# Template files for customizing notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Inhibition rules - suppress lower severity alerts when higher severity fires
inhibit_rules:
  # Inhibit warning alerts when critical alert fires for same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'namespace', 'layer']
  
  # Inhibit info alerts when warning fires
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'namespace']

# Routing tree
route:
  # Root receiver - catch-all
  receiver: 'default-null'
  
  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'team', 'namespace', 'layer']
  
  # Wait before sending notification for a group
  group_wait: 30s
  
  # Interval between sending notifications for same group
  group_interval: 5m
  
  # Minimum interval between repeating a notification
  repeat_interval: 4h
  
  # Routes - evaluated in order
  routes:
    # FinOps alerts - LLM cost alerts to finance team
    - match:
        team: finops
      receiver: 'slack-finops'
      continue: true
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-finops'
          continue: true
    
    # ML team alerts - evaluations, model issues
    - match:
        team: ml
      receiver: 'slack-ml'
      continue: true
      repeat_interval: 2h
    
    # Data team alerts - ingestion issues
    - match:
        team: data
      receiver: 'slack-data'
      continue: true
      repeat_interval: 2h
    
    # Critical alerts - PagerDuty + Slack
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
      repeat_interval: 15m  # Repeat critical alerts every 15 minutes
      
      # Also send to Slack
      routes:
        - receiver: 'slack-critical'
          continue: true
    
    # Warning alerts - Slack only
    - match:
        severity: warning
      receiver: 'slack-warning'
      repeat_interval: 2h

# Receivers - notification channels
receivers:
  # Default - no notifications (prevents spam)
  - name: 'default-null'

  # Critical Slack channel
  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '🔴 {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Layer:* {{ .Labels.layer | default "unknown" }}
          *Namespace:* {{ .Labels.namespace }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url | default "n/a" }}
          *Escalation:* {{ .Annotations.escalation_url | default "n/a" }}
          {{ end }}
        color: 'danger'
        footer: 'Prometheus Alertmanager'

  # Warning Slack channel
  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '🟡 {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Layer:* {{ .Labels.layer | default "unknown" }}
          *Namespace:* {{ .Labels.namespace }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url | default "n/a" }}
          *Escalation:* {{ .Annotations.escalation_url | default "n/a" }}
          {{ end }}
        color: 'warning'
        footer: 'Prometheus Alertmanager'

  # FinOps Slack channel
  - name: 'slack-finops'
    slack_configs:
      - channel: '#finops-alerts'
        send_resolved: true
        title: '💰 {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        color: '{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}'

  # ML Team Slack
  - name: 'slack-ml'
    slack_configs:
      - channel: '#ml-alerts'
        send_resolved: true
        title: '🤖 {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url | default "n/a" }}
          *Escalation:* {{ .Annotations.escalation_url | default "n/a" }}
          {{ end }}
        color: 'warning'

  # Data Team Slack
  - name: 'slack-data'
    slack_configs:
      - channel: '#data-alerts'
        send_resolved: true
        title: '📊 {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url | default "n/a" }}
          *Escalation:* {{ .Annotations.escalation_url | default "n/a" }}
          {{ end }}
        color: 'warning'

  # PagerDuty for critical alerts
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key_file: '/etc/alertmanager/secrets/pagerduty_key'
        description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.namespace }}'
        severity: '{{ .GroupLabels.severity }}'
        details:
          summary: '{{ .Annotations.summary }}'
          description: '{{ .Annotations.description }}'
          runbook: '{{ .Annotations.runbook_url }}'
          layer: '{{ .GroupLabels.layer }}'
          namespace: '{{ .GroupLabels.namespace }}'
        group: '{{ .GroupLabels.alertname }}'

  # PagerDuty for FinOps critical
  - name: 'pagerduty-finops'
    pagerduty_configs:
      - service_key_file: '/etc/alertmanager/secrets/pagerduty_finops_key'
        description: 'FinOps: {{ .GroupLabels.alertname }}'
        severity: 'critical'
        details:
          summary: '{{ .Annotations.summary }}'
          description: '{{ .Annotations.description }}'
          cost: '{{ .Value }}'

  # Email for critical alerts (backup)
  - name: 'email-critical'
    email_configs:
      - to: 'oncall@fabric.local'
        from: 'alerts@fabric.local'
        smarthost: 'smtp.gmail.com:587'
        auth_username_file: '/etc/alertmanager/secrets/smtp_username'
        auth_password_file: '/etc/alertmanager/secrets/smtp_password'
        subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}
