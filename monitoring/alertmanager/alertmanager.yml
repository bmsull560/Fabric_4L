global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_API_URL}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'
      repeat_interval: 1h
    - match:
        alertname: FormulaApprovalRequired
      receiver: 'slack-formula-approval'
      repeat_interval: 30m

receivers:
  - name: 'slack-default'
    slack_configs:
      - channel: '#vf-alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
  - name: 'slack-critical'
    slack_configs:
      - channel: '#vf-alerts-critical'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
  - name: 'slack-formula-approval'
    slack_configs:
      - channel: '#vf-formula-approvals'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
