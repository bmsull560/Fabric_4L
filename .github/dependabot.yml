version: 2
updates:
  # ============================================================================
  # Python Dependencies — Services and SDK (pip ecosystem)
  # ============================================================================
  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
    labels: [dependencies, python, service-api]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/backend-leads

  - package-ecosystem: pip
    directory: /services/layer1-ingestion
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer1]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/data-engineering

  - package-ecosystem: pip
    directory: /services/layer2-extraction
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer2]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/ai-ml-leads

  - package-ecosystem: pip
    directory: /services/layer3-knowledge
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer3]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/graph-specialists

  - package-ecosystem: pip
    directory: /services/layer4-agents
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer4]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/ai-ml-leads

  - package-ecosystem: pip
    directory: /services/layer5-ground-truth
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer5]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/data-engineering

  - package-ecosystem: pip
    directory: /services/layer6-benchmarks
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer6]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/qa-leads

  - package-ecosystem: pip
    directory: /sdk/python
    schedule:
      interval: weekly
    labels: [dependencies, python, sdk-python]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/sre-leads

  - package-ecosystem: pip
    directory: /tests
    schedule:
      interval: weekly
    labels: [dependencies, python, tests]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/backend-leads
      - value-fabric/qa-leads

  # ============================================================================
  # Node.js Dependencies — Apps and Packages (npm ecosystem)
  # ============================================================================
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    labels: [dependencies, javascript, app-web]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/frontend-leads

  - package-ecosystem: npm
    directory: /packages/config
    schedule:
      interval: weekly
    labels: [dependencies, javascript, package-config]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/sre-leads

  - package-ecosystem: npm
    directory: /packages/eslint-plugin-fabric-contracts
    schedule:
      interval: weekly
    labels: [dependencies, javascript, package-eslint]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/sre-leads

  - package-ecosystem: npm
    directory: /packages/platform-contract
    schedule:
      interval: weekly
    labels: [dependencies, javascript, package-contract]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/sre-leads

  # ============================================================================
  # Docker Base Images — Services, Apps, and Devcontainer (docker ecosystem)
  # ============================================================================
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    labels: [dependencies, docker, app-web]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/frontend-leads
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /services/layer1-ingestion
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer1]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/data-engineering
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /services/layer2-extraction
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer2]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/ai-ml-leads
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /services/layer3-knowledge
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer3]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/graph-specialists
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /services/layer4-agents
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer4]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/ai-ml-leads
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /services/layer5-ground-truth
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer5]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/data-engineering
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /services/layer6-benchmarks
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer6]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/qa-leads
      - value-fabric/sre-leads

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
    labels: [dependencies, docker, devcontainer]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - value-fabric/sre-leads

  # ============================================================================
  # GitHub Actions (github-actions ecosystem)
  # ============================================================================
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, github-actions]
    commit-message:
      prefix: chore(ci)
    reviewers:
      - value-fabric/sre-leads
