version: 2
updates:
  # ---------------------------------------------------------------------------
  # Python — service layers and SDK
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /services/layer1-ingestion
    schedule:
      interval: weekly
    labels: [dependencies, python]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: pip
    directory: /services/layer2-extraction
    schedule:
      interval: weekly
    labels: [dependencies, python]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: pip
    directory: /services/layer3-knowledge
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer1]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-ingestion

  - package-ecosystem: pip
    directory: /services/layer4-agents
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer2]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-extraction

  - package-ecosystem: pip
    directory: /services/layer5-ground-truth
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer3]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-knowledge

  - package-ecosystem: pip
    directory: /services/layer6-benchmarks
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer4]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-agents

  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
    labels: [dependencies, python, service-layer5]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-quality

  - package-ecosystem: pip
    directory: /sdk/python
    schedule:
      interval: weekly
    labels: [dependencies, javascript, package-eslint]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-platform

  # ---------------------------------------------------------------------------
  # Node.js — frontend app and workspace packages
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    labels: [dependencies, javascript]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /packages/config
    schedule:
      interval: weekly
    labels: [dependencies, javascript]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /packages/eslint-plugin-fabric-contracts
    schedule:
      interval: weekly
    labels: [dependencies, javascript]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /packages/platform-contract
    schedule:
      interval: weekly
    labels: [dependencies, javascript, package-contract]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-platform

  # ---------------------------------------------------------------------------
  # Docker base images — service layers and frontend
  # ---------------------------------------------------------------------------
  - package-ecosystem: docker
    directory: /services/layer1-ingestion
    schedule:
      interval: weekly
    labels: [dependencies, docker, app-web]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-frontend
      - team-platform

  - package-ecosystem: docker
    directory: /services/layer2-extraction
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer1]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-ingestion
      - team-platform

  - package-ecosystem: docker
    directory: /services/layer3-knowledge
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer2]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-extraction
      - team-platform

  - package-ecosystem: docker
    directory: /services/layer4-agents
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer3]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-knowledge
      - team-platform

  - package-ecosystem: docker
    directory: /services/layer5-ground-truth
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer4]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-agents
      - team-platform

  - package-ecosystem: docker
    directory: /services/layer6-benchmarks
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer5]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-quality
      - team-platform

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    labels: [dependencies, docker, service-layer6]
    commit-message:
      prefix: chore(deps)
    reviewers:
      - team-research
      - team-platform

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, github-actions]
    commit-message:
      prefix: chore(ci)
    reviewers:
      - team-platform
