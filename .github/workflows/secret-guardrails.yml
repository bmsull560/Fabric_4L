name: Secret Guardrails

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run secret guardrails scanner
        run: |
          python scripts/security/secret_guardrails.py $(git ls-files)
