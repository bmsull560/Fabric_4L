name: Package and Sign

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag to sign'
        required: true
        type: string
      registry:
        description: 'Container registry'
        default: 'ghcr.io'
        required: false
        type: string
    outputs:
      attestations_bundle:
        description: 'Attestations bundle artifact name'
        value: ${{ jobs.sign-provenance.outputs.bundle }}

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to sign'
        required: true
        type: string
      registry:
        description: 'Container registry'
        default: 'ghcr.io'
        required: false
        type: string

env:
  REGISTRY: ${{ inputs.registry || 'ghcr.io' }}
  IMAGE_TAG: ${{ inputs.image_tag }}

jobs:
  # ============================================
  # Sign Images with Cosign
  # ============================================
  sign-images:
    name: Sign Container Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: 'v2.4.0'

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ env.IMAGE_TAG }}"
          if ! docker pull "$IMAGE" 2>/dev/null; then
            echo "Image not found: $IMAGE"
            exit 1
          fi
          echo "Image found: $IMAGE"

      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ env.IMAGE_TAG }}"
          echo "Signing image: $IMAGE"
          cosign sign --yes "$IMAGE"

      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ env.IMAGE_TAG }}"
          echo "Verifying signature for: $IMAGE"
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "$IMAGE"

  # ============================================
  # Generate SBOMs
  # ============================================
  generate-sboms:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sign-images

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.17.0

      - name: Generate CycloneDX SBOM
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ env.IMAGE_TAG }}"
          OUTPUT="${{ matrix.layer }}-sbom.cyclonedx.json"
          
          echo "Generating SBOM for: $IMAGE"
          syft "$IMAGE" -o cyclonedx-json="$OUTPUT"
          
          # Verify SBOM was generated
          if [ ! -f "$OUTPUT" ]; then
            echo "Failed to generate SBOM"
            exit 1
          fi
          
          echo "SBOM generated: $OUTPUT"
          ls -la "$OUTPUT"

      - name: Generate SPDX SBOM
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ env.IMAGE_TAG }}"
          OUTPUT="${{ matrix.layer }}-sbom.spdx.json"
          
          echo "Generating SPDX SBOM for: $IMAGE"
          syft "$IMAGE" -o spdx-json="$OUTPUT"
          
          if [ ! -f "$OUTPUT" ]; then
            echo "Failed to generate SPDX SBOM"
            exit 1
          fi
          
          echo "SPDX SBOM generated: $OUTPUT"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.layer }}
          path: |
            ${{ matrix.layer }}-sbom.cyclonedx.json
            ${{ matrix.layer }}-sbom.spdx.json
          retention-days: 90

  # ============================================
  # Generate Provenance Attestations
  # ============================================
  generate-provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sign-images
    permissions:
      contents: read
      id-token: write
      actions: read

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create provenance subject
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ env.IMAGE_TAG }}"
          docker pull "$IMAGE"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | cut -d'@' -f2)
          
          echo "$DIGEST $IMAGE" > "${{ matrix.layer }}-subjects.txt"
          echo "Created subject: $DIGEST $IMAGE"

      - name: Generate SLSA provenance
        id: slsa-provenance
        uses: slsa-framework/slsa-github-generator/actions/generator/generic/create-base64-subjects-from-file@v2.0.0
        with:
          path: "${{ matrix.layer }}-subjects.txt"

      - name: Rename provenance file
        run: |
          mv "${{ steps.slsa-provenance.outputs.provenance-name }}" "${{ matrix.layer }}-provenance.intoto.jsonl" || true
          ls -la *.intoto.jsonl || echo "Provenance files in directory"

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provenance-${{ matrix.layer }}
          path: |
            ${{ matrix.layer }}-subjects.txt
            ${{ matrix.layer }}-provenance.intoto.jsonl
          retention-days: 90

  # ============================================
  # Bundle Attestations
  # ============================================
  sign-provenance:
    name: Bundle and Sign Attestations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [generate-sboms, generate-provenance]
    outputs:
      bundle: ${{ steps.bundle.outputs.name }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: attestations/
          pattern: '*'

      - name: Create attestation bundle
        id: bundle
        run: |
          BUNDLE_NAME="attestations-${{ env.IMAGE_TAG }}"
          tar -czf "$BUNDLE_NAME.tar.gz" attestations/
          echo "name=$BUNDLE_NAME" >> $GITHUB_OUTPUT
          echo "Attestation bundle created: $BUNDLE_NAME.tar.gz"

      - name: Sign attestation bundle
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          BUNDLE="attestations-${{ env.IMAGE_TAG }}.tar.gz"
          echo "Signing bundle: $BUNDLE"
          cosign sign-blob --yes "$BUNDLE" --output-signature="$BUNDLE.sig"

      - name: Upload signed bundle
        uses: actions/upload-artifact@v4
        with:
          name: attestations-${{ env.IMAGE_TAG }}
          path: |
            attestations-${{ env.IMAGE_TAG }}.tar.gz
            attestations-${{ env.IMAGE_TAG }}.tar.gz.sig
          retention-days: 90

      - name: Create attestation summary
        run: |
          cat << 'EOF' > attestation-summary.md
          # Attestation Bundle

          ## Contents
          - Signed container images (7 layers)
          - CycloneDX SBOMs
          - SPDX SBOMs
          - SLSA provenance attestations

          ## Verification
          ```bash
          # Verify image signature
          cosign verify --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/<layer>:${{ env.IMAGE_TAG }}

          # Verify bundle signature
          cosign verify-blob --signature attestations-${{ env.IMAGE_TAG }}.tar.gz.sig \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            attestations-${{ env.IMAGE_TAG }}.tar.gz
          ```
          EOF

          cat attestation-summary.md
