name: Kubernetes Manifest Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/k8s-validation.yml'
  push:
    branches: [main]
    paths:
      - 'k8s/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: k8s-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Validate base manifests
        run: |
          echo "Validating base kustomization..."
          kubectl kustomize k8s/base/ > /dev/null
          echo "Base manifests: OK"

      - name: Validate production overlay
        run: |
          echo "Validating production overlay..."
          kubectl kustomize k8s/overlays/production/ > /dev/null
          echo "Production overlay: OK"

      - name: Validate staging overlay
        run: |
          echo "Validating staging overlay..."
          kubectl kustomize k8s/overlays/staging/ > /dev/null
          echo "Staging overlay: OK"

      - name: Validate dev overlay
        run: |
          echo "Validating dev overlay..."
          kubectl kustomize k8s/overlays/dev/ > /dev/null
          echo "Dev overlay: OK"

      - name: Check for forbidden legacy paths in manifests
        run: |
          # Ensure K8s manifests do not reference deleted legacy namespaces
          FORBIDDEN=(
            "value_fabric.layer1_ingestion"
            "value_fabric.layer3_knowledge"
          )
          FAIL=0
          for pattern in "${FORBIDDEN[@]}"; do
            if grep -r "$pattern" k8s/ --include="*.yaml" --include="*.yml" 2>/dev/null; then
              echo "ERROR: Forbidden legacy reference found in K8s manifests: $pattern"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "No forbidden legacy references in K8s manifests."

      - name: Upload rendered manifests as evidence
        if: always()
        run: |
          mkdir -p artifacts/k8s-validation
          kubectl kustomize k8s/overlays/production/ > artifacts/k8s-validation/production-rendered.yaml 2>&1 || true
          kubectl kustomize k8s/overlays/staging/ > artifacts/k8s-validation/staging-rendered.yaml 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-validation-manifests
          path: artifacts/k8s-validation/
          retention-days: 14
