name: Mandatory Test Profile

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Mandatory Python Tests
  # These tests must pass and fail (never skip) if dependencies are missing
  # ============================================================================
  mandatory-python-tests:
    name: Mandatory Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install mandatory test dependencies
        run: |
          uv pip install -r tests/requirements-test.txt --system

      - name: Run mandatory test profile
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/shared/src:${{ github.workspace }}
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # MANDATORY: unit + contract + security tests
          # These fail (never skip) if dependencies are missing
          pytest -m "mandatory" --strict-markers \
            -v \
            --tb=short \
            --timeout=60 \
            -n auto \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================================
  # Mandatory Frontend Contract Tests
  # ============================================================================
  mandatory-frontend-contract-tests:
    name: Mandatory Frontend Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run contract tests
        run: pnpm test -- src/api/__tests__/contract/ --reporter=verbose

      - name: Fail on placeholder tests
        run: |
          # Detect and fail if any contract test has placeholder assertions
          if grep -r "expect(true).toBe(true)" src/api/__tests__/contract/; then
            echo "❌ PLACEHOLDER TESTS DETECTED: Replace expect(true).toBe(true) with real assertions"
            exit 1
          fi
          echo "✅ No placeholder tests found"

  # ============================================================================
  # Mandatory Security Regression Gate
  # ============================================================================
  mandatory-security-regression-gate:
    name: Mandatory Security Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install gate dependencies
        run: |
          uv pip install -r tests/requirements-test.txt --system
          uv pip install -e services/api --system
          uv pip install -e services/layer1-ingestion --system
          uv pip install -e services/layer2-extraction --system
          uv pip install -e services/layer3-knowledge --system
          uv pip install -e services/layer4-agents --system
          uv pip install -e services/layer5-ground-truth --system
          uv pip install -e services/layer6-benchmarks --system

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mandatory security regression gate
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          bash scripts/ci/mandatory_security_regression_gate.sh

      - name: Upload gate evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-evidence
          path: .fabric/audit/security_regression_gate/
          retention-days: 30
