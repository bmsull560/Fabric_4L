name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Layer 1 - Ingestion
  layer1-checks:
    name: Layer 1 - Ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: value-fabric/layer1-ingestion

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-layer1
          path: value-fabric/layer1-ingestion/coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: |
          pip install bandit
          bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          pip install pip-audit
          pip-audit --severity high --exit-code 1

  # Layer 2 - Extraction
  layer2-checks:
