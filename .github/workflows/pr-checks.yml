  # Frontend checks
  frontend-checks:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-failure
          path: frontend/dist/public/

  # Kubernetes manifest validation (server-side dry-run via kustomize)
  k8s-dry-run:
    name: Kubernetes Dry-Run Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz -o kustomize.tar.gz
          echo "366c0e6b8f2571be6d034a5627e18b43f32a074eb89d4f740fdda80fa7d8bf3e  kustomize.tar.gz" | sha256sum -c
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Server-side dry-run (dev overlay)
        run: |
          kustomize build k8s/overlays/dev | kubectl apply --dry-run=server -f -

      - name: Server-side dry-run (prod overlay)
        run: |
          kustomize build k8s/overlays/prod | kubectl apply --dry-run=server -f -
