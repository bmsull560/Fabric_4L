
# Action pinning and update process
# - All third-party actions are pinned to full-length commit SHAs.
# - Dependabot (github-actions ecosystem) remains enabled to open SHA bump PRs.
# - Quarterly, run a dedicated "Workflow Action Pin Refresh" PR that:
#   1) updates each action to the latest upstream commit for the tracked major/minor tag,
#   2) runs full CI (including security gates), and
#   3) records verification results in the PR description before merge.
name: PR Checks

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Phase 6-7: Structural and contract verification (must pass before layer-specific checks)
  structural-preflight:
    name: Structural Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Enforce package manager policy (root + apps/web)
        run: pnpm run check:package-manager-policy

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Run structural preflight
        run: |
          python scripts/ci/structural_preflight.py --strict --json | tee artifacts/structural-preflight.json
          exit ${PIPESTATUS[0]}

      - name: Run Python contract lint
        run: |
          python scripts/ci/python_contract_lint.py --strict --json | tee artifacts/python-contract-lint.json
          exit ${PIPESTATUS[0]}

      - name: Run import topology tests
        run: |
          pip install pytest pyyaml
          pytest tests/contract/test_import_topology.py -v --tb=short

      - name: Enforce pytest skip governance
        run: |
          mkdir -p artifacts
          set +e
          python -m pytest --collect-only -q -ra tests > artifacts/pytest-collection.txt 2>&1
          collect_status=$?
          set -e
          python scripts/ci/check_pytest_skip_governance.py             artifacts/pytest-collection.txt             --allowlist config/ci/pytest_skip_allowlist.yaml             --baseline config/ci/pytest_skip_baseline.json             --write-report artifacts/pytest-skip-governance.json
          if [ "$collect_status" -ne 0 ]; then
            echo "pytest collection exited non-zero (${collect_status}); structural-preflight should catch import errors separately."
          fi

      - name: Enforce static test skip governance
        run: |
          python scripts/ci/check_test_skip_governance.py \
            --register config/ci/test_skip_register.yaml \
            --write-report artifacts/test-skip-governance.json

      - name: Run Layer 3 source mirror drift gate
        run: |
          mkdir -p artifacts
          python scripts/ci/check_layer3_source_mirror.py | tee artifacts/layer3-source-mirror.txt
          exit ${PIPESTATUS[0]}

      - name: Build duplicate source-tree evidence report
        run: |
          mkdir -p artifacts
          set +e
          python scripts/ci/check_duplicate_source_trees.py --strict --json | tee artifacts/duplicate-source-trees.json
          duplicate_status=${PIPESTATUS[0]}
          set -e
          if [ "$duplicate_status" -ne 0 ]; then
            echo "Duplicate source-tree evidence report recorded existing canonicalization debt; diff-scoped gating is enforced by the violation summary."
          fi

      - name: Run shared import runtime strict gate
        run: |
          mkdir -p artifacts
          python scripts/ci/check_shared_imports.py --strict --scope runtime --json | tee artifacts/shared-imports-runtime.json
          exit ${PIPESTATUS[0]}

      - name: Run navigation pattern guardrail
        run: |
          python scripts/ci/check_navigation_patterns.py --strict

      - name: Run repository config policy guardrail
        run: |
          python scripts/ci/check_config_policy.py

      - name: Run workflow matrix guards
        run: |
          make check-workflow-matrix

      - name: Build PR diff violation summary artifact
        if: always()
        run: |
          mkdir -p artifacts
          python scripts/ci/ci_violation_diff_summary.py             --base-ref "${{ github.base_ref || 'main' }}"             --duplicate-report artifacts/duplicate-source-trees.json             --shared-report artifacts/shared-imports-runtime.json             --json-out artifacts/violation-diff-summary.json             --md-out artifacts/violation-diff-summary.md

      - name: Upload structural reports
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: structural-check-reports
          path: |
            artifacts/structural-preflight.json
            artifacts/python-contract-lint.json
            artifacts/layer3-source-mirror.txt
            artifacts/duplicate-source-trees.json
            artifacts/shared-imports-runtime.json
            artifacts/pytest-collection.txt
            artifacts/pytest-skip-governance.json
            artifacts/test-skip-governance.json
            artifacts/violation-diff-summary.json
            artifacts/violation-diff-summary.md
          retention-days: 14

  governance-docs-check:
    name: Governance Docs Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          fetch-depth: 0

      - name: Verify required policy and runbook docs exist
        run: |
          set -euo pipefail
          required_files=(
            "docs/reliability/dr-policy.md"
            "docs/api-versioning-policy.md"
            "docs/troubleshooting/runbooks/incident/dr-gameday-service-failover.md"
            "docs/troubleshooting/runbooks/incident/dr-gameday-region-loss.md"
            "docs/troubleshooting/runbooks/incident/dr-evidence-log-template.md"
            ".github/pull_request_template.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required governance file: $file"
              exit 1
            fi
          done

          echo "Docs policy gate passed."

      - name: Enforce control matrix update policy
        run: .github/scripts/check-control-matrix.sh


      - name: Validate docs claim verification map
        run: |
          mkdir -p artifacts/docs-validation
          python scripts/ci/validate_docs_claims.py --artifacts-dir artifacts/docs-validation

      - name: Upload docs validation artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: docs-validation-evidence
          path: |
            artifacts/docs-validation/docs-validation-evidence.json
            artifacts/docs-validation/docs-validation-summary.md
            artifacts/docs-validation/stale-documents.json
          retention-days: 14

  # Layer 1 - Ingestion
  layer1-checks:
    name: Layer 1 - Ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer1-ingestion

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/  # Errors, warnings, imports, naming, docstrings
          uv run ruff check --select B src/  # Bugbear (likely bugs)
          uv run ruff check --select C4 src/  # Comprehensions
          uv run ruff check --select SIM src/  # Simplifications
          uv run ruff check --select UP src/  # Pyupgrade

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run Layer 3 Cypher scope gate
        working-directory: ${{ github.workspace }}
        run: python scripts/ci/check_layer3_cypher_scope.py services/layer3-knowledge/src --report-json artifacts/layer3-cypher-scope-audit.json

      - name: Upload Layer 3 Cypher scope audit
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: layer3-cypher-scope-audit
          path: artifacts/layer3-cypher-scope-audit.json
          if-no-files-found: ignore

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer1-coverage.xml \
            --junitxml=layer1-junit.xml \
            --json-report --json-report-file=layer1-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-layer1-ingestion
          path: |
            services/layer1-ingestion/layer1-junit.xml
            services/layer1-ingestion/layer1-results.json
            services/layer1-ingestion/layer1-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Layer 2 - Extraction
  layer2-checks:
    name: Layer 2 - Extraction
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer2-extraction

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/
          uv run ruff check --select B src/
          uv run ruff check --select C4 src/
          uv run ruff check --select SIM src/
          uv run ruff check --select UP src/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Type check Layer 2 API imports
        run: uv run mypy src/layer2_extraction/api --follow-imports=normal --no-incremental

      - name: Guard Layer 2 API import ignores
        run: |
          if rg -n "^(from|import) layer2_extraction\..*# type: ignore(\[[^]]+\])?$" src/layer2_extraction/api; then
            echo "Disallowed type: ignore on layer2_extraction imports in api package"
            exit 1
          fi

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer2-coverage.xml \
            --junitxml=layer2-junit.xml \
            --json-report --json-report-file=layer2-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-layer2-extraction
          path: |
            services/layer2-extraction/layer2-junit.xml
            services/layer2-extraction/layer2-results.json
            services/layer2-extraction/layer2-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Layer 3 - Knowledge
  layer3-checks:
    name: Layer 3 - Knowledge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer3-knowledge

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: 'latest'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/
          uv run ruff check --select B src/
          uv run ruff check --select C4 src/
          uv run ruff check --select SIM src/
          uv run ruff check --select UP src/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer3-coverage.xml \
            --junitxml=layer3-junit.xml \
            --json-report --json-report-file=layer3-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-layer3-knowledge
          path: |
            services/layer3-knowledge/layer3-junit.xml
            services/layer3-knowledge/layer3-results.json
            services/layer3-knowledge/layer3-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Layer 4 - Agents
  layer4-checks:
    name: Layer 4 - Agents
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer4-agents

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/
          uv run ruff check --select B src/
          uv run ruff check --select C4 src/
          uv run ruff check --select SIM src/
          uv run ruff check --select UP src/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer4-coverage.xml \
            --junitxml=layer4-junit.xml \
            --json-report --json-report-file=layer4-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-layer4-agents
          path: |
            services/layer4-agents/layer4-junit.xml
            services/layer4-agents/layer4-results.json
            services/layer4-agents/layer4-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Layer 5 - Ground Truth
  layer5-checks:
    name: Layer 5 - Ground Truth
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer5-ground-truth

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/
          uv run ruff check --select B src/
          uv run ruff check --select C4 src/
          uv run ruff check --select SIM src/
          uv run ruff check --select UP src/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Enforce Layer 5 source contract
        run: python scripts/check_no_duplicate_modules.py

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer5-coverage.xml \
            --junitxml=layer5-junit.xml \
            --json-report --json-report-file=layer5-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-layer5-ground-truth
          path: |
            services/layer5-ground-truth/layer5-junit.xml
            services/layer5-ground-truth/layer5-results.json
            services/layer5-ground-truth/layer5-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1


  layer5-source-contract:
    name: Layer 5 - Source Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/layer5-ground-truth

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Enforce Layer 5 source contract
        run: python scripts/check_no_duplicate_modules.py

  layer5-tenant-isolation-regression:
    name: Layer 5 - Tenant Isolation Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer5-ground-truth

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Run tenant consistency and hostile access regression tests
        run: |
          uv run pytest -v --tb=short             tests/test_tenant_id_consistency.py             tests/test_api.py::TestGetTruth::test_org_isolation

  layer5-contract-shape-regression:
    name: Layer 5 - Contract Shape Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer5-ground-truth

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Run model registry and state transition contract-shape tests
        run: |
          uv run pytest -v --tb=short             tests/test_model_registry.py             tests/test_state_machine.py

  # Layer 6 - Benchmarks
  layer6-checks:
    name: Layer 6 - Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/layer6-benchmarks

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@f8b513ce0366feceaf2a3b0a9c7f1d7be0a2ee8f # v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/
          uv run ruff check --select B src/
          uv run ruff check --select C4 src/
          uv run ruff check --select SIM src/
          uv run ruff check --select UP src/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer6-coverage.xml \
            --junitxml=layer6-junit.xml \
            --json-report --json-report-file=layer6-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-layer6-benchmarks
          path: |
            services/layer6-benchmarks/layer6-junit.xml
            services/layer6-benchmarks/layer6-results.json
            services/layer6-benchmarks/layer6-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Cross-layer shared and tests validation
  shared-and-tests-checks:
    name: Shared & Tests - Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Lint shared modules
        run: |
          ruff check --select E,W,F,I,N,D shared/
          ruff check --select B shared/
          ruff check --select C4,SIM,UP shared/

      - name: Lint tests
        run: |
          ruff check --select E,W,F,I,N,D tests/
          ruff check --select B tests/
          ruff check --select C4,SIM,UP tests/

  # Frontend checks
  frontend-checks:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@e0a5a4ff5d1fb2a0f0f1d713d8b623f2c2b5d5b1 # v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate frontend API types
        run: pnpm run generate:api

      - name: Check generated API type drift
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if ! git diff --quiet apps/web/src/api/generated/; then
            echo "❌ Generated API type drift detected."
            node apps/web/scripts/report-generated-type-drift.mjs
          fi
          git diff --exit-code apps/web/src/api/generated/

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Check for unguarded console statements
        run: |
          # Find console.log/console.warn without DEV guard (excluding tests)
          violations=$(grep -rn "console\.log\|console\.warn" apps/web/src/ \
            --include="*.ts" --include="*.tsx" \
            | grep -v "\.test\." \
            | grep -v "\.spec\." \
            | grep -v "import\.meta\.env\.DEV" \
            | grep -v "process\.env\.NODE_ENV" \
            | grep -v "noqa" || true)

          if [ -n "$violations" ]; then
            echo "❌ Found unguarded console statements in production code:"
            echo "$violations"
            echo ""
            echo "Either:"
            echo "  1. Remove the console statement"
            echo "  2. Guard with: if (import.meta.env.DEV) { console.log(...) }"
            exit 1
          fi

          echo "✅ No unguarded console statements found"

      - name: Build
        run: pnpm run build

      - name: Bundle Analysis
        run: pnpm run build:analyze

      - name: Upload bundle report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: bundle-report
          path: apps/web/dist/stats.html
          retention-days: 14

      - name: Test
        run: pnpm test -- --reporter=junit --outputFile=frontend-junit.xml --reporter=default --coverage

      - name: Critical frontend coverage thresholds
        run: pnpm run test:coverage:critical

      - name: Upload test results
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: test-results-frontend
          path: |
            apps/web/frontend-junit.xml
            apps/web/coverage/
          retention-days: 14

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Accessibility tests (components)
        run: pnpm run test:a11y:components

      - name: Accessibility scan + thresholds (pages)
        env:
          A11Y_REPORT_PATH: ./a11y-report.json
          A11Y_MAX_CRITICAL: "0"
          A11Y_MAX_SERIOUS: "0"
          A11Y_MIN_ROUTES_SCANNED: "4"
        run: |
          pnpm preview --host 127.0.0.1 --port 4173 &
          PREVIEW_PID=$!
          trap "kill $PREVIEW_PID" EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 1
          done
          pnpm run test:a11y:launch-smoke

      - name: Accessibility keyboard-flow E2E (deep a11y assertions)
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: |
          # Preview server is still running from previous step in the same job
          pnpm run test:a11y:keyboard-flow

      - name: Security audit (GATING)
        run: pnpm audit --audit-level high

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: frontend-build-failure
          path: apps/web/dist/public/

  # Kubernetes manifest validation (server-side dry-run via kustomize)
  k8s-dry-run:
    name: Kubernetes Dry-Run Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Create Kind cluster
        uses: helm/kind-action@5d5a9f679a1b7e1b6b16a3f86dd6843f6d944a9d # v1

      - name: Set up kubectl
        uses: azure/setup-kubectl@7af7486c9e5f7fdffd86f25d1f43df89c7a7897c # v4

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz -o kustomize.tar.gz
          echo "3669470b454d865c8184d6bce78df05e977c9aea31c30df3c669317d43bcc7a7  kustomize.tar.gz" | sha256sum -c
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Server-side dry-run (dev-nginx deployment)
        run: |
          kustomize build k8s/deployments/dev-nginx --load-restrictor=LoadRestrictionsNone | kubectl apply --dry-run=server -f -

      - name: Server-side dry-run (prod-nginx deployment)
        run: |
          kustomize build k8s/deployments/prod-nginx --load-restrictor=LoadRestrictionsNone | kubectl apply --dry-run=server -f -

  # Contract tests — required PR gate, no secrets needed
  contract-checks:
    name: Cross-Layer Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@10.18.1 --activate

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt -r packages/platform-contract/requirements-test.txt

      - name: Install platform contract package dependencies
        working-directory: packages/platform-contract
        run: pnpm install --frozen-lockfile

      - name: Run contract and architecture tests
        run: make contract-tests

      - name: Run tool contract validation
        run: |
          python scripts/ci/check_tool_contracts.py services/layer4-agents/src/tools/

      - name: Run endpoint-hook coverage validation
        run: |
          python scripts/ci/check_endpoint_coverage.py \
            --registry apps/web/contracts/endpoint-hook-registry.json \
            --openapi-dir contracts/openapi

      - name: Compatibility debt summary
        run: |
          python scripts/ci/compatibility_debt_summary.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: contract-test-results
          path: |
            .pytest_cache/
          retention-days: 7

  runtime-contract-checks:
    name: Runtime Contract Tests (Services Up)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest requests

      - name: Start runtime contract services
        run: |
          export OPENAI_API_KEY=test-key
          export REDIS_PASSWORD=test-redis
          export NEO4J_PASSWORD=test-neo4j
          export JWT_SECRET=test-jwt-secret
          docker compose up -d postgres redis neo4j layer5-migrate layer5-ground-truth layer1-ingestion layer2-extraction layer3-knowledge layer4-agents

      - name: Wait for L1-L4 health endpoints
        run: |
          python - <<'PY'
          import time
          import requests

          endpoints = {
              "L1": "http://localhost:8001/health",
              "L2": "http://localhost:8002/health",
              "L3": "http://localhost:8003/health",
              "L4": "http://localhost:8004/health",
          }

          deadline = time.time() + 300
          failed = dict(endpoints)

          while time.time() < deadline and failed:
              pending = {}
              for name, url in failed.items():
                  try:
                      response = requests.get(url, timeout=5)
                      if response.status_code == 200:
                          print(f"✅ {name} healthy at {url}")
                      else:
                          pending[name] = url
                          print(f"⏳ {name} not ready: HTTP {response.status_code}")
                  except Exception as exc:
                      pending[name] = url
                      print(f"⏳ {name} not ready: {exc}")
              failed = pending
              if failed:
                  time.sleep(5)

          if failed:
              raise SystemExit(f"Services did not become healthy in time: {failed}")
          PY

      - name: Run runtime contract marker suite
        env:
          RUN_RUNTIME_CONTRACTS: "1"
          L1_URL: http://localhost:8001
          L2_URL: http://localhost:8002
          L3_URL: http://localhost:8003
          L4_URL: http://localhost:8004
        run: |
          pytest tests/contract/test_layer_integration.py -m runtime_contract -v --tb=short

      - name: Upload runtime contract artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: runtime-contract-test-results
          path: |
            .pytest_cache/
          retention-days: 7

  # Schemathesis — Property-based OpenAPI contract validation
  schemathesis-checks:
    name: Schemathesis Property-Based Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Schemathesis
        run: pip install schemathesis

      - name: Run Schemathesis on L1 OpenAPI (static validation)
        run: |
          st check contracts/openapi/layer1-ingestion.json \
            --max-examples 10 \
            --hypothesis-seed 42
        # CONTRACT ENFORCEMENT: L1 now fully implemented - blocking enabled

      - name: Run Schemathesis on L2 OpenAPI (static validation)
        run: |
          st check contracts/openapi/layer2-extraction.json \
            --max-examples 10 \
            --hypothesis-seed 42
        # CONTRACT ENFORCEMENT: L2 now fully implemented - blocking enabled

      - name: Run Schemathesis on L3 OpenAPI (strict validation)
        run: |
          st check contracts/openapi/layer3-knowledge.json \
            --max-examples 50 \
            --hypothesis-seed 42 \
            --checks all

      - name: Run Schemathesis on L4 OpenAPI (strict validation)
        run: |
          st check contracts/openapi/layer4-agents.json \
            --max-examples 50 \
            --hypothesis-seed 42 \
            --checks all

      - name: Upload Schemathesis results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: schemathesis-results
          path: |
            .schemathesis/
          retention-days: 7

  # Integration tests with Docker — PR-blocking
  integration-checks:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip on fork PRs (no secrets available)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start core services
        run: |
          export NEO4J_PASSWORD=valuefabric
          # P1-22 FIX: Removed secret fallback - secrets must be configured
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          docker compose up -d neo4j redis postgres
          # Start layers in background
          docker compose up -d --build layer2-extraction layer3-knowledge layer4-agents

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..24}; do
            sleep 5
            # Check if core DB services are responding
            pg_isready -h localhost -p 5432 2>/dev/null && echo "PostgreSQL ready"
            redis-cli -h localhost -p 6379 ping 2>/dev/null && echo "Redis ready"
            # Check Neo4j
            curl -s http://localhost:7474/dbms/health 2>/dev/null && echo "Neo4j ready"
            # If we've waited enough, proceed
            if [ "$i" -ge "12" ]; then
              echo "Proceeding with available services..."
              break
            fi
          done
          docker compose -f docker-compose.full.yml ps
        timeout-minutes: 3

      - name: Run smoke tests
        run: |
          pip install httpx
          python scripts/smoke/production_smoke.py \
            --l2-url http://localhost:8002 \
            --l3-url http://localhost:8003 \
            --l4-url http://localhost:8004 \
            --output-dir artifacts

      - name: Run integration test suite
        run: |
          pip install pytest httpx pytest-asyncio
          # Run the integration tests if they exist
          if [ -d "tests/integration" ]; then
            cd tests/integration
            pytest -v --tb=short
          else
            echo "Integration test folder not found, skipping..."
          fi

      - name: Capture logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/logs
          docker compose -f docker-compose.test.yml logs > artifacts/logs/docker-compose.log || true

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: smoke-report-pr
          path: artifacts/smoke-report-*.json
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: integration-logs
          path: artifacts/logs/
          retention-days: 7

  # Billing + entitlement regression pack and release evidence artifact
  billing-entitlements-regression:
    name: Billing/Entitlements Regression + Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Run billing/entitlement regression pack
        run: |
          mkdir -p artifacts/release-evidence
          pytest tests/integration/billing_entitlements/ -v --tb=short \
            --junitxml artifacts/release-evidence/billing-entitlements-junit.xml

      - name: Generate launch-checklist evidence
        if: always()
        run: |
          python scripts/ci/generate_billing_evidence.py \
            --junit artifacts/release-evidence/billing-entitlements-junit.xml \
            --out-dir artifacts/release-evidence \
            --test-command "pytest tests/integration/billing_entitlements/ -v --tb=short"

      - name: Upload billing regression evidence
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: launch-checklist-billing-entitlements-evidence
          path: |
            artifacts/release-evidence/billing-entitlements-junit.xml
            artifacts/release-evidence/billing-entitlements-summary.json
            artifacts/release-evidence/billing-entitlements-summary.md
          retention-days: 14

  # Docker image build verification - catches Dockerfile regressions
  docker-compose-config-contract:
    name: Docker Compose Config Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install compose contract dependencies
        run: python -m pip install pyyaml

      - name: Validate Docker Compose config contracts
        run: |
          python scripts/ci/check_docker_compose_config.py \
            --artifact-dir artifacts/docker-compose-config

      - name: Upload Docker Compose config artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: docker-compose-config-contract
          path: artifacts/docker-compose-config/**
          retention-days: 14

  docker-build-check:
    name: Docker Image Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]
        include:
          - layer: layer1-ingestion
            context: services/layer1-ingestion
            dockerfile: ./Dockerfile
          - layer: layer2-extraction
            context: services/layer2-extraction
            dockerfile: ./Dockerfile
          - layer: layer3-knowledge
            context: services/layer3-knowledge
            dockerfile: ./Dockerfile
          - layer: layer4-agents
            context: services/layer4-agents
            dockerfile: ./Dockerfile
          - layer: layer5-ground-truth
            context: services/layer5-ground-truth
            dockerfile: ./Dockerfile
          - layer: layer6-benchmarks
            context: services/layer6-benchmarks
            dockerfile: ./Dockerfile
          - layer: frontend
            context: apps/web
            dockerfile: ./Dockerfile

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3

      - name: Build image (no push)
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Dockerfile lint
        uses: hadolint/hadolint-action@9a9b4e40b6f6d0f6d8f7ecba674498b6ff157131 # v3.1.0
        if: matrix.layer != 'frontend'
        with:
          dockerfile: ${{ matrix.context }}/${{ matrix.dockerfile }}
          ignore: DL3008,DL3013

  # Alertmanager configuration validation
  alertmanager-config-check:
    name: Alertmanager Config Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate Alertmanager configuration
        run: |
          chmod +x scripts/ci/validate-alertmanager-config.sh
          ./scripts/ci/validate-alertmanager-config.sh

      - name: Check kustomize build for monitoring manifests
        run: |
          if command -v kubectl &> /dev/null; then
            echo "Testing kustomize build for dev overlay..."
            kubectl kustomize k8s/deployments/dev-nginx 2>&1 | grep -q "alertmanager" && echo "✓ Alertmanager manifests found in kustomize build"
          else
            echo "⚠️ kubectl not available, skipping kustomize validation"
            exit 1  # CONTRACT ENFORCEMENT: kubectl required for CI validation
          fi
  route-auth-gate:
    name: Route Auth Dependency Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'

      - name: Install gate dependencies
        run: python -m pip install pyyaml

      - name: Enforce route auth dependency policy
        run: python scripts/ci/check_route_auth_dependencies.py
