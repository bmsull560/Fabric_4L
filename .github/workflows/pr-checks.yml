name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  governance-docs-check:
    name: Governance Docs Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify required policy and runbook docs exist
        run: |
          set -euo pipefail
          required_files=(
            "docs/reliability/dr-policy.md"
            "docs/api-versioning-policy.md"
            "docs/runbooks/dr-gameday-service-failover.md"
            "docs/runbooks/dr-gameday-region-loss.md"
            "docs/runbooks/dr-evidence-log-template.md"
            ".github/pull_request_template.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required governance file: $file"
              exit 1
            fi
          done

          echo "Docs policy gate passed."

      - name: Enforce control matrix update policy
        run: .github/scripts/check-control-matrix.sh

  # Layer 1 - Ingestion
  layer1-checks:
    name: Layer 1 - Ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: value-fabric/layer1-ingestion

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/  # Errors, warnings, imports, naming, docstrings
          uv run ruff check --select B src/  # Bugbear (likely bugs)
          uv run ruff check --select C4 src/  # Comprehensions
          uv run ruff check --select SIM src/  # Simplifications
          uv run ruff check --select UP src/  # Pyupgrade

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer1-coverage.xml \
            --junitxml=layer1-junit.xml \
            --json-report --json-report-file=layer1-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-layer1-ingestion
          path: |
            value-fabric/layer1-ingestion/layer1-junit.xml
            value-fabric/layer1-ingestion/layer1-results.json
            value-fabric/layer1-ingestion/layer1-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Layer 2 - Extraction
  layer2-checks:
    name: Layer 2 - Extraction
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: value-fabric/layer2-extraction

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.6'
          enable-cache: true

      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --all-extras

      - name: Lint with ruff (comprehensive)
        run: |
          uv run ruff check --select E,W,F,I,N,D src/
          uv run ruff check --select B src/
          uv run ruff check --select C4 src/
          uv run ruff check --select SIM src/
          uv run ruff check --select UP src/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml:layer2-coverage.xml \
            --junitxml=layer2-junit.xml \
            --json-report --json-report-file=layer2-results.json \
            --cov-fail-under=80

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-layer2-extraction
          path: |
            value-fabric/layer2-extraction/layer2-junit.xml
            value-fabric/layer2-extraction/layer2-results.json
            value-fabric/layer2-extraction/layer2-coverage.xml
          retention-days: 14

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii

      - name: Dependency audit with pip-audit
        run: |
          uv run pip-audit --severity high --exit-code 1

  # Layer 3 - Knowledge
  layer3-checks:
    name: Layer 3 - Knowledge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: value-fabric/layer3-knowledge

    steps:
