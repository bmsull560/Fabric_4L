# PR Performance Gate
# Fail CI/CD if performance degrades beyond thresholds

name: PR Performance Gate

permissions:
  contents: read
  issues: write
  packages: read  # required to pull ghcr.io/value-fabric/base-images

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'k8s/**'
      - 'tests/performance/**'
      - '.github/workflows/pr-performance-gate.yml'

env:
  # Performance regression thresholds
  LATENCY_REGRESSION_PCT: '20'      # Fail if p95 latency increases >20%
  ERROR_RATE_REGRESSION_ABS: '0.005' # Fail if error rate increases >0.5%
  THROUGHPUT_REGRESSION_PCT: '15'   # Fail if throughput drops >15%

concurrency:
  group: perf-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Build and deploy ephemeral stack
  # ============================================
  setup-ephemeral:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start ephemeral services
        run: |
          cat > .env <<'EOF'
          OPENAI_API_KEY=sk-ci-test-key
          ANTHROPIC_API_KEY=sk-ci-test-key
          NEO4J_PASSWORD=valuefabric
          JWT_SECRET=ci-jwt-secret-value-for-ephemeral-compose-only
          JWT_ALGORITHM=HS256
          AUTH_BYPASS_ENABLED=true
          ENVIRONMENT=ci
          REDIS_PASSWORD=valuefabric
          FLOWER_PASSWORD=valuefabric
          GRAFANA_ADMIN_PASSWORD=valuefabric
          EOF
          docker compose -f docker-compose.full.yml up -d neo4j redis postgres

          # Wait for services
          for i in {1..30}; do
            sleep 10
            healthy=$(docker compose -f docker-compose.full.yml ps --format json 2>/dev/null | grep -c '"Health":"healthy"' || echo "0")
            echo "Check $i/30: $healthy healthy"
            if [ "$healthy" -ge "3" ]; then
              echo "Services ready"
              break
            fi
          done

          docker compose -f docker-compose.full.yml ps

  # ============================================
  # Run performance baseline comparison
  # ============================================
  performance-test:
    needs: setup-ephemeral
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Start services under test
        run: |
          cat > .env <<'EOF'
          OPENAI_API_KEY=sk-ci-test-key
          ANTHROPIC_API_KEY=sk-ci-test-key
          NEO4J_PASSWORD=valuefabric
          JWT_SECRET=ci-jwt-secret-value-for-ephemeral-compose-only
          JWT_ALGORITHM=HS256
          AUTH_BYPASS_ENABLED=true
          ENVIRONMENT=ci
          REDIS_PASSWORD=valuefabric
          FLOWER_PASSWORD=valuefabric
          GRAFANA_ADMIN_PASSWORD=valuefabric
          EOF
          # Start layer services with PR code
          docker compose -f docker-compose.full.yml up -d --build layer2-extraction layer3-knowledge layer4-agents

          # Wait for services
          sleep 60

          # Health check
          for url in http://localhost:8002/health http://localhost:8003/health http://localhost:8004/health; do
            for i in {1..10}; do
              if curl -s "$url" > /dev/null; then
                echo "$url is healthy"
                break
              fi
              sleep 5
            done
          done

      - name: Run PR performance tests
        run: |
          mkdir -p artifacts/performance

          # Run short performance test
          k6 run \
            --summary-export artifacts/performance/pr-summary.json \
            --env L2_URL=http://localhost:8002 \
            --env L3_URL=http://localhost:8003 \
            --env L4_URL=http://localhost:8004 \
            --env PERF_DURATION=3m \
            tests/performance/k6/l2_l3_l4_critical_paths.js

      - name: Upload PR results
        uses: actions/upload-artifact@v4
        with:
          name: pr-performance-results
          path: artifacts/performance/pr-summary.json

  # ============================================
  # Compare against baseline
  # ============================================
  compare-baseline:
    needs: performance-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: baseline

      - name: Download baseline results
        uses: actions/download-artifact@v4
        with:
          name: baseline-performance
          path: baseline-artifacts/
        # CONTRACT ENFORCEMENT: Baseline required for performance comparison

      - name: Download PR results
        uses: actions/download-artifact@v4
        with:
          name: pr-performance-results
          path: pr-artifacts/

      - name: Compare performance
        id: compare
        run: |
          python3 scripts/perf/compare-benchmarks.py \
            --baseline baseline-artifacts/baseline-summary.json \
            --current pr-artifacts/pr-summary.json \
            --thresholds "${{ env.LATENCY_REGRESSION_PCT }},${{ env.ERROR_RATE_REGRESSION_ABS }},${{ env.THROUGHPUT_REGRESSION_PCT }}" \
            --output artifacts/performance/comparison-report.md \
            --format github

          # Set output for subsequent steps
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('artifacts/performance/comparison-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Fail on regression
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "::error::Performance regression detected!"
          echo "Review the PR comment for details."
          exit 1

  # ============================================
  # Cleanup ephemeral stack
  # ============================================
  cleanup:
    needs: [performance-test, compare-baseline]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Cleanup Docker Compose
        run: |
          cat > .env <<'EOF'
          OPENAI_API_KEY=sk-ci-test-key
          ANTHROPIC_API_KEY=sk-ci-test-key
          NEO4J_PASSWORD=valuefabric
          JWT_SECRET=ci-jwt-secret-value-for-ephemeral-compose-only
          JWT_ALGORITHM=HS256
          AUTH_BYPASS_ENABLED=true
          ENVIRONMENT=ci
          REDIS_PASSWORD=valuefabric
          FLOWER_PASSWORD=valuefabric
          GRAFANA_ADMIN_PASSWORD=valuefabric
          EOF
          docker compose -f docker-compose.full.yml down -v
          docker system prune -f

  # ============================================
  # Update baseline on main merge
  # ============================================
  update-baseline:
    needs: performance-test
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Download PR results
        uses: actions/download-artifact@v4
        with:
          name: pr-performance-results
          path: new-baseline/

      - name: Update baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-performance
          path: new-baseline/pr-summary.json
          retention-days: 90
