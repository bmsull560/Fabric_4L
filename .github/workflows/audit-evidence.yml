name: Audit Evidence Collection

permissions:
  contents: read

on:
  # Monthly collection for compliance (1st of month at 1 AM UTC)
  schedule:
    - cron: '0 1 1 * *'
  
  # On-demand collection for audits
  workflow_dispatch:
    inputs:
      audit_period_start:
        description: 'Audit period start date (YYYY-MM-DD)'
        required: false
        default: ''
      audit_period_end:
        description: 'Audit period end date (YYYY-MM-DD)'
        required: false
        default: ''
      include_historical:
        description: 'Include historical data (90 days)'
        required: false
        default: true
        type: boolean
  
  # Pre-release evidence collection
  workflow_call:
    inputs:
      include_historical:
        description: 'Include historical data'
        required: false
        default: "true"
        type: string

env:
  INCLUDE_HISTORICAL: ${{ inputs.include_historical || 'true' }}
  DAYS_BACK: 90

jobs:
  # ============================================
  # Access Control Evidence
  # ============================================
  access-control-evidence:
    name: Collect Access Control Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history
      
      - name: Generate access control evidence
        run: |
          mkdir -p audit-evidence/access-control
          
          # Copy CODEOWNERS
          cp .github/CODEOWNERS audit-evidence/access-control/
          
          # Generate RBAC summary
          cat > audit-evidence/access-control/rbac-summary.json << EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "repository": "${{ github.repository }}",
            "default_branch": "${{ github.ref_name }}",
            "controls": [
              {
                "control": "CC6.1.1 - Unique User IDs",
                "implementation": "OIDC JWT with subject claim",
                "test_coverage": "shared/identity/jwt_middleware.py"
              },
              {
                "control": "CC6.1.3 - Role-based Access",
                "implementation": "RBAC with tenant isolation",
                "test_coverage": "tests/security/test_rbac.py"
              }
            ]
          }
          EOF
      
      - name: Upload access control evidence
        uses: actions/upload-artifact@v4
        with:
          name: access-control-evidence
          path: audit-evidence/access-control/
          retention-days: 2555  # 7 years for compliance

  # ============================================
  # Change Management Evidence
  # ============================================
  change-management-evidence:
    name: Collect Change Management Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate commit history
        run: |
          mkdir -p audit-evidence/change-management
          
          # Export commit history (last 90 days)
          git log --all --pretty=format:'%H|%an|%ae|%ad|%s' \
            --date=short --since="${{ env.DAYS_BACK }} days ago" \
            > audit-evidence/change-management/commit-history.csv
          
          # Copy pre-commit config
          cp .pre-commit-config.yaml audit-evidence/change-management/
          
          # Count commits
          COMMIT_COUNT=$(git log --oneline --since="${{ env.DAYS_BACK }} days ago" | wc -l)
          
          cat > audit-evidence/change-management/change-summary.json << EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "period_days": ${{ env.DAYS_BACK }},
            "total_commits": $COMMIT_COUNT,
            "change_controls": [
              "CODEOWNERS mandatory review",
              "Pre-commit hooks (security, formatting)",
              "CI/CD pipeline validation"
            ]
          }
          EOF
      
      - name: Upload change management evidence
        uses: actions/upload-artifact@v4
        with:
          name: change-management-evidence
          path: audit-evidence/change-management/
          retention-days: 2555

  # ============================================
  # Security Operations Evidence
  # ============================================
  security-operations-evidence:
    name: Collect Security Operations Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Collect security test evidence
        run: |
          mkdir -p audit-evidence/security-operations
          
          # Copy security tests
          cp -r tests/security audit-evidence/security-operations/ || true
          
          # Copy security gates workflow
          cp .github/workflows/security-gates.yml audit-evidence/security-operations/ || true
          
          # Copy penetration tests
          cp -r tests/penetration audit-evidence/security-operations/ || true
          
          # Copy threat model
          cp THREAT_MODEL.md audit-evidence/security-operations/ || true
          
          # Generate security summary
          cat > audit-evidence/security-operations/security-summary.json << EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "security_tests": [
              "tests/security/test_rbac.py",
              "tests/security/test_tenant_isolation.py",
              "tests/security/test_injection.py",
              "tests/security/test_security_headers.py",
              "tests/security/test_supply_chain.py",
              "tests/penetration/zap-full-scan.py",
              "tests/penetration/nikto-scan.sh"
            ],
            "scanning_tools": [
              "Trivy - Container vulnerability scanning",
              "Grype - SBOM vulnerability scanning",
              "OWASP ZAP - Penetration testing",
              "Nikto - Web server scanning"
            ],
            "scan_frequency": "Weekly scheduled + On-demand"
          }
          EOF
      
      - name: Upload security operations evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-operations-evidence
          path: audit-evidence/security-operations/
          retention-days: 2555

  # ============================================
  # Availability Evidence
  # ============================================
  availability-evidence:
    name: Collect Availability Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Collect chaos engineering evidence
        run: |
          mkdir -p audit-evidence/availability
          
          # Copy chaos experiments
          cp -r k8s/chaos audit-evidence/availability/ || true
          
          # Copy GitOps configuration
          cp -r k8s/gitops audit-evidence/availability/ || true
          
          # Generate availability summary
          cat > audit-evidence/availability/availability-summary.json << EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "chaos_experiments": [
              {
                "name": "pod-delete-all-layers",
                "target": "All 6 layers",
                "success_criteria": "Recovery <30s"
              },
              {
                "name": "network-partition-l3-l4",
                "target": "Knowledge-Agents",
                "success_criteria": "Graceful degradation"
              },
              {
                "name": "cpu-stress-l4",
                "target": "Layer 4 Agents",
                "success_criteria": "Auto-scaling triggers"
              },
              {
                "name": "memory-stress-l2",
                "target": "Layer 2 Extraction",
                "success_criteria": "OOM handling"
              },
              {
                "name": "pod-autoscaler-l1",
                "target": "Layer 1 Ingestion",
                "success_criteria": "Scale-up <60s"
              }
            ],
            "test_frequency": "Weekly automated runs",
            "framework": "LitmusChaos"
          }
          EOF
      
      - name: Upload availability evidence
        uses: actions/upload-artifact@v4
        with:
          name: availability-evidence
          path: audit-evidence/availability/
          retention-days: 2555

  # ============================================
  # Policy Documentation
  # ============================================
  policy-evidence:
    name: Collect Policy Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Collect policy documents
        run: |
          mkdir -p audit-evidence/policies
          
          # Copy root policy documents
          for doc in SECURITY.md AGENTS.md VERSIONING.md COMPLIANCE.md SUPPLY_CHAIN.md GITOPS.md THREAT_MODEL.md RUNBOOK.md; do
            if [ -f "$doc" ]; then
              cp "$doc" audit-evidence/policies/
            fi
          done
          
          # Copy docs directories
          cp -r docs/trust audit-evidence/policies/ || true
          cp -r docs/operations audit-evidence/policies/ || true
          cp -r docs/audit audit-evidence/policies/ || true
          
          # List collected policies
          find audit-evidence/policies -type f -name "*.md" | sort > audit-evidence/policies/POLICY_MANIFEST.txt
      
      - name: Upload policy evidence
        uses: actions/upload-artifact@v4
        with:
          name: policy-evidence
          path: audit-evidence/policies/
          retention-days: 2555

  # ============================================
  # Consolidate Evidence Bundle
  # ============================================
  consolidate-evidence:
    name: Generate Consolidated Evidence Bundle
    runs-on: ubuntu-latest
    needs: [access-control-evidence, change-management-evidence, security-operations-evidence, availability-evidence, policy-evidence]
    if: always()
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all evidence artifacts
        uses: actions/download-artifact@v4
        with:
          path: audit-evidence/
          merge-multiple: true
      
      - name: Generate evidence index
        run: |
          # Generate JSON index
          cat > audit-evidence/evidence-index.json << EOF
          {
            "audit_bundle": {
              "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "generated_by": "GitHub Actions",
              "workflow": "audit-evidence.yml",
              "run_id": "${{ github.run_id }}",
              "retention_days": 2555
            },
            "categories": {
              "access-control": "Identity and access management",
              "change-management": "Version control and change approval",
              "security-operations": "Security testing and vulnerability management",
              "availability": "Resilience testing and SLO",
              "policies": "Security and compliance policies"
            },
            "compliance_mapping": {
              "SOC2_CC6.1": "access-control/",
              "SOC2_CC6.2": "access-control/",
              "SOC2_CC6.3": "change-management/",
              "SOC2_CC7.1": "security-operations/",
              "SOC2_CC7.2": "policies/operations/",
              "ISO27001_A.9": "access-control/",
              "ISO27001_A.12": "availability/",
              "ISO27001_A.16": "policies/operations/",
              "ISO27001_A.17": "availability/"
            },
            "retention_policy": {
              "security_scans": "90 days",
              "penetration_tests": "1 year",
              "chaos_tests": "90 days",
              "access_reviews": "3 years",
              "policy_docs": "Permanent"
            }
          }
          EOF
          
          # Generate human-readable README using printf (avoids heredoc YAML issues)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '%s\n' "# SOC2/ISO27001 Audit Evidence Bundle" "" \
            "Generated: ${TIMESTAMP}" \
            "GitHub Run: ${{ github.run_id }}" \
            "Retention: 7 years (2555 days)" "" \
            "## Evidence Categories" "" \
            "1. access-control: Identity & access management (SOC2 CC6.1-6.2, ISO27001 A.9)" \
            "2. change-management: Version control & approvals (SOC2 CC6.3, ISO27001 A.12)" \
            "3. security-operations: Security testing & scanning (SOC2 CC7.1, ISO27001 A.14)" \
            "4. availability: Resilience & chaos testing (SOC2 A1.1, ISO27001 A.12, A.17)" \
            "5. policies: Security & compliance docs (All controls)" "" \
            "## Quick Verification" "" \
            'Verify file counts: find audit-evidence -type f | wc -l' \
            'Check integrity: sha256sum audit-evidence.tar.gz' "" \
            "## Auditor Contact" "" \
            "Security: security@value-fabric.local" \
            "Compliance: compliance@value-fabric.local" \
            > audit-evidence/README.md
      
      - name: Create evidence archive
        run: |
          tar -czf audit-evidence-${{ github.run_id }}.tar.gz audit-evidence/
          
          # Generate checksum
          sha256sum audit-evidence-${{ github.run_id }}.tar.gz > audit-evidence-${{ github.run_id }}.sha256
          
          echo "Archive created: audit-evidence-${{ github.run_id }}.tar.gz"
          echo "Size: $(du -h audit-evidence-${{ github.run_id }}.tar.gz | cut -f1)"
      
      - name: Upload consolidated bundle
        uses: actions/upload-artifact@v4
        with:
          name: complete-audit-evidence-bundle
          path: |
            audit-evidence-${{ github.run_id }}.tar.gz
            audit-evidence-${{ github.run_id }}.sha256
          retention-days: 2555
      
      - name: Update workflow summary
        run: |
          echo "## 📋 Audit Evidence Bundle Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Evidence Categories" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Access Control" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Change Management" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Operations" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Availability (Chaos Tests)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Policy Documentation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Retention" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle archive: 7 years (2555 days)" >> $GITHUB_STEP_SUMMARY
          echo "- Security scans: 90 days" >> $GITHUB_STEP_SUMMARY
          echo "- Policy docs: Permanent" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** \\"complete-audit-evidence-bundle\\" artifact" >> $GITHUB_STEP_SUMMARY


  automated-control-evidence:
    name: Collect Automated Control Evidence Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sanitized CI/CD control artifacts
        run: |
          mkdir -p audit-evidence/automated-controls

          # Sanitized git activity log (remove email addresses)
          git log --since="90 days ago" --pretty=format:'%H|%an|%ae|%ad|%s' --date=iso-strict             | sed -E 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+/[REDACTED_EMAIL]/g'             > audit-evidence/automated-controls/sanitized-change-log.txt

          # Compliance integrity control output
          python scripts/ci/check_compliance_evidence_integrity.py             > audit-evidence/automated-controls/control-check-output.txt

          # Access review record scaffold for quarterly attestation
          cat > audit-evidence/automated-controls/access-review-records.json << EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "control_id": "C-AC-01",
            "owner": "Security Engineering",
            "source_workflow": "audit-evidence.yml",
            "sanitized": true,
            "frequency": "quarterly",
            "records": [
              {
                "system": "github",
                "review_period": "$(date -u +"%Y-Q%q" 2>/dev/null || echo current-quarter)",
                "reviewer": "TBD",
                "status": "pending_signoff"
              }
            ]
          }
          EOF

      - name: Upload automated evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automated-control-evidence
          path: audit-evidence/automated-controls/
          retention-days: 2555
