name: Launch Readiness Pipeline

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      up_to_stage:
        description: Run pipeline up to stage
        required: true
        default: evidence_archive
        type: choice
        options:
          - baseline
          - local_quality
          - contract_security
          - evidence_archive
          - staging
      run_staging:
        description: Run staging evidence gates
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: launch-readiness-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.18.1'
  PYTHON_VERSION: '3.11'

defaults:
  run:
    shell: bash

jobs:
  stage-1-baseline:
    name: Stage 1 - Baseline Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      passed: ${{ steps.stage.outputs.passed }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Compile launch readiness scripts
        run: python -m py_compile scripts/ci/classify_failure.py scripts/ci/generate_launch_evidence_bundle.py
      - name: Run repository verification
        run: pnpm run verify
      - name: Web typecheck
        run: pnpm --dir apps/web run check
      - name: Web build
        run: pnpm --dir apps/web run build
      - name: Install Python gate dependencies
        run: python -m pip install pyyaml
      - name: Launch gate validators
        run: |
          python scripts/ci/validate_final_testing_launch_gate.py
          python scripts/ci/validate_core_ga_launch_evidence.py
      - name: Layer 1 import-hygiene gate
        run: python scripts/ci/check_layer1_imports.py --strict
      - name: Enforce release launch governance checklist
        if: startsWith(github.ref_name, 'release/')
        run: python scripts/ci/check_release_launch_governance.py
      - id: stage
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  stage-2-frontend-tests:
    name: Stage 2 - Frontend Tests (${{ matrix.shard }}/4)
    needs: stage-1-baseline
    if: needs.stage-1-baseline.outputs.passed == 'true' && (github.event.inputs.up_to_stage || 'evidence_archive') != 'baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run frontend shard
        run: pnpm --dir apps/web run test --shard=${{ matrix.shard }}/4
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: frontend-test-report-shard-${{ matrix.shard }}
          path: apps/web/test-results/**
          retention-days: 14
          if-no-files-found: warn

  stage-2-journey-smoke:
    name: Stage 2 - Journey Smoke
    needs: stage-1-baseline
    if: needs.stage-1-baseline.outputs.passed == 'true' && (github.event.inputs.up_to_stage || 'evidence_archive') != 'baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - name: Run journey launch smoke
        run: pnpm --dir apps/web run test:e2e:journey-launch
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: journey-smoke-report
          path: apps/web/test-results/**
          retention-days: 14
          if-no-files-found: warn

  stage-3-contract-security:
    name: Stage 3 - Contract and Security (${{ matrix.suite }})
    needs: [stage-2-frontend-tests, stage-2-journey-smoke]
    if: contains(fromJSON('["contract_security", "evidence_archive", "staging"]'), github.event.inputs.up_to_stage || 'evidence_archive')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: contract
            command: python -m pytest tests/contract -n 0 --json-report --json-report-file=contract-report.json
            artifact: contract-report.json
          - suite: security
            command: python -m pytest tests/security -n 0 --json-report --json-report-file=security-report.json
            artifact: security-report.json
          - suite: layer4
            command: python -m pytest services/layer4-agents/tests --json-report --json-report-file=layer4-report.json
            artifact: layer4-report.json
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install test dependencies
        run: python -m pip install -r tests/requirements-test.txt
      - name: Run ${{ matrix.suite }} suite
        run: ${{ matrix.command }}
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: ${{ matrix.suite }}-report
          path: ${{ matrix.artifact }}
          retention-days: 30
          if-no-files-found: warn

  stage-4-evidence-archive:
    name: Stage 4 - Evidence Archive
    needs: stage-3-contract-security
    if: contains(fromJSON('["evidence_archive", "staging"]'), github.event.inputs.up_to_stage || 'evidence_archive')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Generate launch evidence bundle from artifacts
        run: |
          python scripts/ci/generate_launch_evidence_bundle.py \
            --artifacts-only \
            --up-to-stage evidence_archive \
            --repo-root . \
            --json-summary .tmp/launch-evidence-summary.json || true
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: launch-evidence-bundle
          path: |
            docs/launch/readiness-dashboard.md
            docs/launch/launch-blocker-register.md
            docs/validation/launch_readiness_final_sign_off_evidence.md
            .tmp/launch-evidence-summary.json
          retention-days: 90
          if-no-files-found: warn

  stage-5-staging-evidence:
    name: Stage 5 - Staging Evidence
    needs: stage-4-evidence-archive
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_staging == 'true' && github.event.inputs.up_to_stage == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pnpm install --frozen-lockfile
      - name: Journey SLO gate
        run: pnpm --dir apps/web run test:journey-slo-gate
      - name: Generate staging evidence summary
        run: python scripts/ci/generate_launch_evidence_bundle.py --artifacts-only --up-to-stage staging --repo-root . --json-summary .tmp/staging-evidence-summary.json || true
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        if: always()
        with:
          name: staging-evidence-summary
          path: .tmp/staging-evidence-summary.json
          retention-days: 90
          if-no-files-found: warn

  pipeline-summary:
    name: Pipeline Summary
    needs: [stage-1-baseline, stage-2-frontend-tests, stage-2-journey-smoke, stage-3-contract-security, stage-4-evidence-archive, stage-5-staging-evidence]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize launch readiness pipeline
        run: |
          echo "## Launch Readiness Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage 1 baseline | ${{ needs.stage-1-baseline.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage 2 frontend | ${{ needs.stage-2-frontend-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage 2 journey | ${{ needs.stage-2-journey-smoke.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage 3 contract/security | ${{ needs.stage-3-contract-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage 4 evidence | ${{ needs.stage-4-evidence-archive.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage 5 staging | ${{ needs.stage-5-staging-evidence.result }} |" >> "$GITHUB_STEP_SUMMARY"
