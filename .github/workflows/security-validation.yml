name: Security Validation

on:
  # PR trigger for security-critical paths
  pull_request:
    branches: [main]
    paths:
      - '**/middleware.py'
      - '**/auth*.py'
      - '**/security*.py'
      - 'value-fabric/shared/identity/**'
      - 'tests/security/**'
      - '.github/workflows/security-validation.yml'

  # Scheduled full suite
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC

  # Manual trigger
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'full'
        type: choice
        options:
          - smoke
          - full
          - tenant-isolation
          - rbac
          - owasp

env:
  PYTHON_VERSION: '3.11'
  TEST_TYPE: ${{ github.event.inputs.test_type || 'smoke' }}

jobs:
  # ============================================
  # Security Smoke Tests (Fast PR Gate)
  # ============================================
  security-smoke:
    name: Security Smoke Tests (< 2 min)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' || inputs.test_type == 'smoke'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_value_fabric
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx psycopg2-binary redis pyjwt
          # Install layer dependencies if available
          if [ -f value-fabric/layer1-ingestion/requirements.txt ]; then
            pip install -r value-fabric/layer1-ingestion/requirements.txt || true
          fi

      - name: Verify JWT Secret is configured
        run: |
          if [ -z "${{ secrets.TEST_JWT_SECRET }}" ]; then
            echo "ERROR: TEST_JWT_SECRET must be set in repository secrets"
            echo "This is required for test isolation and security validation."
            exit 1
          fi
          echo "✓ TEST_JWT_SECRET is configured"

      - name: Check Neo4j tenant isolation in queries
        run: |
          echo "Checking for unfiltered Neo4j MATCH queries..."

          # File to check
          MAIN_FILE="value-fabric/layer3-knowledge/src/api/main.py"

          # Find MATCH queries that don't have tenant_id filtering
          # Look for MATCH patterns without {tenant_id: or tenant_id in WHERE
          violations=0

          # Check for MATCH (e:Entity) without tenant_id filter
          while IFS= read -r line; do
            # Skip lines that already have tenant_id
            if echo "$line" | grep -q "tenant_id"; then
              continue
            fi
            # Check if this is a MATCH line in an endpoint function
            if echo "$line" | grep -q "MATCH"; then
              echo "POTENTIAL_VIOLATION: $line"
              ((violations++)) || true
            fi
          done < <(grep -n "MATCH" "$MAIN_FILE")

          # More targeted check: find MATCH queries in list_entities and get_full_graph
          # that don't have tenant_id in the query or params
          echo ""
          echo "Checking critical endpoints for tenant isolation..."

          # Extract the list_entities function and check for tenant_id
          if grep -A 200 "async def list_entities" "$MAIN_FILE" | grep -q "MATCH (e:Entity)" | grep -v "tenant_id"; then
            echo "ERROR: list_entities has unfiltered MATCH (e:Entity) query"
            ((violations++)) || true
          fi

          # Check that tenant_id is required in both endpoints
          if ! grep -A 50 "async def list_entities" "$MAIN_FILE" | grep -q "tenant_id is required"; then
            echo "ERROR: list_entities does not require tenant_id"
            ((violations++)) || true
          fi

          if ! grep -A 50 "async def get_full_graph" "$MAIN_FILE" | grep -q "tenant_id is required"; then
            echo "ERROR: get_full_graph does not require tenant_id"
            ((violations++)) || true
          fi

          if [ "$violations" -gt 0 ]; then
            echo ""
            echo "FAIL: Found $violations Neo4j tenant isolation violations"
            echo "All MATCH queries must include tenant_id filtering"
            exit 1
          fi

          echo "✓ All Neo4j queries have tenant_id isolation"

      - name: Run smoke tests
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_value_fabric
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          # JWT_SECRET: No fallback - must be explicitly set in secrets
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          ENVIRONMENT: test
        run: |
          echo "Running security smoke tests..."
          pytest tests/security/test_security_smoke.py -v \
            --tb=short \
            -x \
            --timeout=120

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-smoke-results
          path: |
            .pytest_cache/
            test-results/
          retention-days: 30

  # ============================================
  # Full Security Test Suite
  # ============================================
  security-full:
    name: Full Security Test Suite (~ 15 min)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || inputs.test_type == 'full'
    needs: [security-smoke]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_value_fabric
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/test-password
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p test-password 'RETURN 1'"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 7474:7474
          - 7687:7687

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx psycopg2-binary redis pyjwt
          # Install all layer dependencies
          for req in value-fabric/*/requirements.txt; do
            pip install -r "$req" || true
          done

      - name: Run tenant isolation tests
        if: inputs.test_type == 'tenant-isolation' || inputs.test_type == 'full' || github.event_name == 'schedule'
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_value_fabric
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test-password
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          ENVIRONMENT: test
        run: |
          echo "Running tenant isolation tests..."
          pytest tests/security/test_tenant_isolation.py -v \
            --tb=short \
            -k "P0"

      - name: Run RBAC tests
        if: inputs.test_type == 'rbac' || inputs.test_type == 'full' || github.event_name == 'schedule'
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_value_fabric
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          ENVIRONMENT: test
        run: |
          echo "Running RBAC tests..."
          pytest tests/security/test_rbac.py -v \
            --tb=short \
            -k "P0 or TestPermissionGranularity or TestJWTTamperingResistance"

      - name: Run OWASP Top 10 tests
        if: inputs.test_type == 'owasp' || inputs.test_type == 'full' || github.event_name == 'schedule'
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_value_fabric
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          ENVIRONMENT: test
        run: |
          echo "Running OWASP Top 10 tests..."
          pytest tests/security/test_owasp_top10.py -v \
            --tb=short \
            -k "P0"

      - name: Run security misconfiguration tests
        if: inputs.test_type == 'full' || github.event_name == 'schedule'
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_value_fabric
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          ENVIRONMENT: test
        run: |
          echo "Running security misconfiguration tests..."
          pytest tests/security/test_security_misconfiguration.py -v \
            --tb=short

      - name: Generate coverage report
        if: always()
        run: |
          pytest tests/security/ \
            --cov=shared/security \
            --cov-report=xml \
            --cov-report=html \
            || true

      - name: Upload full test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-full-results
          path: |
            .pytest_cache/
            htmlcov/
            coverage.xml
          retention-days: 90

  # ============================================
  # Security Summary Report
  # ============================================
  security-summary:
    name: Security Test Summary
    runs-on: ubuntu-latest
    needs: [security-smoke, security-full]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Security Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.security-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Suite | ${{ needs.security-full.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts available for 30 days." >> $GITHUB_STEP_SUMMARY

      - name: Check for critical failures (GATING)
        if: needs.security-smoke.result == 'failure'
        run: |
          echo "❌ Security smoke tests failed - PR blocked due to security regression"
          exit 1  # HARD FAIL: Security tests are gating
