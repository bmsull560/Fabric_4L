name: Workflow README Sync Check

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/check-workflow-readme-links.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/check-workflow-readme-links.py'

permissions:
  contents: read

jobs:
  validate-workflow-readme:
    name: Validate workflow README references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate workflow filenames referenced in README
        run: |
          python .github/scripts/check-workflow-readme-links.py
