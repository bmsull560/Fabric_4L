# Secret Rotation Automation
# Automated rotation of static secrets with audit logging
name: Secret Rotation

permissions:
  contents: read
  issues: write

on:
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      rotation_type:
        description: 'Type of secrets to rotate'
        required: true
        type: choice
        options:
          - jwt
          - llm
          - api_hmac
          - database_static
          - all
        default: 'all'
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - prod
        default: 'staging'
      force_rotation:
        description: 'Force rotation even if not due'
        required: false
        type: boolean
        default: false
  
  # Scheduled rotation ( Sundays at 2 AM UTC )
  schedule:
    - cron: '0 2 * * 0'

# Prevent concurrent runs
concurrency:
  group: secret-rotation-${{ github.event.inputs.environment || 'scheduled' }}
  cancel-in-progress: false

env:
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}

jobs:
  # ============================================
  # Pre-rotation checks
  # ============================================
  pre-checks:
    runs-on: ubuntu-latest
    outputs:
      should_rotate: ${{ steps.check.outputs.should_rotate }}
      rotation_list: ${{ steps.check.outputs.rotation_list }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check rotation schedule
        id: check
        run: |
          ROTATION_TYPE="${{ github.event.inputs.rotation_type || 'all' }}"
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          FORCE="${{ github.event.inputs.force_rotation }}"
          
          echo "::group::Rotation Check"
          echo "Type: $ROTATION_TYPE"
          echo "Environment: $ENV"
          echo "Force: $FORCE"
          echo "::endgroup::"
          
          # Build rotation list
          ROTATION_LIST="[]"
          SHOULD_ROTATE="false"
          
          if [[ "$FORCE" == "true" ]] || [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            SHOULD_ROTATE="true"
            case $ROTATION_TYPE in
              jwt)
                ROTATION_LIST='["jwt"]'
                ;;
              llm)
                ROTATION_LIST='["llm"]'
                ;;
              api_hmac)
                ROTATION_LIST='["api_hmac"]'
                ;;
              database_static)
                ROTATION_LIST='["database_static"]'
                ;;
              all)
                ROTATION_LIST='["jwt", "llm", "api_hmac", "database_static"]'
                ;;
            esac
          else
            # Check scheduled rotation based on day of year
            DAY_OF_YEAR=$(date +%j)
            
            # JWT: Every 90 days (days 1, 91, 181, 271)
            if [[ $((DAY_OF_YEAR % 90)) -eq 1 ]]; then
              SHOULD_ROTATE="true"
              ROTATION_LIST=$(echo "$ROTATION_LIST" | jq '. + ["jwt"]')
            fi
            
            # LLM: Every 180 days
            if [[ $((DAY_OF_YEAR % 180)) -eq 1 ]]; then
              SHOULD_ROTATE="true"
              ROTATION_LIST=$(echo "$ROTATION_LIST" | jq '. + ["llm"]')
            fi
            
            # API HMAC: Every 90 days
            if [[ $((DAY_OF_YEAR % 90)) -eq 1 ]]; then
              SHOULD_ROTATE="true"
              ROTATION_LIST=$(echo "$ROTATION_LIST" | jq '. + ["api_hmac"]')
            fi
          fi
          
          echo "should_rotate=$SHOULD_ROTATE" >> $GITHUB_OUTPUT
          echo "rotation_list=$ROTATION_LIST" >> $GITHUB_OUTPUT
          
          echo "::group::Decision"
          echo "Should rotate: $SHOULD_ROTATE"
          echo "Rotation list: $ROTATION_LIST"
          echo "::endgroup::"

  # ============================================
  # Rotate JWT Signing Secrets
  # ============================================
  rotate-jwt:
    needs: pre-checks
    if: contains(needs.pre-checks.outputs.rotation_list, 'jwt')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Vault CLI
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          method: token
      
      - name: Generate new JWT secret
        id: generate
        run: |
          NEW_SECRET=$(openssl rand -base64 64)
          echo "::add-mask::$NEW_SECRET"
          echo "new_secret=$NEW_SECRET" >> $GITHUB_OUTPUT
      
      - name: Store in Vault
        run: |
          vault kv put secret/value-fabric/auth \
            jwt-secret="${{ steps.generate.outputs.new_secret }}" \
            rotation_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            rotated_by="github-actions"
      
      - name: Audit log rotation
        run: |
          cat >> rotation-audit.log << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "secret_type": "jwt",
            "environment": "${{ github.event.inputs.environment || 'staging' }}",
            "rotated_by": "github-actions",
            "workflow_run_id": "${{ github.run_id }}",
            "status": "completed"
          }
          EOF
      
      - name: Notify services to reload
        run: |
          # Trigger rolling restart of auth-dependent services
          kubectl rollout restart deployment/layer1-ingestion -n value-fabric
          kubectl rollout restart deployment/layer2-extraction -n value-fabric
          kubectl rollout restart deployment/layer3-knowledge -n value-fabric
          kubectl rollout restart deployment/layer4-agents -n value-fabric
          
          # Wait for rollout to complete
          kubectl rollout status deployment/layer1-ingestion -n value-fabric --timeout=300s
          kubectl rollout status deployment/layer4-agents -n value-fabric --timeout=300s
      
      - name: Verify rotation
        run: |
          # Verify JWT signing still works
          scripts/secrets/verify-jwt-rotation.sh

  # ============================================
  # Rotate LLM API Keys
  # ============================================
  rotate-llm:
    needs: pre-checks
    if: contains(needs.pre-checks.outputs.rotation_list, 'llm')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Rotate OpenAI API Key
        id: openai
        run: |
          # Note: OpenAI doesn't support automated key rotation via API
          # This step creates a notification for manual rotation
          echo "::warning::OpenAI API keys require manual rotation via dashboard"
          echo "Manual action required: https://platform.openai.com/account/api-keys"
          
          # Create issue for tracking
          gh issue create \
            --title "[ACTION REQUIRED] Rotate OpenAI API Key - ${{ github.event.inputs.environment || 'staging' }}" \
            --body "LLM API key rotation is due. Please rotate manually via OpenAI dashboard." \
            --label "security,rotation-required"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Audit log rotation
        run: |
          cat >> rotation-audit.log << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "secret_type": "llm",
            "environment": "${{ github.event.inputs.environment || 'staging' }}",
            "rotated_by": "manual-notification",
            "workflow_run_id": "${{ github.run_id }}",
            "status": "manual_action_required"
          }
          EOF

  # ============================================
  # Rotate API HMAC Secret
  # ============================================
  rotate-api-hmac:
    needs: pre-checks
    if: contains(needs.pre-checks.outputs.rotation_list, 'api_hmac')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Vault CLI
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          method: token
      
      - name: Generate new HMAC secret
        id: generate
        run: |
          NEW_SECRET=$(openssl rand -base64 64)
          echo "::add-mask::$NEW_SECRET"
          echo "new_secret=$NEW_SECRET" >> $GITHUB_OUTPUT
      
      - name: Store in Vault
        run: |
          vault kv put secret/value-fabric/auth \
            api-key-hmac-secret="${{ steps.generate.outputs.new_secret }}" \
            rotation_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            rotated_by="github-actions"
      
      - name: Audit log rotation
        run: |
          cat >> rotation-audit.log << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "secret_type": "api_hmac",
            "environment": "${{ github.event.inputs.environment || 'staging' }}",
            "rotated_by": "github-actions",
            "workflow_run_id": "${{ github.run_id }}",
            "status": "completed"
          }
          EOF
      
      - name: Rolling restart
        run: |
          # Rolling restart to pick up new HMAC secret
          kubectl rollout restart deployment/layer1-ingestion -n value-fabric
          kubectl rollout restart deployment/layer4-agents -n value-fabric
          
          kubectl rollout status deployment/layer4-agents -n value-fabric --timeout=300s

  # ============================================
  # Rotate Static Database Passwords (non-dynamic)
  # ============================================
  rotate-database-static:
    needs: pre-checks
    if: contains(needs.pre-checks.outputs.rotation_list, 'database_static')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate new database passwords
        id: generate
        run: |
          NEO4J_PASS=$(openssl rand -base64 32)
          REDIS_PASS=$(openssl rand -base64 32)
          
          echo "::add-mask::$NEO4J_PASS"
          echo "::add-mask::$REDIS_PASS"
          
          echo "neo4j_pass=$NEO4J_PASS" >> $GITHUB_OUTPUT
          echo "redis_pass=$REDIS_PASS" >> $GITHUB_OUTPUT
      
      - name: Update Vault
        run: |
          vault kv patch secret/value-fabric/database \
            neo4j-password="${{ steps.generate.outputs.neo4j_pass }}" \
            redis-password="${{ steps.generate.outputs.redis_pass }}" \
            rotation_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      
      - name: Update Neo4j password in database
        run: |
          # Connect to Neo4j and update password
          kubectl exec -n value-fabric neo4j-0 -- cypher-shell -u neo4j -p "$OLD_NEO4J_PASS" \
            "ALTER CURRENT USER SET PASSWORD FROM '\$OLD_NEO4J_PASS' TO '${{ steps.generate.outputs.neo4j_pass }}'"
      
      - name: Update Redis password
        run: |
          # Update Redis ACL or restart with new config
          kubectl rollout restart statefulset/redis -n value-fabric
      
      - name: Audit log rotation
        run: |
          cat >> rotation-audit.log << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "secret_type": "database_static",
            "environment": "${{ github.event.inputs.environment || 'staging' }}",
            "rotated_by": "github-actions",
            "workflow_run_id": "${{ github.run_id }}",
            "status": "completed"
          }
          EOF
      
      - name: Rolling restart
        run: |
          kubectl rollout restart statefulset/neo4j -n value-fabric
          kubectl rollout restart statefulset/redis -n value-fabric

  # ============================================
  # Post-rotation verification
  # ============================================
  verify:
    needs: [pre-checks, rotate-jwt, rotate-llm, rotate-api-hmac, rotate-database-static]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests
        run: |
          echo "Running post-rotation smoke tests..."
          scripts/smoke/vault_smoke.py
          
      - name: Upload audit log
        uses: actions/upload-artifact@v7
        with:
          name: rotation-audit-${{ github.run_id }}
          path: rotation-audit.log
          retention-days: 365
      
      - name: Notify on success
        if: success()
        run: |
          echo "::notice::Secret rotation completed successfully"
          
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Secret rotation failed - check logs for details"
          # Create PagerDuty alert or Slack notification
