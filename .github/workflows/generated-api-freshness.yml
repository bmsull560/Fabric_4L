name: Generated API Freshness

permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**/src/**'
      - 'value_fabric/layer*/**'
      - 'contracts/openapi/**'
      - 'apps/web/src/api/**'
      - 'packages/platform-contract/src/typescript/generated/**'
      - 'packages/platform-contract/scripts/generate-openapi-types.mjs'
      - 'apps/web/scripts/generate-api-types.ts'
      - 'scripts/export_openapi.py'
      - 'scripts/ci/contract_compliance_gate.py'
      - '.github/workflows/generated-api-freshness.yml'
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'services/**/src/**'
      - 'value_fabric/layer*/**'
      - 'contracts/openapi/**'
      - 'apps/web/src/api/**'
      - 'packages/platform-contract/src/typescript/generated/**'
      - 'packages/platform-contract/scripts/generate-openapi-types.mjs'
      - 'apps/web/scripts/generate-api-types.ts'
      - 'scripts/export_openapi.py'
      - 'scripts/ci/contract_compliance_gate.py'
      - '.github/workflows/generated-api-freshness.yml'
  workflow_dispatch:

concurrency:
  group: generated-api-freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-api-freshness:
    name: generated-api-freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@10.18.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run generated API freshness gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/ci/contract_compliance_gate.py --mode fast --base-ref origin/${{ github.base_ref }}
          else
            python scripts/ci/contract_compliance_gate.py --mode full
          fi
