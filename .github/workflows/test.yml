name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fabric_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_AUTH: neo4j/test
          NEO4J_ACCEPT_LICENSE_AGREEMENT: yes
        options: >-
          --health-cmd "cypher-shell -u neo4j -p test 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 7687:7687
          - 7474:7474

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-xdist pytest-timeout pytest-cov httpx pytest-asyncio
          if [ -f "shared/pyproject.toml" ]; then
            pip install -e shared/
          fi

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 2>/dev/null && echo "PostgreSQL ready"
            redis-cli -h localhost -p 6379 ping 2>/dev/null && echo "Redis ready"
            curl -s http://localhost:7474/dbms/health 2>/dev/null && echo "Neo4j ready"
            if [ "$i" -ge "6" ]; then
              echo "Proceeding with available services..."
              break
            fi
            sleep 5
          done

      - name: Run unit tests
        run: pytest -m unit -n auto --timeout=60
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test

      - name: Run integration tests
        run: pytest -m integration --timeout=120
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test

      - name: Run contract tests
        run: pytest -m contract --timeout=60
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test

      - name: Run security tests
        run: pytest -m security --timeout=60
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test

      - name: Generate coverage report
        run: pytest --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: frontend
        run: pnpm test -- --reporter=default --coverage

      - name: Run lint
        working-directory: frontend
        run: pnpm run lint

      - name: Type check
        working-directory: frontend
        run: pnpm tsc --noEmit

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests, frontend-tests]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start backend services
        run: |
          cd value-fabric
          export NEO4J_PASSWORD=test
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY || 'sk-test-key' }}
          docker compose up -d neo4j redis postgres
          docker compose up -d --build layer2-extraction layer3-knowledge layer4-agents

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            sleep 10
            healthy=$(docker compose -f value-fabric/docker-compose.yml ps --format json 2>/dev/null | grep -c '"Health":"healthy"' || echo "0")
            echo "Check $i/30: $healthy services healthy"
            if [ "$healthy" -ge "6" ]; then
              echo "All services healthy!"
              break
            fi
          done
          docker compose -f value-fabric/docker-compose.yml ps
        timeout-minutes: 6

      - name: Run E2E tests
        working-directory: frontend
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm exec playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Capture logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/logs
          docker compose -f value-fabric/docker-compose.yml logs > artifacts/logs/docker-compose.log || true

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-logs
          path: artifacts/logs/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          cd value-fabric && docker compose down -v

  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-timeout
          if [ -f "shared/pyproject.toml" ]; then
            pip install -e shared/
          fi

      - name: Run performance benchmarks
        run: pytest -m performance --timeout=300 -v

      - name: Upload performance baseline
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: performance-baseline.txt
          retention-days: 30
