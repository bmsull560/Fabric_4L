name: Test Suite

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fabric_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
        ports:
          - 7687:7687
          - 7474:7474

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-xdist pytest-timeout pytest-cov httpx pytest-asyncio
          if [ -f "shared/pyproject.toml" ]; then
            pip install -e shared/
          fi

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 2>/dev/null && echo "PostgreSQL ready"
            redis-cli -h localhost -p 6379 ping 2>/dev/null && echo "Redis ready"
            curl -s http://localhost:7474/dbms/health 2>/dev/null && echo "Neo4j ready"
            if [ "$i" -ge "6" ]; then
              echo "Proceeding with available services..."
              break
            fi
            sleep 5
          done

      - name: Run unit tests
        run: pytest -m unit -n auto --timeout=60
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword

      - name: Run integration tests
        run: pytest -m integration --timeout=120
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword

      - name: Run contract tests
        run: pytest -m contract --timeout=60
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword

      - name: Run security tests
        run: pytest -m security --timeout=60
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/fabric_test
          REDIS_URL: redis://localhost:6379
          NEO4J_URL: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword

      - name: Generate coverage report
        run: |
          for svc in services/layer1-ingestion services/layer2-extraction services/layer3-knowledge services/layer4-agents services/layer5-ground-truth services/layer6-benchmarks; do
            echo "=== Coverage for $svc ==="
            (cd "$svc" && pytest --cov=src --cov-report=xml --cov-fail-under=80)
            cp "$svc/coverage.xml" "coverage-$(basename "$svc").xml"
          done

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-*.xml
          fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: apps/web
        run: pnpm test -- --reporter=default --coverage

      - name: Run lint
        working-directory: apps/web
        run: pnpm run lint

      - name: Type check
        working-directory: apps/web
        run: pnpm tsc --noEmit

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend-tests, frontend-tests]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Start E2E backend stack
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait
        timeout-minutes: 10

      - name: Verify backend health
        run: |
          echo "Checking layer4 API health..."
          for i in {1..20}; do
            if curl -sf http://localhost:8004/health; then
              echo "Backend healthy"
              break
            fi
            echo "Attempt $i/20 — waiting..."
            sleep 5
          done
          curl -sf http://localhost:8004/health || (echo "Backend did not become healthy" && exit 1)

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mocked E2E tests (no backend required)
        working-directory: apps/web
        run: pnpm exec playwright test --project=contracts --project=journeys
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3001'

      - name: Run backend-integrated E2E tests
        working-directory: apps/web
        run: pnpm exec playwright test --project=backend-integrated
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3001'
          PLAYWRIGHT_BACKEND_URL: 'http://localhost:8004'
          # Remove this line to make skipped @backend tests fail the build
          SKIP_BACKEND_TESTS: 'false'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/e2e-results/
          retention-days: 14

      - name: Capture service logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/logs
          docker compose -f docker-compose.e2e.yml logs > artifacts/logs/e2e-services.log || true

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-logs
          path: artifacts/logs/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-timeout
          if [ -f "shared/pyproject.toml" ]; then
            pip install -e shared/
          fi

      - name: Run performance benchmarks
        run: pytest -m performance --timeout=300 -v

      - name: Upload performance baseline
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: performance-baseline.txt
          retention-days: 30

