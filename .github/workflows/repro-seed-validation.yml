name: Repro Seed Validation

on:
  pull_request:
    paths:
      - 'scripts/repro-seeds/**'
      - 'tests/repro-seeds/**'
      - '.github/workflows/repro-seed-validation.yml'
  push:
    branches: [ main ]
    paths:
      - 'scripts/repro-seeds/**'
      - 'tests/repro-seeds/**'
      - '.github/workflows/repro-seed-validation.yml'

jobs:
  validate-repro-seeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate seed determinism and tenant safety
        run: python scripts/repro-seeds/validate_seed_packs.py
