name: Repository Hygiene

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.github/scripts/**'
      - 'monitoring/alerting/rules.yml'
      - 'canonical-paths.yaml'
      - 'scripts/ci/repo_hygiene.py'
      - 'scripts/ci/legacy_path_guard.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.github/scripts/**'
      - 'monitoring/alerting/rules.yml'
      - 'canonical-paths.yaml'
      - 'scripts/ci/repo_hygiene.py'
      - 'scripts/ci/legacy_path_guard.py'
  workflow_dispatch:

concurrency:
  group: repo-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Canonical Layout & Legacy Path Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run legacy path guard
        run: python scripts/ci/legacy_path_guard.py --repo-root .

      - name: Run repository hygiene validator
        id: hygiene
        run: |
          python scripts/ci/repo_hygiene.py --json | tee artifacts/repo-hygiene.json
          exit ${PIPESTATUS[0]}

      - name: Comment PR with hygiene report (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('artifacts/repo-hygiene.json', 'utf8'));
            } catch (e) {
              report = { passed: false, errors: 1, warnings: 0, violations: [] };
            }
            const lines = [
              '## 🧹 Repository Hygiene Check Failed',
              '',
              `**Errors:** ${report.errors}  |  **Warnings:** ${report.warnings}`,
              '',
              'Active workflows, Dependabot, CODEOWNERS, or monitoring rules reference deleted or obsolete directories.',
              '',
              '### Violations',
              ...report.violations
                .filter(v => v.severity === 'error')
                .map(v => `- **${v.file}:${v.line}** — ${v.message}`),
              '',
              '> See \_canonical-paths.yaml\_ for the canonical layout manifest and migration guidance.'
            ];
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: lines.join('\n')
            });

      - name: Upload hygiene report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-hygiene-report
          path: artifacts/repo-hygiene.json
          retention-days: 14
