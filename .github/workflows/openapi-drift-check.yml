name: OpenAPI Drift Check

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'services/**/src/api/**'
      - 'services/**/src/**/routes/**'
      - 'shared/**'
      - 'scripts/export_openapi.py'
      - '.github/workflows/openapi-drift-check.yml'
  push:
    branches: [main, develop]
    paths:
      - 'services/**/src/api/**'
      - 'services/**/src/**/routes/**'
      - 'shared/**'
      - 'scripts/export_openapi.py'

jobs:
  export-openapi:
    name: Export and Validate OpenAPI Specs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer:
          - { name: "Layer 1", dir: "layer1-ingestion", file: "layer1-ingestion.json" }
          - { name: "Layer 2", dir: "layer2-extraction", file: "layer2-extraction.json" }
          - { name: "Layer 3", dir: "layer3-knowledge", file: "layer3-knowledge.json" }
          - { name: "Layer 4", dir: "layer4-agents", file: "layer4-agents.json" }
          - { name: "Layer 5", dir: "layer5-ground-truth", file: "layer5-ground-truth.json" }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic
          # Install layer-specific dependencies
          pip install -e services/${{ matrix.layer.dir }} || true

      - name: Export OpenAPI spec
        run: |
          python scripts/export_openapi.py

      - name: Validate OpenAPI JSON syntax
        run: |
          python -c "
          import json
          import sys
          path = 'contracts/openapi/${{ matrix.layer.file }}'
          try:
              with open(path) as f:
                  data = json.load(f)
              print(f'✅ {path} is valid JSON')
              print(f'   Title: {data.get(\"info\", {}).get(\"title\", \"N/A\")}')
              print(f'   Version: {data.get(\"info\", {}).get(\"version\", \"N/A\")}')
              print(f'   Paths: {len(data.get(\"paths\", {}))}')
              sys.exit(0)
          except Exception as e:
              print(f'❌ {path} validation failed: {e}')
              sys.exit(1)
          "

      - name: Check for spec drift
        run: |
          if git diff --name-only | grep -q "contracts/openapi/${{ matrix.layer.file }}"; then
            echo "::error::OpenAPI drift detected: contracts/openapi/${{ matrix.layer.file }}"
            echo "Drift detected. Please run 'python scripts/export_openapi.py' and commit the changes."
            exit 1
          fi

  openapi-complete:
    name: All OpenAPI Exports Valid
    runs-on: ubuntu-latest
    needs: export-openapi
    if: always()

    steps:
      - name: Check all exports succeeded
        run: |
          echo "OpenAPI export validation complete for all layers"
          # This job ensures all matrix jobs passed before allowing merge

  contract-tests:
    name: Run Contract Tests
    runs-on: ubuntu-latest
    needs: export-openapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest schemathesis pyyaml
          pip install -r requirements.txt || true

      - name: Run contract validation tests (with infra)
        run: |
          bash scripts/run-openapi-contract-tests.sh
        # Hard fail - contract tests must pass
