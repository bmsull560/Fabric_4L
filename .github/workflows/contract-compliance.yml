# Contract Compliance Check
# Validates that code follows Fabric 4L canonical contracts and detects API drift
#
# CONTRACT.md §3.3 - Lint and CI Enforcement Strategy
#
# This workflow consolidates:
# - Former platform-contract-gate.yml (Python + frontend lint)
# - Original contract-compliance.yml (ESLint plugin tests + frontend lint + canonical examples)
# - Former contract-drift-check.yml (OpenAPI drift detection)
# Into a single authoritative CI gate.

name: Contract Compliance

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'examples/canonical/**'
      - 'packages/eslint-plugin-fabric-contracts/**'
      - 'packages/shared/**'
      - 'services/**/src/**'
      - 'packages/platform-contract/**'
      - 'contracts/openapi/**'
      - 'tests/contract/**'
      - 'scripts/ci/platform_contract_lint.py'
      - '.github/workflows/contract-compliance.yml'
  schedule:
    # Run daily at 03:00 UTC (consolidated from 02:00 and 03:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: contract-compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Build and Test ESLint Plugin
  # ==========================================================================
  plugin-tests:
    name: ESLint Plugin Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/eslint-plugin-fabric-contracts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/eslint-plugin-fabric-contracts/package.json

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Run tests
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: eslint-plugin
          name: eslint-plugin-coverage

  # ==========================================================================
  # Validate Dependabot Coverage (H-07 Audit Fix)
  # ==========================================================================
  validate-dependabot-coverage:
    name: Validate Dependabot Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate dependabot.yml coverage
        run: python scripts/ci/validate_dependabot_coverage.py

  # ==========================================================================
  # Lint Frontend with Contract Rules
  # ==========================================================================
  lint-frontend:
    name: Lint Frontend (Contract Rules)
    runs-on: ubuntu-latest
    needs: [plugin-tests, validate-dependabot-coverage]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Link plugin to frontend
        run: |
          cd packages/eslint-plugin-fabric-contracts
          npm link
          cd ../../apps/web
          npm link eslint-plugin-fabric-contracts

      - name: Run contract linting (all contract rules as errors)
        working-directory: apps/web
        run: |
          # Uses .eslintrc.js which now enforces all contract rules as "error"
          # CONTRACT.md §3.3 - All 6 canonical contracts enforced
          npx eslint src/ server/ --ext .ts,.tsx --max-warnings 0

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: eslint-contract-violations
          path: |
            apps/web/.eslintcache
            apps/web/eslint-report.json
        # No continue-on-error: contract violations must block CI

  # ==========================================================================
  # Validate Canonical Examples
  # ==========================================================================
  validate-canonical:
    name: Validate Canonical Examples
    runs-on: ubuntu-latest
    needs: plugin-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/eslint-plugin-fabric-contracts/package.json

      - name: Install plugin
        working-directory: packages/eslint-plugin-fabric-contracts
        run: npm ci && npm run build

      - name: Validate examples/canonical/
        run: |
          npx eslint examples/canonical/ --ext .ts \
            --plugin fabric-contracts \
            --rule 'fabric-contracts/no-tenant-id-parameter: error' \
            --rule 'fabric-contracts/no-throw-in-tool: error' \
            --rule 'fabric-contracts/no-json-parse-agent-output: error' \
            --rule 'fabric-contracts/no-imperative-navigation: error' \
            --rule 'fabric-contracts/no-url-concatenation: error' \
            --rule 'fabric-contracts/no-private-imports: error' \
            --rule 'fabric-contracts/no-circular-dependencies: warn' \
            --format compact

  # ==========================================================================
  # Platform Contract Package Tests
  # ==========================================================================
  platform-contract-tests:
    name: Platform Contract Package Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/platform-contract/package-lock.json

      - name: Install Python contract test dependencies
        run: pip install -r packages/platform-contract/requirements-test.txt

      - name: Install platform contract package dependencies
        working-directory: packages/platform-contract
        run: npm ci

      - name: Run platform contract package tests
        working-directory: packages/platform-contract
        run: npm run contract:test

  # ==========================================================================
  # Python Backend Contract Lint (merged from platform-contract-gate.yml)
  # ==========================================================================
  python-lint:
    name: Python Platform Contract Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Run Platform Contract Lint
        run: python scripts/ci/platform_contract_lint.py

      - name: Run Strict Shared-Import Enforcement
        run: python scripts/ci/check_shared_imports.py --strict --scope executable
        # NO continue-on-error: This is a BLOCKING contract gate

      - name: Contract scan - Tenant context violations
        run: |
          echo "Scanning for tenantId parameter violations (CONTRACT.md §2.1)..."
          # Count but don't fail yet - we're tracking toward zero
          VIOLATIONS=$(grep -rn "def.*tenant_id\|def.*tenantId" services/*/src/ --include="*.py" | wc -l || true)
          VIOLATIONS=$(grep -rn "def.*tenant_id\|def.*tenantId" services/*/src/ --include="*.py" | wc -l || true)
          echo "tenant_id parameter violations found: $VIOLATIONS"
          echo "tenant_violations=$VIOLATIONS" >> $GITHUB_ENV

      - name: Contract scan - Raw SQL tenant filtering
        run: |
          echo "Scanning for raw SQL tenant_id filtering (CONTRACT.md §2.2)..."
          VIOLATIONS=$(grep -rn "WHERE.*tenant_id\|tenant_id.*=" services/*/src/ --include="*.py" | grep -v "migrations/" | wc -l || true)
          VIOLATIONS=$(grep -rn "WHERE.*tenant_id\|tenant_id.*=" services/*/src/ --include="*.py" | grep -v "migrations/" | wc -l || true)
          echo "raw SQL tenant violations found: $VIOLATIONS"
          echo "sql_violations=$VIOLATIONS" >> $GITHUB_ENV

      # ==========================================================================
      # P0 FIX: Tenant Boundary Security Gate (BLOCKING)
      # ==========================================================================
      - name: Tenant Boundary Security Check
        run: |
          echo "🔒 Running tenant boundary security check..."
          echo "Direct header access (headers['X-Tenant-ID']) is PROHIBITED."
          echo "All code must use: from shared.boundaries import require_tenant_context"
          echo ""
          python scripts/ci/boundary_check.py
        # NO continue-on-error: This is a BLOCKING security gate

      - name: Run tenant boundary security tests
        run: |
          echo "🧪 Running tenant boundary fails-closed tests..."
          pip install pytest pytest-asyncio
          python -m pytest tests/security/test_tenant_boundary_fails_closed.py -v
        env:
          PYTHONPATH: "packages/shared/src"
        # NO continue-on-error: Tests must pass

      - name: Upload contract scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-contract-scan
          path: |
            contract-scan-results.json
            deprecation-tracking.json

  # ==========================================================================
  # OpenAPI Drift Detection (merged from contract-drift-check.yml)
  # ==========================================================================
  generate-openapi:
    name: Generate OpenAPI from Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        layer: [layer3-knowledge, layer5-ground-truth]
        include:
          - layer: layer3-knowledge
            port: 8003
            module: layer3_knowledge.api.main:app
          - layer: layer5-ground-truth
            port: 8005
            module: layer5_ground_truth.api.main:app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic
          if [ "${{ matrix.layer }}" = "layer3-knowledge" ]; then
            pip install neo4j python-dotenv httpx psutil
          elif [ "${{ matrix.layer }}" = "layer5-ground-truth" ]; then
            pip install sqlalchemy asyncpg
          fi

      - name: Generate OpenAPI spec from code
        working-directory: ./services/${{ matrix.layer }}
        working-directory: ./services/${{ matrix.layer }}
        run: |
          python -c "
          import sys
          import json
          import traceback
          
          sys.path.insert(0, 'src')
          
          try:
              from ${{ matrix.module }} import app
              openapi = app.openapi()
              with open('generated-openapi.json', 'w') as f:
                  json.dump(openapi, f, indent=2)
              print(f'✅ Generated OpenAPI for ${{ matrix.layer }}')
              print(f'   Paths: {len(openapi.get(\"paths\", {}))}')
              sys.exit(0)
          except ImportError as e:
              print(f'❌ Failed to import app for ${{ matrix.layer }}: {e}')
              traceback.print_exc()
              sys.exit(1)
          except Exception as e:
              print(f'❌ Failed to generate OpenAPI for ${{ matrix.layer }}: {e}')
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Upload generated spec
        uses: actions/upload-artifact@v4
        with:
          name: generated-openapi-${{ matrix.layer }}
          path: services/${{ matrix.layer }}/generated-openapi.json
          retention-days: 7

  detect-drift:
    name: Detect OpenAPI Drift
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        layer: [layer3-knowledge, layer5-ground-truth]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated spec
        uses: actions/download-artifact@v4
        with:
          name: generated-openapi-${{ matrix.layer }}
          path: generated/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compare OpenAPI specs
        id: compare
        run: |
          pip install jsondiff
          python scripts/compare_openapi.py \
            contracts/openapi/${{ matrix.layer }}.json \
            generated/generated-openapi.json \
            --output drift-report-${{ matrix.layer }}.md \
            --exit-code || EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      - name: Comment PR with drift report
        if: github.event_name == 'pull_request' && steps.compare.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report-${{ matrix.layer }}.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 API Contract Drift Detected: ${{ matrix.layer }}\n\n${report}`
            });

      - name: Fail on drift
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "::error::API contract drift detected in ${{ matrix.layer }}"
          cat drift-report-${{ matrix.layer }}.md
          exit 1

  openapi-contract-tests:
    name: OpenAPI Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: generate-openapi
    strategy:
      fail-fast: false
      matrix:
        layer: [layer3, layer5]
        include:
          - layer: layer3
            test_path: tests/contracts/test_layer3_contract.py
            port: 8003
          - layer: layer5
            test_path: tests/contracts/test_layer5_contract.py
            port: 8005

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx

      - name: Run contract tests
        run: |
          pytest ${{ matrix.test_path }} -v --tb=short
        env:
          FAIL_ON_CONTRACT_VIOLATION: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results-${{ matrix.layer }}
          path: |
            .pytest_cache/
            test-results.xml

  # ==========================================================================
  # Deprecation Register Validation
  # ==========================================================================
  validate-deprecations:
    name: Validate Deprecation Register
    runs-on: ubuntu-latest
    needs: [plugin-tests, lint-frontend, validate-canonical, platform-contract-tests, python-lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate deprecations.json schema
        run: |
          echo "Validating governance/deprecations.json..."
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('docs/governance/deprecations.json', 'utf8'));
            
            // Required fields check
            if (!data.version) throw new Error('Missing version');
            if (!data.items || !Array.isArray(data.items)) throw new Error('Missing items array');
            
            // Check each deprecation item
            data.items.forEach((item, idx) => {
              const required = ['id', 'pattern', 'contract', 'status', 'severity', 'owner', 'targetRemoval', 'replacement'];
              required.forEach(field => {
                if (!item[field]) throw new Error(\`Item \${idx} missing \${field}\`);
              });
              
              // Check for expired exceptions
              if (item.targetRemoval) {
                const removal = new Date(item.targetRemoval);
                // Validate date format first
                if (isNaN(removal.getTime())) {
                  throw new Error(\`Item \${item.id} has invalid targetRemoval date format: \${item.targetRemoval}. Expected ISO 8601 format (YYYY-MM-DD).\`);
                }
                if (removal < new Date()) {
                  console.error(\`::error::Deprecation \${item.id} expired on \${item.targetRemoval}\`);
                  process.exitCode = 1;
                }
              }
            });
            
            console.log(\`✅ Validated \${data.items.length} deprecations\`);
            console.log(\`📊 Compliance score: \${data.compliance?.overallScore || 'N/A'}%\`);
            console.log(\`🎯 Target: \${data.compliance?.targetScore || 'N/A'}% by \${data.compliance?.targetDate || 'N/A'}\`);
          "

      - name: Check for expired exceptions
        run: |
          echo "Checking for expired deprecation exceptions..."
          EXPIRED=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('docs/governance/deprecations.json', 'utf8'));
            const now = new Date();
            const expired = data.items.filter(i => new Date(i.targetRemoval) < now);
            console.log(expired.map(i => i.id).join(' ') || 'NONE');
          ")
          if [ "$EXPIRED" != "NONE" ]; then
            echo "::error::Expired deprecations found: $EXPIRED"
            exit 1
          fi
          echo "✅ No expired deprecations"

      - name: Upload deprecation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deprecation-register
          path: docs/governance/deprecations.json

  # ==========================================================================
  # Summary Report
  # ==========================================================================
  summary:
    name: Contract Compliance Summary
    runs-on: ubuntu-latest
    needs: [plugin-tests, validate-dependabot-coverage, lint-frontend, validate-canonical, platform-contract-tests, python-lint, generate-openapi, detect-drift, openapi-contract-tests, validate-deprecations]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        run: |
          echo "## Contract Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Code Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Tests | ${{ needs.plugin-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Dependabot Coverage | ${{ needs.validate-dependabot-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Frontend | ${{ needs.lint-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Canonical | ${{ needs.validate-canonical.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform Contract Tests | ${{ needs.platform-contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Lint | ${{ needs.python-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deprecation Register | ${{ needs.validate-deprecations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### OpenAPI Contract Checks" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Generate OpenAPI | ${{ needs.generate-openapi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Drift | ${{ needs.detect-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Tests | ${{ needs.openapi-contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Contract Enforcement Status" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | ESLint | CI Gate | Runtime | Score |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|---------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| §2.1 Tenant Context | error | ✅ BLOCKING | ✅ Fails Closed | 90%+ |" >> $GITHUB_STEP_SUMMARY
          echo "| §2.2 DB Session | error | ✅ | 🟡 | 40% |" >> $GITHUB_STEP_SUMMARY
          echo "| §2.3 Middleware Flow | error | ✅ | 🟡 | 50% |" >> $GITHUB_STEP_SUMMARY
          echo "| §2.4 Tool Boundary | error | ✅ | 🟡 | 55% |" >> $GITHUB_STEP_SUMMARY
          echo "| §2.5 Agent Output | error | ✅ | 🟡 | 50% |" >> $GITHUB_STEP_SUMMARY
          echo "| §2.6 UI State | error | ✅ | 🟡 | 65% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sprint Progress" >> $GITHUB_STEP_SUMMARY
          echo "- **Current Score**: ~58%" >> $GITHUB_STEP_SUMMARY
          echo "- **Sprint Target**: 85-90%" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Date**: 2026-05-23" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Enforced Rules" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant Isolation**: no-tenant-id-parameter, no-req-tenant-access, no-raw-tenant-query" >> $GITHUB_STEP_SUMMARY
          echo "- **Database Session**: no-explicit-db-connect" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool Invocation**: no-inline-middleware, no-inline-tool-definition, no-throw-in-tool" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Output**: no-json-parse-agent-output" >> $GITHUB_STEP_SUMMARY
          echo "- **UI State**: no-imperative-navigation, no-url-concatenation" >> $GITHUB_STEP_SUMMARY
          echo "- **Public API**: no-private-imports, no-circular-dependencies" >> $GITHUB_STEP_SUMMARY
          echo "- **OpenAPI Drift**: Auto-detection via spec comparison" >> $GITHUB_STEP_SUMMARY

