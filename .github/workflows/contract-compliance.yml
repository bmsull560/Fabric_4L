# Contract Compliance Check
# Validates that code follows Fabric 4L canonical contracts
#
# CONTRACT.md §3.3 - Lint and CI Enforcement Strategy

name: Contract Compliance

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'examples/canonical/**'
      - 'eslint-plugin-fabric-contracts/**'
      - 'shared/mcp_gateway/**'
      - 'value-fabric/**/src/**'
      - '.github/workflows/contract-compliance.yml'
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: contract-compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Build and Test ESLint Plugin
  # ==========================================================================
  plugin-tests:
    name: ESLint Plugin Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eslint-plugin-fabric-contracts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eslint-plugin-fabric-contracts/package.json

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Run tests
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: eslint-plugin
          name: eslint-plugin-coverage

  # ==========================================================================
  # Lint Frontend with Contract Rules
  # ==========================================================================
  lint-frontend:
    name: Lint Frontend (Contract Rules)
    runs-on: ubuntu-latest
    needs: plugin-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Link plugin to frontend
        run: |
          cd eslint-plugin-fabric-contracts
          npm link
          cd ../frontend
          npm link eslint-plugin-fabric-contracts

      - name: Run contract linting
        working-directory: frontend
        run: |
          npx eslint src/ --ext .ts,.tsx \
            --plugin fabric-contracts \
            --rule 'fabric-contracts/no-imperative-navigation: error' \
            --rule 'fabric-contracts/no-url-concatenation: error' \
            --rule 'fabric-contracts/no-private-imports: error' \
            --rule 'fabric-contracts/no-json-parse-agent-output: error' \
            --format compact
  # ==========================================================================
  # Validate Canonical Examples
  # ==========================================================================
  validate-canonical:
    name: Validate Canonical Examples
    runs-on: ubuntu-latest
    needs: plugin-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eslint-plugin-fabric-contracts/package.json

      - name: Install plugin
        working-directory: eslint-plugin-fabric-contracts
        run: npm ci && npm run build

      - name: Validate examples/canonical/
        run: |
          npx eslint examples/canonical/ --ext .ts \
            --plugin fabric-contracts \
            --rule 'fabric-contracts/no-tenant-id-parameter: error' \
            --rule 'fabric-contracts/no-throw-in-tool: error' \
            --rule 'fabric-contracts/no-json-parse-agent-output: error' \
            --rule 'fabric-contracts/no-imperative-navigation: error' \
            --rule 'fabric-contracts/no-url-concatenation: error' \
            --rule 'fabric-contracts/no-private-imports: error' \
            --rule 'fabric-contracts/no-circular-dependencies: warn' \
            --format compact

  # ==========================================================================
  # Summary Report
  # ==========================================================================
  summary:
    name: Contract Compliance Summary
    runs-on: ubuntu-latest
    needs: [plugin-tests, lint-frontend, validate-canonical]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Contract Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Tests | ${{ needs.plugin-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Frontend | ${{ needs.lint-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Canonical | ${{ needs.validate-canonical.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Contract Enforcement" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant Isolation**: no-tenant-id-parameter, no-req-tenant-access, no-raw-tenant-query" >> $GITHUB_STEP_SUMMARY
          echo "- **Database Session**: no-explicit-db-connect" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool Invocation**: no-inline-middleware, no-inline-tool-definition, no-throw-in-tool" >> $GITHUB_STEP_SUMMARY
          echo "- **LLM Output**: no-json-parse-agent-output" >> $GITHUB_STEP_SUMMARY
          echo "- **UI State**: no-imperative-navigation, no-url-concatenation" >> $GITHUB_STEP_SUMMARY
          echo "- **Public API**: no-private-imports, no-circular-dependencies" >> $GITHUB_STEP_SUMMARY
