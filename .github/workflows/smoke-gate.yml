name: Smoke Gate

permissions:
  contents: read

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Cross-Layer Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start services
        run: |
          cat > .env <<'EOF'
          OPENAI_API_KEY=sk-ci-test-key
          ANTHROPIC_API_KEY=sk-ci-test-key
          NEO4J_PASSWORD=valuefabric
          JWT_SECRET=ci-jwt-secret-value-for-ephemeral-compose-only
          JWT_ALGORITHM=HS256
          AUTH_BYPASS_ENABLED=true
          ENVIRONMENT=ci
          REDIS_PASSWORD=valuefabric
          FLOWER_PASSWORD=valuefabric
          GRAFANA_ADMIN_PASSWORD=valuefabric
          EOF

          # Start core services (L2, L3, L4 + dependencies)
          docker compose -f docker-compose.full.yml up -d neo4j redis postgres layer2-extraction layer3-knowledge layer4-agents

          # Wait for services to be healthy (poll for up to 2 minutes)
          echo "Waiting for services to be healthy..."
          for i in {1..24}; do
            sleep 5
            healthy_count=$(docker compose -f docker-compose.full.yml ps --format json 2>/dev/null | grep -c '"Health":"healthy"' || echo "0")
            total_count=6  # neo4j, redis, postgres, layer2, layer3, layer4
            echo "Check $i/24: $healthy_count/$total_count services healthy"
            if [ "$healthy_count" -ge "$total_count" ]; then
              echo "All services healthy!"
              break
            fi
          done

          # Check service health
          docker compose -f docker-compose.full.yml ps

      - name: Run smoke tests
        id: smoke
        run: |
          python scripts/smoke/production_smoke.py \
            --l2-url http://localhost:8002 \
            --l3-url http://localhost:8003 \
            --l4-url http://localhost:8004 \
            --output-dir artifacts

      - name: Upload smoke report
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report
          path: artifacts/smoke-report-*.json
          retention-days: 14

      - name: Display smoke report
        if: always()
        run: |
          echo "=== Smoke Test Report ==="
          cat artifacts/smoke-report-*.json || echo "No report found"

      - name: Capture logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/logs
          docker compose -f docker-compose.full.yml logs > artifacts/logs/docker-compose.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-failure-logs
          path: artifacts/logs/
          retention-days: 7

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose.full.yml down -v
