name: Smoke Gate

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Cross-Layer Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start services
        working-directory: ./value-fabric
        run: |
          # Export required environment variables
          export NEO4J_PASSWORD=valuefabric
          # P1-22 FIX: Removed secret fallback - secrets must be configured
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          
          # Start core services (L2, L3, L4 + dependencies)
          docker compose up -d neo4j redis postgres layer2-extraction layer3-knowledge layer4-agents
          
          # Wait for services to be healthy (poll for up to 2 minutes)
          echo "Waiting for services to be healthy..."
          for i in {1..24}; do
            sleep 5
            healthy_count=$(docker compose ps --format json 2>/dev/null | grep -c '"Health":"healthy"' || echo "0")
            total_count=6  # neo4j, redis, postgres, layer2, layer3, layer4
            echo "Check $i/24: $healthy_count/$total_count services healthy"
            if [ "$healthy_count" -ge "$total_count" ]; then
              echo "All services healthy!"
              break
            fi
          done
          
          # Check service health
          docker compose ps

      - name: Run smoke tests
        id: smoke
        run: |
          python scripts/smoke/production_smoke.py \
            --l2-url http://localhost:8002 \
            --l3-url http://localhost:8003 \
            --l4-url http://localhost:8004 \
            --output-dir artifacts

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: artifacts/smoke-report-*.json
          retention-days: 14

      - name: Display smoke report
        if: always()
        run: |
          echo "=== Smoke Test Report ==="
          cat artifacts/smoke-report-*.json || echo "No report found"

      - name: Capture logs on failure
        if: failure()
        working-directory: ./value-fabric
        run: |
          mkdir -p ../artifacts/logs
          docker compose logs > ../artifacts/logs/docker-compose.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-logs
          path: artifacts/logs/
          retention-days: 7

      - name: Tear down services
        if: always()
        working-directory: ./value-fabric
        run: |
          docker compose down -v
