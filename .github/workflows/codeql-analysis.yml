name: CodeQL Analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Wednesdays at 6 AM UTC (offset from security-gates Monday)
    - cron: '0 6 * * 3'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-python:
    name: CodeQL — Python
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
          config: |
            paths:
              - value-fabric/layer1-ingestion/src
              - value-fabric/layer2-extraction/src
              - value-fabric/layer3-knowledge/src
              - value-fabric/layer4-agents/src
              - value-fabric/layer5-ground-truth/src
              - value-fabric/layer6-benchmarks/src
              - value-fabric/shared
            paths-ignore:
              - '**/tests/**'
              - '**/migrations/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-python
          output: codeql-results-python
          upload: always

  analyze-javascript:
    name: CodeQL — JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
          config: |
            paths:
              - frontend/client/src
              - frontend/server
            paths-ignore:
              - '**/test/**'
              - '**/e2e/**'
              - '**/*.test.*'
              - '**/*.spec.*'
              - '**/node_modules/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-javascript
          output: codeql-results-javascript
          upload: always
