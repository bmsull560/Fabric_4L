name: Layer6 Dashboard Metric Drift

on:
  pull_request:
    paths:
      - "monitoring/grafana/dashboards/*.json"
      - "monitoring/alerting/rules.yml"
      - "contracts/observability/layer6-metrics.json"
      - "scripts/observability/check_layer6_dashboard_metrics.py"
  push:
    branches: [main]
    paths:
      - "monitoring/grafana/dashboards/*.json"
      - "monitoring/alerting/rules.yml"
      - "contracts/observability/layer6-metrics.json"
      - "scripts/observability/check_layer6_dashboard_metrics.py"

permissions: read-all

jobs:
  validate-layer6-dashboard-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate layer6 dashboard metrics
        run: python scripts/observability/check_layer6_dashboard_metrics.py
