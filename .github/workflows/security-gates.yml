name: Security Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SECURITY_ARTIFACT_RETENTION_DAYS: 30

jobs:
  # Secret detection with gitleaks
  gitleaks-scan:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Container vulnerability scanning with Trivy
  trivy-image-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.layer }}:scan-target value-fabric/${{ matrix.layer }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ matrix.layer }}:scan-target'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln,secret,config'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-${{ matrix.layer }}

  # SBOM generation + vulnerability policy gate
  sbom-policy:
    name: SBOM + Policy (${{ matrix.artifact.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        artifact:
          - name: layer1-ingestion
            context: value-fabric/layer1-ingestion
          - name: layer2-extraction
            context: value-fabric/layer2-extraction
          - name: layer3-knowledge
            context: value-fabric/layer3-knowledge
          - name: layer4-agents
            context: value-fabric/layer4-agents
          - name: layer5-ground-truth
            context: value-fabric/layer5-ground-truth
          - name: layer6-benchmarks
            context: value-fabric/layer6-benchmarks

    steps:
      - uses: actions/checkout@v4

      - name: Build image artifact
        run: |
          docker build -t ${{ matrix.artifact.name }}:ci ${{ matrix.artifact.context }}

      - name: Generate CycloneDX SBOM (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ matrix.artifact.name }}:ci'
          format: 'cyclonedx'
          output: '${{ matrix.artifact.name }}-sbom.cdx.json'
          scanners: 'vuln'

      - name: Evaluate SBOM vulnerability policy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'sbom'
          scan-ref: '${{ matrix.artifact.name }}-sbom.cdx.json'
          format: 'sarif'
          output: '${{ matrix.artifact.name }}-sbom-vuln.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Upload SBOM vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: '${{ matrix.artifact.name }}-sbom-vuln.sarif'
          category: sbom-${{ matrix.artifact.name }}

      - name: Upload SBOM and policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.artifact.name }}
          path: |
            ${{ matrix.artifact.name }}-sbom.cdx.json
            ${{ matrix.artifact.name }}-sbom-vuln.sarif
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

  # DAST against ephemeral compose stack
  dast-api-scan:
    name: DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Start ephemeral Value Fabric stack
        working-directory: value-fabric
        run: |
          cat > .env << 'EOF'
          OPENAI_API_KEY=dummy-key-for-ci
          ANTHROPIC_API_KEY=dummy-key-for-ci
          JWT_SECRET=ci-jwt-secret
          NEO4J_PASSWORD=valuefabric
          EOF
          docker compose up -d --build

      - name: Wait for public API health endpoints
        run: |
          set -euo pipefail
          for target in \
            "http://localhost:8001/health" \
            "http://localhost:8002/health" \
            "http://localhost:8003/health" \
            "http://localhost:8004/health" \
            "http://localhost:8005/api/v1/health"; do
            echo "Waiting for $target"
            for _ in $(seq 1 60); do
              if curl -fsS "$target" >/dev/null; then
                echo "Healthy: $target"
                break
              fi
              sleep 5
            done
            curl -fsS "$target" >/dev/null
          done

      - name: Run OWASP ZAP baseline against public APIs
        run: |
          set -euo pipefail
          mkdir -p zap-reports
          declare -a targets=(
            "layer1:http://127.0.0.1:8001"
            "layer2:http://127.0.0.1:8002"
            "layer3:http://127.0.0.1:8003"
            "layer4:http://127.0.0.1:8004"
            "layer5:http://127.0.0.1:8005"
          )

          for target in "${targets[@]}"; do
            name="${target%%:*}"
            url="${target#*:}"
            echo "Running ZAP baseline for $name at $url"
            docker run --rm --network host \
              -v "${PWD}/zap-reports:/zap/wrk:rw" \
              ghcr.io/zaproxy/zaproxy:stable \
              zap-baseline.py \
              -t "$url" \
              -J "${name}-zap-report.json" \
              -r "${name}-zap-report.html" \
              -w "${name}-zap-warnings.md" \
              -m 5
          done

      - name: Collect compose logs for evidence
        if: always()
        working-directory: value-fabric
        run: docker compose logs --no-color > ../zap-reports/ephemeral-stack.log

      - name: Upload DAST evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-reports
          path: zap-reports/
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

      - name: Stop ephemeral stack
        if: always()
        working-directory: value-fabric
        run: docker compose down -v

  # Python security linting with bandit
  bandit-scan:
    name: Python Security Lint (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit scan
        working-directory: value-fabric/${{ matrix.layer }}
        run: |
          bandit -r src/ -ll -ii --format json --output bandit-report.json || true
          bandit -r src/ -ll -ii --format screen
          if [ -s bandit-report.json ]; then
            echo "Bandit issues found - checking severity"
            python3 << 'PYEOF'
          import json
          import sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = [r for r in data.get('results', []) if r['issue_severity'] in ['MEDIUM', 'HIGH']]
          if issues:
              print(f"Found {len(issues)} medium/high severity issues")
              for i in issues[:5]:
                  print(f"  - {i['issue_text']} at {i['filename']}:{i['line_number']}")
              sys.exit(1)
          else:
              print("No medium/high severity issues found")
          PYEOF
          fi

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ matrix.layer }}
          path: value-fabric/${{ matrix.layer }}/bandit-report.json
          retention-days: 14

  # Python dependency vulnerability scan with pip-audit
  pip-audit-scan:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: value-fabric/${{ matrix.layer }}
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit --vulnerability-service pypi --severity high
        continue-on-error: false

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report-${{ matrix.layer }}
          path: value-fabric/${{ matrix.layer }}/pip-audit-report.json
          retention-days: 14

  # Frontend security audit
  frontend-security-audit:
    name: Frontend Security Audit (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level high --json > pnpm-audit-report.json || true

      - name: Check for critical vulnerabilities
        run: |
          if [ -s pnpm-audit-report.json ]; then
            node << 'NODEEOF'
          const fs = require('fs');
          try {
            const data = JSON.parse(fs.readFileSync('pnpm-audit-report.json', 'utf8'));
            const advisories = data.advisories || {};
            const critical = Object.values(advisories).filter(a => a.severity === 'critical');
            const high = Object.values(advisories).filter(a => a.severity === 'high');
            console.log('Critical vulnerabilities:', critical.length);
            console.log('High vulnerabilities:', high.length);
            if (critical.length > 0) {
              console.log('CRITICAL vulnerabilities found. Failing.');
              process.exit(1);
            }
            if (high.length > 10) {
              console.log('More than 10 HIGH vulnerabilities found. Failing.');
              process.exit(1);
            }
            console.log('Audit passed.');
          } catch (e) {
            console.log('No vulnerabilities found or parse error');
          }
          NODEEOF
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-audit
          path: frontend/pnpm-audit-report.json
          retention-days: 14

  # Dependency review for PRs
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development
          comment-summary-in-pr: true

  # Consolidated security evidence for releases and audits
  security-evidence-artifact:
    name: Security Evidence Bundle
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    needs:
      - dast-api-scan
      - sbom-policy
      - trivy-image-scan
      - gitleaks-scan

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-evidence

      - name: Build evidence manifest
        run: |
          {
            echo "# Security Gates Evidence"
            echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "## Included artifacts"
            find security-evidence -maxdepth 2 -type f | sort
          } > security-evidence/SECURITY_EVIDENCE_MANIFEST.md

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-security-evidence-${{ github.sha }}
          path: security-evidence/
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

  # This status check should be configured as REQUIRED in branch protection
  # to block merges unless DAST and SBOM policy checks pass.
  security-gates-required:
    name: Security Gates Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - dast-api-scan
      - sbom-policy

    steps:
      - name: Confirm required security gates passed
        run: |
          echo "DAST and SBOM policy checks succeeded."
