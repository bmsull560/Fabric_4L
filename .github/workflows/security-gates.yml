
# Action pinning and update process
# - All third-party actions are pinned to full-length commit SHAs.
# - Dependabot (github-actions ecosystem) remains enabled to open SHA bump PRs.
# - Quarterly, run a dedicated "Workflow Action Pin Refresh" PR that:
#   1) updates each action to the latest upstream commit for the tracked major/minor tag,
#   2) runs full CI (including security gates), and
#   3) records verification results in the PR description before merge.
name: Security Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SECURITY_ARTIFACT_RETENTION_DAYS: 30
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Secret detection with gitleaks
  gitleaks-scan:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@56f8e3c4a1e3b4f5b8d0b8ff103b57f7af79f0d0 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Container vulnerability scanning with Trivy
  trivy-image-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks]

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            --build-arg BUILDER_BASE_IMAGE="${BUILDER_BASE_IMAGE:-}" \
            -t ${{ matrix.layer }}:scan-target \
            services/${{ matrix.layer }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@8e6cbf1955f948b0b1f0f2f12f6ec2e5374c8c57 # v0.35.0
        with:
          image-ref: '${{ matrix.layer }}:scan-target'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln,secret,config'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-${{ matrix.layer }}

  # SBOM generation + vulnerability policy gate
  sbom-policy:
    name: SBOM + Policy (${{ matrix.artifact.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        artifact:
          - name: layer1-ingestion
            context: services/layer1-ingestion
          - name: layer2-extraction
            context: services/layer2-extraction
          - name: layer3-knowledge
            context: services/layer3-knowledge
          - name: layer4-agents
            context: services/layer4-agents
          - name: layer5-ground-truth
            context: services/layer5-ground-truth
          - name: layer6-benchmarks
            context: services/layer6-benchmarks

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Build image artifact
        run: |
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            --build-arg BUILDER_BASE_IMAGE="${BUILDER_BASE_IMAGE:-}" \
            -t ${{ matrix.artifact.name }}:ci \
            ${{ matrix.artifact.context }}

      - name: Generate CycloneDX SBOM (Trivy)
        uses: aquasecurity/trivy-action@8e6cbf1955f948b0b1f0f2f12f6ec2e5374c8c57 # v0.35.0
        with:
          image-ref: '${{ matrix.artifact.name }}:ci'
          format: 'cyclonedx'
          output: '${{ matrix.artifact.name }}-sbom.cdx.json'
          scanners: 'vuln'

      - name: Evaluate SBOM vulnerability policy
        uses: aquasecurity/trivy-action@8e6cbf1955f948b0b1f0f2f12f6ec2e5374c8c57 # v0.35.0
        with:
          scan-type: 'sbom'
          scan-ref: '${{ matrix.artifact.name }}-sbom.cdx.json'
          format: 'sarif'
          output: '${{ matrix.artifact.name }}-sbom-vuln.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Upload SBOM vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        with:
          sarif_file: '${{ matrix.artifact.name }}-sbom-vuln.sarif'
          category: sbom-${{ matrix.artifact.name }}

      - name: Upload SBOM and policy artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: sbom-${{ matrix.artifact.name }}
          path: |
            ${{ matrix.artifact.name }}-sbom.cdx.json
            ${{ matrix.artifact.name }}-sbom-vuln.sarif
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

  # DAST against ephemeral compose stack
  dast-api-scan:
    name: DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Start ephemeral Value Fabric stack
        run: |
          cat > .env << 'EOF'
          OPENAI_API_KEY=dummy-key-for-ci
          ANTHROPIC_API_KEY=dummy-key-for-ci
          JWT_SECRET=ci-jwt-secret
          NEO4J_PASSWORD=valuefabric
          EOF
          docker compose -f docker-compose.full.yml up -d --build

      - name: Wait for public API health endpoints
        run: |
          set -euo pipefail
          for target in \
            "http://localhost:8001/health" \
            "http://localhost:8002/health" \
            "http://localhost:8003/health" \
            "http://localhost:8004/health" \
            "http://localhost:8005/api/v1/health"; do
            echo "Waiting for $target"
            for _ in $(seq 1 60); do
              if curl -fsS "$target" >/dev/null; then
                echo "Healthy: $target"
                break
              fi
              sleep 5
            done
            curl -fsS "$target" >/dev/null
          done

      - name: Run OWASP ZAP baseline against public APIs
        run: |
          set -euo pipefail
          mkdir -p zap-reports
          declare -a targets=(
            "layer1:http://127.0.0.1:8001"
            "layer2:http://127.0.0.1:8002"
            "layer3:http://127.0.0.1:8003"
            "layer4:http://127.0.0.1:8004"
            "layer5:http://127.0.0.1:8005"
          )

          for target in "${targets[@]}"; do
            name="${target%%:*}"
            url="${target#*:}"
            echo "Running ZAP baseline for $name at $url"
            docker run --rm --network host \
              -v "${PWD}/zap-reports:/zap/wrk:rw" \
              ghcr.io/zaproxy/zaproxy:stable \
              zap-baseline.py \
              -t "$url" \
              -J "${name}-zap-report.json" \
              -r "${name}-zap-report.html" \
              -w "${name}-zap-warnings.md" \
              -m 5
          done

      - name: Collect compose logs for evidence
        if: always()
        run: docker compose -f docker-compose.full.yml logs --no-color > zap-reports/ephemeral-stack.log

      - name: Upload DAST evidence artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: dast-zap-reports
          path: zap-reports/
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

      - name: Stop ephemeral stack
        if: always()
        run: docker compose -f docker-compose.full.yml down -v

  # Python security linting with bandit
  bandit-scan:
    name: Python Security Lint (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks]

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit scan
        working-directory: services/${{ matrix.layer }}
        run: |
          bandit -r src/ -ll -ii --format json --output bandit-report.json || true
          bandit -r src/ -ll -ii --format screen
          if [ -s bandit-report.json ]; then
            echo "Bandit issues found - checking severity"
            python3 << 'PYEOF'
          import json
          import sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = [r for r in data.get('results', []) if r['issue_severity'] in ['MEDIUM', 'HIGH']]
          if issues:
              print(f"Found {len(issues)} medium/high severity issues")
              for i in issues[:5]:
                  print(f"  - {i['issue_text']} at {i['filename']}:{i['line_number']}")
              sys.exit(1)
          else:
              print("No medium/high severity issues found")
          PYEOF
          fi

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: bandit-report-${{ matrix.layer }}
          path: services/${{ matrix.layer }}/bandit-report.json
          retention-days: 14

  # Python dependency vulnerability scan with pip-audit
  pip-audit-scan:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks]

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: services/${{ matrix.layer }}
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit --vulnerability-service pypi --severity high
        continue-on-error: false

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: pip-audit-report-${{ matrix.layer }}
          path: services/${{ matrix.layer }}/pip-audit-report.json
          retention-days: 14

  # Frontend security audit
  frontend-security-audit:
    name: Frontend Security Audit (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@e0a5a4ff5d1fb2a0f0f1d713d8b623f2c2b5d5b1 # v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level high --json > pnpm-audit-report.json || true

      - name: Check for critical vulnerabilities
        run: |
          if [ -s pnpm-audit-report.json ]; then
            node << 'NODEEOF'
          const fs = require('fs');
          try {
            const data = JSON.parse(fs.readFileSync('pnpm-audit-report.json', 'utf8'));
            const advisories = data.advisories || {};
            const critical = Object.values(advisories).filter(a => a.severity === 'critical');
            const high = Object.values(advisories).filter(a => a.severity === 'high');
            console.log('Critical vulnerabilities:', critical.length);
            console.log('High vulnerabilities:', high.length);
            if (critical.length > 0) {
              console.log('CRITICAL vulnerabilities found. Failing.');
              process.exit(1);
            }
            if (high.length > 10) {
              console.log('More than 10 HIGH vulnerabilities found. Failing.');
              process.exit(1);
            }
            console.log('Audit passed.');
          } catch (e) {
            console.log('No vulnerabilities found or parse error');
          }
          NODEEOF
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: frontend-security-audit
          path: apps/web/pnpm-audit-report.json
          retention-days: 14

  # Dockerfile non-root user check
  dockerfile-non-root-check:
    name: Dockerfile Non-Root User Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Check Dockerfiles for USER directive
        run: |
          # Files that must have USER directive (runtime stages)
          REQUIRED_FILES="
            apps/web/Dockerfile
            services/layer1-ingestion/Dockerfile
            services/layer2-extraction/Dockerfile
            services/layer3-knowledge/Dockerfile
            services/layer4-agents/Dockerfile
            services/layer5-ground-truth/Dockerfile
            services/layer6-benchmarks/Dockerfile
          "

          FAILED=0
          for file in $REQUIRED_FILES; do
            if [ -f "$file" ]; then
              # Check if file contains USER directive (excluding builder stages)
              # We look for USER followed by non-root/non-0 user
              if ! grep -qE "^USER\s+(appuser|node|[^0])" "$file"; then
                echo "❌ FAIL: $file - missing non-root USER directive"
                FAILED=1
              else
                echo "✅ PASS: $file - has non-root USER directive"
              fi
            else
              echo "⚠️  SKIP: $file - file not found"
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Dockerfiles must include 'USER <non-root>' directive before runtime"
            exit 1
          fi

      - name: Test image runs as non-root
        run: |
          # Build test images and verify user
          docker build -t test-frontend apps/web/
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            --build-arg BUILDER_BASE_IMAGE="${BUILDER_BASE_IMAGE:-}" \
            -t test-layer3 services/layer3-knowledge/
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            -t test-layer4 services/layer4-agents/
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            -t test-layer6 services/layer6-benchmarks/

          # Check running user (should not be root/0)
          for image in test-frontend test-layer3 test-layer4 test-layer6; do
            USER_ID=$(docker run --rm --entrypoint id $image -u 2>/dev/null || echo "unknown")
            if [ "$USER_ID" = "0" ] || echo "$USER_ID" | grep -q "uid=0"; then
              echo "❌ FAIL: $image runs as root (uid=0)"
              exit 1
            else
              echo "✅ PASS: $image runs as non-root: $USER_ID"
            fi
          done

  # Dependency review for PRs
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@8c745b8aadf2f5f7f1c3e15ee5f2f4c3d8b74fcb # v4
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development
          comment-summary-in-pr: true

  # Consolidated security evidence for releases and audits
  security-evidence-artifact:
    name: Security Evidence Bundle
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    needs:
      - dast-api-scan
      - sbom-policy
      - trivy-image-scan
      - gitleaks-scan
      - mandatory-security-regression

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          path: security-evidence

      - name: Build evidence manifest
        run: |
          {
            echo "# Security Gates Evidence"
            echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "## Included artifacts"
            find security-evidence -maxdepth 2 -type f | sort
          } > security-evidence/SECURITY_EVIDENCE_MANIFEST.md

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: release-security-evidence-${{ github.sha }}
          path: security-evidence/
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

  # This status check should be configured as REQUIRED in branch protection
  # to block merges unless DAST and SBOM policy checks pass.
  security-gates-required:
    name: Security Gates Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - dast-api-scan
      - sbom-policy
      - mandatory-security-regression
      - route-auth-gate

    steps:
      - name: Confirm required security gates passed
        run: |
          echo "DAST, SBOM policy, route-auth, and mandatory security regression checks succeeded."
  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, apps-web]

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Build Docker image for SBOM
        run: |
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            --build-arg BUILDER_BASE_IMAGE="${BUILDER_BASE_IMAGE:-}" \
            -t ${{ matrix.layer }}:sbom-target \
            ${{ matrix.layer == 'apps-web' && 'apps/web' || format('services/{0}', matrix.layer) }}

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@db10516546c5b9d4f8f5bd2d96ff475c2c7781d1 # v0
        with:
          image: ${{ matrix.layer }}:sbom-target
          format: cyclonedx-json
          output-file: sbom-${{ matrix.layer }}.cdx.json

      - name: Validate SBOM output exists
        run: |
          test -s sbom-${{ matrix.layer }}.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: sbom-${{ matrix.layer }}
          path: sbom-${{ matrix.layer }}.cdx.json
          if-no-files-found: error
          retention-days: 30
  route-auth-gate:
    name: Route Auth Dependency Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Install gate dependencies
        run: python -m pip install pyyaml

      - name: Enforce route auth dependency policy
        run: python scripts/ci/check_route_auth_dependencies.py

  mandatory-security-regression:
    name: mandatory-security-regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@e0a5a4ff5d1fb2a0f0f1d713d8b623f2c2b5d5b1 # v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Python security test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r tests/requirements-test.txt
          python -m pip install -e services/api
          python -m pip install -e services/layer1-ingestion
          python -m pip install -e services/layer2-extraction
          python -m pip install -e services/layer3-knowledge
          python -m pip install -e services/layer4-agents
          python -m pip install -e services/layer5-ground-truth
          python -m pip install -e services/layer6-benchmarks

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mandatory security regression gate
        env:
          MANDATORY_SECURITY_ARTIFACT_DIR: artifacts/mandatory_security
          FABRIC_AUDIT_DIR: .fabric/audit
        run: bash scripts/ci/mandatory_security_regression_gate.sh

      - name: Upload mandatory security evidence
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: mandatory-security-regression-${{ github.sha }}
          path: |
            artifacts/mandatory_security/
            .fabric/audit/security_regression_gate/
          if-no-files-found: error
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

