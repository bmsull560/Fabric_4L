name: Refresh Testing KPI Snapshot

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  refresh-testing-kpis:
    name: Refresh docs/reference/testing-strategy.md KPI block
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh KPI section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci/refresh_testing_kpis.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/refresh-testing-kpis
          commit-message: 'docs: refresh testing KPI snapshot'
          title: 'docs: refresh testing KPI snapshot'
          body: |
            Automated weekly refresh for testing KPI values in `docs/reference/testing-strategy.md`.
          delete-branch: true
