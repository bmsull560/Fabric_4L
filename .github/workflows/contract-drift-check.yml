# Contract Drift Detection
# Validates that implementation matches OpenAPI specifications

name: Contract Drift Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/openapi/**'
      - 'value-fabric/**/src/api/**'
      - 'value-fabric/**/api/**'
      - 'tests/contracts/**'
      - '.github/workflows/contract-drift-check.yml'
  schedule:
    # Run daily at 02:00 UTC to catch drift
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: contract-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Generate OpenAPI from Code
  # ==========================================================================
  generate-openapi:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer3-knowledge, layer5-ground-truth]
        include:
          - layer: layer3-knowledge
            port: 8003
            module: layer3_knowledge.api.main:app
          - layer: layer5-ground-truth
            port: 8005
            module: layer5_ground_truth.api.main:app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic
          # Install layer-specific dependencies
          if [ "${{ matrix.layer }}" = "layer3-knowledge" ]; then
            pip install neo4j python-dotenv httpx psutil
          elif [ "${{ matrix.layer }}" = "layer5-ground-truth" ]; then
            pip install sqlalchemy asyncpg
          fi

      - name: Generate OpenAPI spec from code
        working-directory: ./value-fabric/${{ matrix.layer }}
        run: |
          # Generate OpenAPI JSON from FastAPI app
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from ${{ matrix.module }} import app
          import json
          
          openapi = app.openapi()
          with open('generated-openapi.json', 'w') as f:
              json.dump(openapi, f, indent=2)
          print(f'Generated OpenAPI for ${{ matrix.layer }}')
          print(f'Paths: {len(openapi.get(\"paths\", {}))}')
          " || echo "Failed to generate OpenAPI - will compare manually"

      - name: Upload generated spec
        uses: actions/upload-artifact@v4
        with:
          name: generated-openapi-${{ matrix.layer }}
          path: value-fabric/${{ matrix.layer }}/generated-openapi.json
          retention-days: 7

  # ==========================================================================
  # Compare Specs and Detect Drift
  # ==========================================================================
  detect-drift:
    needs: generate-openapi
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer3-knowledge, layer5-ground-truth]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated spec
        uses: actions/download-artifact@v4
        with:
          name: generated-openapi-${{ matrix.layer }}
          path: generated/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compare OpenAPI specs
        id: compare
        run: |
          pip install jsondiff
          
          python scripts/compare_openapi.py \
            contracts/openapi/${{ matrix.layer }}.json \
            generated/generated-openapi.json \
            --output drift-report-${{ matrix.layer }}.md \
            --exit-code || EXIT_CODE=$?
          
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      - name: Comment PR with drift report
        if: github.event_name == 'pull_request' && steps.compare.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report-${{ matrix.layer }}.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 API Contract Drift Detected: ${{ matrix.layer }}\n\n${report}`
            });

      - name: Fail on drift
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "::error::API contract drift detected in ${{ matrix.layer }}"
          cat drift-report-${{ matrix.layer }}.md
          exit 1

  # ==========================================================================
  # Run Contract Tests
  # ==========================================================================
  contract-tests:
    runs-on: ubuntu-latest
    needs: generate-openapi
    strategy:
      matrix:
        layer: [layer3, layer5]
        include:
          - layer: layer3
            test_path: tests/contracts/test_layer3_contract.py
            port: 8003
          - layer: layer5
            test_path: tests/contracts/test_layer5_contract.py
            port: 8005
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx

      - name: Run contract tests
        run: |
          pytest ${{ matrix.test_path }} -v --tb=short || true
        # Continue on failure to report all issues

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results-${{ matrix.layer }}
          path: |
            .pytest_cache/
            test-results.xml

  # ==========================================================================
  # Summary Report
  # ==========================================================================
  summary:
    needs: [detect-drift, contract-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Contract Drift Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| Layer | Drift Check | Contract Tests |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|----------------|" >> $GITHUB_STEP_SUMMARY
          
          # Layer 3
          DRIFT_L3="${{ needs.detect-drift.result }}"
          TEST_L3="${{ needs.contract-tests.result }}"
          echo "| Layer 3 Knowledge | $DRIFT_L3 | $TEST_L3 |" >> $GITHUB_STEP_SUMMARY
          
          # Layer 5
          DRIFT_L5="${{ needs.detect-drift.result }}"
          TEST_L5="${{ needs.contract-tests.result }}"
          echo "| Layer 5 Ground Truth | $DRIFT_L5 | $TEST_L5 |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$DRIFT_L3" == "failure" || "$DRIFT_L5" == "failure" ]]; then
            echo "⚠️ **Drift detected!** Review the PR comments for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No drift detected** - All specs aligned with implementation." >> $GITHUB_STEP_SUMMARY
          fi
