name: Frontend Route Audit Check

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'apps/web/src/App.tsx'
      - 'apps/web/src/App/Router.test.tsx'
      - 'apps/web/audit-output/route-map.md'
      - 'apps/web/audit-output/track-a-route-extraction.json'
      - 'scripts/extract-routes-audit.py'
      - 'scripts/check-route-audit-freshness.py'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/App.tsx'
      - 'apps/web/src/App/Router.test.tsx'
      - 'apps/web/audit-output/route-map.md'
      - 'apps/web/audit-output/track-a-route-extraction.json'
      - 'scripts/extract-routes-audit.py'
      - 'scripts/check-route-audit-freshness.py'

jobs:
  route-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify frontend route audit freshness
        run: python3 scripts/check-route-audit-freshness.py

