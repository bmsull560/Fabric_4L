name: Package Manager Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  enforce-package-manager-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce root package manager policy
        run: node scripts/ci/enforce-package-manager.cjs
