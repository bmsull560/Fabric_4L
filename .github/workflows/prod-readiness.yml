name: Prod Readiness Gates

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, "release/**" ]
  workflow_dispatch:

env:
  POLICY_FILE: .fabric/prod-gates.policy.yaml
  ARTIFACT_DIR: artifacts

jobs:
  determine-profile:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.profile }}
    steps:
      - id: profile
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "profile=mainline-full" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            echo "profile=release-candidate" >> $GITHUB_OUTPUT
          else
            echo "profile=pr-fast" >> $GITHUB_OUTPUT
          fi

  setup:
    runs-on: ubuntu-latest
    needs: [determine-profile]
    steps:
      - uses: actions/checkout@v4
      - name: Create artifact directories
        run: |
          mkdir -p ${ARTIFACT_DIR}/{arch,security,chaos,smoke,agent,state,obs,readiness,release}
      - name: Validate policy schema
        run: make gates-validate-policy POLICY_FILE=${POLICY_FILE}
      - name: Validate policy enforcement matrix coverage
        run: python scripts/ci/validate_policy_enforcement_matrix.py
      - uses: actions/upload-artifact@v4
        with:
          name: setup-artifacts
          path: artifacts/

  arch-conformance:
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run architecture conformance gate
        run: make gate-arch PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - uses: actions/upload-artifact@v4
        with:
          name: arch-artifacts
          path: artifacts/arch/

  security-isolation:
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run security & isolation gate
        run: make gate-security PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - name: Enforce tenant boundary release tests
        if: needs.determine-profile.outputs.profile == 'release-candidate'
        run: |
          python -m pip install --upgrade pip pytest
          TARGET_FILES=(
            tests/security/test_cross_tenant_api.py
            tests/security/test_tenant_boundary_fails_closed.py
            tests/security/test_tenant_mismatch.py
            tests/security/test_privileged_audit.py
            tests/security/test_layer3_ingest_tenant_hint_hostile.py
          )

          expected=$(python -m pytest --collect-only -q "${TARGET_FILES[@]}" | rg -c "::")
          selected=$(python -m pytest --collect-only -q -m tenant_boundary "${TARGET_FILES[@]}" | rg -c "::")

          if [[ "$selected" -ne "$expected" ]]; then
            echo "ERROR: tenant_boundary marker coverage mismatch (selected=$selected expected=$expected)"
            exit 1
          fi

          python -m pytest -v -m tenant_boundary "${TARGET_FILES[@]}" --maxfail=1
      - uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: artifacts/security/

  dependency-chaos:
    if: needs.determine-profile.outputs.profile != 'pr-fast'
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run dependency chaos gate
        run: make gate-chaos PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - uses: actions/upload-artifact@v4
        with:
          name: chaos-artifacts
          path: artifacts/chaos/

  cross-domain-smoke:
    if: needs.determine-profile.outputs.profile != 'pr-fast'
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run cross-domain smoke gate
        run: make gate-smoke PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: artifacts/smoke/

  agent-provenance:
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run agent provenance gate
        run: make gate-agent PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - uses: actions/upload-artifact@v4
        with:
          name: agent-artifacts
          path: artifacts/agent/

  state-consistency:
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run state consistency gate
        run: make gate-state PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - uses: actions/upload-artifact@v4
        with:
          name: state-artifacts
          path: artifacts/state/

  observability-readiness:
    if: needs.determine-profile.outputs.profile != 'pr-fast'
    runs-on: ubuntu-latest
    needs: [determine-profile, setup]
    steps:
      - uses: actions/checkout@v4
      - name: Run observability readiness gate
        run: make gate-obs PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - uses: actions/upload-artifact@v4
        with:
          name: obs-artifacts
          path: artifacts/obs/

  release-policy:
    runs-on: ubuntu-latest
    needs:
      - determine-profile
      - arch-conformance
      - security-isolation
      - agent-provenance
      - state-consistency
      - dependency-chaos
      - cross-domain-smoke
      - observability-readiness
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Build launch-readiness evidence bundle
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_STAMP="$(date -u +%Y%m%d)"
          SECURITY_DIR="${ARTIFACT_DIR}/security"
          READINESS_DIR="${ARTIFACT_DIR}/readiness"
          mkdir -p "${SECURITY_DIR}" "${READINESS_DIR}"

          resolve_required_artifact() {
            local pattern="$1"
            local label="$2"
            local resolved
            resolved="$(find . -type f -path "${pattern}" | head -n 1 || true)"
            if [[ -z "${resolved}" ]]; then
              echo "Missing required artifact for ${label}: ${pattern}" >&2
              exit 1
            fi
            printf '%s\n' "${resolved}"
          }

          tenant_isolation_file="$(resolve_required_artifact "*/artifacts/security/tenant-isolation-results.json" "tenant isolation test results")"
          auth_coverage_file="$(resolve_required_artifact "*/artifacts/security/auth-endpoint-coverage.json" "auth endpoint coverage report")"
          migration_rollback_file="$(resolve_required_artifact "*/artifacts/state/migration-rollback-test-output.txt" "migration rollback test output")"
          red_snapshot_file="$(resolve_required_artifact "*/artifacts/obs/red-dashboard-snapshot-metadata.json" "RED dashboard snapshot metadata")"

          cp "${tenant_isolation_file}" "${SECURITY_DIR}/tenant-isolation-results-${BUNDLE_STAMP}.json"
          cp "${tenant_isolation_file}" "${SECURITY_DIR}/tenant-isolation-results.json"
          cp "${auth_coverage_file}" "${SECURITY_DIR}/auth-endpoint-coverage-${BUNDLE_STAMP}.json"
          cp "${auth_coverage_file}" "${SECURITY_DIR}/auth-endpoint-coverage.json"

          cp "${migration_rollback_file}" "${READINESS_DIR}/migration-rollback-test-output-${BUNDLE_STAMP}.txt"
          cp "${migration_rollback_file}" "${READINESS_DIR}/migration-rollback-test-output.txt"
          cp "${red_snapshot_file}" "${READINESS_DIR}/red-dashboard-snapshot-metadata-${BUNDLE_STAMP}.json"
          cp "${red_snapshot_file}" "${READINESS_DIR}/red-dashboard-snapshot-metadata.json"
      - name: Evaluate release policy
        run: make gate-release-policy PROFILE=${{ needs.determine-profile.outputs.profile }} POLICY_FILE=${POLICY_FILE}
      - name: Sign release manifest
        if: success() && needs.determine-profile.outputs.profile != 'pr-fast'
        run: make gates-sign-manifest
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            artifacts/release/
            artifacts/security/
            artifacts/readiness/

  prod-readiness-summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [release-policy]
    steps:
      - uses: actions/download-artifact@v4
      - name: Build PR summary
        run: make gates-render-summary
      - name: Publish summary
        run: cat artifacts/release/summary.md >> $GITHUB_STEP_SUMMARY
