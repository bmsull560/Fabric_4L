name: Security Gates (Merged)

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    branches: [main, staging, production]
  push:
    branches: [main, staging, production]

jobs:
  # ============================================================================
  # Security Linting
  # ============================================================================
  bandit-scan:
    name: Bandit Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit[toml]
      - name: Run Bandit
        run: |
          bandit -r services/layer1-ingestion/src \
                 services/layer2-extraction/src \
                 services/layer3-knowledge/src \
                 services/layer4-agents/src \
                 services/layer5-ground-truth/src \
                 services/layer6-benchmarks/src \
                 shared/ \
                 -f json -o bandit-report.json || true
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
      - name: Check for High/Severity Issues
        run: |
          if [ -f bandit-report.json ]; then
            high_count=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-report.json)
            if [ "$high_count" -gt 0 ]; then
              echo "::error::Bandit found $high_count HIGH severity issues"
              exit 1
            fi
          fi

  # ============================================================================
  # Secret Scanning
  # ============================================================================
  trivy-secret-scan:
    name: Trivy Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Trivy Secret Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-secrets.sarif'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        with:
          sarif_file: 'trivy-secrets.sarif'

  # ============================================================================
  # IaC Scanning (K8s)
  # ============================================================================
  k8s-scan:
    name: K8s IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run KubeScore
        run: |
          docker run --rm -v $(pwd)/k8s:/dir gcr.io/distroless/kubescore:v1.18.0 score --ignore-test pod-image-pull-policy /dir/base/*.yaml || true
      - name: Run KubeLinter
        run: |
          docker run --rm -v $(pwd)/k8s:/dir ghcr.io/stackrox/kube-linter:latest lint /dir/base/*.yaml || true

  # ============================================================================
  # Container Scanning
  # ============================================================================
  trivy-container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents]
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: |
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE:-}" \
            --build-arg BUILDER_BASE_IMAGE="${BUILDER_BASE_IMAGE:-}" \
            -f services/${{ matrix.layer }}/Dockerfile \
            -t test-${{ matrix.layer }}:latest \
            services/${{ matrix.layer }}/
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: test-${{ matrix.layer }}:latest
          format: 'sarif'
          output: 'trivy-${{ matrix.layer }}.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        with:
          sarif_file: 'trivy-${{ matrix.layer }}.sarif'

  # ============================================================================
  # Dependency Scanning (SCA)
  # ============================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents]
    steps:
      - uses: actions/checkout@v4
      - name: Run Grype
        run: |
          docker run --rm -v $(pwd):/project anchore/grype:latest dir:/project/services/${{ matrix.layer }} --output json > grype-${{ matrix.layer }}.json || true
      - name: Upload Grype Report
        uses: actions/upload-artifact@v7
        with:
          name: grype-${{ matrix.layer }}
          path: grype-${{ matrix.layer }}.json

  # ============================================================================
  # SBOM Generation
  # ============================================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        run: |
          docker run --rm -v $(pwd):/project anchore/syft:latest dir:/project/services/${{ matrix.layer }} -o spdx-json > sbom-${{ matrix.layer }}.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.layer }}
          path: sbom-${{ matrix.layer }}.json

  # ============================================================================
  # Security Regression Tests
  # ============================================================================
  security-tests:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install -e services/layer1-ingestion
      - name: Run Security Tests
        run: |
          pytest tests/security/test_security_fixes.py -v --tb=short

  # ============================================================================
  # Gate: Block Merge if Any Security Check Fails
  # ============================================================================
  security-gate:
    name: Security Gate (Block Merge on Failure)
    runs-on: ubuntu-latest
    needs: [bandit-scan, trivy-secret-scan, k8s-scan, trivy-container-scan, dependency-scan, security-tests]
    if: always()
    steps:
      - name: Check All Jobs Passed
        run: |
          if [ "${{ needs.bandit-scan.result }}" != "success" ] || \
             [ "${{ needs.trivy-secret-scan.result }}" != "success" ] || \
             [ "${{ needs.k8s-scan.result }}" != "success" ] || \
             [ "${{ needs.trivy-container-scan.result }}" != "success" ] || \
             [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "::error::Security gate failed - one or more security checks did not pass"
            exit 1
          fi
          echo "All security gates passed"
