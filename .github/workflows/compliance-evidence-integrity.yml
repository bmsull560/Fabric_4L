name: Compliance Evidence Integrity

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "docs/reference/compliance.md"
      - "scripts/ci/check_compliance_evidence_integrity.py"
      - ".github/workflows/compliance-evidence-integrity.yml"
      - ".github/workflows/audit-evidence.yml"
      - "docs/operations/**"
      - "shared/**"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  evidence-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate compliance evidence references
        run: python scripts/ci/check_compliance_evidence_integrity.py
