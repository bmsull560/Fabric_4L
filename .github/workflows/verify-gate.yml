name: Verify Gate

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  make-verify:
    name: make verify
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Python test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Install local service packages
        run: |
          pip install -e services/api
          pip install -e services/layer1-ingestion
          pip install -e services/layer2-extraction
          pip install -e services/layer3-knowledge
          pip install -e services/layer4-agents
          pip install -e services/layer5-ground-truth
          pip install -e services/layer6-benchmarks

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Compatibility launch-freeze policy
        run: python scripts/ci/check_compatibility_launch_freeze.py --strict

      - name: Shim divergence suite
        run: python -m pytest tests/ci/test_shim_divergence.py

      - name: Run make verify
        run: make verify
