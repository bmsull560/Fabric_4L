name: Regenerate Python SDK

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'contracts/openapi/*.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regenerate-sdk:
    name: Regenerate SDK from OpenAPI
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install datamodel-code-generator httpx pydantic

      - name: Regenerate SDK
        working-directory: sdk/python
        run: |
          python scripts/generate_from_openapi.py

      - name: Run SDK tests
        working-directory: sdk/python
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short || echo "Some tests may fail due to backend unavailability"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet sdk/python/src/valuefabric/generated/; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sdk/python/src/valuefabric/generated/
          git commit -m "chore(sdk): regenerate from OpenAPI specs [skip ci]"
          git push

      - name: Create PR if direct push fails
        if: steps.check_changes.outputs.changed == 'true' && failure()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sdk): regenerate from OpenAPI specs"
          title: "chore(sdk): auto-regenerate from OpenAPI specs"
          body: |
            This PR contains auto-generated SDK changes from OpenAPI spec updates.

            - Generated using: `datamodel-code-generator`
            - Source specs: `contracts/openapi/layer4-agents.json`, `layer3-knowledge.json`
          branch: chore/regenerate-sdk
          delete-branch: true
          add-paths: |
            sdk/python/src/valuefabric/generated/
