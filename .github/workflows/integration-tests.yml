name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Run nightly at 2 AM UTC

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Service configuration
  EXPECTED_SERVICES: 6
  HEALTH_CHECK_MAX_RETRIES: 30
  HEALTH_CHECK_INTERVAL_SECONDS: 10

jobs:
  # Extended validation tier — runs nightly, not required for PR merge
  # This workflow requires secrets and Docker orchestration
  extended-integration:
    name: Extended Stack Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip on forks - requires repository secrets
    if: github.event_name != 'pull_request' || github.repository_owner == 'bmsull560'

    defaults:
      run:
        working-directory: value-fabric

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start core services
        env:
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker compose up -d neo4j redis postgres layer2-extraction layer3-knowledge layer4-agents

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 $HEALTH_CHECK_MAX_RETRIES); do
            sleep $HEALTH_CHECK_INTERVAL_SECONDS
            healthy=$(docker compose ps --format json 2>/dev/null | grep -c '"Health":"healthy"' || echo "0")
            echo "Check $i/$HEALTH_CHECK_MAX_RETRIES: $healthy services healthy"
            if [ "$healthy" -ge "$EXPECTED_SERVICES" ]; then
              echo "✅ All $EXPECTED_SERVICES services healthy!"
              exit 0
            fi
          done
          echo "❌ Services failed to become healthy within timeout"
          docker compose ps
          exit 1
        timeout-minutes: 6

      - name: Run smoke tests
        run: |
          pip install httpx
          python ../scripts/smoke/production_smoke.py \
            --l2-url http://localhost:8002 \
            --l3-url http://localhost:8003 \
            --l4-url http://localhost:8004 \
            --output-dir ../artifacts

      - name: Run L2 extraction pipeline tests
        working-directory: services/layer2-extraction
        run: |
          pip install -e ".[dev]" pytest httpx pytest-asyncio
          pytest tests/test_extract_and_ingest_pipeline.py -v --tb=short

      - name: Run L3 E2E pipeline tests
        working-directory: services/layer3-knowledge
        run: |
          pip install -e ".[dev]" pytest httpx pytest-asyncio
          pytest tests/test_e2e_pipeline.py -v --tb=short

      - name: Run integration tests
        working-directory: ${{ github.workspace }}
        run: |
          if [ -d "tests/integration" ] && [ "$(ls -A tests/integration/*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            pip install pytest httpx pytest-cov
            pytest tests/integration -v --cov=. --cov-report=xml
          else
            echo "No integration tests found - marking as skipped"
            echo "::warning::Integration tests not configured - add tests/integration/"
          fi
        timeout-minutes: 15

      - name: Capture logs on failure
        if: failure()
        run: |
          mkdir -p ../artifacts/logs
          docker compose logs > ../artifacts/logs/docker-compose.log

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: ${{ github.workspace }}/artifacts/smoke-report-*.json
          retention-days: 14

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-logs-${{ github.run_id }}
          path: ${{ github.workspace }}/artifacts/logs/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

  frontend-e2e-backend-integrated:
    name: Frontend E2E Backend-Integrated
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Skip on forks - requires repository secrets
    if: github.event_name != 'pull_request' || github.repository_owner == 'bmsull560'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Install frontend dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/web
        run: pnpm run build

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start E2E backend stack
        run: |
          docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run backend-integrated E2E tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BACKEND_URL: http://localhost:8004
          CI: true
        run: pnpm run test:e2e:backend

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-integrated-results-${{ github.run_id }}
          path: |
            apps/web/e2e-results/
            apps/web/e2e-results/junit.xml
          retention-days: 14

      - name: Tear down E2E backend
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
