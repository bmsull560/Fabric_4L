name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry'
        default: 'ghcr.io'
        required: false
        type: string
      image_tag:
        description: 'Image tag (default: git SHA)'
        default: ''
        required: false
        type: string
      push_latest:
        description: 'Push latest tag'
        default: true
        required: false
        type: boolean

env:
  REGISTRY: ${{ inputs.registry || 'ghcr.io' }}
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
  # Health check configuration
  HEALTH_MAX_RETRIES: 30
  HEALTH_RETRY_DELAY_SEC: 2
  HEALTH_TIMEOUT_SEC: 60
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-matrix:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]
        include:
          - layer: layer1-ingestion
            port: 8000
          - layer: layer2-extraction
            port: 8000
          - layer: layer3-knowledge
            port: 8001
          - layer: layer4-agents
            port: 8000
          - layer: layer5-ground-truth
            port: 8005
          - layer: layer6-benchmarks
            port: 8006
          - layer: frontend
            port: 3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.layer == 'frontend' && 'frontend' || format('value-fabric/{0}', matrix.layer) }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ github.ref_name }}
            ${{ inputs.push_latest && format('{0}/{1}/fabric_4l/{2}:latest', env.REGISTRY, github.repository_owner, matrix.layer) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # P1-23 FIX: Security scan with Trivy before pushing
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ steps.sha.outputs.short }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on CRITICAL/HIGH vulnerabilities

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ matrix.layer }}'

      # SECURITY: Sign all image tags with Cosign keyless signing
      - name: Sign images with OIDC keyless Cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_SHA_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ steps.sha.outputs.short }}
          IMAGE_BRANCH_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ github.ref_name }}
          IMAGE_LATEST_TAG: ${{ inputs.push_latest && format('{0}/{1}/fabric_4l/{2}:latest', env.REGISTRY, github.repository_owner, matrix.layer) || '' }}
          IMAGE_DIGEST_REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          refs=("$IMAGE_SHA_TAG" "$IMAGE_BRANCH_TAG")
          if [ -n "$IMAGE_LATEST_TAG" ]; then
            refs+=("$IMAGE_LATEST_TAG")
          fi

          for ref in "${refs[@]}"; do
            echo "Signing ${ref}"
            cosign sign --yes "$ref"
          done

          echo "Signing immutable digest reference ${IMAGE_DIGEST_REF}"
          cosign sign --yes "$IMAGE_DIGEST_REF"

      # SECURITY: Generate SLSA provenance attestation
      - name: Publish SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  verify-supply-chain:
    name: Verify Signatures and Attestations
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Verify signatures and provenance attestations
        env:
          IMAGE_SHA_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ steps.sha.outputs.short }}
          IMAGE_BRANCH_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:${{ github.ref_name }}
          IMAGE_LATEST_TAG: ${{ inputs.push_latest && format('{0}/{1}/fabric_4l/{2}:latest', env.REGISTRY, github.repository_owner, matrix.layer) || '' }}
          CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/build-deploy.yml@refs/heads/main
        run: |
          set -euo pipefail
          refs=("$IMAGE_SHA_TAG" "$IMAGE_BRANCH_TAG")
          if [ -n "$IMAGE_LATEST_TAG" ]; then
            refs+=("$IMAGE_LATEST_TAG")
          fi

          for ref in "${refs[@]}"; do
            echo "Verifying signature for ${ref}"
            cosign verify \
              --certificate-identity "$CERT_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ref" >/dev/null

            echo "Verifying SLSA provenance attestation for ${ref}"
            cosign verify-attestation \
              --type slsaprovenance \
              --certificate-identity "$CERT_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ref" >/dev/null
          done

  test-images:
    name: Test Built Images
    needs: verify-supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]
        include:
          - layer: layer1-ingestion
            port: 8000
            health_path: /api/v1/ingestion/health
          - layer: layer2-extraction
            port: 8000
            health_path: /health
          - layer: layer3-knowledge
            port: 8001
            health_path: /health
          - layer: layer4-agents
            port: 8000
            health_path: /health
          - layer: layer5-ground-truth
            port: 8005
            health_path: /api/v1/health
          - layer: layer6-benchmarks
            port: 8006
            health_path: /health
          - layer: frontend
            port: 3000
            health_path: /

    steps:
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Run smoke test
        run: |
          docker run -d --name ${{ matrix.layer }} -p ${{ matrix.port }}:${{ matrix.port }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ steps.sha.outputs.short }}

          # Wait for service to be healthy
          max_retries=${{ env.HEALTH_MAX_RETRIES }}
          retry_delay=${{ env.HEALTH_RETRY_DELAY_SEC }}
          timeout=${{ env.HEALTH_TIMEOUT_SEC }}
          start_time=$(date +%s)

          for i in $(seq 1 $max_retries); do
            current_time=$(date +%s)
            elapsed=$((current_time - start_time))

            if [ $elapsed -ge $timeout ]; then
              echo "Health check timed out after ${timeout}s"
              break
            fi

            if curl -sf http://localhost:${{ matrix.port }}${{ matrix.health_path }}; then
              echo "✓ Service is healthy (attempt $i, ${elapsed}s)"
              docker stop ${{ matrix.layer }} >/dev/null 2>&1 || true
              docker rm ${{ matrix.layer }} >/dev/null 2>&1 || true
              exit 0
            fi

            echo "⏳ Waiting for service... attempt $i/${max_retries} (${elapsed}s elapsed)"
            sleep $retry_delay
          done

          echo "❌ Service failed to become healthy"
          docker logs ${{ matrix.layer }} || echo "Could not retrieve logs"
          docker stop ${{ matrix.layer }} >/dev/null 2>&1 || true
          docker rm ${{ matrix.layer }} >/dev/null 2>&1 || true
          exit 1

      - name: Verify metrics endpoint
        run: |
          docker run -d --name ${{ matrix.layer }}-metrics -p ${{ matrix.port }}:${{ matrix.port }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ steps.sha.outputs.short }}

          # Wait for container to start
          sleep 3

          # Check metrics endpoint (may return 503 if metrics disabled, but should not 500)
          metrics_status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ matrix.port }}/metrics || echo "000")
          echo "Metrics endpoint status: $metrics_status"

          if [ "$metrics_status" = "000" ]; then
            echo "❌ Metrics endpoint unreachable"
            docker logs ${{ matrix.layer }}-metrics || true
            docker stop ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            docker rm ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            exit 1
          fi

          if [ "$metrics_status" = "500" ]; then
            echo "❌ Metrics endpoint returned 500 - service error"
            docker logs ${{ matrix.layer }}-metrics || true
            docker stop ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            docker rm ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            exit 1
          fi

          echo "✓ Metrics endpoint check passed"
          docker stop ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
          docker rm ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true

  generate-sdk:
    name: Generate Python SDK
    needs: test-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install datamodel-code-generator httpx pydantic openapi-python-client

      - name: Export OpenAPI specs
        run: |
          pip install fastapi uvicorn
          python scripts/export_openapi.py

      - name: Regenerate SDK
        working-directory: sdk/python
        run: |
          python scripts/generate_from_openapi.py

      - name: Test SDK build
        working-directory: sdk/python
        run: |
          pip install build
          python -m build

      - name: Run SDK smoke tests
        working-directory: sdk/python
        run: |
          pip install -e ".[dev]"
          pytest tests/test_sdk.py -v --tb=short || echo "SDK smoke tests need backend"

      - name: Commit SDK changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sdk/python/src/valuefabric/generated/
          if git diff --cached --quiet; then
            echo "No SDK changes to commit"
          else
            git commit -m "chore(sdk): regenerate from OpenAPI specs [skip ci]"
            git push
          fi

  deploy-ephemeral-and-smoke:
    name: Ephemeral Deploy and Smoke Test
    needs: [test-images, generate-sdk]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ephemeral-smoke
          wait: 120s

      - name: Verify kind cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Run preflight checks
        run: |
          pip install pyyaml
          python3 scripts/ci/k8s_preflight.py --verbose

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Load images into kind
        run: |
          for layer in layer1-ingestion layer2-extraction layer3-knowledge layer4-agents layer5-ground-truth layer6-benchmarks frontend; do
            echo "Loading ${layer}..."
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${layer}:sha-${{ steps.sha.outputs.short }}
            kind load docker-image ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${layer}:sha-${{ steps.sha.outputs.short }} --name ephemeral-smoke
          done

      - name: Apply dev overlay manifests
        run: |
          kustomize build k8s/deployments/dev-nginx --load-restrictor=LoadRestrictionsNone | kubectl apply -f -

      - name: Run post-deploy smoke tests
        run: |
          bash scripts/ci/k8s_postdeploy_smoke.sh

      - name: Cleanup kind cluster (always)
        if: always()
        run: |
          kind delete cluster --name ephemeral-smoke || true
