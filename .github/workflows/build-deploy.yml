name: Build and Deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry'
        default: 'ghcr.io'
        required: false
        type: string

env:
  REGISTRY: ${{ inputs.registry || 'ghcr.io' }}
  # Health check configuration
  HEALTH_MAX_RETRIES: 30
  HEALTH_RETRY_DELAY_SEC: 2
  HEALTH_TIMEOUT_SEC: 60
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hermeticity-guard:
    name: Hermeticity Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Enforce hermetic build inputs
        run: python scripts/ci/check_hermetic_build_inputs.py

  build-matrix:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: hermeticity-guard
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]
        include:
          - layer: layer1-ingestion
            port: 8000
          - layer: layer2-extraction
            port: 8000
          - layer: layer3-knowledge
            port: 8001
          - layer: layer4-agents
            port: 8000
          - layer: layer5-ground-truth
            port: 8005
          - layer: layer6-benchmarks
            port: 8006
          - layer: frontend
            port: 3000

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db

      - name: Install Cosign
        uses: sigstore/cosign-installer@6d2d7732ec3f8d4155459f03187c2bf0f8f868ad

      - name: Log in to Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release metadata signature
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          git fetch --tags --force
          git verify-tag "${{ github.event.release.tag_name }}"

      - name: Build immutable tag set
        id: tags
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          image_base="${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}"
          sha_tag="${image_base}:sha-${GITHUB_SHA}"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"

          tags="${sha_tag}"
          published_tag="sha-${GITHUB_SHA}"
          if [ -n "${RELEASE_TAG}" ]; then
            if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag '${RELEASE_TAG}' is not semantic version-like"
              exit 1
            fi
            tags="${tags}\n${image_base}:${RELEASE_TAG}"
            echo "release_tag=${image_base}:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            published_tag="${RELEASE_TAG}"
          fi

          echo "published_tag=${published_tag}" >> "$GITHUB_OUTPUT"

          {
            echo "image_tags<<EOF"
            printf '%b\n' "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ${{ matrix.layer == 'frontend' && 'apps/web' || format('services/{0}', matrix.layer) }}
          push: true
          tags: ${{ steps.tags.outputs.image_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}


      - name: Validate registry immutability policy
        env:
          TAGS: ${{ steps.tags.outputs.image_tags }}
        run: |
          set -euo pipefail
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            tag="${ref##*:}"
            if [[ "$tag" == "latest" ]] || [[ "$tag" =~ ^(main|master|develop|dev|staging|production)$ ]] || [[ "$tag" =~ ^(stable|edge|nightly)$ ]]; then
              echo "Mutable tag forbidden: $ref"
              exit 1
            fi
            if [[ "$tag" != sha-* ]] && [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "Non-immutable tag forbidden: $ref"
              exit 1
            fi
          done <<< "$TAGS"

      # P1-23 FIX: Security scan with Trivy before pushing
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@f19e8bd4f8dfdc8c0f8e0815d5cc8de6f3f5f7f1
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on CRITICAL/HIGH vulnerabilities

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@b7197d43fd95e2f4c1c922ef5aaf7a00a1f8d2f4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ matrix.layer }}'

      # SECURITY: Sign all image tags with Cosign keyless signing
      - name: Sign images with OIDC keyless Cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_SHA_TAG: ${{ steps.tags.outputs.sha_tag }}
          IMAGE_RELEASE_TAG: ${{ steps.tags.outputs.release_tag }}
          IMAGE_DIGEST_REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          refs=("$IMAGE_SHA_TAG")
          if [ -n "${IMAGE_RELEASE_TAG:-}" ]; then
            refs+=("$IMAGE_RELEASE_TAG")
          fi

          for ref in "${refs[@]}"; do
            echo "Signing ${ref}"
            cosign sign --yes "$ref"
          done

          echo "Signing immutable digest reference ${IMAGE_DIGEST_REF}"
          cosign sign --yes "$IMAGE_DIGEST_REF"

      # SECURITY: Generate SLSA provenance attestation
      - name: Publish SLSA provenance attestation
        uses: actions/attest-build-provenance@e8994a95d35a7f7b1d3e89df0fa6f9e3c3f4e4eb
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true


      - name: Emit build metadata artifact
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          PUBLISHED_REF: sha-${{ github.sha }}
        run: |
          mkdir -p artifacts/build-metadata
          cat > "artifacts/build-metadata/${{ matrix.layer }}.json" <<JSON
          {
            "layer": "${{ matrix.layer }}",
            "image_digest": "${IMAGE_DIGEST}",
            "published_ref": "${PUBLISHED_REF}",
            "source_commit_sha": "${{ github.sha }}"
          }
          JSON

      - name: Upload build metadata artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: build-metadata-${{ matrix.layer }}
          path: artifacts/build-metadata/${{ matrix.layer }}.json
          if-no-files-found: error

  verify-supply-chain:
    name: Verify Signatures and Attestations
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6d2d7732ec3f8d4155459f03187c2bf0f8f868ad

      - name: Log in to Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signatures and provenance attestations
        env:
          IMAGE_SHA_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ github.sha }}
          IMAGE_RELEASE_TAG: ${{ github.event_name == 'release' && format('{0}/{1}/fabric_4l/{2}:{3}', env.REGISTRY, github.repository_owner, matrix.layer, github.event.release.tag_name) || '' }}
          CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/build-deploy.yml@refs/heads/main
        run: |
          set -euo pipefail
          refs=("$IMAGE_SHA_TAG")
          if [ -n "${IMAGE_RELEASE_TAG:-}" ]; then
            refs+=("$IMAGE_RELEASE_TAG")
          fi

          for ref in "${refs[@]}"; do
            echo "Verifying signature for ${ref}"
            cosign verify \
              --certificate-identity "$CERT_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ref" >/dev/null

            echo "Verifying SLSA provenance attestation for ${ref}"
            cosign verify-attestation \
              --type slsaprovenance \
              --certificate-identity "$CERT_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ref" >/dev/null
          done

  test-images:
    name: Test Built Images
    needs: verify-supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        layer: [layer1-ingestion, layer2-extraction, layer3-knowledge, layer4-agents, layer5-ground-truth, layer6-benchmarks, frontend]
        include:
          - layer: layer1-ingestion
            port: 8000
            health_path: /api/v1/ingestion/health
          - layer: layer2-extraction
            port: 8000
            health_path: /health
          - layer: layer3-knowledge
            port: 8001
            health_path: /health
          - layer: layer4-agents
            port: 8000
            health_path: /health
          - layer: layer5-ground-truth
            port: 8005
            health_path: /api/v1/health
          - layer: layer6-benchmarks
            port: 8006
            health_path: /health
          - layer: frontend
            port: 3000
            health_path: /

    steps:
      - name: Set up Docker
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db

      - name: Log in to Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke test
        run: |
          docker run -d --name ${{ matrix.layer }} -p ${{ matrix.port }}:${{ matrix.port }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ github.sha }}

          # Wait for service to be healthy
          max_retries=${{ env.HEALTH_MAX_RETRIES }}
          retry_delay=${{ env.HEALTH_RETRY_DELAY_SEC }}
          timeout=${{ env.HEALTH_TIMEOUT_SEC }}
          start_time=$(date +%s)

          for i in $(seq 1 $max_retries); do
            current_time=$(date +%s)
            elapsed=$((current_time - start_time))

            if [ $elapsed -ge $timeout ]; then
              echo "Health check timed out after ${timeout}s"
              break
            fi

            if curl -sf http://localhost:${{ matrix.port }}${{ matrix.health_path }}; then
              echo "✓ Service is healthy (attempt $i, ${elapsed}s)"
              docker stop ${{ matrix.layer }} >/dev/null 2>&1 || true
              docker rm ${{ matrix.layer }} >/dev/null 2>&1 || true
              exit 0
            fi

            echo "⏳ Waiting for service... attempt $i/${max_retries} (${elapsed}s elapsed)"
            sleep $retry_delay
          done

          echo "❌ Service failed to become healthy"
          docker logs ${{ matrix.layer }} || echo "Could not retrieve logs"
          docker stop ${{ matrix.layer }} >/dev/null 2>&1 || true
          docker rm ${{ matrix.layer }} >/dev/null 2>&1 || true
          exit 1

      - name: Verify metrics endpoint
        run: |
          docker run -d --name ${{ matrix.layer }}-metrics -p ${{ matrix.port }}:${{ matrix.port }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${{ matrix.layer }}:sha-${{ github.sha }}

          # Wait for container to start
          sleep 3

          # Check metrics endpoint (may return 503 if metrics disabled, but should not 500)
          metrics_status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ matrix.port }}/metrics || echo "000")
          echo "Metrics endpoint status: $metrics_status"

          if [ "$metrics_status" = "000" ]; then
            echo "❌ Metrics endpoint unreachable"
            docker logs ${{ matrix.layer }}-metrics || true
            docker stop ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            docker rm ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            exit 1
          fi

          if [ "$metrics_status" = "500" ]; then
            echo "❌ Metrics endpoint returned 500 - service error"
            docker logs ${{ matrix.layer }}-metrics || true
            docker stop ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            docker rm ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
            exit 1
          fi

          echo "✓ Metrics endpoint check passed"
          docker stop ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true
          docker rm ${{ matrix.layer }}-metrics >/dev/null 2>&1 || true

  generate-sdk:
    name: Generate Python SDK
    needs: test-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install datamodel-code-generator httpx pydantic openapi-python-client

      - name: Export OpenAPI specs
        run: |
          pip install fastapi uvicorn
          python scripts/export_openapi.py

      - name: Regenerate SDK
        working-directory: sdk/python
        run: |
          python scripts/generate_from_openapi.py

      - name: Test SDK build
        working-directory: sdk/python
        run: |
          pip install build
          python -m build

      - name: Run SDK smoke tests
        working-directory: sdk/python
        run: |
          pip install -e ".[dev]"
          pytest tests/test_sdk.py -v --tb=short || echo "SDK smoke tests need backend"

      - name: Commit SDK changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sdk/python/src/valuefabric/generated/
          if git diff --cached --quiet; then
            echo "No SDK changes to commit"
          else
            git commit -m "chore(sdk): regenerate from OpenAPI specs [skip ci]"
            git push
          fi

  deploy-ephemeral-and-smoke:
    name: Ephemeral Deploy and Smoke Test
    needs: [test-images, generate-sdk]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install kubectl
        uses: azure/setup-kubectl@7af7486c9e5f7fdffd86f25d1f43df89c7a7897c
        with:
          version: v1.30.0

      - name: Install kind
        uses: helm/kind-action@5d5a9f679a1b7e1b6b16a3f86dd6843f6d944a9d
        with:
          cluster_name: ephemeral-smoke
          wait: 120s

      - name: Verify kind cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Run preflight checks
        run: |
          pip install pyyaml
          python3 scripts/ci/k8s_preflight.py --verbose

      - name: Load images into kind
        run: |
          for layer in layer1-ingestion layer2-extraction layer3-knowledge layer4-agents layer5-ground-truth layer6-benchmarks frontend; do
            echo "Loading ${layer}..."
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${layer}:sha-${{ github.sha }}
            kind load docker-image ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric_4l/${layer}:sha-${{ github.sha }} --name ephemeral-smoke
          done

      - name: Apply dev overlay manifests
        run: |
          kustomize build k8s/deployments/dev-nginx --load-restrictor=LoadRestrictionsNone | kubectl apply -f -

      - name: Run post-deploy smoke tests
        run: |
          bash scripts/ci/k8s_postdeploy_smoke.sh

      - name: Cleanup kind cluster (always)
        if: always()
        run: |
          kind delete cluster --name ephemeral-smoke || true
