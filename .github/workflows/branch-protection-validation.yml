name: Branch Protection Validation

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Mondays
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: Validate Required Status Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check branch protection rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQUIRED_CHECKS=(
            "mandatory-security-regression"
            "contract-compliance"
            "p0-e2e-gate"
            "prod-readiness"
          )

          BRANCH="main"
          REPO="${{ github.repository }}"

          # Query GitHub API for branch protection
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/branches/$BRANCH/protection")

          # Install jq for JSON parsing if not available
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          MISSING=()
          for check in "${REQUIRED_CHECKS[@]}"; do
            if ! echo "$RESPONSE" | jq -e ".required_status_checks.checks[].name == \"$check\"" &> /dev/null; then
              MISSING+=("$check")
            fi
          done

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::Missing required status checks in branch protection:"
            for check in "${MISSING[@]}"; do
              echo "  - $check"
            done
            exit 1
          fi

          echo "✅ All required status checks are enforced in branch protection"
