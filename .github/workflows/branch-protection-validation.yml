name: Branch Protection Validation

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Mondays
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: Validate Required Status Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check branch protection rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQUIRED_CHECKS=(
            "mandatory-security-regression"
            "contract-compliance"
            "p0-e2e-gate"
            "prod-readiness"
            "Layer 5 - Source Contract"
            "Layer 5 - Tenant Isolation Regression"
            "Layer 5 - Contract Shape Regression"
            "make verify"
          )

          REPO="${{ github.repository }}"
          BRANCHES=("main")

          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          while IFS= read -r release_branch; do
            BRANCHES+=("$release_branch")
          done < <(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/branches?per_page=100" \
            | jq -r '.[].name | select(startswith("release/"))')

          if [ "${#BRANCHES[@]}" -eq 1 ]; then
            echo "::warning::No release/* branches found; validating main only."
          fi

          for BRANCH in "${BRANCHES[@]}"; do
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/branches/$BRANCH/protection")

            MISSING=()
            for check in "${REQUIRED_CHECKS[@]}"; do
              if ! echo "$RESPONSE" | jq -e ".required_status_checks.checks[].name == \"$check\"" &> /dev/null; then
                MISSING+=("$check")
              fi
            done

            if ! echo "$RESPONSE" | jq -e '.required_status_checks.strict == true' > /dev/null; then
              MISSING+=("required_status_checks.strict=true")
            fi

            if ! echo "$RESPONSE" | jq -e '.required_status_checks.contexts | length > 0' > /dev/null; then
              MISSING+=("required_status_checks.contexts non-empty")
            fi

            if [ ${#MISSING[@]} -ne 0 ]; then
              echo "::error::Branch protection gaps on $BRANCH:"
              for check in "${MISSING[@]}"; do
                echo "  - $check"
              done
              exit 1
            fi

            echo "✅ Branch protection checks verified for $BRANCH"
          done
