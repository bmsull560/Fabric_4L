name: K8s Readiness

on:
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/k8s-readiness.yml"
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/k8s-readiness.yml"
  workflow_dispatch:

permissions: read-all

jobs:
  k8s-static-precheck:
    name: K8s Static Precheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz -o kustomize.tar.gz
          echo "366c0e6b8f2571be6d034a5627e18b43f32a074eb89d4f740fdda80fa7d8bf3e  kustomize.tar.gz" | sha256sum -c
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          echo "d9e5f5c19020e0af24e831e97a9d8bdac0e9e6b2841a2218651e9676de3619d7  kubeconform.tar.gz" | sha256sum -c
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Set up Python for preflight checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preflight dependencies
        run: pip install pyyaml

      - name: Run Kubernetes preflight guardrails
        run: python3 scripts/ci/k8s_preflight.py

      - name: Render overlays
        run: |
          kustomize build k8s/overlays/dev > /tmp/dev.yaml
          kustomize build k8s/overlays/production > /tmp/prod.yaml

      - name: Schema validate overlays
        # kubeconform -strict rejects unknown resource types by default.
        # The datreeio CRDs-catalog provides kubeconform-format schemas for
        # CloudNativePG and other operators, so operator CRDs validate correctly.
        # Types absent from both the default schema location and the catalog are
        # skipped rather than failed (kubeconform default behaviour).
        run: |
          SCHEMA_LOCATIONS=(
            "default"
            "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
          )
          kubeconform -summary -strict \
            -schema-location "${SCHEMA_LOCATIONS[0]}" \
            -schema-location "${SCHEMA_LOCATIONS[1]}" \
            /tmp/dev.yaml
          kubeconform -summary -strict \
            -schema-location "${SCHEMA_LOCATIONS[0]}" \
            -schema-location "${SCHEMA_LOCATIONS[1]}" \
            /tmp/prod.yaml

      - name: Client dry-run precheck
        run: |
          kubectl apply --dry-run=client -f /tmp/dev.yaml > /dev/null
          kubectl apply --dry-run=client -f /tmp/prod.yaml > /dev/null

  k8s-server-dry-run:
    name: K8s Server Dry Run (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: k8s-static-precheck

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: task47-validation
          wait: 120s
        continue-on-error: true
        id: kind-install

      - name: Retry kind cluster creation
        if: steps.kind-install.outcome == 'failure'
        run: |
          echo "Kind cluster creation failed, retrying with cleanup..."
          kind delete cluster --name task47-validation || true
          sleep 10
          kind create cluster --name task47-validation --wait 120s
          kubectl cluster-info

      - name: Verify cluster bootstrap
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Install operator CRDs into kind cluster
        # The base manifests use CloudNativePG (postgresql.cnpg.io/v1 Cluster) and
        # Spotahome Redis Operator (databases.spotahome.com/v1 RedisFailover).
        # Server-side dry-run requires these CRDs to be registered in the API server.
        #
        # CNPG: extract only CustomResourceDefinition documents from the release
        # bundle. Installing the full bundle would register admission webhooks that
        # call back to the operator pod — which is not running in this kind cluster —
        # causing dry-run to fail with a webhook connection error.
        #
        # Spotahome: pinned to v1.2.4 (latest tagged release). Using 'master' would
        # risk silent schema drift on every CI run.
        run: |
          # CloudNativePG 1.23 — CRDs only (strip Deployment, webhooks, RBAC, etc.)
          curl -sSfL \
            https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.23/releases/cnpg-1.23.0.yaml \
            | python3 -c "
          import sys, yaml
          docs = [d for d in yaml.safe_load_all(sys.stdin)
                  if isinstance(d, dict) and d.get('kind') == 'CustomResourceDefinition']
          print('---\n'.join(yaml.dump(d) for d in docs))
          " | kubectl apply --server-side -f - --force-conflicts

          # Spotahome Redis Operator v1.2.4 — CRD manifest only
          kubectl apply --server-side -f \
            https://raw.githubusercontent.com/spotahome/redis-operator/v1.2.4/manifests/databases.spotahome.com_redisfailovers.yaml \
            --force-conflicts

          # Wait for CRDs to be established before dry-run
          kubectl wait --for=condition=Established \
            crd/clusters.postgresql.cnpg.io \
            crd/redisfailovers.databases.spotahome.com \
            --timeout=60s

      - name: Server-side dry-run (dev overlay)
        run: |
          kubectl apply --dry-run=server -k k8s/overlays/dev

      - name: Server-side dry-run (prod overlay)
        run: |
          kubectl apply --dry-run=server -k k8s/overlays/production

      - name: Upload rendered manifests on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-rendered-manifests
          path: /tmp/*.yaml
          retention-days: 7
