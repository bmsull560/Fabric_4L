name: K8s Readiness

on:
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/k8s-readiness.yml"
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/k8s-readiness.yml"
  workflow_dispatch:

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  k8s-static-precheck:
    name: K8s Static Precheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz -o kustomize.tar.gz
          echo "366c0e6b8f2571be6d034a5627e18b43f32a074eb89d4f740fdda80fa7d8bf3e  kustomize.tar.gz" | sha256sum -c
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          echo "d9e5f5c19020e0af24e831e97a9d8bdac0e9e6b2841a2218651e9676de3619d7  kubeconform.tar.gz" | sha256sum -c
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Install conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.61.0/conftest_0.61.0_Linux_x86_64.tar.gz -o conftest.tar.gz
          echo "6f63fd232db3350c8108aa8a79486a46f4e4db005885f46e8ebf6f0cbf2bb977  conftest.tar.gz" | sha256sum -c
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Render overlays
        run: |
          kustomize build k8s/overlays/dev > /tmp/dev.yaml
          kustomize build k8s/overlays/prod > /tmp/prod.yaml

      - name: Schema validate overlays
        run: |
          kubeconform -summary -strict /tmp/dev.yaml
          kubeconform -summary -strict /tmp/prod.yaml

      - name: Policy validate hardening controls (conftest)
        run: |
          conftest test /tmp/dev.yaml -p k8s/policy
          conftest test /tmp/prod.yaml -p k8s/policy

      - name: Policy validate prod secret sourcing
        run: |
          if rg -n '^kind: Secret$' /tmp/prod.yaml; then
            echo "Found raw Secret resources in prod overlay output. Use ExternalSecret only."
            exit 1
          fi
          if ! rg -n '^kind: ExternalSecret$' /tmp/prod.yaml; then
            echo "Prod overlay must include ExternalSecret resources."
            exit 1
          fi

      - name: Client dry-run precheck
        run: |
          kubectl apply --dry-run=client -f /tmp/dev.yaml > /dev/null
          kubectl apply --dry-run=client -f /tmp/prod.yaml > /dev/null

      - name: Preflight checks
        run: |
          pip install pyyaml
          python3 scripts/ci/k8s_preflight.py --verbose

  k8s-server-dry-run:
    name: K8s Server Dry Run (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: k8s-static-precheck

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: task47-validation
          wait: 120s
        continue-on-error: true
        id: kind-install

      - name: Retry kind cluster creation
        if: steps.kind-install.outcome == 'failure'
        run: |
          echo "Kind cluster creation failed, retrying with cleanup..."
          kind delete cluster --name task47-validation || true
          sleep 10
          kind create cluster --name task47-validation --wait 120s
          kubectl cluster-info

      - name: Verify cluster bootstrap
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Server-side dry-run (dev overlay)
        run: |
          kubectl apply --dry-run=server -k k8s/overlays/dev

      - name: Server-side dry-run (prod overlay)
        run: |
          kubectl apply --dry-run=server -k k8s/overlays/prod

      - name: Upload rendered manifests on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-rendered-manifests
          path: /tmp/*.yaml
          retention-days: 7
