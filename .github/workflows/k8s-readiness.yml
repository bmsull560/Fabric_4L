name: K8s Readiness

on:
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/k8s-readiness.yml"
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/k8s-readiness.yml"
  workflow_dispatch:

jobs:
  k8s-static-precheck:
    name: K8s Static Precheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz -o kustomize.tar.gz
          echo "366c0e6b8f2571be6d034a5627e18b43f32a074eb89d4f740fdda80fa7d8bf3e  kustomize.tar.gz" | sha256sum -c
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          echo "d9e5f5c19020e0af24e831e97a9d8bdac0e9e6b2841a2218651e9676de3619d7  kubeconform.tar.gz" | sha256sum -c
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Secret defaults guardrail
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("k8s")
          files = sorted(
              [
                  p
                  for p in root.rglob("*")
                  if p.is_file()
                  and re.search(r"secret", p.name, re.IGNORECASE)
                  and p.suffix in {".yml", ".yaml", ".template"}
              ]
          )

          weak_tokens = ("changeme", "postgres", "valuefabric")
          placeholder_token = "replace_with_"
          assignment = re.compile(r'^\s*([A-Za-z0-9_.-]+):\s*(.*?)\s*(?:#.*)?$')
          quote_strip = re.compile(r'^(["\'])(.*)\1$')

          def normalize(value: str) -> str:
              v = value.strip()
              m = quote_strip.match(v)
              if m:
                  return m.group(2).strip()
              return v

          violations: list[str] = []

          for path in files:
              text = path.read_text(encoding="utf-8")
              is_template = path.as_posix() == "k8s/secrets.yml.template"
              for lineno, line in enumerate(text.splitlines(), start=1):
                  match = assignment.match(line)
                  if not match:
                      continue
                  key, raw_value = match.group(1).lower(), match.group(2)
                  value = normalize(raw_value)
                  value_l = value.lower()

                  if key == "api-key" and value in {"", "''", '""'}:
                      violations.append(f"{path}:{lineno} empty api-key is not allowed")

                  if key in {"password", "auth", "secret", "api-key"}:
                      for token in weak_tokens:
                          if token in value_l:
                              violations.append(
                                  f"{path}:{lineno} contains weak token '{token}' in {key}"
                              )

                  if placeholder_token in value_l and not is_template:
                      violations.append(
                          f"{path}:{lineno} placeholder values are only allowed in k8s/secrets.yml.template"
                      )

              if is_template:
                  if placeholder_token not in text.lower():
                      violations.append(
                          f"{path}: expected REPLACE_WITH_ placeholders in template"
                      )

          if violations:
              print("❌ Kubernetes secret guardrail violations detected:")
              for item in violations:
                  print(f" - {item}")
              print(
                  "\nRemediation: replace weak defaults in non-template manifests and keep placeholders only in k8s/secrets.yml.template."
              )
              sys.exit(1)

          print("✅ Secret defaults guardrail passed.")
          PY

      - name: Render overlays
        run: |
          kustomize build k8s/overlays/dev > /tmp/dev.yaml
          kustomize build k8s/overlays/prod > /tmp/prod.yaml

      - name: Schema validate overlays
        run: |
          kubeconform -summary -strict /tmp/dev.yaml
          kubeconform -summary -strict /tmp/prod.yaml

      - name: Client dry-run precheck
        run: |
          kubectl apply --dry-run=client -f /tmp/dev.yaml > /dev/null
          kubectl apply --dry-run=client -f /tmp/prod.yaml > /dev/null

  k8s-server-dry-run:
    name: K8s Server Dry Run (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: k8s-static-precheck

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: task47-validation
          wait: 120s
        continue-on-error: true
        id: kind-install

      - name: Retry kind cluster creation
        if: steps.kind-install.outcome == 'failure'
        run: |
          echo "Kind cluster creation failed, retrying with cleanup..."
          kind delete cluster --name task47-validation || true
          sleep 10
          kind create cluster --name task47-validation --wait 120s
          kubectl cluster-info

      - name: Verify cluster bootstrap
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Server-side dry-run (dev overlay)
        run: |
          kubectl apply --dry-run=server -k k8s/overlays/dev

      - name: Server-side dry-run (prod overlay)
        run: |
          kubectl apply --dry-run=server -k k8s/overlays/prod

      - name: Upload rendered manifests on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-rendered-manifests
          path: /tmp/*.yaml
          retention-days: 7
