name: Live Workflow Validation Gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Validation mode to run"
        required: true
        default: "config-only"
        type: choice
        options:
          - config-only
          - no-start
          - full
          - remote
      run_seed:
        description: "Run strict live seed after services are healthy"
        required: true
        default: false
        type: boolean
      run_playwright:
        description: "Run live Playwright P0 validation after services are healthy"
        required: true
        default: false
        type: boolean
      frontend_url:
        description: "Live frontend URL for remote/Bunnyshell runs"
        required: false
        default: ""
        type: string
      backend_url:
        description: "Layer 4 backend URL for remote/Bunnyshell runs"
        required: false
        default: ""
        type: string
      service_health_urls:
        description: "Comma- or newline-separated name=url health probes for remote/Bunnyshell services"
        required: false
        default: ""
        type: string
      required_service_names:
        description: "Comma-separated required service names for remote/Bunnyshell health probes"
        required: false
        default: "layer1,layer2,layer3,layer4,layer5,layer6,postgres,redis,neo4j,minio"
        type: string
      live_environment_name:
        description: "Human-readable live environment name"
        required: false
        default: ""
        type: string
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.live.yml'
      - 'scripts/ci/run_live_workflow_validation.sh'
      - 'scripts/ci/validate_live_workflow_artifacts.py'
      - 'scripts/db/seed-e2e-data.ts'
      - 'apps/web/playwright.config.ts'
      - 'apps/web/scripts/live-env-guard.mjs'
      - 'apps/web/e2e/**'
      - 'docs/validation/live-workflow-validation.md'
      - '.github/workflows/live-workflow-validation.yml'
  push:
    branches: [main]
    paths:
      - 'docker-compose.live.yml'
      - 'scripts/ci/run_live_workflow_validation.sh'
      - 'scripts/ci/validate_live_workflow_artifacts.py'
      - 'scripts/db/seed-e2e-data.ts'
      - 'apps/web/playwright.config.ts'
      - 'apps/web/scripts/live-env-guard.mjs'
      - 'apps/web/e2e/**'
      - 'docs/validation/live-workflow-validation.md'
      - '.github/workflows/live-workflow-validation.yml'

permissions:
  contents: read

jobs:
  live-validation-gate:
    name: Live validation gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ARTIFACT_DIR: artifacts/live-workflow-validation
      PLAYWRIGHT_LIVE_FRONTEND_URL: http://localhost:3001
      PLAYWRIGHT_BACKEND_URL: http://localhost:8004
      LIVE_SERVICE_HEALTH_URLS: ""
      REQUIRED_REMOTE_SERVICE_NAMES: layer1,layer2,layer3,layer4,layer5,layer6,postgres,redis,neo4j,minio
      LIVE_ENVIRONMENT_NAME: ""
      RELEASE_CANDIDATE_SHA: ${{ github.sha }}
      VITE_USE_MOCKS: "false"
      VITE_ENABLE_MOCK_FALLBACK: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Provide docker-compose compatibility command
        run: |
          if ! command -v docker-compose >/dev/null 2>&1; then
            sudo tee /usr/local/bin/docker-compose >/dev/null <<'SH'
          #!/usr/bin/env bash
          exec docker compose "$@"
          SH
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          docker-compose version

      - name: Run live workflow validation gate
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'config-only' }}
          RUN_SEED: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seed || false }}
          RUN_PLAYWRIGHT: ${{ github.event_name == 'workflow_dispatch' && inputs.run_playwright || false }}
          DISPATCH_FRONTEND_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_url || '' }}
          DISPATCH_BACKEND_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_url || '' }}
          DISPATCH_SERVICE_HEALTH_URLS: ${{ github.event_name == 'workflow_dispatch' && inputs.service_health_urls || '' }}
          DISPATCH_REQUIRED_SERVICE_NAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.required_service_names || 'layer1,layer2,layer3,layer4,layer5,layer6,postgres,redis,neo4j,minio' }}
          DISPATCH_LIVE_ENVIRONMENT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.live_environment_name || '' }}
        run: |
          set -euo pipefail
          args=()
          if [[ -n "$DISPATCH_FRONTEND_URL" ]]; then
            export PLAYWRIGHT_LIVE_FRONTEND_URL="$DISPATCH_FRONTEND_URL"
          fi
          if [[ -n "$DISPATCH_BACKEND_URL" ]]; then
            export PLAYWRIGHT_BACKEND_URL="$DISPATCH_BACKEND_URL"
          fi
          if [[ -n "$DISPATCH_SERVICE_HEALTH_URLS" ]]; then
            export LIVE_SERVICE_HEALTH_URLS="$DISPATCH_SERVICE_HEALTH_URLS"
          fi
          if [[ -n "$DISPATCH_REQUIRED_SERVICE_NAMES" ]]; then
            export REQUIRED_REMOTE_SERVICE_NAMES="$DISPATCH_REQUIRED_SERVICE_NAMES"
          fi
          if [[ -n "$DISPATCH_LIVE_ENVIRONMENT_NAME" ]]; then
            export LIVE_ENVIRONMENT_NAME="$DISPATCH_LIVE_ENVIRONMENT_NAME"
          fi
          if [[ "$MODE" == "config-only" ]]; then
            args+=(--config-only)
          elif [[ "$MODE" == "no-start" ]]; then
            args+=(--no-start)
          elif [[ "$MODE" == "remote" ]]; then
            args+=(--remote)
          elif [[ "$MODE" != "full" ]]; then
            echo "Unsupported live validation mode: $MODE" >&2
            exit 2
          fi
          if [[ "$RUN_SEED" == "true" ]]; then
            args+=(--seed)
          fi
          if [[ "$RUN_PLAYWRIGHT" == "true" ]]; then
            args+=(--playwright)
          fi
          scripts/ci/run_live_workflow_validation.sh "${args[@]}"

      - name: Validate live workflow artifact schema
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'config-only' }}
          RUN_SEED: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seed || false }}
        run: |
          args=()
          if [[ "$MODE" != "config-only" ]]; then
            args+=(--require-endpoint-probes)
          fi
          if [[ "$RUN_SEED" == "true" ]]; then
            args+=(--require-seed-report)
          fi
          python scripts/ci/validate_live_workflow_artifacts.py "$ARTIFACT_DIR" "${args[@]}"

      - name: Upload live validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-workflow-validation
          path: artifacts/live-workflow-validation
          if-no-files-found: error
