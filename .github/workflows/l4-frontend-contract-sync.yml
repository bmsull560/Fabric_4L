name: Layer 4 Frontend Contract Sync

permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/openapi/layer4-agents.json'
      - 'apps/web/scripts/generate-api-types.ts'
      - 'apps/web/src/api/generated/**'
      - 'apps/web/src/types/**'
      - 'tests/contract/test_l4_frontend_contract.py'
      - '.github/workflows/l4-frontend-contract-sync.yml'
  push:
    branches: [main, develop]
    paths:
      - 'contracts/openapi/layer4-agents.json'
      - 'apps/web/scripts/generate-api-types.ts'
      - 'apps/web/src/api/generated/**'
      - 'apps/web/src/types/**'
      - 'tests/contract/test_l4_frontend_contract.py'
      - '.github/workflows/l4-frontend-contract-sync.yml'
  workflow_dispatch:

concurrency:
  group: l4-frontend-contract-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  l4-frontend-contract-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.18.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema

      - name: Regenerate frontend API client/types from canonical Layer 4 contract
        run: pnpm --dir apps/web run generate:types

      - name: Fail on generated output drift in apps/web
        run: |
          set -euo pipefail
          if ! git diff --quiet -- apps/web/src/api/generated apps/web/src/types; then
            echo "::error::Layer 4 frontend generated artifacts are stale in apps/web."
            echo "Regenerate locally:"
            echo "  pnpm --dir apps/web run generate:types"
            echo "Then commit updated files from apps/web/src/api/generated and apps/web/src/types."
            git --no-pager diff -- apps/web/src/api/generated apps/web/src/types
            exit 1
          fi

      - name: Validate Layer 4 frontend payload compatibility contract test
        run: pytest tests/contract/test_l4_frontend_contract.py
