name: Contract Drift Check

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'services/**/src/api/**'
      - 'services/**/src/**/routes/**'
      - 'services/**/src/**/main.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-drift:
    name: Detect OpenAPI Contract Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4


      - name: Validate workflow command/artifact references
        run: |
          python3 scripts/ci/check_workflow_references.py --workflow-glob "drift-check.yml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic neo4j psycopg2-binary
          # Install layer dependencies for proper export
          pip install -e services/layer1-ingestion/
          pip install -e services/layer2-extraction/
          pip install -e services/layer3-knowledge/
          pip install -e services/layer4-agents/


      - name: Check Layer 3 app_monolith shim drift
        run: |
          python3 services/layer3-knowledge/scripts/check_app_monolith_shim_drift.py

      - name: Security regression drift
        run: |
          python3 scripts/ci/check_security_regressions.py --strict

      - name: Deprecation drift
        run: |
          python3 scripts/ci/check_deprecation_drift.py --strict --use-baseline

      - name: Migration safety drift
        run: |
          python3 scripts/ci/check_migration_safety.py --strict --use-baseline

      - name: Production-readiness language drift
        run: |
          python3 scripts/ci/check_readiness_language.py --strict --use-baseline

      - name: Export current contracts
        run: |
          python scripts/export_openapi.py

      - name: Check for drift
        run: |
          git diff --stat contracts/openapi/
          git diff --exit-code contracts/openapi/ || {
            echo "::error::Contract drift detected! Run 'python scripts/export_openapi.py' locally and commit changes."
            echo "::group::Drift Details"
            git diff contracts/openapi/
            echo "::endgroup::"
            exit 1
          }

      - name: Upload drift artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-drift
          path: |
            contracts/openapi/*.json
            scripts/export_openapi.py
          retention-days: 7
