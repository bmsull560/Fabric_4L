name: Preflight Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Repository Hygiene
  # ============================================
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        run: |
          if grep -r "<<<<<<< HEAD" --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.md" --include="*.yml" --include="*.yaml" .; then
            echo "Merge conflict markers found!"
            exit 1
          fi

      - name: Verify lockfile freshness
        run: |
          # Check frontend lockfile
          if [ -f apps/web/pnpm-lock.yaml ] || [ -f pnpm-lock.yaml ]; then
            echo "✓ pnpm-lock.yaml exists"
          else
            echo "✗ Missing pnpm-lock.yaml"
            exit 1
          fi

          # Check for Python lockfiles in all layers
          for layer in services/layer{1..6}-*; do
            if [ -d "$layer" ]; then
              if [ -f "$layer/uv.lock" ] || [ -f "$layer/poetry.lock" ]; then
                echo "✓ $layer has lockfile"
              else
                echo "⚠ $layer missing lockfile (acceptable if using pip-compile)"
              fi
            fi
          done

      - name: Check required root files
        run: |
          required_files=(
            "AGENTS.md"
            "ARCHITECTURE.md"
            "SECURITY.md"
            "THREAT_MODEL.md"
            "COMPLIANCE.md"
            "RUNBOOK.md"
            "VERSIONING.md"
            ".github/CODEOWNERS"
            ".pre-commit-config.yaml"
            ".tool-versions"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          echo "All required root files present ✓"

  # ============================================
  # License and Headers
  # ============================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden licenses
        run: |
          # This is a placeholder - integrate with FOSSA or Black Duck in production
          echo "License check placeholder - integrate with FOSSA/Black Duck"
          # fossa analyze --target $GITHUB_SHA

      - name: Verify license headers
        run: |
          # Check for license headers in source files
          missing_headers=0
          for file in $(find services -name "*.py" -type f | head -20); do
            if ! head -5 "$file" | grep -q "SPDX-License-Identifier\|Copyright\|License"; then
              echo "Missing license header: $file"
              missing_headers=$((missing_headers + 1))
            fi
          done

          # Not failing for now, just informational
          echo "Files missing license headers: $missing_headers"

  # ============================================
  # Secrets Detection
  # ============================================
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Conventional Commits
  # ============================================
  commit-message:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR commits
        run: |
          # Check that commits follow conventional commit format
          git log --format=%s origin/main..HEAD | while read line; do
            if ! echo "$line" | grep -qE "^(feat|fix|docs|style|refactor|test|chore|security|breaking)(\(.+\))?: .+$"; then
              echo "Non-conventional commit message: $line"
              # Not failing, just warning
            fi
          done

  # ============================================
  # File Size and Encoding
  # ============================================
  file-checks:
    name: File Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check for large files
        run: |
          large_files=$(find . -type f -size +500k \
            ! -path "./.git/*" \
            ! -path "./**/*.lock" \
            ! -path "./**/*.pdf" \
            ! -path "./**/*.png" \
            ! -path "./**/*.jpg" \
            ! -path "./**/*.gif" \
            2>/dev/null)

          if [ -n "$large_files" ]; then
            echo "Large files found (>500KB):"
            echo "$large_files"
            exit 1
          fi

      - name: Check for CRLF line endings
        run: |
          crlf_files=$(find . -type f \
            ! -path "./.git/*" \
            \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.md" -o -name "*.yml" -o -name "*.yaml" \) \
            -exec file {} \; 2>/dev/null | grep CRLF | cut -d: -f1)

          if [ -n "$crlf_files" ]; then
            echo "Files with CRLF line endings:"
            echo "$crlf_files"
            exit 1
          fi

  # ============================================
  # Dependabot Coverage
  # ============================================
  dependabot-coverage:
    name: Dependabot Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate every manifest and Dockerfile has a Dependabot entry
        run: python scripts/ci/check_dependabot_coverage.py
