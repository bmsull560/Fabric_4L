# Fabric 4L Monorepo Workspace Configuration
#
# Canonical production workspace roots are intentionally constrained to:
#   - apps/web
#   - packages/*
#   - services/*
# Experimental content under archive/ and prototypes/ is intentionally excluded
# from default workspace tooling and must be targeted explicitly when needed.

packages:
  # Canonical application root (production)
  - 'apps/web'
  # Canonical shared libraries (production)
  - 'packages/*'
  # Canonical backend/service layers (production)
  - 'services/*'
