version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: layer1-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: layer1_ingestion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - layer1-network

  # Redis (Celery broker and cache)
  redis:
    image: redis:7-alpine
    container_name: layer1-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - layer1-network

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: layer1-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - layer1-network

  # Create MinIO bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/layer1-raw-html || true;
      /usr/bin/mc policy set public myminio/layer1-raw-html;
      exit 0;
      "
    networks:
      - layer1-network

  # FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: layer1-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/layer1_ingestion
      LAYER1_REDIS_URL: redis://redis:6379/0
      LAYER1_S3_ENDPOINT: http://minio:9000
      LAYER1_S3_ACCESS_KEY: minioadmin
      LAYER1_S3_SECRET_KEY: minioadmin
      LAYER1_DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - layer1-network

  # Celery worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: layer1-worker
    command: celery -A src.shared.tasks worker --loglevel=info --concurrency=2
    environment:
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/layer1_ingestion
      LAYER1_REDIS_URL: redis://redis:6379/0
      LAYER1_S3_ENDPOINT: http://minio:9000
      LAYER1_S3_ACCESS_KEY: minioadmin
      LAYER1_S3_SECRET_KEY: minioadmin
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - layer1-network

  # Celery beat (scheduler)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: layer1-beat
    command: celery -A src.shared.tasks beat --loglevel=info
    environment:
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/layer1_ingestion
      LAYER1_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
    depends_on:
      - worker
    networks:
      - layer1-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  layer1-network:
    driver: bridge
