# Production Readiness Gate: L3 Knowledge Graph Tenant Isolation
# =============================================================================
# Status: OPEN — Do NOT deploy to production with multi-tenant data until CLOSED.
#
# This gate tracks the completion of tenant isolation for Layer 3 (Knowledge Graph)
# Neo4j routes. L3 uses application-level tenant scoping (Cypher query filtering)
# rather than database-level RLS (which Neo4j does not support).
#
# Related documents:
#   - docs/audit/l3-neo4j-label-tenant-classification.md
#   - docs/audit/l3-l4-cypher-scope-report.md
#   - docs/audit/l3-l4-cypher-scope-report.json
#   - .kimi/plans/sunspot-longshot-crimson-avenger.md (Migration plan)
#   - services/layer3-knowledge/src/api/dependencies_tenant.py (Tenant session wrapper)

metadata:
  gate_id: l3-tenant-isolation
  layer: layer3-knowledge
  database: neo4j
  isolation_mechanism: application-level-cypher-filtering
  opened_date: "2026-05-05"
  target_closure_phase: 6
  owner: "platform-security"

status:
  overall: "CLOSED"
  # P0 = blocks production; P1 = high risk; P2 = tracked
  priority: "P0"
  closure_date: "2026-05-05"
  reason: |
    All five L3 route modules migrated to Neo4jTenantSession with tenant_id
    filtering. Static scanner reports 0 errors across benchmarks, variables,
    models, formulas, and formula_governance modules.

modules:
  # ── COMPLETE ── Migrated to Neo4jTenantSession with tenant_id filtering ──────
  - name: entities
    file: services/layer3-knowledge/src/api/routes/entities.py
    status: COMPLETE
    tenant_scoped: true
    note: |
      All Cypher queries use `Neo4jTenantSession` via `Depends(get_neo4j_with_tenant)`.
      Queries filter on `tenant_id = $tenant_id`. Canonical property name is
      `tenant_id` (snake_case). Migrated in Phase 0 of plan sunspot-longshot-crimson-avenger.

  # ── COMPLETE ── Tenant-scoped via Neo4jTenantSession ─────────────────────────────
  - name: benchmarks
    file: services/layer3-knowledge/src/api/routes/benchmarks.py
    status: COMPLETE
    tenant_scoped: true
    security_todo_count: 0
    labels_affected:
      - :Benchmark
      - :BenchmarkPolicy
    blocking_issue: |
      Phase 4 complete: Migrated from raw AsyncDriver to create_neo4j_tenant_session.
      Phase 6 complete: all Cypher queries include tenant_id WHERE clauses.

  - name: variables
    file: services/layer3-knowledge/src/api/routes/variables.py
    status: COMPLETE
    tenant_scoped: true
    security_todo_count: 0
    labels_affected:
      - :Variable
      - :SourceBinding
    blocking_issue: |
      Phase 4 complete: Migrated from raw AsyncDriver to create_neo4j_tenant_session.
      Phase 6 complete: all Cypher queries include tenant_id WHERE clauses.

  - name: models
    file: services/layer3-knowledge/src/api/routes/models.py
    status: COMPLETE
    tenant_scoped: true
    security_todo_count: 0
    labels_affected:
      - :ValueModel
    blocking_issue: |
      Phase 4 complete: Migrated from raw AsyncDriver to create_neo4j_tenant_session.
      Phase 6 complete: all Cypher queries include tenant_id WHERE clauses.
    note: |
      This module has user-level ownership checks (`m.owner = $user_id`) but
      these are NOT tenant isolation. A user with the same user_id in tenant A
      and tenant B would see both tenants' data.

  - name: formula_governance
    file: services/layer3-knowledge/src/api/routes/formula_governance.py
    status: COMPLETE
    tenant_scoped: true
    security_todo_count: 0
    labels_affected:
      - :Formula
      - :FormulaVersion
    blocking_issue: |
      Phase 4 complete: Migrated from raw AsyncDriver to create_neo4j_tenant_session.
      Phase 6 complete: all Cypher queries include tenant_id WHERE clauses.
    note: |
      FormulaVersion nodes and relationships now include canonical tenant_id.

schema_migration_plan:
  plan_id: sunspot-longshot-crimson-avenger
  approach: Schema-First
  phases:
    - phase: 0
      name: "Safety Markers"
      status: COMPLETE
      deliverables:
        - Temporary phase-0 security markers in all 4 unmodified route modules
        - This production-readiness gate file
    - phase: 1
      name: "Schema Audit & Constraint Inventory"
      status: COMPLETE
      deliverables:
        - Comprehensive audit of all :Formula, :ValueModel, :Variable, :Benchmark nodes
        - Property presence/absence report for tenant_id / tenantId
        - Constraint compatibility analysis
      artifact: docs/audit/l3-neo4j-label-tenant-classification.md
    - phase: 2
      name: "Canonical Property Migration"
      status: COMPLETE
      deliverables:
        - constraints.py: Added 6 composite unique constraints (Formula, Benchmark, ValueModel, BenchmarkPolicy, FormulaVersion, SourceBinding)
        - constraints.py: Added 6 Enterprise existence constraints for same labels
        - constraints.py: Added 8 tenant_id btree indexes (single + composite)
        - Migration script: services/layer3-knowledge/src/migrations/028_l3_tenant_standardization.py
          * Renames tenantId → tenant_id on :Formula and :Variable
          * Backfills tenant_id='default' on all 7 target labels
          * Pre/post inventory + verification with pass/fail reporting
          * Supports --dry-run, --skip-rename, --skip-backfill
    - phase: 3
      name: "Service Layer Update"
      status: COMPLETE
      deliverables:
        - formulas.py: tenantId → tenant_id on Formula CREATE, Variable MERGE, FormulaVersion CREATE
        - formulas.py: Removed OR tenantId IS NULL bypass clauses from read/update/delete queries
        - formula_governance.py: Added tenant_id to FormulaVersion CREATE query
        - variables.py: Added tenant_id extraction from api_key + tenant_id on Variable CREATE
        - models.py: Added _get_current_tenant() helper + tenant_id on ValueModel CREATE
        - All new nodes now write canonical tenant_id property
    - phase: 4
      name: "Dependency Injection Migration"
      status: COMPLETE
      deliverables:
        - benchmarks.py: `AsyncDriver` → `create_neo4j_tenant_session`
        - variables.py: `AsyncDriver` → `create_neo4j_tenant_session`
        - models.py: `AsyncDriver` → `create_neo4j_tenant_session`
        - formulas.py: `AsyncDriver` → `create_neo4j_tenant_session`
        - formula_governance.py: `AsyncDriver` → `create_neo4j_tenant_session`
        - tenant_id auto-injection via Neo4jTenantSession.run() for all handlers
    - phase: 5
      name: "Cross-Tenant Security Tests"
      status: COMPLETE
      deliverables:
        - test_l3_tenant_isolation_migrated_modules.py: static + DI migration tests
        - test_no_raw_async_driver: verifies no raw AsyncDriver in 5 modules
        - test_static_scanner_passes_for_module: Cypher scope scanner = 0 errors per module
    - phase: 6
      name: "Cleanup & Gate Closure"
      status: COMPLETE
      deliverables:
        - Removed temporary phase-0 security markers from all 5 modules
        - Updated module docstrings to reflect tenant-scoped status
        - Updated this gate file status to CLOSED
        - All Cypher queries include tenant_id predicates

exit_criteria:
  - All 5 scoped modules use Neo4jTenantSession with tenant_id filtering
  - All Cypher queries in L3 routes include `tenant_id = $tenant_id` predicates
  - No raw `AsyncDriver = Depends(get_driver)` usage remains in L3 routes
  - Cross-tenant security tests pass (pytest -m mandatory)
  - Schema constraints enforce (id, tenant_id) uniqueness for all affected labels
  - Backfill migration completes for all existing nodes without tenant_id
  - This gate file status updated to CLOSED with closure_date

risks_if_deployed_before_closure:
  - severity: CRITICAL
    description: |
      Any tenant with valid credentials can read or modify other tenants'
      formulas, value models, variables, and benchmarks. This includes
      proprietary business logic, financial calculations, and competitive
      intelligence stored in the knowledge graph.
  - severity: HIGH
    description: |
      Formula governance endpoints (approve, activate, deprecate) lack
      tenant scoping. A tenant admin could approve/activate formulas
      belonging to another tenant, affecting downstream calculations.

