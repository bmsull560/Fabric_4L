# =============================================================================
# Fabric_4L Contract Testing Stack
# =============================================================================
# Isolated test profile for running contract tests. Only includes the core
# API layers (L3, L4, L5) and their required databases to reduce overhead.
# =============================================================================

x-build-args: &build-args
  BASE_IMAGE: ${BASE_IMAGE:-}

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: vf-contract-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingestion
      POSTGRES_MULTIPLE_DATABASES: ingestion,layer2_extraction,ground_truth,layer4_agents
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - contract-postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    networks:
      - contract-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vf-contract-redis
    command: redis-server
    ports:
      - "6379:6379"
    volumes:
      - contract-redis-data:/data
    networks:
      - contract-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: vf-contract-neo4j
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - contract-neo4j-data:/data
    networks:
      - contract-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Layer 3: Knowledge Graph Service
  # ---------------------------------------------------------------------------
  layer3:
    build:
      context: ./services/layer3-knowledge
      dockerfile: ./Dockerfile
      args:
        <<: *build-args
        BUILDER_BASE_IMAGE: ${BUILDER_BASE_IMAGE:-}
    container_name: vf-contract-layer3
    ports:
      - "8003:8001"
    environment:
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      REDIS_URL: redis://host.docker.internal:6379/0
      LOG_LEVEL: info
    volumes:
      - ./services/layer3-knowledge/src:/app/src:ro
      - ./value_fabric/layer3:/app/value_fabric/layer3:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - contract-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Layer 4: Agents Service
  # ---------------------------------------------------------------------------
  layer4:
    build:
      context: ./services/layer4-agents
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-contract-layer4
    ports:
      - "8004:8000"
    environment:
      DEV_AUTH_BYPASS: "true"
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      SERVICE_AUTH_SECRET: dev-local-service-auth-secret-do-not-use-in-production-32c
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/layer4_agents
      CHECKPOINT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/ground_truth
      REDIS_URL: redis://host.docker.internal:6379/0
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      # Contract test endpoints; we might map absent layers to 8000 dummy, or keep them to prevent startup crashes if they don't do hard checks.
      LAYER1_URL: http://host.docker.internal:8001
      LAYER1_API_URL: http://host.docker.internal:8001
      LAYER2_URL: http://host.docker.internal:8002
      LAYER2_API_URL: http://host.docker.internal:8002
      LAYER3_URL: http://host.docker.internal:8003
      LAYER3_API_URL: http://host.docker.internal:8003
      LAYER5_GROUND_TRUTH_URL: http://host.docker.internal:8005
      LAYER6_BENCHMARKS_URL: http://host.docker.internal:8006
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: gpt-4o
      LOG_LEVEL: debug
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      layer3:
        condition: service_healthy
      layer5:
        condition: service_healthy
    volumes:
      - ./services/layer4-agents/src:/app/src:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - contract-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Layer 5: Ground Truth Service
  # ---------------------------------------------------------------------------
  layer5:
    build:
      context: ./services/layer5-ground-truth
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-contract-layer5
    ports:
      - "8005:8005"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/ground_truth
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/ground_truth
      LAYER3_BASE_URL: http://host.docker.internal:8003
      LAYER3_SYNC_ENABLED: "true"
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      JWT_ALGORITHM: HS256
      SERVICE_AUTH_SECRET: dev-local-service-auth-secret-do-not-use-in-production-32c
      LOG_LEVEL: info
      API_PORT: 8005
      REDIS_URL: redis://host.docker.internal:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      layer5-migrate:
        condition: service_completed_successfully
      layer3:
        condition: service_healthy
    volumes:
      - ./services/layer5-ground-truth/src:/app/src:ro
      - ./value_fabric/layer5:/app/value_fabric/layer5:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - contract-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  layer5-migrate:
    build:
      context: ./services/layer5-ground-truth
      dockerfile: ./Dockerfile
      args: *build-args
    container_name: vf-contract-layer5-migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/ground_truth
      MIGRATION_CONNECT_ATTEMPTS: 12
      MIGRATION_CONNECT_DELAY_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/layer5-ground-truth/src:/app/src:ro
      - ./value_fabric/layer5:/app/value_fabric/layer5:ro
      - ./packages/shared/src/value_fabric/shared:/app/value_fabric/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - contract-network
    restart: "no"

volumes:
  contract-postgres-data:
  contract-redis-data:
  contract-neo4j-data:

networks:
  contract-network:
    driver: bridge