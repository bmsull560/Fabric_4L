version: "3.8"

services:
  # Layer 1: Data Ingestion Service
  layer1-ingestion:
    build:
      context: ./layer1-ingestion
      dockerfile: Dockerfile
    container_name: value-fabric-layer1
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ingestion
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BROWSERBASE_API_KEY=${BROWSERBASE_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - CRAWL_RATE_LIMIT_PER_DOMAIN=1
      - LOG_LEVEL=info
      # Infisical — leave blank to use plain env vars
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID:-}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-Development}
      - INFISICAL_HOST=${INFISICAL_HOST:-}
      - INFISICAL_SECRET_PATH=${INFISICAL_SECRET_PATH:-/}
      - INFISICAL_OVERWRITE=${INFISICAL_OVERWRITE:-false}
    volumes:
      - ./raw-content:/app/raw-content
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Layer 2: Extraction Pipeline
  layer2-extraction:
    build:
      context: ./layer2-extraction
      dockerfile: Dockerfile
    container_name: value-fabric-layer2
    ports:
      - "8002:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-valuefabric}
      - RDF_OUTPUT_DIR=/app/rdf-output
      - LOG_LEVEL=info
      # Infisical — leave blank to use plain env vars
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID:-}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-Development}
      - INFISICAL_HOST=${INFISICAL_HOST:-}
      - INFISICAL_SECRET_PATH=${INFISICAL_SECRET_PATH:-/}
      - INFISICAL_OVERWRITE=${INFISICAL_OVERWRITE:-false}
    volumes:
      - rdf-output:/app/rdf-output
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Layer 3: Neo4j Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: value-fabric-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-valuefabric}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Layer 3 Knowledge Graph API
  layer3-knowledge:
    build:
      context: ./layer3-knowledge
      dockerfile: Dockerfile
    container_name: value-fabric-layer3
    ports:
      - "8003:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-valuefabric}
      - REDIS_URL=redis://redis:6379/0
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - LOG_LEVEL=info
      # Infisical — leave blank to use plain env vars
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID:-}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-Development}
      - INFISICAL_HOST=${INFISICAL_HOST:-}
      - INFISICAL_SECRET_PATH=${INFISICAL_SECRET_PATH:-/}
      - INFISICAL_OVERWRITE=${INFISICAL_OVERWRITE:-false}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Layer 4: Agentic Workflow Engine
  layer4-agents:
    build:
      context: ./layer4-agents
      dockerfile: Dockerfile
    container_name: value-fabric-layer4
    ports:
      - "8004:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-valuefabric}
      - LAYER2_API_URL=http://layer2-extraction:8000
      - LAYER1_API_URL=http://layer1-ingestion:8000
      - LAYER3_API_URL=http://layer3-knowledge:8001
      - LAYER5_GROUND_TRUTH_URL=http://layer5-ground-truth:8005
      - LAYER6_BENCHMARKS_URL=http://layer6-benchmarks:8006
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - CHECKPOINT_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ground_truth
      - LOG_LEVEL=info
      # Infisical — leave blank to use plain env vars
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID:-}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-Development}
      - INFISICAL_HOST=${INFISICAL_HOST:-}
      - INFISICAL_SECRET_PATH=${INFISICAL_SECRET_PATH:-/}
      - INFISICAL_OVERWRITE=${INFISICAL_OVERWRITE:-false}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      layer2-extraction:
        condition: service_healthy
      layer3-knowledge:
        condition: service_healthy
      layer5-ground-truth:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Layer 5: Ground Truth Service
  layer5-ground-truth:
    build:
      context: ./layer5-ground-truth
      dockerfile: Dockerfile
    container_name: value-fabric-layer5
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ground_truth
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@postgres:5432/ground_truth
      - LAYER3_BASE_URL=http://layer3-knowledge:8001
      - LAYER3_SYNC_ENABLED=true
      - LAYER3_API_KEY=${LAYER3_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
      - JWT_ALGORITHM=HS256
      - MIN_CONFIDENCE_FOR_SUPPORTED=0.5
      - MIN_SOURCES_FOR_CORROBORATED=2
      - AUTO_ADVANCE_TO_SUPPORTED=true
      - LOG_LEVEL=info
      - API_PORT=8005
      # Infisical — leave blank to use plain env vars
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID:-}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-Development}
      - INFISICAL_HOST=${INFISICAL_HOST:-}
      - INFISICAL_SECRET_PATH=${INFISICAL_SECRET_PATH:-/}
      - INFISICAL_OVERWRITE=${INFISICAL_OVERWRITE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      layer5-migrate:
        condition: service_completed_successfully
      layer3-knowledge:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Layer 5 Alembic migration runner (one-shot: runs migrations then exits)
  layer5-migrate:
    build:
      context: ./layer5-ground-truth
      dockerfile: Dockerfile
    container_name: value-fabric-layer5-migrate
    command: alembic upgrade head
    environment:
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@postgres:5432/ground_truth
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: "no"

  # Layer 6: Benchmark Service
  layer6-benchmarks:
    build:
      context: ./layer6-benchmarks
      dockerfile: Dockerfile
    container_name: value-fabric-layer6
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - LOG_LEVEL=info
      # Infisical — leave blank to use plain env vars
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID:-}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-Development}
      - INFISICAL_HOST=${INFISICAL_HOST:-}
      - INFISICAL_SECRET_PATH=${INFISICAL_SECRET_PATH:-/}
      - INFISICAL_OVERWRITE=${INFISICAL_OVERWRITE:-false}
    depends_on:
      layer4-agents:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: value-fabric-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerting/rules.yml:/etc/prometheus/alerting/rules.yml:ro
    depends_on:
      layer1-ingestion:
        condition: service_healthy
      layer2-extraction:
        condition: service_healthy
      layer3-knowledge:
        condition: service_healthy
      layer4-agents:
        condition: service_healthy
      layer5-ground-truth:
        condition: service_healthy
      layer6-benchmarks:
        condition: service_healthy
      alertmanager:
        condition: service_started
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring: Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: value-fabric-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:11.2.0
    container_name: value-fabric-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Task 62: Distributed Tracing - Jaeger all-in-one
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: value-fabric-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "14268:14268"  # Jaeger thrift
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (shared across all layers)
  redis:
    image: redis:7-alpine
    container_name: value-fabric-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Vault (dev mode) — optional local secrets backend
  vault:
    image: hashicorp/vault:latest
    container_name: value-fabric-vault
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - ../scripts/vault-dev-init.sh:/vault-dev-init.sh:ro
    networks:
      - value-fabric-network
    restart: "no"
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200

  # PostgreSQL (for Layer 1 crawl state + Layer 5 Ground Truth)
  postgres:
    image: postgres:15-alpine
    container_name: value-fabric-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ingestion
      # POSTGRES_MULTIPLE_DATABASES is consumed by init-multiple-dbs.sh
      - POSTGRES_MULTIPLE_DATABASES=ingestion,ground_truth
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  rdf-output:
  ground-truth-data:
  grafana-data:

networks:
  value-fabric-network:
    driver: bridge
