version: "3.8"

services:
  # Layer 1: Data Ingestion Service
  layer1-ingestion:
    build:
      context: ./layer1-ingestion
      dockerfile: Dockerfile
    container_name: value-fabric-layer1
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ingestion
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BROWSERBASE_API_KEY=${BROWSERBASE_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - CRAWL_RATE_LIMIT_PER_DOMAIN=1
      - LOG_LEVEL=info
    volumes:
      - ./raw-content:/app/raw-content
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Layer 2: Extraction Pipeline
  layer2-extraction:
    build:
      context: ./layer2-extraction
      dockerfile: Dockerfile
    container_name: value-fabric-layer2
    ports:
      - "8002:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-valuefabric}
      - RDF_OUTPUT_DIR=/app/rdf-output
      - LOG_LEVEL=info
    volumes:
      - rdf-output:/app/rdf-output
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Layer 3: Neo4j Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: value-fabric-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-valuefabric}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Layer 4: Agentic Workflow Engine
  layer4-agents:
    build:
      context: ./layer4-agents
      dockerfile: Dockerfile
    container_name: value-fabric-layer4
    ports:
      - "8004:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-valuefabric}
      - LAYER2_API_URL=http://layer2-extraction:8000
      - LAYER1_API_URL=http://layer1-ingestion:8000
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      layer2-extraction:
        condition: service_healthy
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (shared across all layers)
  redis:
    image: redis:7-alpine
    container_name: value-fabric-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL (for Layer 1 crawl state)
  postgres:
    image: postgres:15-alpine
    container_name: value-fabric-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ingestion
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - value-fabric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  rdf-output:

networks:
  value-fabric-network:
    driver: bridge
