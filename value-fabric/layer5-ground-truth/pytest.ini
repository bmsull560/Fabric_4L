[pytest]
asyncio_mode = auto
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    asyncio: mark test as async
    integration: mark test as integration test (requires running services)
    unit: mark test as unit test (no external dependencies)
log_cli = true
log_cli_level = INFO

env =
    TESTING=true
    JWT_SECRET=test-jwt-secret-must-be-at-least-32-characters-long
    API_KEY_HMAC_SECRET=test-api-key-hmac-secret-32-chars
