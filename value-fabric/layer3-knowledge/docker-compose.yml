version: "3.8"

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: value-fabric-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
      - NEO4J_PLUGINS=["apoc", "gds"]  # Install APOC and Graph Data Science
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Layer 3 API
  layer3-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: value-fabric-layer3
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - NEO4J_DATABASE=valuefabric
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - LOG_LEVEL=INFO
    depends_on:
      - neo4j
    command: >
      sh -c "sleep 10 &&
             python -m uvicorn src.api.main:app 
             --host 0.0.0.0 
             --port 8001
             --reload"

volumes:
  neo4j_data:
  neo4j_logs:
