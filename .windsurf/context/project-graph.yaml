# Project Graph Context Provider
# Defines how agents fetch and inject monorepo dependency context.

provider: repo-graph-mcp
endpoint: /repo-graph/get_project_dependencies

# When to fetch
fetch_conditions:
  - before_file_edit
  - before_refactor
  - before_test_generation

# What to inject
injection_format: structured_json
schema:
  type: object
  required: [target, dependencies, dependents, affected_tests, boundary_violations]
  properties:
    target:
      type: string
      description: The file or module being edited
    dependencies:
      type: array
      items:
        type: string
      description: Modules this file depends on
    dependents:
      type: array
      items:
        type: string
      description: Modules that depend on this file
    affected_tests:
      type: array
      items:
        type: string
      description: Test files that should be run after changes
    boundary_violations:
      type: array
      items:
        type: object
        properties:
          rule_id:
            type: string
          message:
            type: string
      description: Any dependency rule violations detected

# Action on boundary violations
violation_handling:
  severity: block
  message_template: >
    Boundary violation detected: {rule_id}. 
    Target {target} violates {message}.
    Halt and escalate before proceeding.

# Caching
cache:
  enabled: true
  ttl_seconds: 300
  key_format: "project_graph:{target}:{depth}"
