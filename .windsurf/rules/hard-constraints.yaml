# Hard Constraints (Blockers)
# These rules block execution. They are evaluated by the policy engine BEFORE any code is written.
# If any hard constraint triggers, the agent halts immediately.

rules:
  - id: HC-001
    name: tool-manifest-sync-required
    severity: block
    description: >
      Do not change a tool manifest in contracts/tool-manifests/ without updating
      the corresponding skill definition in value-fabric/layer4-agents/skills/ and registry/skills.json.
    rationale: >
      Contracts and skills must stay in sync. AGENTS.md P0 rule #4.
    trigger:
      type: file_change
      files:
        - "contracts/tool-manifests/*.json"
        - "value-fabric/layer4-agents/skills/*.md"
    action:
      type: block
      message: "Tool manifest change requires synchronized skill definition update. Run tool-contract-sync skill."
      required_verification:
        - "registry/skills.json"
        - "registry/tools.json"

  - id: HC-002
    name: no-identity-modifications-without-review
    severity: block
    description: >
      Never modify shared/identity/ without a security review.
    rationale: >
      This is the cross-layer authentication and authorization library. Bugs here affect every service.
      AGENTS.md P0 rule #2.
    trigger:
      type: file_change
      files:
        - "shared/identity/**/*"
    action:
      type: block
      message: "Modifications to shared/identity/ require explicit security review and 2 approvals."
      escalation_path: security-team

  - id: HC-003
    name: no-manual-migration-changes
    severity: block
    description: >
      Never modify value-fabric/layer4-agents/migrations/ by hand. Use Alembic to generate new migration files.
    rationale: >
      AGENTS.md P0 rule #3. Hand-edited migrations cause drift and deployment failures.
    trigger:
      type: file_change
      files:
        - "value-fabric/layer4-agents/migrations/*.py"
        - "value-fabric/layer4-agents/migrations/versions/*.py"
        - "value-fabric/layer1-ingestion/migrations/**/*.py"
        - "value-fabric/layer2-extraction/migrations/**/*.py"
        - "value-fabric/layer5-ground-truth/migrations/**/*.py"
    action:
      type: block
      message: "Use 'alembic revision --autogenerate -m \"description\"' instead of hand-editing migrations."
      required_verification:
        - "alembic_head_check"

  - id: HC-004
    name: never-weaken-tests
    severity: block
    description: >
      Never remove or weaken existing tests. If a test is blocking you, understand why before touching it.
    rationale: >
      Tests encode behavioral contracts. AGENTS.md P0 rule #5.
    trigger:
      type: coverage_decrease
      files:
        - "**/test_*.py"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.spec.ts"
    action:
      type: block
      message: "Test removal or weakening requires explicit justification and team approval."
      required_verification:
        - "coverage_report"
        - "team_approval"

  - id: HC-005
    name: no-secrets-in-code
    severity: block
    description: >
      Never commit secrets. No API keys, passwords, or tokens in any file.
    rationale: >
      AGENTS.md P0 rule #1. Use .env (gitignored) for all secrets.
    trigger:
      type: content_scan
      patterns:
        - "(?i)(api[_-]?key|password|secret|token)\s*[:=]\s*['\"][^'\"]{8,}['\"]"
        - "sk-[a-zA-Z0-9]{48}"
        - "AKIA[0-9A-Z]{16}"
    action:
      type: block
      message: "Secret detected in code. Move to .env immediately."
      required_verification:
        - "secret_scan_pass"
