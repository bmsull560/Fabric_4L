[pytest]
minversion = 7.0
asyncio_mode = auto
testpaths =
    value-fabric/layer1-ingestion/tests
    value-fabric/layer2-extraction/tests
    value-fabric/layer3-knowledge/tests
    value-fabric/layer4-agents/tests
    tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
pythonpath = . value-fabric/layer1-ingestion/src value-fabric/layer2-extraction/src value-fabric/layer3-knowledge/src value-fabric/layer4-agents/src value-fabric/layer5-ground-truth/src value-fabric/layer6-benchmarks/src shared/

addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=60
    --randomly-seed=last
    -n auto
    --ignore=tests/quarantine
    # Coverage configured per-layer, not globally
    # Use: cd value-fabric/layerX && pytest --cov=src --cov-report=term-missing

markers =
    unit: Fast unit tests (no I/O, <100ms)
    integration: Integration tests with real dependencies
    e2e: End-to-end tests
    contract: API contract tests (OpenAPI schema validation)
    runtime_contract: Runtime cross-layer contract tests that require live L1-L4 services
    performance: Performance benchmarks and SLO validation
    security: Security tests (OWASP Top 10)
    accessibility: WCAG 2.1 AA compliance tests
    slow: Tests that take > 1 second
    flaky: Known flaky tests being fixed - skip in CI
    quarantine: Tests temporarily isolated due to external dependencies (Docker, etc.)
    requires_postgres: Tests requiring PostgreSQL
    requires_redis: Tests requiring Redis
    requires_neo4j: Tests requiring Neo4j
    requires_openai: Tests requiring OpenAI API (mocked in CI)

filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

env =
    TESTING=true
    LOG_LEVEL=DEBUG
    DATABASE_URL=postgresql://postgres:test@localhost:5432/fabric_test
    REDIS_URL=redis://localhost:6379
    NEO4J_URL=bolt://localhost:7687
    NEO4J_USER=neo4j
    NEO4J_PASSWORD=test
    JWT_SECRET=test-jwt-secret-must-be-at-least-32-characters-long
    API_KEY_HMAC_SECRET=test-api-key-hmac-secret-32-chars
