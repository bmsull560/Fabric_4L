[pytest]
minversion = 7.0
asyncio_mode = auto
testpaths =
    services/layer1-ingestion/tests
    services/layer2-extraction/tests
    services/layer3-knowledge/tests
    services/layer4-agents/tests
    tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
pythonpath = . packages/shared/src

addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=60
    --randomly-seed=last
    -n auto
    --ignore=tests/quarantine
    # Coverage configured per-layer, not globally
    # Use: cd services/layerX && pytest --cov=src --cov-report=term-missing
    #
    # Test profiles (pass -m <expression> to select):
    #
    #   Mandatory profile — unit + contract + security tests; deps must be installed:
    #     pytest -m "not slow and not requires_neo4j and not e2e and not performance"
    #
    #   Full profile — all tests including infra-gated and slow:
    #     pytest  (no -m filter; requires Docker infra via docker-compose.test.yml)
    #
    #   Dry-run collection audit (no dep check, no execution):
    #     pytest --no-mandatory-dep-check --collect-only -q

markers =
    unit: Fast unit tests (no I/O, <100ms)
    integration: Integration tests with real dependencies
    e2e: End-to-end tests
    contract: API contract tests (OpenAPI schema validation)
    runtime_contract: Runtime cross-layer contract tests that require live L1-L4 services
    performance: Performance benchmarks and SLO validation
    security: Security tests (OWASP Top 10)
    tenant_boundary: High-risk tenant boundary tests (cross-tenant API, RLS fail-closed, header spoofing, super-admin bypass audit)
    accessibility: WCAG 2.1 AA compliance tests
    slow: Tests that take >1 second or require optional heavy deps (playwright, pymupdf4llm)
    flaky: Known flaky tests being fixed - skip in CI
    quarantine: Tests temporarily isolated due to external dependencies (Docker, etc.)
    requires_postgres: Tests requiring a live PostgreSQL instance
    requires_redis: Tests requiring a live Redis instance
    requires_neo4j: Tests requiring a live Neo4j instance
    requires_openai: Tests requiring OpenAI API (mocked in CI)

filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

env =
    TESTING=true
    LOG_LEVEL=DEBUG
    DATABASE_URL=postgresql://postgres:test@localhost:5432/fabric_test
    REDIS_URL=redis://localhost:6379
    NEO4J_URL=bolt://localhost:7687
    NEO4J_USER=neo4j
    NEO4J_PASSWORD=test
    JWT_SECRET=test-jwt-secret-must-be-at-least-32-characters-long
    API_KEY_HMAC_SECRET=test-api-key-hmac-secret-32-chars
