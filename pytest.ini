[pytest]
minversion = 7.0
asyncio_mode = auto
testpaths =
    tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
pythonpath = . packages/shared/src services/layer5-ground-truth/src services/api services/layer4-agents/src

addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=60
    --randomly-seed=last
    --import-mode=importlib
    --ignore=tests/quarantine
    # pytest-timeout and pytest-randomly are installed by `make setup` into the
    # pytest pipx venv alongside all service deps.
    # NOTE: `-n auto` parallelism is opt-in (pass `-n auto` or `-n N` on the CLI).
    # Schemathesis-driven suites under `tests/contract/` and the schemathesis-importing
    # security suites crash under xdist with
    #   `INTERNALERROR> AttributeError: 'WorkerController' object has no attribute 'workeroutput'`
    # See reports/TEST_COVERAGE_RUBRIC_AUDIT_2026-05-12.md §8 M0-3. CI shards parallel
    # work at the job level; local runs that need speed can re-enable explicitly.
    # Coverage is per-layer opt-in, not a global gate.
    # Use: cd services/layerX && pytest --cov=src --cov-report=term-missing --cov-fail-under=80
    #
    # All layers now have pyproject.toml [tool.coverage.report] fail_under:
    #   L1: 80%, L2: 85%, L3: 80%, L4: 80%, L5: 80%, L6: 80%
    # Root-level pytest runs do not enforce a single global coverage floor
    # because each layer is tested independently in CI. Run layer tests
    # individually for accurate coverage reporting.
    #
    # Test profiles (pass -m <expression> to select):
    #
    #   MANDATORY profile (CI gate) — unit + contract + security tests:
    #     deps: requirements from tests/requirements-test.txt must be installed
    #     cmd:  scripts/test-python-production.sh --mandatory-only
    #     This profile FAILS if dependencies are missing (never skips)
    #
    #   Optional tests (marked slow, requires_postgres, requires_neo4j, etc):
    #     These may be skipped if deps/infrastructure is unavailable
    #     cmd:  pytest -m "slow or requires_postgres or requires_neo4j"
    #
    #   Full profile — all tests including infra-gated:
    #     cmd:  scripts/test-python-production.sh --full
    #
    #   Dry-run collection audit (no dep check, no execution):
    #     cmd:  pytest --no-mandatory-dep-check --collect-only -q

markers =
    mandatory: Tests that must run and pass in CI (unit + contract + security). Fails if deps missing.
    unit: Fast unit tests (no I/O, <100ms)
    integration: Integration tests with real dependencies
    e2e: End-to-end tests
    contract: API contract tests (OpenAPI schema validation)
    runtime_contract: Runtime cross-layer contract tests that require live L1-L4 services
    backend_integrated: Backend-integrated validation tests that require live Fabric_4L services and durable cross-layer state
    release_smoke: Minimal production-gate smoke checks for backend-integrated validation readiness
    performance: Performance benchmarks and SLO validation
    benchmark: Micro-benchmark tests collected under the production profile but normally selected separately
    security: Security tests (OWASP Top 10)
    tenant_boundary: High-risk tenant boundary tests (cross-tenant API, RLS fail-closed, header spoofing, super-admin bypass audit)
    tenant_matrix: Cross-layer route-to-hostile-test tenant isolation matrix coverage tests
    auth_boundaries: authentication and authorization boundary regression tests
    auth_source: authentication source validation regression tests
    cross_tenant_write: cross-tenant write isolation regression tests
    jwt_config: JWT configuration safety regression tests
    rate_limit: rate-limiting safety regression tests
    tenant_lifecycle: tenant lifecycle security regression tests
    tenant_mismatch: tenant mismatch and confused-deputy regression tests
    websocket: websocket authentication and authorization regression tests
    accessibility: WCAG 2.1 AA compliance tests
    slow: Tests that take >1 second or require optional heavy deps (playwright, pymupdf4llm)
    flaky: Known flaky tests being fixed - skip in CI
    no_parallel: Tests that must run serially (e.g. schemathesis crashes under pytest-xdist)
    contract_static: Contract tests that must run deterministically without live services
    contract_static_no_service: Static OpenAPI artifact checks that do not require live service availability
    service_required: Contract tests that require reachable live service endpoints
    quarantine: Tests temporarily isolated due to external dependencies (Docker, etc.)
    requires_postgres: Tests requiring a live PostgreSQL instance
    requires_redis: Tests requiring a live Redis instance
    requires_neo4j: Tests requiring a live Neo4j instance
    requires_docker: Tests requiring a running Docker daemon (testcontainers)
    requires_openai: Tests requiring OpenAI API (mocked in CI)
    temporary_compat: Temporary backward-compatibility checks with planned removal date/phase
    permanent_compat: Long-term compatibility contract checks
    oidc_live: Live OIDC integration tests requiring a running Keycloak instance (port 8080)

filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

env =
    ENVIRONMENT=development
    ALLOW_DEV_AUTH_BYPASS=I_UNDERSTAND_RISK
    TESTING=true
    LOG_LEVEL=DEBUG
    MOCK_PERSISTENCE=true
    DATABASE_URL=postgresql://postgres:test@localhost:5432/fabric_test
    REDIS_URL=redis://localhost:6379
    NEO4J_URL=bolt://localhost:7687
    NEO4J_USER=neo4j
    NEO4J_PASSWORD=test
    JWT_SECRET=test-jwt-secret-must-be-at-least-32-characters-long
    API_KEY_HMAC_SECRET=test-api-key-hmac-secret-32-chars
    CORS_ORIGINS=["http://localhost:3000"]

