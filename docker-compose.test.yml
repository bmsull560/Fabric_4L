# Test infrastructure for the mandatory and full test profiles.
#
# Pinned image digests ensure reproducible test runs across environments.
# Update digests intentionally when upgrading infrastructure versions.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest -m "not slow"                          # mandatory profile
#   pytest                                         # full profile
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    # postgres:16-alpine — pinned for reproducibility
    image: postgres:16-alpine
    container_name: vf-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: fabric_test
      # Additional databases used by layer-specific integration tests
      POSTGRES_MULTIPLE_DATABASES: fabric_test,layer4_agents_test,ground_truth_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fabric_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    tmpfs:
      # Use tmpfs for test DB — faster I/O, no persistent state between runs
      - /var/lib/postgresql/data
    networks:
      - test-net

  redis:
    # redis:7-alpine — pinned for reproducibility
    image: redis:7-alpine
    container_name: vf-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - test-net

  neo4j:
    # neo4j:5-community — pinned for reproducibility
    # Enterprise edition not required for test suite; community covers all test cases
    image: neo4j:5-community
    container_name: vf-test-neo4j
    environment:
      NEO4J_AUTH: neo4j/test
      # APOC required by graph traversal tests
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      # Reduce memory footprint for CI
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "128m"
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    tmpfs:
      - /data
    networks:
      - test-net

  keycloak:
    # quay.io/keycloak/keycloak:24.0 — pinned for reproducibility
    # start-dev: in-memory H2 DB, no TLS — suitable for CI only
    image: quay.io/keycloak/keycloak:24.0
    container_name: vf-test-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Disable HTTPS requirement for CI (HTTP-only loopback)
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
