# Blue/green launch control entrypoint.
#
# Usage:
#   ACTIVE_COLOR=blue BLUE_UPSTREAM=http://blue.example.internal GREEN_UPSTREAM=http://green.example.internal docker compose -f docker-compose.blue-green.yml up -d traffic-router
#   ACTIVE_COLOR=green BLUE_UPSTREAM=http://blue.example.internal GREEN_UPSTREAM=http://green.example.internal docker compose -f docker-compose.blue-green.yml up -d traffic-router
#
# This file owns only the traffic switch and evidence-friendly health probe.
# Blue and green environments are expected to be deployed separately and passed
# in as explicit upstream URLs so this router does not depend on project names
# or container names from another compose file.

name: fabric4l-blue-green

services:
  traffic-router:
    image: nginx:1.27-alpine
    container_name: value-fabric-blue-green-router
    environment:
      ACTIVE_COLOR: ${ACTIVE_COLOR:?set ACTIVE_COLOR to blue or green}
      BLUE_UPSTREAM: ${BLUE_UPSTREAM:?set BLUE_UPSTREAM to the blue environment URL}
      GREEN_UPSTREAM: ${GREEN_UPSTREAM:?set GREEN_UPSTREAM to the green environment URL}
    ports:
      - "${BLUE_GREEN_HTTP_PORT:-8080}:80"
    command:
      - /bin/sh
      - -c
      - |
        case "$$ACTIVE_COLOR" in
          blue) upstream="$$BLUE_UPSTREAM" ;;
          green) upstream="$$GREEN_UPSTREAM" ;;
          *) echo "ACTIVE_COLOR must be blue or green" >&2; exit 64 ;;
        esac
        cat > /etc/nginx/conf.d/default.conf <<EOF
        server {
          listen 80;
          location = /health {
            add_header Content-Type text/plain;
            return 200 "active=$$ACTIVE_COLOR\n";
          }
          location / {
            proxy_pass $$upstream;
            proxy_set_header Host $$host;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
        }
        EOF
        nginx -g 'daemon off;'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/health | grep -q \"active=$${ACTIVE_COLOR}\""]
      interval: 10s
      timeout: 3s
      retries: 6
