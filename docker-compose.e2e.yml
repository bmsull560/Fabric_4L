# =============================================================================
# docker-compose.e2e.yml — Deterministic E2E Backend for Journey Tests
# =============================================================================
#
# Purpose:  Provide a fully isolated, repeatable backend stack for the 16
#           data-dependent Playwright journey tests. No persistent volumes,
#           no monitoring, no hot-reload — just the minimum services needed
#           to serve the frontend API surface.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d --wait
#   pnpm --filter frontend seed:e2e          # seed deterministic data
#   pnpm --filter frontend test:e2e:journeys # run journey tests
#   docker compose -f docker-compose.e2e.yml down -v
#
# Environment modes:
#   Local deterministic  — developer confidence  — this file
#   CI deterministic     — required gate         — this file
#   Staging smoke        — deployment confidence — PLAYWRIGHT_BACKEND_URL override
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: vf-e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: valuefabric
      POSTGRES_MULTIPLE_DATABASES: ingestion,ground_truth,layer4_agents
    volumes:
      # No persistent volume — fresh database every run
      - ./value-fabric/scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    networks:
      - e2e-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vf-e2e-redis
    command: redis-server
    ports:
      - "6379:6379"
    networks:
      - e2e-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: vf-e2e-neo4j
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - e2e-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Backend — Layer 4 Agents API (primary API surface for frontend)
  # ---------------------------------------------------------------------------
  layer4:
    build:
      context: ./value-fabric
      dockerfile: ./layer4-agents/Dockerfile
    container_name: vf-e2e-layer4
    ports:
      - "8004:8000"
    environment:
      # Auth bypass — E2E tests inject tenant context via DEV_AUTH_BYPASS
      - DEV_AUTH_BYPASS=true
      - DEV_TENANT_ID=00000000-0000-4000-e2e0-000000000001
      # JWT secret (required at import time, bypassed at runtime)
      - JWT_SECRET=e2e-test-secret-do-not-use-in-production-minimum-32-chars
      # Database
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/layer4_agents
      - CHECKPOINT_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ground_truth
      - REDIS_URL=redis://redis:6379/0
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=devpassword
      # LLM — disabled for E2E; tests use deterministic seed data
      - OPENAI_API_KEY=
      - ANTHROPIC_API_KEY=
      - LLM_MODEL=gpt-4o
      # Inter-layer URLs (point to self — stubs return 503)
      - LAYER1_API_URL=http://layer4:8000
      - LAYER2_API_URL=http://layer4:8000
      - LAYER3_API_URL=http://layer4:8000
      - LAYER5_GROUND_TRUTH_URL=http://layer4:8000
      - LAYER6_BENCHMARKS_URL=http://layer4:8000
      # Logging
      - LOG_LEVEL=warning
      - PYTHONPATH=/app
      # Disable Infisical
      - INFISICAL_CLIENT_ID=
      - INFISICAL_CLIENT_SECRET=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - e2e-network
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --log-level warning
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Database Migrations — runs once then exits
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: ./value-fabric
      dockerfile: ./layer4-agents/Dockerfile
    container_name: vf-e2e-migrate
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/layer4_agents
      - CHECKPOINT_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ground_truth
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - e2e-network
    command: >
      python -c "
      import asyncio
      from sqlalchemy.ext.asyncio import create_async_engine
      from src.database import Base
      async def run():
          engine = create_async_engine('postgresql+asyncpg://postgres:postgres@postgres:5432/layer4_agents')
          async with engine.begin() as conn:
              await conn.run_sync(Base.metadata.create_all)
          await engine.dispose()
          print('E2E migrations complete')
      asyncio.run(run())
      "
    restart: "no"

networks:
  e2e-network:
    driver: bridge
