name: fabric_4l
services:
  alertmanager:
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    container_name: value-fabric-alertmanager
    expose:
      - "9093"
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - '-'
        - http://localhost:9093/-/healthy
      timeout: 10s
      interval: 30s
      retries: 3
    image: prom/alertmanager:v0.28.1
    networks:
      value-fabric-network: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: C:\Users\BBB\Fabric_4L\monitoring\alertmanager\alertmanager.yml
        target: /etc/alertmanager/alertmanager.yml
        read_only: true
        bind: {}
      - type: volume
        source: alertmanager-data
        target: /alertmanager
        volume: {}
  flower:
    build:
      context: C:\Users\BBB\Fabric_4L
      dockerfile: ./services/layer1-ingestion/Dockerfile.live
      args:
        BASE_IMAGE: python:3.11.11-slim-bookworm
    cap_drop:
      - ALL
    command:
      - celery
      - -A
      - src.shared.tasks
      - flower
      - --port=5555
      - --basic_auth=admin:flowerdev
    container_name: value-fabric-flower
    depends_on:
      layer1-celery-worker:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      FLOWER_PASSWORD: flowerdev
      FLOWER_USER: admin
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      LAYER1_REDIS_URL: redis://:redisdev@redis:6379/0
      PYTHONPATH: /app
      REDIS_URL: redis://:redisdev@redis:6379/0
    expose:
      - "5555"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:5555/')
      timeout: 10s
      interval: 30s
      retries: 3
    networks:
      value-fabric-network: null
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
  grafana:
    container_name: value-fabric-grafana
    depends_on:
      prometheus:
        condition: service_healthy
        required: true
    environment:
      GF_SECURITY_ADMIN_PASSWORD: grafanadev
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - '-'
        - http://localhost:3000/api/health
      timeout: 10s
      interval: 30s
      retries: 3
    image: grafana/grafana:11.2.0
    networks:
      value-fabric-network: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: C:\Users\BBB\Fabric_4L\monitoring\grafana\provisioning\datasources
        target: /etc/grafana/provisioning/datasources
        read_only: true
        bind: {}
      - type: bind
        source: C:\Users\BBB\Fabric_4L\monitoring\grafana\provisioning\dashboards
        target: /etc/grafana/provisioning/dashboards
        read_only: true
        bind: {}
      - type: bind
        source: C:\Users\BBB\Fabric_4L\monitoring\grafana\dashboards
        target: /var/lib/grafana/dashboards
        read_only: true
        bind: {}
      - type: volume
        source: grafana-data
        target: /var/lib/grafana
        volume: {}
  jaeger:
    container_name: value-fabric-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    expose:
      - "16686"
      - "4317"
      - "4318"
      - "14268"
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - '-'
        - http://localhost:16686/
      timeout: 10s
      interval: 30s
      retries: 3
    image: jaegertracing/all-in-one:1.50
    networks:
      value-fabric-network: null
    restart: unless-stopped
  layer1-celery-beat:
    build:
      context: C:\Users\BBB\Fabric_4L
      dockerfile: ./services/layer1-ingestion/Dockerfile.live
      args:
        BASE_IMAGE: python:3.11.11-slim-bookworm
    cap_drop:
      - ALL
    command:
      - celery
      - -A
      - src.shared.tasks
      - beat
      - --loglevel=info
      - --schedule=/tmp/celerybeat-schedule
    container_name: value-fabric-layer1-celery-beat
    depends_on:
      layer1-celery-worker:
        condition: service_started
        required: true
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      LAYER1_REDIS_URL: redis://:redisdev@redis:6379/0
      PYTHONPATH: /app
      REDIS_URL: redis://:redisdev@redis:6379/0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os; os.kill(1, 0)
      timeout: 10s
      interval: 30s
      retries: 3
    networks:
      value-fabric-network: null
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
  layer1-celery-worker:
    build:
      context: C:\Users\BBB\Fabric_4L
      dockerfile: ./services/layer1-ingestion/Dockerfile.live
      args:
        BASE_IMAGE: python:3.11.11-slim-bookworm
    cap_drop:
      - ALL
    command:
      - celery
      - -A
      - src.shared.tasks
      - worker
      - --loglevel=info
      - --concurrency=4
      - -Q
      - celery,ingestion,processing
    container_name: value-fabric-layer1-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      JWT_SECRET: dev-local-secret-do-not-use-in-production-minimum-32-chars
      LAYER1_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      LAYER1_REDIS_URL: redis://:redisdev@redis:6379/0
      PYTHONPATH: /app
      REDIS_URL: redis://:redisdev@redis:6379/0
    healthcheck:
      test:
        - CMD-SHELL
        - /app/.venv/bin/celery -A src.shared.tasks inspect ping -d celery@$$(hostname) --timeout=5
      timeout: 10s
      interval: 30s
      retries: 3
    networks:
      value-fabric-network: null
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
